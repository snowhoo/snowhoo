<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷新历史缓存</title>
<style>body{opacity:0}</style>
</head>
<body>
<div id="history-today">
  <style>
    #history-today .history-card{width:100%;max-width:800px;margin:0 auto;font-family:system-ui,sans-serif;background:#fff;border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,0.03);text-align:center}
    #history-today .history-header{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.6rem 1rem}
    #history-today .history-header h3{font-size:1rem;font-weight:500;color:#2b4f6e}
    #history-today .history-date{font-size:0.7rem;color:#8ba0bc;background:#f5f8fe;padding:0.2rem 0.6rem;border-radius:30px}
    #history-today .detail-panel{display:none;padding:0.5rem 1rem 1.2rem}
    #history-today .events-list{display:flex;flex-direction:column;gap:1rem}
    #history-today .event-item{text-align:center}
    #history-today .event-year{font-weight:600;font-size:0.85rem;color:#4f7aa6;background:#f1f6fd;display:inline-block;padding:0.1rem 0.45rem;border-radius:16px;margin-right:0.6rem}
    #history-today .event-title{font-size:0.9rem;line-height:1.45;color:#2c445e;display:inline}
    #history-today .status-message{color:#9ab0c9;font-size:0.8rem;text-align:center;padding:1rem}
  </style>
  <div class="history-card">
    <div class="history-header">
      <h3>历史上的今天</h3>
      <span class="history-date" id="htQueryDate"></span>
    </div>
    <div id="htDetailPanel" class="detail-panel">
      <div id="htEventsContainer" class="events-list"><div class="status-message">加载中...</div></div>
    </div>
  </div>
</div>
<script>
(function(){
  var API = 'https://api.asilu.com/today';
  var CACHE_KEY = 'ht_cache';
  var todayStr = '';
  var DONE = false;

  function getToday() {
    var d = new Date();
    var m = String(d.getMonth()+1), day = String(d.getDate());
    todayStr = d.getFullYear()+'-'+m+'-'+day;
    return { year: d.getFullYear(), month: m, day: day, display: d.getFullYear()+'年'+m+'月'+day+'日' };
  }

  function getCache() {
    try {
      var raw = localStorage.getItem(CACHE_KEY);
      if(!raw) return null;
      var c = JSON.parse(raw);
      if(c.date === todayStr && Array.isArray(c.events) && c.events.length > 0) return c.events;
    } catch(e){}
    return null;
  }

  function setCache(events) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({date:todayStr, events:events})); } catch(e){}
    if(!DONE) { DONE = true; document.title = '[OK] ' + events.length + ' events cached'; window.close(); }
  }

  function fetchEvents() {
    return new Promise(function(resolve, reject) {
      var controller = new AbortController();
      var tid = setTimeout(function(){ controller.abort(); }, 8000);
      fetch(API, {signal:controller.signal}).then(function(r){
        clearTimeout(tid);
        if(!r.ok){ reject(new Error('请求失败')); return; }
        return r.json();
      }).then(function(json){
        clearTimeout(tid);
        if(!json || json.code !== 200 || !Array.isArray(json.data)) {
          reject(new Error('数据格式错误'));
          return;
        }
        var events = json.data.map(function(item){
          return { year: item.year, text: item.title };
        });
        resolve(events);
      }).catch(function(e){
        clearTimeout(tid);
        reject(e);
      });
    });
  }

  var t = getToday();
  document.getElementById('htQueryDate').innerText = t.display;

  var cached = getCache();
  if(cached) {
    document.title = '[HIT] using cache';
    window.close();
  } else {
    document.title = '[MISS] fetching...';
    fetchEvents().then(function(evs) {
      setCache(evs);
    }).catch(function() {
      document.title = '[ERR] failed';
      window.close();
    });
    setTimeout(function(){ if(!DONE) { DONE=true; window.close(); } }, 15000);
  }
})();
</script>
</body>
</html>
