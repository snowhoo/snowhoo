<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澶滆</title>
  <style>
    .yedu-app { padding: 0; }

    .yedu-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .yedu-header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary, #1a1a2e);
    }

    .yedu-header span {
      font-size: 0.85rem;
      color: var(--text-secondary, #888);
    }

    .yedu-article-list { padding: 0 4px; }

    .yedu-article-card {
      background: var(--card-bg, rgba(255, 255, 255, 0.95));
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px var(--shadow, rgba(0, 0, 0, 0.08));
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .yedu-article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px var(--shadow, rgba(0, 0, 0, 0.12));
    }

    .yedu-article-main {
      display: flex;
      height: 110px;
    }

    .yedu-article-cover {
      position: relative;
      flex: 0 0 120px;
      width: 120px;
      overflow: hidden;
      background: var(--cover-bg, #2d4a6e);
    }

    .yedu-article-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .yedu-article-card:hover .yedu-article-cover img { transform: scale(1.06); }

    .yedu-audio-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      background: rgba(233, 69, 96, 0.9);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 2;
    }

    .yedu-audio-btn:hover { background: rgba(233, 69, 96, 1); transform: translate(-50%, -50%) scale(1.1); }

    .yedu-audio-btn svg { width: 14px; height: 14px; fill: #fff; margin-left: 2px; }
    .yedu-audio-btn.yedu-playing svg { margin-left: 0; }
    .yedu-audio-btn.yedu-playing svg path { d: "M6 4h4v16H6zM14 4h4v16h-4z"; }

    .yedu-article-meta {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      gap: 3px;
      z-index: 2;
    }

    .yedu-article-meta svg { width: 9px; height: 9px; fill: currentColor; }

    .yedu-audio-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.3);
      z-index: 3;
    }

    .yedu-audio-progress-bar {
      height: 100%;
      background: #e94560;
      width: 0;
      transition: width 0.1s linear;
    }

    .yedu-article-content {
      flex: 1;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .yedu-article-title {
      font-size: 0.95rem;
      color: var(--text-primary, #1a1a2e);
      margin-bottom: 5px;
      line-height: 1.4;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .yedu-article-summary {
      color: var(--text-secondary, #888);
      font-size: 0.78rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .yedu-read-more {
      color: #e94560;
      font-size: 0.72rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-top: 5px;
      transition: gap 0.2s ease;
    }

    .yedu-read-more:hover { gap: 5px; }
    .yedu-read-more svg { width: 11px; height: 11px; fill: #e94560; transition: transform 0.2s ease; }
    .yedu-read-more.yedu-expanded svg { transform: rotate(180deg); }

    .yedu-full-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      background: var(--card-bg, rgba(255, 255, 255, 0.98));
    }

    .yedu-full-content.yedu-show { max-height: 2000px; }

    .yedu-full-content-inner {
      padding: 14px;
      color: var(--text-primary, #333);
      font-size: 0.85rem;
      line-height: 1.8;
      border-top: 1px solid var(--border-color, #eee);
    }

    .yedu-full-content-inner p { margin-bottom: 10px; }

    .yedu-source-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--text-secondary, #999);
      font-size: 0.75rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .yedu-source-link:hover { color: #e94560; }

    .yedu-loading {
      text-align: center;
      color: var(--text-secondary, rgba(255, 255, 255, 0.5));
      padding: 40px 0;
      font-size: 0.9rem;
    }

    .yedu-img-placeholder {
      width: 100%;
      height: 100%;
      background: var(--cover-bg, #2d4a6e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .yedu-pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
    }

    .yedu-pagination button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: var(--btn-bg, rgba(255, 255, 255, 0.15));
      color: var(--text-primary, #fff);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .yedu-pagination button:hover:not(:disabled) { background: rgba(233, 69, 96, 0.8); }
    .yedu-pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .yedu-pagination .yedu-page-info { color: var(--text-secondary, rgba(255, 255, 255, 0.6)); font-size: 0.8rem; }

    @media (max-width: 600px) {
      .yedu-article-main { height: auto; flex-direction: column; }
      .yedu-article-cover { flex: none; width: 100%; height: 150px; }
      .yedu-audio-btn { width: 44px; height: 44px; }
      .yedu-article-content { padding: 10px 12px; }
      .yedu-article-title { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="yedu-app">
    <div class="yedu-header">
      <h1>澶滆</h1>
      <span>姣忔櫄鍗佺偣路娓╂殩鐩镐即</span>
    </div>

    <div class="yedu-article-list" id="yeduArticleList">
      <div class="yedu-loading">姝ｅ湪鍔犺浇...</div>
    </div>
  </div>

  <script type="module">
    const PAGE_SIZE = 10;
    let currentPage = 1;
    let articles = [];
    let currentAudio = null;
    let currentBtn = null;

    async function loadData() {
      try {
        // ES Module import() 鏀寔 file:// 鐩存帴璁块棶锛屾棤 CORS 闄愬埗
        const indexModule = await import('./data/article-list.js');
        const index = indexModule.default;

        // 鎸夌湡瀹炲彂甯冩棩鏈熼檷搴忔帓鍒?
        index.sort((a, b) => (b.pubDate || '').localeCompare(a.pubDate || ''));

        // 骞惰鍔犺浇鎵€鏈夋枃绔狅紙import() 鏀寔 file://锛?
        const fetches = index.map(item =>
          import(`./data/${item.filename}`).then(m => m.default).catch(() => null)
        );
        const results = await Promise.all(fetches);

        articles = results.filter(Boolean).map((article, i) => ({
          ...article,
          _filename: index[i].filename,
          _pubDate: index[i].pubDate,
        }));

        renderPage(1);
      } catch (error) {
        console.error('鍔犺浇澶辫触:', error);
        document.getElementById('yeduArticleList').innerHTML =
          '<div class="yedu-loading">鏁版嵁鍔犺浇澶辫触锛岃鍒锋柊閲嶈瘯</div>';
      }
    }

    function renderPage(page) {
      currentPage = page;
      const start = (page - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageArticles = articles.slice(start, end);
      const totalPages = Math.ceil(articles.length / PAGE_SIZE);

      const container = document.getElementById('yeduArticleList');

      if (articles.length === 0) {
        container.innerHTML = '<div class="yedu-loading">鏆傛棤鍐呭</div>';
        return;
      }

      let html = pageArticles.map((article, i) => {
        const globalIndex = start + i;
        const hasAudio = !!article.audioSrc;
        const imgSrc = article.coverSrc || '';

        return `
        <div class="yedu-article-card" data-index="${globalIndex}">
          <div class="yedu-article-main">
            <div class="yedu-article-cover">
              ${imgSrc ? `<img src="${imgSrc}" alt="${article.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
              <div class="yedu-img-placeholder" style="display:${imgSrc ? 'none' : 'flex'}">澶滆</div>
              ${hasAudio ? `
              <button class="yedu-audio-btn" onclick="yeduToggleAudio(${globalIndex}, this)" data-src="${article.audioSrc}">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </button>` : ''}
              <div class="yedu-article-meta">
                ${article.duration ? `
                  <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                  <span>${article.duration}</span>
                ` : ''}
                ${article.pubDate ? `<span>${article.pubDate}</span>` : `<span>${article.timeAgo || ''}</span>`}
              </div>
              ${hasAudio ? `
              <div class="yedu-audio-progress">
                <div class="yedu-audio-progress-bar" id="yedu-progress-${globalIndex}"></div>
              </div>` : ''}
            </div>
            <div class="yedu-article-content">
              <h2 class="yedu-article-title" title="${article.title}">${article.title}</h2>
              <p class="yedu-article-summary">${article.summary || ''}</p>
              <div class="yedu-read-more" onclick="yeduToggleContent(this, ${globalIndex})">
                <span>灞曞紑</span>
                <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
              </div>
            </div>
          </div>
          <div class="yedu-full-content" id="yedu-full-content-${globalIndex}">
            <div class="yedu-full-content-inner">
              ${(article.paragraphs || []).map(p => `<p>${p}</p>`).join('')}
              <a href="${article.url}" target="_blank" class="yedu-source-link">鏌ョ湅鍘熸枃 鈫?/a>
            </div>
          </div>
        </div>
      `}).join('');

      if (totalPages > 1) {
        html += `
        <div class="yedu-pagination">
          <button onclick="yeduRenderPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>涓婁竴椤?/button>
          <span class="yedu-page-info">${page} / ${totalPages}</span>
          <button onclick="yeduRenderPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>涓嬩竴椤?/button>
        </div>`;
      }

      container.innerHTML = html;
    }

    function yeduToggleAudio(index, btn) {
      const src = btn.dataset.src;
      const progressBar = document.getElementById(`yedu-progress-${index}`);

      if (currentAudio && currentAudio.src === src) {
        if (currentAudio.paused) {
          currentAudio.play();
          btn.classList.add('yedu-playing');
          btn.querySelector('svg path').setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
        } else {
          currentAudio.pause();
          btn.classList.remove('yedu-playing');
          btn.querySelector('svg path').setAttribute('d', 'M8 5v14l11-7z');
        }
        return;
      }

      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        if (currentBtn) {
          currentBtn.classList.remove('yedu-playing');
          currentBtn.querySelector('svg path').setAttribute('d', 'M8 5v14l11-7z');
        }
      }

      const audio = new Audio(src);
      currentAudio = audio;
      currentBtn = btn;

      audio.addEventListener('timeupdate', () => {
        if (audio.duration && progressBar) {
          progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
        }
      });

      audio.addEventListener('ended', () => {
        btn.classList.remove('yedu-playing');
        btn.querySelector('svg path').setAttribute('d', 'M8 5v14l11-7z');
        if (progressBar) progressBar.style.width = '0%';
      });

      audio.addEventListener('error', () => {
        btn.classList.remove('yedu-playing');
        btn.querySelector('svg path').setAttribute('d', 'M8 5v14l11-7z');
        if (progressBar) progressBar.style.width = '0%';
      });

      btn.classList.add('yedu-playing');
      btn.querySelector('svg path').setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
      audio.play().catch(() => {
        btn.classList.remove('yedu-playing');
        btn.querySelector('svg path').setAttribute('d', 'M8 5v14l11-7z');
      });
    }

    function yeduToggleContent(el, index) {
      const content = document.getElementById(`yedu-full-content-${index}`);
      const isShow = content.classList.toggle('yedu-show');
      el.querySelector('span').textContent = isShow ? '鏀惰捣' : '灞曞紑';
      el.classList.toggle('yedu-expanded');
    }

    function yeduRenderPage(page) {
      renderPage(page);
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
