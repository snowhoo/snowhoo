    <path d="M60 400 Q63 375 60 383" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/><path d="M150 400 Q153 365 150 373" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M240 400 Q243 375 240 383" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/><path d="M330 400 Q333 365 330 373" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M420 400 Q423 375 420 383" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/><path d="M510 400 Q513 365 510 373" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M600 400 Q603 375 600 383" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/><path d="M690 400 Q693 365 690 373" stroke="#81c784" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0.0" y="320" width="1300" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="406.25" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="1056.25" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#1b5e20" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">清明</text>

  <!-- 拼音 -->
  <text x="1056.25" y="246" text-anchor="middle" font-size="20"
    fill="#1b5e20" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Qīngmíng</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#1b5e20" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="1056.25" y="287" text-anchor="middle" font-size="15"
    fill="#1b5e20" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">04月04日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="1056.25" y="378" text-anchor="middle" font-size="13"
    fill="#1b5e20" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">追思  ·  踏青  ·  新生  ·  春意盎然</text>
</svg>