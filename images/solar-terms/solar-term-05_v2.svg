/><line x1="588" y1="50" x2="584" y2="68" stroke="#78909c" stroke-width="1.2" opacity="0.18"/><line x1="616" y1="62" x2="612" y2="80" stroke="#78909c" stroke-width="1.2" opacity="0.24"/><line x1="644" y1="74" x2="640" y2="92" stroke="#78909c" stroke-width="1.2" opacity="0.30000000000000004"/><line x1="672" y1="50" x2="668" y2="68" stroke="#78909c" stroke-width="1.2" opacity="0.12"/>
