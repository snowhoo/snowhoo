# --------------------------------------
# Hexo Butterfly Theme Configuration
# 持久保存配置 - 确保 npm install 后不丢失
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo: /images/logo.png
  display_title: false
  display_post_title: true
  fixed: true

menu:
   首页: / || fas fa-home
   时间轴: /archives ||fas fa-archive
   标签: /tags/ || fas fa-tags
   分类: /categories/ || fas fa-folder-open
   友情链接: /link/ || fas fa-link
   关于: /about/ || fas fa-heart

code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

social:
   fab fa-github: https://github.com/snowhoo || Github || '#24292e'
   fas fa-envelope: mailto:9187541@qq.com || Email || '#4a7dbe'
   fab fa-qq: http://wpa.qq.com/msgrd?v=3&uin=9187541&site=qq&menu=yes || QQ || '#4a7dbe'
   fab fa-weibo: https://weibo.com/snowhoo || weibo || '#be514a'

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: /images/favicon.ico

avatar:
  img: /images/profile_PIC.jpg
  effect: false

disable_top_img: true

default_top_img: /images/banner.jpg

index_img:
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
footer_img: true
background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /images/friend_404.gif
  post_page: /images/404.jpg

error_404:
  enable: true
  subtitle: '页面没有找到'
  background: /images/404.jpg

post_meta:
  page:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------

index_site_info_top:
index_top_img_height:

subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
      - 一九七九年的春天
      - 注定是不平凡的
      - 就在九个月前
      - 小红在亿万竞争者中脱颖而出
      - 并坚强的存活了下来
      - 于是新的生命故事由此拉开序幕
      - ……

index_layout: 3

index_post_content:
  method: 2
  length: 500

# --------------------------------------
# Post Settings
# --------------------------------------

toc:
  post: true
  page: true
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: true
  text:
  QR_code:
     - img: /images/wechat.png
       text: 微信
     - img: /images/alipay.jpg
       text: 支付宝

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 2

noticeOutdate:
  enable: false
  style: flat
  limit_day: 365
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: false
    version: false
  custom_text: 小红故事 | SnowHoo.NET

# --------------------------------------
# Aside Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 1979年，那是一个春天……
    button:
      enable: true
      icon: fab fa-github
      text: 我的 Github
      link: https://github.com/snowhoo
  card_announcement:
    enable: true
    content: 《我在八王之乱当卧底》已在番茄连载，每晚 22:00 左右加更，欢迎大家阅读！
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: true
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 10
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: YYYY 年 MM 月
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date:

# --------------------------------------
# Bottom right button
# --------------------------------------

rightside_bottom:

translate:
  enable: true
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: false
  start:
  end:

rightside_scroll_percent: false

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------

anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Math
# --------------------------------------

math:
  use:
  per_page: true
  hide_scrollbar: false
  mathjax:
    enableMenu: true
    tags: none
  katex:
    copy_tex: false

# --------------------------------------
# Search
# --------------------------------------

search:
  use: local_search
  placeholder:
  algolia_search:
    hitsPerPage: 6
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: true
      hitsPerPage: 8
    CDN:
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# Share System
# --------------------------------------

share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# Comments System
# --------------------------------------

comments:
  use:
  text: true
  lazyload: false
  count: false
  card_post_count: false

# --------------------------------------
# Analysis
# --------------------------------------

baidu_analytics:
google_analytics:
cloudflare_analytics:
microsoft_clarity:

umami_analytics:
  enable: false
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    token:

google_tag_manager:
  tag_id:
  domain:

# --------------------------------------
# Advertisement
# --------------------------------------

google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

ad:
  index:
  aside:
  post:

site_verification:

# --------------------------------------
# Beautify / Effect
# --------------------------------------

category_ui:
tag_ui:

rounded_corners_ui: true
text_align_justify: false

mask:
  header: true
  footer: true

preloader:
  enable: false
  source: 1
  pace_css_url:

enter_transitions: true
display_mode: light

beautify:
  enable: false
  field: post
  title_prefix_icon:
  title_prefix_icon_color:

font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

hr_icon:
  enable: true
  icon:
  icon_top:

activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

