      .post > section,
      #article-container > div,
      #article-container > section {
        margin-top: 1px !important;
        margin-bottom: 1px !important;
      }
      </style>
      <script>
      document.addEventListener('DOMContentLoaded', function() {
        // 延迟初始化，确保页面完全加载
        setTimeout(function() {
          initTTSPlayer();
        }, 500);
      });

      function initTTSPlayer() {
        // 检查是否在文章页面
        const postEl = document.getElementById('post');
        const articleEl = document.getElementById('article-container');
        const isPostPage = postEl !== null || articleEl !== null;
        if (!isPostPage) {
          console.log('[TTS] Not a post page, exiting');
          return;
        }

        // 获取文章标题元素
        const titleEl = document.querySelector('#post h1, .post-title, #article-container h1, article h1');
        if (!titleEl) {
          console.log('[TTS] Title element not found');
          return;
        }

        // 创建行内包装器
        const wrapper = document.createElement('span');
        wrapper.className = 'tts-inline-wrapper';

        // 检查浏览器是否支持语音合成
        const isTTSSupported = 'speechSynthesis' in window;

        if (isTTSSupported) {
          // 支持 TTS，创建真实按钮
          wrapper.innerHTML = `
            <button class="tts-btn-inline" id="tts-btn" title="朗读文章">
              <i class="fas fa-volume-up"></i>
            </button>
            <div class="tts-controls-inline" id="tts-controls">
              <span class="tts-status-inline" id="tts-status">就绪</span>
              <select class="tts-rate-inline" id="tts-rate" title="语速">
                <option value="0.7">慢</option>
                <option value="1" selected>正常</option>
                <option value="1.3">快</option>
              </select>
              <button class="tts-stop-inline" id="tts-stop" title="停止">停止</button>
            </div>
          `;
        } else {
          // 不支持 TTS，创建灰色虚拟按钮
          wrapper.innerHTML = `
            <button class="tts-btn-dummy" id="tts-dummy" disabled title="当前浏览器不支持TTS朗读功能">
              <i class="fas fa-volume-mute"></i>
            </button>
          `;
        }

        // 插入到标题内部最前面（与标题文字同一行）
        titleEl.insertBefore(wrapper, titleEl.firstChild);

        // 如果支持 TTS，初始化播放器
        if (isTTSSupported) {
          console.log('[TTS] Initializing TTS player...');
          new TTSPlayer();
        } else {
          console.log('[TTS] Browser does not support TTS');
        }
      }

      class TTSPlayer {
        constructor() {
          this.synth = window.speechSynthesis;
          this.utterance = null;
          this.isPlaying = false;
          this.isPaused = false;
          this.btn = document.getElementById('tts-btn');
          this.controls = document.getElementById('tts-controls');
          this.status = document.getElementById('tts-status');
          this.rateSelect = document.getElementById('tts-rate');
          this.stopBtn = document.getElementById('tts-stop');

          this.bindEvents();
        }

        bindEvents() {
          this.btn.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止冒泡，避免立即触发 document 点击
            this.toggle();
          });
          this.stopBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            this.stop();
          });
          this.rateSelect.addEventListener('change', () => {
            if (this.isPlaying) {
              this.stop();
              this.play();
            }
          });
          this.controls.addEventListener('click', (e) => {
            e.stopPropagation(); // 点击控件区域不隐藏
          });

          // 页面离开时停止播放
          window.addEventListener('beforeunload', () => this.stop());

          // 点击空白处隐藏控件
          document.addEventListener('click', () => {
            if (this.controls.classList.contains('active') && !this.isPlaying) {
              this.controls.classList.remove('active');
            }
          });
        }

        getArticleText() {
          // 获取文章内容，排除不需要朗读的元素
          const article = document.querySelector('#article-container, .post-content, article');
          if (!article) return '';

          // 克隆节点以避免修改原内容
          const clone = article.cloneNode(true);

          // 移除不需要朗读的元素
          const excludeSelectors = ['.code-block', 'pre', 'code', 'script', 'style', '.copyright', '.share', '.relatedPosts', 'img', 'iframe'];
          excludeSelectors.forEach(selector => {
            const elements = clone.querySelectorAll(selector);
            elements.forEach(el => el.remove());
          });

          // 获取纯文本
          let text = clone.textContent || clone.innerText || '';

          // 清理文本
          text = text.replace(/\s+/g, ' ').trim();

          // 限制长度
          if (text.length > 5000) {
            text = text.substring(0, 5000) + '...（内容过长，已截断）';
          }

          return text;
        }

        play() {
          const text = this.getArticleText();
          if (!text) {
            this.status.textContent = '无内容';
            return;
          }

          // 取消之前的朗读
          this.synth.cancel();

          this.utterance = new SpeechSynthesisUtterance(text);

          // 设置语言为中文
          this.utterance.lang = 'zh-CN';

          // 设置语速
          this.utterance.rate = parseFloat(this.rateSelect.value);

          // 尝试设置中文语音
          const voices = this.synth.getVoices();
          const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('CN'));
          if (zhVoice) {
            this.utterance.voice = zhVoice;
          }

          // 事件监听
          this.utterance.onstart = () => {
            this.isPlaying = true;
            this.isPaused = false;
            this.btn.classList.add('playing');
            this.btn.innerHTML = '<i class="fas fa-pause"></i>';
            this.status.textContent = '朗读中...';
            this.controls.classList.add('active');
            // 2秒后自动隐藏控件（播放中不改变状态的话）
            clearTimeout(this._hideTimer);
            this._hideTimer = setTimeout(() => {
              if (this.isPlaying && !this.isPaused) {
                this.controls.classList.remove('active');
              }
            }, 2000);
          };

          this.utterance.onend = () => {
            this.isPlaying = false;
            this.isPaused = false;
            this.btn.classList.remove('playing');
            this.btn.innerHTML = '<i class="fas fa-volume-up"></i>';
            this.status.textContent = '完成';
            setTimeout(() => {
              this.controls.classList.remove('active');
              this.status.textContent = '就绪';
            }, 2000);
          };

          this.utterance.onerror = (e) => {
            console.error('[TTS] Error:', e);
            this.isPlaying = false;
            this.btn.classList.remove('playing');
            this.btn.innerHTML = '<i class="fas fa-volume-up"></i>';
            this.status.textContent = '错误';
          };

          this.synth.speak(this.utterance);
        }

        pause() {
          if (this.synth.speaking && !this.synth.paused) {
            this.synth.pause();
            this.isPaused = true;
            this.btn.innerHTML = '<i class="fas fa-play"></i>';
            this.status.textContent = '已暂停';
          }
        }

        resume() {
          if (this.synth.paused) {
            this.synth.resume();
            this.isPaused = false;
            this.btn.innerHTML = '<i class="fas fa-pause"></i>';
            this.status.textContent = '朗读中...';
          }
        }

        stop() {
          this.synth.cancel();
          this.isPlaying = false;
          this.isPaused = false;
          this.btn.classList.remove('playing');
          this.btn.innerHTML = '<i class="fas fa-volume-up"></i>';
          this.status.textContent = '就绪';
          this.controls.classList.remove('active');
        }

        toggle() {
          if (!this.isPlaying) {
            this.play();
          } else if (this.isPaused) {
            this.resume();
          } else {
            this.pause();
          }
        }
      }
      </script>
