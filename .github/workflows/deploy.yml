name: Hexo Deploy

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Patch Font Awesome CDN to bootcdn (domestic CDN)
        run: |
          sed -i 's|cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css|cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css|g' node_modules/hexo-theme-butterfly/layout/includes/head.pug

      - name: Generate static files
        run: npx hexo generate

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4