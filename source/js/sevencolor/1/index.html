<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜读</title>
  <style>
    /* CSS 变量定义在 :root */
    :root {
      --yedu-text-primary: #1a1a2e;
      --yedu-text-secondary: #888;
      --yedu-card-bg: rgba(255, 255, 255, 0.95);
      --yedu-cover-bg: #2d4a6e;
      --yedu-border-color: #eee;
    }
    [data-theme="dark"] {
      --yedu-text-primary: #e8e8e8;
      --yedu-text-secondary: #90a4ae;
      --yedu-card-bg: rgba(30, 30, 50, 0.95);
      --yedu-cover-bg: #1a1a2e;
      --yedu-border-color: #333;
    }

    .yedu-app {
      --text-primary: var(--yedu-text-primary);
      --text-secondary: var(--yedu-text-secondary);
      --card-bg: var(--yedu-card-bg);
      --cover-bg: var(--yedu-cover-bg);
      --border-color: var(--yedu-border-color);
      padding: 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .yedu-header {
      align-items: baseline;
      gap: 12px;
    }

    .yedu-header span {
      font-size: 0.85rem;
      color: var(--text-secondary, #888);
    }

    .yedu-article-list { padding: 0; text-align: left; }

    .yedu-article-card {
      background: var(--card-bg, rgba(255, 255, 255, 0.95));
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .yedu-article-card:hover {
      transform: translateY(-2px);
    }

    .yedu-article-main {
      display: flex;
      gap: 12px;
    }

    /* 默认水平布局：封面 50%，内容 50% */
    .yedu-article-cover-card {
      flex: 0 0 50%;
      width: 50%;
      align-self: flex-start;
      background: var(--card-bg, rgba(255, 255, 255, 0.95));
      border-radius: 10px;
      overflow: hidden;
    }

    .yedu-article-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1;
      overflow: hidden;
      background: var(--cover-bg, #2d4a6e);
    }

    .yedu-article-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.3s ease;
      display: block;
    }

    .yedu-article-card:hover .yedu-article-cover img { transform: scale(1.06); }

    .yedu-audio-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      background: rgba(233, 69, 96, 0.9);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 2;
    }

    .yedu-audio-btn:hover { background: rgba(233, 69, 96, 1); transform: translate(-50%, -50%) scale(1.1); }

    .yedu-audio-btn svg { width: 14px; height: 14px; fill: #fff; margin-left: 2px; }
    .yedu-audio-btn.yedu-playing svg { margin-left: 0; }

    .yedu-article-meta {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      gap: 3px;
      z-index: 2;
    }

    .yedu-article-meta svg { width: 9px; height: 9px; fill: currentColor; }

    .yedu-corner-label {
      position: absolute;
      top: 6px;
      left: 6px;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.75rem;
      background: rgba(0, 0, 0, 0.1);
      padding: 0px 8px;
      border-radius: 18px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      white-space: nowrap;
    }

    .yedu-audio-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.3);
      z-index: 3;
    }

    .yedu-audio-progress-bar {
      height: 100%;
      background: #e94560;
      width: 0;
      transition: width 0.1s linear;
    }

    /* 内容卡片：默认占剩余50% */
    .yedu-article-content-card {
      flex: 0 0 50%;
      width: 50%;
      min-width: 0;
      background: var(--card-bg, rgba(255, 255, 255, 0.95));
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .yedu-article-content-card:hover {
      transform: translateY(-2px);
    }

    .yedu-article-content {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .yedu-article-title {
      color: var(--text-primary, #1a1a2e);
      font-weight: 600;
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin: 0 0 4px 0;
    }

    .yedu-article-date {
      color: var(--text-secondary, #aaa);
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    .yedu-article-summary {
      color: var(--text-secondary, #888);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0 0 8px 0;
      font-size: 0.82rem;
    }

    .yedu-read-more {
      color: #e94560;
      font-size: 0.7rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      margin: 0;
      padding: 0;
      border: none;
      background: none;
      transition: gap 0.2s ease;
    }

    .yedu-read-more:hover { gap: 4px; }
    .yedu-read-more svg { width: 10px; height: 10px; fill: #e94560; transition: transform 0.2s ease; }
    .yedu-read-more.yedu-expanded svg { transform: rotate(180deg); }

    .yedu-full-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      background: var(--card-bg, rgba(255, 255, 255, 0.98));
    }

    .yedu-full-content.yedu-show { max-height: none; }

    .yedu-full-inner {
      padding: 14px;
      color: var(--text-primary, #333);
      font-size: 0.85rem;
      line-height: 1.8;
      border-top: 1px solid var(--border-color, #eee);
    }

    .yedu-full-inner p { margin-bottom: 10px; }

    .yedu-source-link {
      display: inline-block;
      margin-top: 10px;
      color: var(--text-secondary, #999);
      font-size: 0.75rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .yedu-source-link:hover { color: #e94560; }

    .yedu-loading {
      text-align: center;
      color: var(--text-secondary, rgba(255, 255, 255, 0.5));
      padding: 40px 0;
      font-size: 0.9rem;
    }

    .yedu-img-placeholder {
      width: 100%;
      height: 100%;
      background: var(--cover-bg, #2d4a6e);
      background-image: url('./images/placeholder.webp');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .yedu-pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
    }

    .yedu-pagination button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: var(--btn-bg, rgba(255, 255, 255, 0.15));
      color: var(--text-primary, #fff);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .yedu-pagination button:hover:not(:disabled) { background: rgba(233, 69, 96, 0.8); }
    .yedu-pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    /*.yedu-pagination .yedu-page-info { color: var(--text-secondary, rgba(255, 255, 255, 0.6)); font-size: 0.8rem; }*/

    /* 小屏：纵向排列，各占100% */
    @media (max-width: 767px) {
      .yedu-article-main { flex-direction: column; gap: 12px; }
      .yedu-article-cover-card { flex: none !important; width: 100% !important; }
      .yedu-article-content-card { flex: none; width: 100%; }
      .yedu-audio-btn { width: 40px; height: 40px; }
      .yedu-article-content { padding: 10px; }
    }

    /* 中屏：水平布局，各占50% */
    @media (min-width: 768px) and (max-width: 1024px) {
      .yedu-article-main { gap: 10px; }
      .yedu-article-cover-card { flex: 0 0 50%; width: 50%; }
      .yedu-article-content-card { flex: 0 0 50%; width: 50%; }
    }

    /* 大屏：水平布局，封面25%，内容75% */
    @media (min-width: 1025px) {
      .yedu-article-main { gap: 12px; }
      .yedu-article-cover-card { flex: 0 0 25%; width: 25%; }
      .yedu-article-content-card { flex: 0 0 75%; width: 75%; }
    }
  </style>
</head>
<body>
  <div class="yedu-app">
    <div class="yedu-article-list" id="yeduArticleList">
      <div class="yedu-loading">正在加载...</div>
    </div>
  </div>


  <script>
    // basePath: 嵌入时由 sevencolor.js 传入，独立访问默认 ./
    var basePath = (typeof window.__SC_BASE_PATH !== 'undefined' ? window.__SC_BASE_PATH : './');
    // cid: 嵌入时由 sevencolor.js 传入，独立访问使用默认值
    var cid = (typeof window.__SC_ID !== 'undefined' ? window.__SC_ID : 'yedu');
    var prefix = '__' + cid + '_';

    // 主题检测：独立访问时根据系统偏好设置主题
    function detectTheme() {
      // 如果已经在嵌入环境，尝试从父文档获取主题
      try {
        var parentTheme = window.parent.document.documentElement.getAttribute('data-theme');
        if (parentTheme === 'dark' || parentTheme === 'light') {
          document.documentElement.setAttribute('data-theme', parentTheme);
          return;
        }
      } catch(e) {}
      // 否则根据系统偏好
      var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    }
    detectTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', detectTheme);

    // 替换 HTML 中的 yedu 标记（嵌入模式下 cid 不同时需要）
    function replaceCidMarkers() {
      if (cid === 'yedu') return; // 无需替换
      // 替换所有元素 ID
      var idEls = document.querySelectorAll('[id*="yedu"]');
      for (var i = 0; i < idEls.length; i++) {
        idEls[i].id = idEls[i].id.replace(/yedu/g, cid);
      }
      // 替换所有元素 class
      var classEls = document.querySelectorAll('[class*="yedu"]');
      for (var j = 0; j < classEls.length; j++) {
        classEls[j].className = classEls[j].className.replace(/yedu/g, cid);
      }
      // 替换 style 标签中的 CSS 类名
      var styles = document.querySelectorAll('style');
      for (var k = 0; k < styles.length; k++) {
        if (styles[k].textContent) {
          styles[k].textContent = styles[k].textContent.replace(/yedu/g, cid);
        }
      }
    }
    replaceCidMarkers();

    // p = CSS 前缀（已经过 cid 替换）
    var p = cid;

    var pausePath = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
    var playPath = 'M8 5v14l11-7z';

    // 动态加载数据文件
    fetch(basePath + 'data/index.json')
      .then(function(r) { 
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json(); 
      })
      .then(function(files) {
        return Promise.all(files.map(function(f) {
          return fetch(basePath + 'data/' + f).then(function(r) { 
            if (!r.ok) throw new Error('HTTP ' + r.status); 
            return r.text(); 
          });
        }));
      })
      .then(function(texts) {
        texts.forEach(function(text) {
          // 修复数据文件中的相对路径（coverSrc, audioSrc）
          text = text.replace(/"(\.[^"]+)"/g, function(m, path) {
            if (path.startsWith('/') || path.startsWith('http')) return m;
            return '"' + basePath + path.replace(/^\.\//, '') + '"';
          });
          try { eval(text); } catch(e) { console.error('Data eval error:', e); }
        });

        // 收集文章数据
        var articles = Object.keys(window)
          .filter(function(k) { return k.startsWith(prefix); })
          .sort()
          .reverse()
          .map(function(k) { return window[k]; });

        console.log('[SevenColor] loaded ' + articles.length + ' articles, prefix:', prefix);
        // 存储到全局供 __scRenderPage 使用
        window.__scArticles = articles;
        // 通知 sevencolor.js 缓存数据（嵌入模式）
        if (typeof onDataLoaded !== 'undefined' && onDataLoaded) {
          onDataLoaded(articles);
        }
        // 注册渲染函数
        if (typeof defineRender !== 'undefined' && defineRender) {
          defineRender(__scRenderPage);
        }
        __scRenderPage(1);
      })
      .catch(function(e) {
        console.error('[SevenColor] data load failed:', e);
        var container = document.getElementById(p + 'ArticleList');
        if (container) {
          container.innerHTML = '<div class="' + p + '-loading">加载失败：' + e.message + '</div>';
        }
      });

    function __scRenderPage(page) {
      var articles = (typeof window.__scArticles !== 'undefined' ? window.__scArticles : []);
      var PAGE_SIZE = 1;
      var start = (page - 1) * PAGE_SIZE;
      var end = start + PAGE_SIZE;
      var pageArticles = articles.slice(start, end);
      var totalPages = Math.ceil(articles.length / PAGE_SIZE);
      var container = document.getElementById(p + 'ArticleList');
      if (!container) return;

      if (articles.length === 0) {
        container.innerHTML = '<div class="' + p + '-loading">暂无内容</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < pageArticles.length; i++) {
        var article = pageArticles[i];
        var globalIndex = start + i;
        var hasAudio = !!article.audioSrc;
        var imgSrc = article.coverSrc || '';

        var metaHtml = '<div class="' + p + '-article-meta">';
        if (article.duration) {
          metaHtml += '<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><span>' + article.duration + '</span>';
        }
        metaHtml += '</div>';

        var progressHtml = hasAudio
          ? '<div class="' + p + '-audio-progress"><div class="' + p + '-audio-progress-bar" id="' + p + '-progress-' + globalIndex + '"></div></div>'
          : '';

        var paragraphsHtml = '';
        if (article.paragraphs && article.paragraphs.length) {
          for (var j = 0; j < article.paragraphs.length; j++) {
            paragraphsHtml += '<p>' + article.paragraphs[j] + '</p>';
          }
        }

        html += '<div class="' + p + '-article-card" data-index="' + globalIndex + '">' +
          '<div class="' + p + '-article-main">' +
            '<div class="' + p + '-article-cover-card">' +
              '<div class="' + p + '-article-cover">' +
                (imgSrc
                  ? '<img src="' + imgSrc + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
                  : '') +
                '<div class="' + p + '-img-placeholder" style="display:' + (imgSrc ? 'none' : 'flex') + '">夜读</div>' +
                (hasAudio
                  ? '<button class="' + p + '-audio-btn" data-index="' + globalIndex + '" data-src="' + article.audioSrc + '"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>'
                  : '') +
                '<span class="' + p + '-corner-label">每晚十点 · 温暖相伴</span>' +
                metaHtml +
                progressHtml +
              '</div>' +
            '</div>' +
            '<div class="' + p + '-article-content-card">' +
              '<div class="' + p + '-article-content">' +
                '<h3 class="' + p + '-article-title" title="' + article.title + '">' + article.title + '</h3>' +
                (article.pubDate ? '<div class="' + p + '-article-date">' + article.pubDate + '</div>' : '') +
                '<p class="' + p + '-article-summary">' + (article.summary || '') + '</p>' +
                '<div class="' + p + '-read-more" data-index="' + globalIndex + '"><span>展开</span><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="' + p + '-full-content" id="' + p + '-full-content-' + globalIndex + '">' +
            '<div class="' + p + '-full-inner">' +
              paragraphsHtml +
            '</div>' +
          '</div>' +
        '</div>';
      }

      if (totalPages > 1) {
        html += '<div class="' + p + '-pagination" data-total="' + totalPages + '" data-page="' + page + '">' +
          '<button class="' + p + '-prev-btn" ' + (page <= 1 ? 'disabled' : '') + '>上一页</button>' +
          '<span class="' + p + '-page-info">' + page + ' / ' + totalPages + '</span>' +
          '<button class="' + p + '-next-btn" ' + (page >= totalPages ? 'disabled' : '') + '>下一页</button>' +
        '</div>';
      }

      container.innerHTML = html;

      if (window._scHandler) {
        container.removeEventListener('click', window._scHandler);
      }
      window._scHandler = function(e) {
        var btn = e.target.closest('.' + p + '-audio-btn');
        if (btn) {
          e.stopPropagation();
          __scToggleAudio(parseInt(btn.getAttribute('data-index')), btn);
          return;
        }
        var readMore = e.target.closest('.' + p + '-read-more');
        if (readMore) {
          e.stopPropagation();
          __scToggleContent(readMore, parseInt(readMore.getAttribute('data-index')));
          return;
        }
        var prevBtn = e.target.closest('.' + p + '-prev-btn');
        if (prevBtn && !prevBtn.disabled) {
          var pg = container.querySelector('.' + p + '-pagination');
          if (pg) __scRenderPage(parseInt(pg.getAttribute('data-page')) - 1);
          return;
        }
        var nextBtn = e.target.closest('.' + p + '-next-btn');
        if (nextBtn && !nextBtn.disabled) {
          var pg = container.querySelector('.' + p + '-pagination');
          if (pg) __scRenderPage(parseInt(pg.getAttribute('data-page')) + 1);
          return;
        }
      };
      container.addEventListener('click', window._scHandler);
    }

    function __scToggleAudio(index, btn) {
      var src = btn.getAttribute('data-src');
      var progressBar = document.getElementById(p + '-progress-' + index);
      var svg = btn.querySelector('svg');
      var pathEl = svg.querySelector('path');

      if (window._scAudio && window._scAudio._scSrc === src) {
        if (window._scAudio.paused) {
          window._scAudio.play();
          btn.classList.add(p + '-playing');
          pathEl.setAttribute('d', pausePath);
        } else {
          window._scAudio.pause();
          btn.classList.remove(p + '-playing');
          pathEl.setAttribute('d', playPath);
        }
        return;
      }

      if (window._scAudio) {
        window._scAudio.pause();
        if (window._scAudioBtn) {
          window._scAudioBtn.classList.remove(p + '-playing');
          var oldPath = window._scAudioBtn.querySelector('svg path');
          if (oldPath) oldPath.setAttribute('d', playPath);
        }
      }

      var audio = new Audio(src);
      audio._scSrc = src;
      window._scAudio = audio;
      window._scAudioBtn = btn;

      audio.addEventListener('timeupdate', function() {
        if (audio.duration && progressBar) {
          progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
        }
      });

      audio.addEventListener('ended', function() {
        btn.classList.remove(p + '-playing');
        pathEl.setAttribute('d', playPath);
        if (progressBar) progressBar.style.width = '0%';
      });

      audio.addEventListener('error', function() {
        btn.classList.remove(p + '-playing');
        pathEl.setAttribute('d', playPath);
        if (progressBar) progressBar.style.width = '0%';
      });

      btn.classList.add(p + '-playing');
      pathEl.setAttribute('d', pausePath);
      audio.play().catch(function() {
        btn.classList.remove(p + '-playing');
        pathEl.setAttribute('d', playPath);
      });
    }

    function __scToggleContent(el, index) {
      var content = document.getElementById(p + '-full-content-' + index);
      if (!content) return;
      var isShow = content.classList.toggle(p + '-show');
      el.querySelector('span').textContent = isShow ? '收起' : '展开';
      el.classList.toggle(p + '-expanded');
    }

    // 注册全局渲染函数（嵌入模式关闭后重新打开时使用）
    // 已在上面通过 defineRender 注册
  </script>
</body>
</html>
