<div class="yedu-app">
  <div class="yedu-article-list" id="yeduArticleList">
    <div class="yedu-loading">正在加载...</div>
  </div>
</div>

<style>
:root {
  --yedu-text-primary: #1a1a2e;
  --yedu-text-secondary: #888;
  --yedu-card-bg: rgba(255, 255, 255, 0.95);
  --yedu-cover-bg: #2d4a6e;
  --yedu-border-color: #eee;
}
[data-theme="dark"] {
  --yedu-text-primary: #e8e8e8;
  --yedu-text-secondary: #90a4ae;
  --yedu-card-bg: rgba(30, 30, 50, 0.95);
  --yedu-cover-bg: #1a1a2e;
  --yedu-border-color: #333;
}

.yedu-app {
  --text-primary: var(--yedu-text-primary);
  --text-secondary: var(--yedu-text-secondary);
  --card-bg: var(--yedu-card-bg);
  --cover-bg: var(--yedu-cover-bg);
  --border-color: var(--yedu-border-color);
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
}

.yedu-article-list { padding: 0; text-align: left; }

.yedu-article-main {
  display: flex;
  gap: 12px;
}

.yedu-article-cover-card {
  flex: 0 0 50%;
  width: 50%;
  align-self: flex-start;
  background: var(--card-bg, rgba(255, 255, 255, 0.95));
  border-radius: 10px;
  overflow: hidden;
}

.yedu-article-cover {
  position: relative;
  width: 100%;
  aspect-ratio: 2 / 1;
  overflow: hidden;
  background: var(--cover-bg, #2d4a6e);
}

.yedu-article-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transition: transform 0.3s ease;
  display: block;
}

.yedu-article-card:hover .yedu-article-cover img { transform: scale(1.06); }

.yedu-audio-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 36px;
  height: 36px;
  background: rgba(233, 69, 96, 0.9);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  z-index: 2;
}
.yedu-audio-btn:hover { background: rgba(233, 69, 96, 1); transform: translate(-50%, -50%) scale(1.1); }
.yedu-audio-btn svg { width: 14px; height: 14px; fill: #fff; margin-left: 2px; }
.yedu-audio-btn.yedu-playing svg { margin-left: 0; }

.yedu-corner-label {
  position: absolute;
  top: 6px;
  left: 6px;
  color: rgba(255, 255, 255, 0.95);
  font-size: 0.75rem;
  background: rgba(0, 0, 0, 0.1);
  padding: 0px 8px;
  border-radius: 18px;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
  pointer-events: none;
  white-space: nowrap;
}

.yedu-article-meta {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  padding: 2px 6px;
  border-radius: 8px;
  font-size: 0.65rem;
  display: flex;
  align-items: center;
  gap: 3px;
  z-index: 2;
}
.yedu-article-meta svg { width: 9px; height: 9px; fill: currentColor; }

.yedu-audio-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: rgba(255, 255, 255, 0.3);
  z-index: 3;
}
.yedu-audio-progress-bar {
  height: 100%;
  background: #e94560;
  width: 0;
  transition: width 0.1s linear;
}

.yedu-article-content-card {
  flex: 0 0 50%;
  width: 50%;
  min-width: 0;
  background: var(--card-bg, rgba(255, 255, 255, 0.95));
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.yedu-article-content-card:hover { transform: translateY(-2px); }

.yedu-article-content {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.yedu-article-title {
  color: var(--text-primary, #1a1a2e);
  font-weight: 600;
  white-space: normal;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  margin: 0 0 4px 0;
}

.yedu-article-date {
  color: var(--text-secondary, #aaa);
  font-size: 0.78rem;
  margin-bottom: 6px;
}

.yedu-article-summary {
  color: var(--text-secondary, #888);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin: 0 0 8px 0;
  font-size: 0.82rem;
}

.yedu-read-more {
  color: #e94560;
  font-size: 0.7rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  margin: 0;
  padding: 0;
  border: none;
  background: none;
  transition: gap 0.2s ease;
}
.yedu-read-more:hover { gap: 4px; }
.yedu-read-more svg { width: 10px; height: 10px; fill: #e94560; transition: transform 0.2s ease; }
.yedu-read-more.yedu-expanded svg { transform: rotate(180deg); }

.yedu-full-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  background: var(--card-bg, rgba(255, 255, 255, 0.98));
}
.yedu-full-content.yedu-show { max-height: none; }

.yedu-full-inner {
  padding: 14px;
  color: var(--text-primary, #333);
  font-size: 0.85rem;
  line-height: 1.8;
  border-top: 1px solid var(--border-color, #eee);
}
.yedu-full-inner p { margin-bottom: 10px; }

.yedu-img-placeholder {
  width: 100%;
  height: 100%;
  background: var(--cover-bg, #2d4a6e);
  background-image: url('./images/placeholder.webp');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.8);
  font-size: 0.9rem;
  font-weight: 500;
}

.yedu-pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
}
.yedu-pagination button {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  background: var(--btn-bg, rgba(255, 255, 255, 0.15));
  color: var(--text-primary, #fff);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.yedu-pagination button:hover:not(:disabled) { background: rgba(233, 69, 96, 0.8); }
.yedu-pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

.yedu-loading {
  text-align: center;
  color: var(--text-secondary, rgba(255, 255, 255, 0.5));
  padding: 40px 0;
  font-size: 0.9rem;
}

/* ===== 响应式布局 ===== */
/* 小屏：上下布局 */
@media (max-width: 767px) {
  .yedu-article-main { flex-direction: column; gap: 12px; }
  .yedu-article-cover-card { flex: none; width: 100%; }
  .yedu-article-content-card { flex: none; width: 100%; }
  .yedu-audio-btn { width: 40px; height: 40px; }
  .yedu-article-content { padding: 10px; }
}
/* 中屏：水平各50% */
@media (min-width: 768px) and (max-width: 1024px) {
  .yedu-article-main { gap: 10px; }
  .yedu-article-cover-card { flex: 0 0 50%; width: 50%; }
  .yedu-article-content-card { flex: 0 0 50%; width: 50%; }
}
/* 大屏：封面25%，内容75% */
@media (min-width: 1025px) {
  .yedu-article-main { gap: 12px; }
  .yedu-article-cover-card { flex: 0 0 25%; width: 25%; }
  .yedu-article-content-card { flex: 0 0 75%; width: 75%; }
}
</style>

<script>
(function() {
  var basePath = (typeof window.__SC_BASE_PATH !== 'undefined' ? window.__SC_BASE_PATH : './');
  var pausePath = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
  var playPath = 'M8 5v14l11-7z';
  var articles = [];
  var _scAudio, _scAudioBtn;

  // 主题检测
  function detectTheme() {
    try {
      var pt = window.parent.document.documentElement.getAttribute('data-theme');
      if (pt === 'dark' || pt === 'light') {
        document.documentElement.setAttribute('data-theme', pt);
        return;
      }
    } catch(e) {}
    var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  }
  detectTheme();
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', detectTheme);

  // 数据加载
  function loadData() {
    fetch(basePath + 'data/index.json')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(files) {
        return Promise.all(files.map(function(f) {
          return fetch(basePath + 'data/' + f).then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
          });
        }));
      })
      .then(function(texts) {
        texts.forEach(function(text) {
          text = text.replace(/"(\.[^"]+)"/g, function(m, path) {
            if (path.startsWith('/') || path.startsWith('http')) return m;
            return '"' + basePath + path.replace(/^\.\//, '') + '"';
          });
          // 提取变量名，修复路径
          var vn = text.match(/^var\s+(\w+)\s*=/);
          if (vn) text = text.replace(/__([a-zA-Z])/g, '_$1');
          try { eval(text); } catch(e) {}
        });

        // 收集文章：匹配所有 __yedu_ 前缀的变量
        var allKeys = Object.keys(window).filter(function(k) { return k.indexOf('__yedu_') === 0; }).sort().reverse();
        articles = allKeys.map(function(k) { return window[k]; });

        if (typeof onDataLoaded === 'function') onDataLoaded(articles);
        if (typeof defineRender === 'function') defineRender(renderPage);
        renderPage(1);
      })
      .catch(function(e) {
        var c = document.getElementById('yeduArticleList');
        if (c) c.innerHTML = '<div class="yedu-loading">加载失败：' + e.message + '</div>';
      });
  }

  function renderPage(page) {
    var PAGE_SIZE = 1;
    var start = (page - 1) * PAGE_SIZE;
    var end = start + PAGE_SIZE;
    var pageArticles = articles.slice(start, end);
    var totalPages = Math.ceil(articles.length / PAGE_SIZE);
    var container = document.getElementById('yeduArticleList');
    if (!container) return;

    if (articles.length === 0) {
      container.innerHTML = '<div class="yedu-loading">暂无内容</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < pageArticles.length; i++) {
      var a = pageArticles[i];
      var idx = start + i;
      var hasAudio = !!a.audioSrc;
      var imgSrc = a.coverSrc || '';

      var metaHtml = '<div class="yedu-article-meta">';
      if (a.duration) {
        metaHtml += '<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><span>' + a.duration + '</span>';
      }
      metaHtml += '</div>';

      var progressHtml = hasAudio
        ? '<div class="yedu-audio-progress"><div class="yedu-audio-progress-bar" id="yedu-progress-' + idx + '"></div></div>'
        : '';

      var paragraphsHtml = '';
      if (a.paragraphs && a.paragraphs.length) {
        for (var j = 0; j < a.paragraphs.length; j++) {
          paragraphsHtml += '<p>' + a.paragraphs[j] + '</p>';
        }
      }

      html +=
        '<div class="yedu-article-card" data-index="' + idx + '">' +
          '<div class="yedu-article-main">' +
            '<div class="yedu-article-cover-card">' +
              '<div class="yedu-article-cover">' +
                (imgSrc ? '<img src="' + imgSrc + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' : '') +
                '<div class="yedu-img-placeholder" style="display:' + (imgSrc ? 'none' : 'flex') + '">夜读</div>' +
                (hasAudio ? '<button class="yedu-audio-btn" data-index="' + idx + '" data-src="' + a.audioSrc + '"><svg viewBox="0 0 24 24"><path d="' + playPath + '"/></svg></button>' : '') +
                '<span class="yedu-corner-label">每晚十点 · 温暖相伴</span>' +
                metaHtml + progressHtml +
              '</div>' +
            '</div>' +
            '<div class="yedu-article-content-card">' +
              '<div class="yedu-article-content">' +
                '<h3 class="yedu-article-title" title="' + a.title + '">' + a.title + '</h3>' +
                (a.pubDate ? '<div class="yedu-article-date">' + a.pubDate + '</div>' : '') +
                '<p class="yedu-article-summary">' + (a.summary || '') + '</p>' +
                '<div class="yedu-read-more" data-index="' + idx + '"><span>展开</span><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></div>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="yedu-full-content" id="yedu-full-content-' + idx + '">' +
            '<div class="yedu-full-inner">' + paragraphsHtml + '</div>' +
          '</div>' +
        '</div>';
    }

    if (totalPages > 1) {
      html +=
        '<div class="yedu-pagination" data-total="' + totalPages + '" data-page="' + page + '">' +
          '<button class="yedu-prev-btn" ' + (page <= 1 ? 'disabled' : '') + '>上一页</button>' +
          '<span class="yedu-page-info">' + page + ' / ' + totalPages + '</span>' +
          '<button class="yedu-next-btn" ' + (page >= totalPages ? 'disabled' : '') + '>下一页</button>' +
        '</div>';
    }

    container.innerHTML = html;

    // 事件委托
    if (window._scHandler) container.removeEventListener('click', window._scHandler);
    window._scHandler = function(e) {
      var btn = e.target.closest('.yedu-audio-btn');
      if (btn) { e.stopPropagation(); toggleAudio(parseInt(btn.dataset.index), btn); return; }
      var rm = e.target.closest('.yedu-read-more');
      if (rm) { e.stopPropagation(); toggleContent(rm, parseInt(rm.dataset.index)); return; }
      var pb = e.target.closest('.yedu-prev-btn');
      if (pb && !pb.disabled) { var pg = container.querySelector('.yedu-pagination'); if (pg) renderPage(parseInt(pg.dataset.page) - 1); return; }
      var nb = e.target.closest('.yedu-next-btn');
      if (nb && !nb.disabled) { var pg = container.querySelector('.yedu-pagination'); if (pg) renderPage(parseInt(pg.dataset.page) + 1); return; }
    };
    container.addEventListener('click', window._scHandler);
  }

  function toggleAudio(index, btn) {
    var src = btn.dataset.src;
    var progressBar = document.getElementById('yedu-progress-' + index);
    var svg = btn.querySelector('svg');
    var pathEl = svg.querySelector('path');

    if (_scAudio && _scAudio._scSrc === src) {
      if (_scAudio.paused) {
        _scAudio.play();
        btn.classList.add('yedu-playing');
        pathEl.setAttribute('d', pausePath);
      } else {
        _scAudio.pause();
        btn.classList.remove('yedu-playing');
        pathEl.setAttribute('d', playPath);
      }
      return;
    }

    if (_scAudio) {
      _scAudio.pause();
      if (_scAudioBtn) {
        _scAudioBtn.classList.remove('yedu-playing');
        var op = _scAudioBtn.querySelector('svg path');
        if (op) op.setAttribute('d', playPath);
      }
    }

    var audio = new Audio(src);
    audio._scSrc = src;
    _scAudio = audio;
    _scAudioBtn = btn;

    audio.addEventListener('timeupdate', function() {
      if (audio.duration && progressBar) {
        progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
    });
    audio.addEventListener('ended', function() {
      btn.classList.remove('yedu-playing');
      pathEl.setAttribute('d', playPath);
      if (progressBar) progressBar.style.width = '0%';
    });
    audio.addEventListener('error', function() {
      btn.classList.remove('yedu-playing');
      pathEl.setAttribute('d', playPath);
      if (progressBar) progressBar.style.width = '0%';
    });

    btn.classList.add('yedu-playing');
    pathEl.setAttribute('d', pausePath);
    audio.play().catch(function() {
      btn.classList.remove('yedu-playing');
      pathEl.setAttribute('d', playPath);
    });
  }

  function toggleContent(el, index) {
    var content = document.getElementById('yedu-full-content-' + index);
    if (!content) return;
    var isShow = content.classList.toggle('yedu-show');
    el.querySelector('span').textContent = isShow ? '收起' : '展开';
    el.classList.toggle('yedu-expanded');
  }

  loadData();
})();
</script>
