<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 仅保留下拉框基础样式，无任何多余装饰 */
        //body {
            //font-family: system-ui, sans-serif;
            //padding: 20px;
            //margin: 0;
            //background: white;
        //}
        select {
            //padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            //background-color: #fff;
            cursor: pointer;
            width: 100%;
            //margin-bottom: 20px;
        }
        select:focus {
            outline: none;
            //border-color: #0078d4;
        }
        #pageContainer {
            width: 100%;
        }
    </style>
</head>
<body>

<select id="pageSelect"></select>
<div id="pageContainer"></div>

<script>
    // ========== 配置区域：文件路径映射 ==========
    // 键：下拉框显示的文字，值：对应的 HTML 文件路径（同域或支持 CORS 的 URL）
    const pages = {
        "五子连珠": "/js/sevencolor/5/five.html"//,      // 请修改为实际文件路径
        //"关于": "./about.html",
        //"联系": "./contact.html"
    };
    // ===========================================

    const selectEl = document.getElementById('pageSelect');
    const container = document.getElementById('pageContainer');

    /**
     * 将 HTML 字符串渲染到容器中，并确保脚本执行
     * @param {string} htmlStr 完整的 HTML 代码
     * @param {HTMLElement} target 目标容器
     */
    function renderHtml(htmlStr, target) {
        target.innerHTML = '';
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlStr, 'text/html');

        // 迁移样式（head 中的 style 和 link[rel="stylesheet"]）
        const headNodes = doc.head.childNodes;
        const styleElements = [];
        for (const node of headNodes) {
            if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                if (tagName === 'style' || (tagName === 'link' && node.rel === 'stylesheet')) {
                    styleElements.push(node.cloneNode(true));
                }
            }
        }
        styleElements.forEach(el => target.appendChild(el));

        // 迁移 body 内容
        const bodyChildren = Array.from(doc.body.childNodes);
        bodyChildren.forEach(child => {
            target.appendChild(child.cloneNode(true));
        });

        // 重新执行所有 script 标签
        const allScripts = doc.querySelectorAll('script');
        const scriptsToRun = [];
        allScripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            if (oldScript.src) {
                newScript.src = oldScript.src;
                newScript.async = oldScript.async;
                newScript.defer = oldScript.defer;
            } else {
                newScript.textContent = oldScript.textContent;
            }
            scriptsToRun.push(newScript);
        });
        scriptsToRun.forEach(script => target.appendChild(script));

        // 可选：同步页面标题
        const newTitle = doc.querySelector('title');
        if (newTitle && newTitle.textContent) {
            document.title = newTitle.textContent;
        }
    }

    // 加载指定路径的 HTML 文件并渲染
    async function loadPageFromFile(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            const htmlText = await response.text();
            renderHtml(htmlText, container);
        } catch (err) {
            console.error('加载文件失败:', err);
            container.innerHTML = `<div style="color: red; padding: 1rem;">加载失败: ${err.message}</div>`;
        }
    }

    // 构建下拉选项
    function buildSelect() {
        const keys = Object.keys(pages);
        if (keys.length === 0) {
            selectEl.innerHTML = '<option disabled>—— 请配置文件路径 ——</option>';
            container.innerHTML = '';
            console.warn('pages 对象为空，请添加文件映射');
            return;
        }
        let options = '';
        keys.forEach(key => {
            options += `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`;
        });
        selectEl.innerHTML = options;
        // 默认加载第一个页面
        const firstKey = keys[0];
        selectEl.value = firstKey;
        loadPageFromFile(pages[firstKey]);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 监听下拉变化
    selectEl.addEventListener('change', (e) => {
        const selectedKey = e.target.value;
        const filePath = pages[selectedKey];
        if (filePath) {
            loadPageFromFile(filePath);
        }
    });

    buildSelect();
</script>
</body>
</html>
