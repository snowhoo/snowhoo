---
layout: false
---
<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title></title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* ===== 作用域隔离：所有样式限定在 #player-wrap 内 ===== */
/* 不重置所有元素，只针对需要的元素 */
#player-wrap{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;max-width:100%;margin:0 auto;line-height:1.5;font-size:14px;position:relative;--bg-page:#0f0f0f;--bg-card:#1a1a2e;--bg-card-hover:#1e1e38;--bg-eplist:#111;--bg-eplist-alt:#161616;--bg-player:#000;--bg-toolbar:#16213e;--bg-input:#1a1a2e;--text-primary:#e8e8e8;--text-secondary:#90a4ae;--text-muted:#607d8b;--border:#333;--accent:#ff6b35;--accent-hover:#e85d2a;--badge-playable-bg:#2e7d32;--badge-playable-text:#fff;--badge-unplayable-bg:#616161;--badge-unplayable-text:#bdbdbd;--shadow:rgba(0,0,0,0.4);--card-radius:10px;color:var(--text-primary);transition:color .3s;overflow-x:hidden;width:100%}
#player-wrap[data-theme="light"]{--bg-page:#f5f5f5;--bg-card:#fff;--bg-card-hover:#f0f0f5;--bg-eplist:#fafafa;--bg-eplist-alt:#f0f0f0;--bg-player:#000;--bg-toolbar:#e8e0f0;--bg-input:#fff;--text-primary:#212121;--text-secondary:#546e7a;--text-muted:#90a4ae;--border:#ddd;--accent:#e65100;--accent-hover:#d84315;--badge-playable-bg:#2e7d32;--badge-playable-text:#fff;--badge-unplayable-bg:#bdbdbd;--badge-unplayable-text:#757575;--shadow:rgba(0,0,0,0.1);--card-radius:10px}
/* 工具栏 */
#player-wrap .pw-toolbar{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap;align-items:center}
#player-wrap .pw-toolbar select,#player-wrap .pw-toolbar input,#player-wrap .pw-toolbar button{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-primary);font-size:13px;margin:0}
#player-wrap .pw-toolbar select{flex:2;min-width:100px;cursor:pointer}
#player-wrap .pw-toolbar input{flex:2;min-width:120px}
#player-wrap .pw-toolbar button{flex-shrink:0;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:500}
#player-wrap .pw-toolbar button:hover{background:var(--accent-hover)}
/* 分类栏 */
#player-wrap .pw-cat-bar{margin:0 8px 0 0;display:flex;align-items:center;gap:8px}
#player-wrap .pw-cat-bar select{max-width:160px;min-width:80px;padding:7px 10px;background:transparent;color:var(--text-primary);border:1px solid var(--border);border-radius:6px;cursor:pointer;margin:0}
/* 状态栏 */
#player-wrap .pw-status-bar{padding:2px 0;margin:6px 0;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
#player-wrap .pw-status-bar .pw-next-ep-btn{flex-shrink:0;padding:2px 10px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;display:none;margin:0}
#player-wrap .pw-status-bar .pw-clear-search-btn{padding:2px 10px;background:#555;color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0}
/* 播放器容器 */
#player-wrap .pw-player-box{background:var(--bg-player);border-radius:10px;overflow:hidden;position:relative;aspect-ratio:16/9;height:auto;max-width:100%;width:100%}
#player-wrap .pw-player{width:100%;height:100%;background:#000;display:block;object-fit:contain}
/* 浮动播放器 - 小屏模式（始终使用 fixed 定位，相对于浏览器视口，避免被父容器裁剪） */
#player-wrap .pw-float-player{position:fixed;bottom:20px;right:20px;width:320px;background:#1a1a2e;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:9999;overflow:hidden;display:none}
#player-wrap .pw-float-header{display:flex;align-items:center;padding:8px 10px;background:#16213e;gap:8px}
#player-wrap .pw-float-title{flex:1;font-size:13px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#player-wrap .pw-float-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
#player-wrap .pw-float-close{color:#ff6b6b}
#player-wrap .pw-float-video{width:100%;height:auto;aspect-ratio:16/9;background:#000;display:block;max-height:180px;object-fit:contain}
/* 视频网格 */
#player-wrap .pw-video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin:12px 0;padding:0;max-width:100%;overflow:hidden;width:100%}
#player-wrap .pw-video-grid *{box-sizing:border-box}
#player-wrap.pw-narrow .pw-video-grid .pw-video-card{min-width:0 !important}
/* 视频卡片 */
#player-wrap .pw-video-card{background:var(--bg-card);border-radius:var(--card-radius);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--border);position:relative;overflow:hidden}
#player-wrap .pw-video-card:hover{transform:translateY(-3px);box-shadow:0 4px 16px var(--shadow)}
#player-wrap .pw-video-card .pw-poster-wrap{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--bg-card)}
#player-wrap .pw-video-card .pw-poster{width:100%;height:100%;object-fit:cover;display:block}
#player-wrap .pw-video-card .pw-poster-fallback{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,var(--bg-card),var(--bg-toolbar));color:var(--text-muted);font-size:32px}
#player-wrap .pw-video-card .pw-card-badge{position:absolute;top:6px;right:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;backdrop-filter:blur(4px)}
#player-wrap .pw-video-card .pw-card-badge.pw-playable{background:rgba(46,125,50,.85);color:#fff}
#player-wrap .pw-video-card .pw-card-badge.pw-unplayable{background:rgba(97,97,97,.75);color:#bdbdbd}
#player-wrap .pw-video-card .pw-card-info{padding:8px 10px}
#player-wrap .pw-video-card .pw-card-title{font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;margin:0}
#player-wrap .pw-video-card .pw-card-meta{font-size:11px;color:var(--text-secondary);margin-top:3px;display:flex;gap:6px}
#player-wrap .pw-video-card .pw-fav-btn{position:absolute;top:4px;width:28px;height:28px;border-radius:50%;background:transparent;color:#ff6b6b;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;border:none;padding:0}
#player-wrap .pw-video-card .pw-fav-btn.pw-faved{color:#ff6b6b}
#player-wrap .pw-video-card .pw-card-delete{left:calc(6px + 28px + 6px);color:#f44}
#player-wrap .pw-video-card .pw-progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,0.5)}
#player-wrap .pw-video-card .pw-progress-fill{height:100%;background:var(--accent)}
#player-wrap .pw-video-card .pw-bookmark-note{position:absolute;bottom:4px;left:4px;right:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 剧集面板 */
#player-wrap .pw-ep-panel{display:none;background:var(--bg-eplist);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--card-radius) var(--card-radius);margin-top:-1px;max-height:320px;overflow-y:auto}
#player-wrap .pw-ep-panel.pw-open{display:block}
#player-wrap .pw-ep-header{display:flex;justify-content:space-between;padding:6px 10px;font-size:11px;color:var(--text-muted);background:var(--bg-eplist-alt);border-bottom:1px solid var(--border);position:sticky;top:0}
#player-wrap .pw-ep-item{cursor:pointer;padding:4px 10px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
#player-wrap .pw-ep-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
#player-wrap .pw-ep-item.pw-current{color:var(--accent);font-weight:500}
/* 分页 */
#player-wrap .pw-pagination{display:flex;gap:3px;justify-content:center;margin:12px 0;flex-wrap:wrap;padding:0}
#player-wrap .pw-pagination button{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:12px;min-width:26px;margin:0}
#player-wrap .pw-pagination button.pw-active{background:var(--accent);border-color:var(--accent);color:#fff}
#player-wrap .pw-pagination button:disabled{opacity:0.5;cursor:default}
/* 空状态 */
#player-wrap .pw-empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
/* 页脚 */
#player-wrap .pw-tvbox-footer{text-align:center;padding:12px 0 6px;margin-top:12px;font-size:11px;color:var(--text-muted)}
/* 预加载条 */
#player-wrap .pw-preload-bar{width:100%;height:1px;background:transparent;margin:0;position:relative;display:block}
#player-wrap .pw-preload-fill{width:0%;height:100%;background:#aaa;transition:width .2s;display:block}
/* 响应式布局 - 基于容器宽度而非页面宽度 */
/* 小屏模式：容器宽度小于 500px 时，每排显示 2 个卡片 */
#player-wrap .pw-video-grid{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
@container (max-width:500px){
  #player-wrap .pw-video-grid{grid-template-columns:repeat(2,1fr);gap:8px}
}
/* 降级方案：使用 max-width 模拟容器查询 */
#player-wrap.pw-narrow .pw-video-grid{grid-template-columns:repeat(2,1fr) !important;gap:8px}
#player-wrap.pw-narrow .pw-video-grid .pw-video-card .pw-poster-wrap{aspect-ratio:2/3}
</style>
</head>
<body>
<div id="player-wrap">
<div class="pw-toolbar">
  <select id="pwSourceSelect"></select>
  <input type="text" id="pwSearchInput" placeholder="全局搜索影片...">
  <button id="pwSearchBtn">搜索</button>
  <button id="pwStopSearchBtn" style="display:none">停止</button>
</div>
<div class="pw-preload-bar"><div class="pw-preload-fill"></div></div>
<div class="pw-player-box"><video id="pwPlayer" style="width:100%;height:100%;display:block" controls playsinline></video></div>
<div class="pw-float-player" id="pwFloatPlayer" style="display:none">
  <div class="pw-float-header"><span class="pw-float-title" id="pwFloatPlayerTitle">正在播放</span><button class="pw-float-btn" id="pwFloatBackBtn">←</button><button class="pw-float-btn pw-float-close" id="pwFloatCloseBtn">✖</button></div>
  <video id="pwFloatVideo" playsinline></video>
</div>
<div id="pwStatus" class="pw-status-bar">
  <div class="pw-cat-bar" id="pwCatBar"></div>
  <span id="pwStatusText">[STOP] 选择一个数据源</span>
  <div style="display:flex; gap:6px"><button id="pwClearSearchResultBtn" class="pw-clear-search-btn" style="display:none">清空</button><button id="pwBookmarkBtn" class="pw-next-ep-btn" style="background:#4caf50">签</button><button id="pwNextEpBtn" class="pw-next-ep-btn">下集</button></div>
</div>
<div id="pwContent"></div>
<div class="pw-pagination" id="pwPagination"></div>
<div class="pw-tvbox-footer" id="pwTvboxFooter"></div>
</div>
<script>
// ===== 作用域隔离：所有选择器限定在 #player-wrap 内 =====
const STORAGE = { HISTORY:'tvbox_history', FAVORITES:'tvbox_favorites', BOOKMARKS:'tvbox_bookmarks', SEARCH:'tvbox_search_results' };
const PAGE_SIZE = 12, CONCURRENT = 10;
let sourceIndex=[], loadedSources={}, sourceMeta={}, currentPrefix='', currentFilePage=1, currentPage=1, currentFiltered=[], currentCategory='';
let currentSearchKeyword='', currentSearchResults=[], currentSearchCategory='', isSearching=false, searchVersion=0;
let currentPlayingVideo=null, currentPlayingEpIndex=0, currentOpenVideo=null, currentEpNext=null, currentHls=null, playerInFloat=false, floatReturn=null;
let categoryStatsLoading=false;
const pw$ = sel => document.querySelector('#player-wrap ' + sel);
const $ = id => document.getElementById(id);
const escHtml = s => String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
const escAttr = s => String(s).replace(/[&"']/g, m => ({'&':'&amp;','"':'&quot;',"'":'&#39;'})[m]);
const setStatus = t => $('pwStatusText').textContent = t;
const getStorage = key => { try{ return JSON.parse(localStorage.getItem(key))||(key===STORAGE.HISTORY?{}:[]); }catch(e){ return key===STORAGE.HISTORY?{}:[]; } };
const setStorage = (key,val) => localStorage.setItem(key,JSON.stringify(val));
const saveHistory = (key,val) => { let h=getStorage(STORAGE.HISTORY); h[key]=val; setStorage(STORAGE.HISTORY,h); };
const isFavorited = (k,n) => getStorage(STORAGE.FAVORITES).some(f=>f.sourceKey===k&&f.videoName===n);
const addFavorite = v => { if(isFavorited(v.sourceKey,v.vod_name)) return; let fav=getStorage(STORAGE.FAVORITES); fav.push({ videoName:v.vod_name, sourceKey:v.sourceKey, sourceName:v.sourceName, vodPic:v.vod_pic, ep_count:v.ep_count, playable_count:v.playable_count, episodes:v.episodes, vod_class:v.vod_class }); setStorage(STORAGE.FAVORITES,fav); };
const removeFavorite = (k,n) => setStorage(STORAGE.FAVORITES, getStorage(STORAGE.FAVORITES).filter(f=>!(f.sourceKey===k&&f.videoName===n)));
const getBookmarks = () => getStorage(STORAGE.BOOKMARKS);
const saveBookmarks = list => setStorage(STORAGE.BOOKMARKS,list);
const addBookmark = (video,epIdx,prog,note) => { let list=getBookmarks(); let epsCopy=video.episodes?video.episodes.map(e=>({title:e.title,url:e.url,playable:e.playable})):[]; list.unshift({ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||epsCopy.length, playable_count:video.playable_count||epsCopy.filter(e=>e.playable).length, episodes:epsCopy, epIndex:epIdx, epTitle:(video.episodes||[])[epIdx]?.title||'', epUrl:(video.episodes||[])[epIdx]?.url||'', progress:prog, note:note||'', createdAt:Date.now() }); saveBookmarks(list); };
const updateHistory = (video,epIdx,prog) => { let key=video.sourceKey+'_'+video.vod_name; let epsCopy=video.episodes?video.episodes.map(e=>({title:e.title,url:e.url,playable:e.playable})):[]; saveHistory(key,{ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||epsCopy.length, playable_count:video.playable_count||epsCopy.filter(e=>e.playable).length, episodes:epsCopy, epIndex:epIdx, epTitle:(video.episodes||[])[epIdx]?.title||'', epUrl:(video.episodes||[])[epIdx]?.url||'', progress:prog, updatedAt:Date.now() }); };
function findVideoInCache(sKey,vName){ for(let k in loadedSources){ let d=loadedSources[k]; if(d?.videos){ let f=d.videos.find(v=>v.vod_name===vName); if(f) return f; } } return null; }
function loadData(file,cb,to=3000){ let key=file==='index.js'?'_TVBOX_INDEX':'_TVBOX_SITE_DATA'; let s=document.createElement('script'); let t=setTimeout(()=>{ s.onload=s.onerror=null; s.remove(); cb(null); },to); s.onerror=()=>{ clearTimeout(t); cb(null); }; s.onload=()=>{ clearTimeout(t); let d=window[key]; delete window[key]; cb(d||null); }; let bp=(typeof window.__SC_BASE_PATH !== 'undefined' ? window.__SC_BASE_PATH : ''); s.src=bp+'data/'+file; document.head.appendChild(s); }

// ===== 预加载 =====
let preloadTotal=0,preloadCompleted=0;
function updatePreload(p){ $('pwPreloadProgressFill').style.width=p+'%'; }
function startPreload(){ if(!sourceIndex.length) return; let files=new Set(); sourceIndex.forEach(s=>{ let pc=s.page_count||1, base=(sourceMeta[s.prefix]?.fileBase)||s.prefix; for(let i=1;i<=pc;i++) files.add(base+'-'+String(i).padStart(2,'0')+'.js'); }); let arr=[...files]; preloadTotal=arr.length; preloadCompleted=0; $('pwPreloadProgressBar').style.display='block'; updatePreload(0); let idx=0,running=0; function loadOne(){ if(idx>=arr.length){ if(running===0){ updatePreload(100); setTimeout(()=>$('pwPreloadProgressBar').style.display='none',500); } return; } let f=arr[idx++]; running++; loadData(f,data=>{ if(data) loadedSources[f]=data; preloadCompleted++; updatePreload(Math.floor(preloadCompleted/preloadTotal*100)); running--; loadOne(); },5000); } for(let i=0;i<CONCURRENT;i++) loadOne(); }

// ===== 搜索 =====
let searchTimer=null;
function doSearch(){
  let kw=$('pwSearchInput').value.trim();
  if(!kw) return;
  if(isSearching) stopSearch();
  currentSearchKeyword=kw;
  currentSearchResults=[];
  currentSearchCategory='';
  isSearching=true;
  searchVersion++;
  let ver=searchVersion;
  $('pwSearchBtn').style.display='none';
  $('pwStopSearchBtn').style.display='inline';
  renderSearchResult(true);
  // 如果 sourceIndex 还没加载完，先等待
  if(!sourceIndex.length){
    let wait = setInterval(()=>{
      if(!isSearching) { clearInterval(wait); return; }
      if(sourceIndex.length){
        clearInterval(wait);
        doSearchImpl(kw, ver);
      }
    }, 200);
    return;
  }
  doSearchImpl(kw, ver);
}
function doSearchImpl(kw, ver){
  // 边加载边搜索所有分页
  let totalPages = 0;
  sourceIndex.forEach(s=>{ totalPages += (s.page_count||1); });
  let loadedPages = 0, results = [];
  function checkDone(){
    if(ver!==searchVersion) return;
    if(loadedPages >= totalPages){
      currentSearchResults=results;
      isSearching=false;
      $('pwSearchBtn').style.display='inline';
      $('pwStopSearchBtn').style.display='none';
      if(ver===searchVersion) renderSearchResult(false);
    }
  }
  sourceIndex.forEach(src=>{
    let pc = src.page_count||1;
    for(let p=1; p<=pc; p++){
      let base=(sourceMeta[src.prefix]?.fileBase)||src.prefix;
      let fname=base+'-'+String(p).padStart(2,'0')+'.js';
      if(loadedSources[fname]){
        let d=loadedSources[fname];
        if(d?.videos){
          d.videos.forEach(v=>{
            if(v.vod_name.includes(kw)||(v.vod_class||'').includes(kw)){
              results.push({...v,sourceKey:fname,sourceName:d.name});
            }
          });
        }
        loadedPages++;
        setStatus(`📡 搜索中 ${loadedPages}/${totalPages}...`);
        checkDone();
      } else {
        loadData(fname, data=>{
          if(data) loadedSources[fname]=data;
          if(data?.videos){
            data.videos.forEach(v=>{
              if(v.vod_name.includes(kw)||(v.vod_class||'').includes(kw)){
                results.push({...v,sourceKey:fname,sourceName:data.name});
              }
            });
          }
          loadedPages++;
          setStatus(`📡 搜索中 ${loadedPages}/${totalPages}...`);
          checkDone();
        }, 4000);
      }
    }
  });
}
function stopSearch(){
  if(!isSearching) return;
  searchVersion++;
  isSearching=false;
  $('pwSearchBtn').style.display='inline';
  $('pwStopSearchBtn').style.display='none';
  if(currentSearchKeyword) renderSearchResult(false);
}

// ===== 搜索结果管理 =====
function saveSearchToStorage(){ setStorage(STORAGE.SEARCH,{ keyword:currentSearchKeyword, results:currentSearchResults, category:currentSearchCategory }); }
function loadSearchFromStorage(){ let d=getStorage(STORAGE.SEARCH); if(d?.results?.length){ currentSearchKeyword=d.keyword||''; currentSearchResults=d.results.slice(); currentSearchCategory=d.category||''; return true; } return false; }
function refreshSearchDisplay(){ let filtered = currentSearchCategory==='' ? currentSearchResults.slice() : currentSearchCategory==='未分类' ? currentSearchResults.filter(v=>!(v.vod_class||'').trim()) : currentSearchResults.filter(v=>(v.vod_class||'').split(',').some(c=>c.trim()===currentSearchCategory)); currentFiltered=filtered; currentPage=1; render(); saveSearchToStorage(); }
function buildSearchCatBar(){ let cats={}; currentSearchResults.forEach(v=>{ let cls=(v.vod_class||'').trim(); if(!cls) cats['未分类']=(cats['未分类']||0)+1; else cls.split(',').forEach(c=>{ c=c.trim(); if(c) cats[c]=(cats[c]||0)+1; }); }); let h='<select class="pw-cat-filter"><option value="">全部分类 ('+currentSearchResults.length+')</option>'; Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).forEach(c=>h+=`<option value="${c.replace(/&/g,'&amp;')}"${c===currentSearchCategory?' selected':''}>${c} (${cats[c]})</option>`); h+='</select>'; $('pwCatBar').innerHTML=h; }
function renderSearchResult(loading){ currentPrefix='__search_result__'; if(loading && (!currentSearchResults.length||isSearching)){ $('pwContent').innerHTML='<div class="pw-empty-state">🔍 搜索中…</div>'; $('pwPagination').innerHTML=''; setStatus(`关键词：${currentSearchKeyword} - 结果：0`); $('pwClearSearchResultBtn').style.display='none'; $('pwCatBar').innerHTML=''; return; } if(!currentSearchResults.length){ setEmpty('暂无搜索结果','请尝试其他关键词'); $('pwPagination').innerHTML=''; setStatus(`关键词：${currentSearchKeyword} - 结果：0`); $('pwClearSearchResultBtn').style.display='none'; $('pwCatBar').innerHTML=''; return; } buildSearchCatBar(); refreshSearchDisplay(); $('pwSourceSelect').value='__search_result__'; }
function resetSearch(keyword){ currentSearchKeyword=keyword; currentSearchResults=[]; currentSearchCategory=''; $('pwSourceSelect').value='__search_result__'; renderSearchResult(true); setStorage(STORAGE.SEARCH,null); }
function addSearchResults(newArr){ if(!newArr.length) return; let exist=new Set(currentSearchResults.map(v=>v.sourceKey+'_'+v.vod_name)); for(let item of newArr){ let key=item.sourceKey+'_'+item.vod_name; if(!exist.has(key)){ currentSearchResults.push(item); exist.add(key); } } if($('pwSourceSelect').value==='__search_result__'){ buildSearchCatBar(); refreshSearchDisplay(); } saveSearchToStorage(); }
function clearAllSearchResults(){ if(currentPrefix!=='__search_result__') return; currentSearchResults=[]; currentSearchKeyword=''; currentSearchCategory=''; renderSearchResult(false); setStatus('关键词：- 结果：0'); $('pwClearSearchResultBtn').style.display='none'; $('pwCatBar').innerHTML=''; setStorage(STORAGE.SEARCH,null); }

function loadPageFile(prefix,page){ let base=(sourceMeta[prefix]?.fileBase)||prefix; let fname=base+'-'+String(page).padStart(2,'0')+'.js'; if(loadedSources[fname]) useSourceData(loadedSources[fname],fname,page); else { $('pwContent').innerHTML='<div class="pw-empty-state">⛏ 加载中...</div>'; loadData(fname,data=>{ if(data) loadedSources[fname]=data; useSourceData(data,fname,page); }); } }
function useSourceData(data,file,page){ currentData=data; currentFilePage=page; currentPage=1; if(!data?.videos){ setStatus('❌ 数据格式错误'); return; } currentCategory=''; setStatus(`📡 ${data.name} — 第${page}页`); currentFiltered=data.videos.map(v=>({...v, sourceKey:file, sourceName:data.name})); render(); $('pwClearSearchResultBtn').style.display='none';
  buildCatBarAsync();

async function ensureFullCategoryStats(prefix){
  if(categoryStatsLoading) return;
  let meta=sourceMeta[prefix];
  if(!meta) return;
  if(meta.categories && Object.keys(meta.categories).length>0) return;
  categoryStatsLoading=true;
  setStatus(`📊 正在统计分类数量 (全量) ...`);
  let pc=meta.page_count||1;
  let base=(meta.fileBase)||prefix;
  let catMap={};
  let loadedCount=0;
  let totalVideos=0;
  let playableVideos=0;
  for(let p=1;p<=pc;p++){
    let fname=base+'-'+String(p).padStart(2,'0')+'.js';
    let pageData=loadedSources[fname];
    if(!pageData){
      await new Promise(resolve=>{
        loadData(fname,data=>{
          if(data) loadedSources[fname]=data;
          resolve();
        },5000);
      });
      pageData=loadedSources[fname];
    }
    if(pageData?.videos){
      totalVideos+=pageData.videos.length;
      pageData.videos.forEach(v=>{
        if(v.playable_count>0) playableVideos++;
        let cls=(v.vod_class||'').trim();
        if(!cls) catMap['未分类']=(catMap['未分类']||0)+1;
        else cls.split(',').forEach(c=>{ c=c.trim(); if(c) catMap[c]=(catMap[c]||0)+1; });
      });
    }
    loadedCount++;
    setStatus(`📊 统计分类中 ${loadedCount}/${pc} ...`);
  }
  meta.categories=catMap;
  meta.total=totalVideos;
  meta.playable_videos=playableVideos;
  categoryStatsLoading=false;
  setStatus(`✅ 分类统计完成 (共 ${Object.keys(catMap).length} 个分类)`);
  buildCatBarAndRefresh();
}
function buildCatBarAndRefresh(){
  let meta=sourceMeta[currentPrefix];
  if(!meta) return;
  let cats=meta.categories||{};
  let total=meta.total||0;
  let playable=meta.playable_videos||0;
  let h=`<select class="pw-cat-filter"><option value="">全部 (${total>99?'99+':total}/${playable>99?'99+':playable})</option>`;
  Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).forEach(c=>h+=`<option value="${c.replace(/&/g,'&amp;')}">${c} (${cats[c]})</option>`);
  h+='</select>';
  $('pwCatBar').innerHTML=h;
  if(currentCategory && currentCategory!==''){
    filterCategory(document.querySelector('.pw-cat-filter'));
  } else {
    if(currentPrefix && !currentPrefix.startsWith('__') && currentData){
      currentFiltered=currentData.videos.map(v=>({...v, sourceKey:currentData.fileName||currentPrefix, sourceName:currentData.name}));
      render();
    }
  }
}
function buildCatBarAsync(){
  let meta=sourceMeta[currentPrefix];
  if(!meta) return;
  if(meta.categories && Object.keys(meta.categories).length>0){
    let cats=meta.categories;
    let total=meta.total||0;
    let playable=meta.playable_videos||0;
    let h=`<select class="pw-cat-filter"><option value="">全部 (${total>99?'99+':total}/${playable>99?'99+':playable})</option>`;
    Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).forEach(c=>h+=`<option value="${c.replace(/&/g,'&amp;')}">${c} (${cats[c]})</option>`);
    h+='</select>';
    $('pwCatBar').innerHTML=h;
    return;
  }
  ensureFullCategoryStats(currentPrefix).then(()=>{
    if(currentPrefix===sourceMeta[currentPrefix]?.prefix) buildCatBarAndRefresh();
  }).catch(()=>{});
  $('pwCatBar').innerHTML=`<select class="pw-cat-filter"><option value="">统计分类中...</option></select>`;
}
function filterCategory(sel){ let selected=sel.value;
  if(currentPrefix==='__search_result__'){ currentSearchCategory=selected; refreshSearchDisplay(); buildSearchCatBar(); return; }
  if(currentPrefix.startsWith('__')) return;
  currentCategory=selected; currentPage=1;
  if(!currentCategory){ loadPageFile(currentPrefix,currentFilePage); return; }
  let meta=sourceMeta[currentPrefix], pc=meta.page_count||1, results=[], loaded=0;
  let done=()=>{ if(++loaded>=pc){ currentFiltered=results; setStatus(`[FILTER] ${selected} — ${results.length} results`); render(); } };
  for(let p=1;p<=pc;p++){ let fn=(meta.fileBase||currentPrefix)+'-'+String(p).padStart(2,'0')+'.js'; if(loadedSources[fn]){ collectCat(loadedSources[fn],selected,results); done(); }else loadData(fn,data=>{ if(data) loadedSources[fn]=data; if(data) collectCat(data,selected,results); done(); }); } }
function collectCat(src,cat,out){
  if(!src?.videos) return;
  src.videos.forEach(v=>{
    let matched = false;
    if(cat === '未分类') {
      const clsRaw = v.vod_class;
      if(!clsRaw || (typeof clsRaw === 'string' && clsRaw.trim() === '')) matched = true;
    } else {
      const clsRaw = v.vod_class || '';
      const classes = clsRaw.split(',').map(c=>c.trim()).filter(c=>c);
      if(classes.includes(cat)) matched = true;
    }
    if(matched){
      out.push({
        sourceKey: currentPrefix,
        sourceName: src.name,
        vod_name: v.vod_name,
        vod_pic: v.vod_pic,
        episodes: v.episodes,
        ep_count: v.ep_count,
        playable_count: v.playable_count,
        vod_class: v.vod_class
      });
    }
  });
}

function go(p){ let total=currentFiltered.length, max=Math.ceil(total/PAGE_SIZE)||1; if(p<1) p=1; if(p>max) p=max; currentPage=p; render(); }

function toggleEpisodes(el,eid){
  let panel = document.getElementById(eid);
  if(!panel) return;
  let open = panel.classList.contains('pw-open');
  document.querySelectorAll('.pw-ep-panel.pw-open').forEach(ep=>{ if(ep.id!==eid) ep.classList.remove('pw-open'); });
  panel.classList.toggle('pw-open');
  if(!open){
    let vodName=el.dataset.vodname, sKey=el.dataset.sourcekey;
    currentOpenVideo=currentFiltered.find(v=>v.vod_name===vodName&&v.sourceKey===sKey)||null;
    if(currentOpenVideo && currentOpenVideo.episodes?.length===1 && (currentOpenVideo.isHistory||currentOpenVideo.isBookmark)){
      let full=findVideoInCache(sKey,vodName);
      if(full?.episodes?.length>1){
        currentOpenVideo.episodes=full.episodes;
        currentOpenVideo.playable_count=full.playable_count||full.episodes.filter(e=>e.playable).length;
        currentOpenVideo.ep_count=full.ep_count||full.episodes.length;
        let epContainer=panel;
        epContainer.innerHTML=`<div class="pw-ep-header"><span>剧集 (${currentOpenVideo.episodes.length})</span><button class="pw-ep-close" data-eid="${eid}">✖</button></div>`;
        currentOpenVideo.episodes.forEach((e,ei)=>{
          let isCurr=(currentOpenVideo.isHistory && ei===currentOpenVideo.historyEpIndex)||(currentOpenVideo.isBookmark && ei===currentOpenVideo.bookmarkEpIndex);
          let prog=isCurr&&(currentOpenVideo.historyProgress||currentOpenVideo.bookmarkProgress);
          epContainer.innerHTML+=`<div class="pw-ep-item${isCurr?' pw-current':''}" data-url="${escAttr(e.url)}" data-name="${escAttr(currentOpenVideo.vod_name+' - '+e.title)}" data-epindex="${ei}">${escHtml(e.title)}${!e.playable?' ⚠':''}${isCurr?' ▶':''}${prog?` (${Math.floor(prog/60)}'${prog%60})`:''}</div>`;
        });

      }
    }
  } else currentOpenVideo=null;
}

 floatDiv.style.display='block'; if(!main.paused) floatV.play().catch(()=>{}); }

})();
function setEmpty(t,s){ $('pwContent').innerHTML=`<div class="pw-empty-state">📺 ${t}${s?`<div class="sub">${s}</div>`:''}</div>`; }
function loadIndex(){ loadData('index.js',data=>{ if(!data){ setEmpty('无数据','请运行爬虫'); return; } sourceIndex=data; if(!sourceIndex.length){ setEmpty('无数据源','请检查 data/目录'); return; } let sel=$('pwSourceSelect'), ta=0,pa=0; sel.innerHTML=''; sel.appendChild(new Option('🕒 最近观看','__history__')); sel.appendChild(new Option('❤️ 我的收藏','__favorites__')); sel.appendChild(new Option('📌 我的影签','__bookmarks__')); sel.appendChild(new Option('📋 搜索结果','__search_result__')); sel.appendChild(new Option('— 数据源 —','',true,true)); let nameCnt={}; sourceIndex.forEach(s=>nameCnt[s.name]=(nameCnt[s.name]||0)+1); let nameSeen={}; sourceIndex.forEach(s=>{ ta+=s.total||0; pa+=s.playable||0; let dn=s.name; if(nameCnt[s.name]>1){ nameSeen[s.name]=(nameSeen[s.name]||0)+1; dn=s.name+'（站'+['一','二','三','四','五','六','七','八','九'][nameSeen[s.name]-1]+'）'; } sel.appendChild(new Option('📀 '+dn,s.prefix)); sourceMeta[s.prefix]={ page_count:s.page_count||1, name:dn, total:s.total, playable_videos:s.playable_videos||0, categories:s.categories||{}, fileBase:s.file.replace(/\.js$/,'').replace(/-\d+$/,''), prefix:s.prefix }; }); $('pwTvboxFooter').innerHTML=`<span>数据源 ${sourceIndex.length}</span><span>总地址 ${ta}</span><span>可播放 ${pa}</span>`; startPreload(); sel.value='__history__'; renderSpecialView('__history__'); }); }

// ===== 全局事件（委托）=====
document.addEventListener('click',e=>{
  let t=e.target; let epDel=t.closest('.pw-ep-delete'); if(epDel && !t.closest('.pw-search-result-delete')){ e.stopPropagation(); let sKey=epDel.dataset.sourcekey, vName=epDel.dataset.vodname, type=epDel.dataset.type; if(type==='history'){ let h=getStorage(STORAGE.HISTORY); delete h[sKey+'_'+vName]; setStorage(STORAGE.HISTORY,h); setStatus('✓ 已删除'); renderSpecialView('__history__'); }else if(type==='bookmark'){ saveBookmarks(getBookmarks().filter(b=>!(b.videoName===vName&&b.sourceKey===sKey))); setStatus('✓ 影签已删除'); renderSpecialView('__bookmarks__'); } return; }
  let fav=t.closest('.pw-fav-btn'); if(fav){ e.stopPropagation(); let sKey=fav.dataset.sourcekey, vName=fav.dataset.vodname, vPic=fav.dataset.vodpic, eCnt=parseInt(fav.dataset.epcount)||0, pCnt=parseInt(fav.dataset.playablecount)||0; if(isFavorited(sKey,vName)){ removeFavorite(sKey,vName); fav.classList.remove('pw-faved'); fav.innerHTML='♡'; fav.title='收藏'; if(currentPrefix==='__favorites__') renderSpecialView('__favorites__'); }else{ let full=currentFiltered.find(v=>v.vod_name===vName&&v.sourceKey===sKey); if(!full && currentData?.videos) full=currentData.videos.find(v=>v.vod_name===vName); if(!full||!full.episodes?.length) Object.values(loadedSources).some(d=>{ let f=d?.videos?.find(v=>v.vod_name===vName); if(f?.episodes?.length){ full=f; return true; } }); addFavorite({ sourceKey:sKey, vod_name:vName, vod_pic:full?.vod_pic||vPic, sourceName:full?.sourceName||'', ep_count:full?.ep_count||eCnt, playable_count:full?.playable_count||pCnt, episodes:full?.episodes||[], vod_class:full?.vod_class||'' }); fav.classList.add('pw-faved'); fav.innerHTML='❤'; fav.title='取消收藏'; } return; }
  let epItem=t.closest('.pw-ep-item'); if(epItem){ playEp(epItem); return; }
  let epClose=t.closest('.pw-ep-close'); if(epClose){ e.stopPropagation(); let pid=epClose.dataset.eid; let panel=document.getElementById(pid); if(panel) panel.classList.remove('pw-open'); return; }
  let btn=t.closest('button'); if(btn){ if(btn.id==='pwSearchBtn') doSearch(); else if(btn.id==='pwStopSearchBtn') stopSearch(); else if(btn.id==='pwBookmarkBtn') addBookmarkHandler(); else if(btn.id==='pwNextEpBtn') playNext(); else if(btn.classList.contains('pw-pg-go')) go(parseInt(btn.dataset.page)); else if(btn.classList.contains('pw-pg-page')) goPage(parseInt(btn.dataset.page)); else if(btn.id==='pwClearSearchResultBtn') clearAllSearchResults(); return; }
  let card=t.closest('.pw-video-card'); if(card) toggleEpisodes(card,card.dataset.eid);
});
document.addEventListener('change',e=>{ let tar=e.target; if(tar.id==='pwSourceSelect') switchSource(); else if(tar.classList.contains('pw-cat-filter')) filterCategory(tar); });
document.addEventListener('keydown',e=>{ if(e.key==='Enter' && document.activeElement===$('pwSearchInput')) doSearch(); if((e.key==='n'||e.key==='N') && currentEpNext){ e.preventDefault(); playNext(); } });
$('pwPlayer').addEventListener('ended',()=>{ if(currentPlayingVideo){ let v=$('pwPlayer'); updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } playNext(); if(!currentEpNext) pw$('.pw-player-box').classList.remove('pw-playing');
 });
$('pwPlayer').addEventListener('pause',()=>{ if(currentPlayingVideo){ let v=$('pwPlayer'); if(v.currentTime>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } });
$('pwFloatBackBtn').addEventListener('click',returnFromFloat);
$('pwFloatCloseBtn').addEventListener('click',closeFloatPlayer);
loadIndex();
// 通知 sevencolor.js 数据已加载（嵌入模式缓存）
if (typeof onDataLoaded !== 'undefined' && onDataLoaded) {
  onDataLoaded([]);
}
