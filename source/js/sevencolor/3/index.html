<script>
(function() {
var STORAGE = { HISTORY:'tvbox_history', FAVORITES:'tvbox_favorites', BOOKMARKS:'tvbox_bookmarks', SEARCH:'tvbox_search_results' };
var PAGE_SIZE = 12, CONCURRENT = 10;
var sourceIndex=[], loadedSources={}, sourceMeta={}, currentData=null, currentPrefix='', currentFilePage=1, currentPage=1, currentFiltered=[], currentCategory='';
var currentSearchKeyword='', currentSearchResults=[], currentSearchCategory='', isSearching=false, searchVersion=0;
var currentPlayingVideo=null, currentPlayingEpIndex=0, currentOpenVideo=null, currentEpNext=null, currentHls=null, playerInFloat=false, floatReturn=null;
var categoryStatsLoading=false;
var pw$ = function(sel) { return document.querySelector('#player-wrap ' + sel); };
var $ = function(id) { return document.getElementById(id); };
var escHtml = function(s) { return String(s).replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); };
var escAttr = function(s) { return String(s).replace(/[&"']/g, function(m) { return {'&':'&amp;','"':'&quot;',"'":'&#39;'}[m]; }); };
var setStatus = function(t) { $('pwStatusText').textContent = t; };
var getStorage = function(key) { try{ return JSON.parse(localStorage.getItem(key))||(key===STORAGE.HISTORY?{}:[]); }catch(e){ return key===STORAGE.HISTORY?{}:[]; } };
var setStorage = function(key,val) { localStorage.setItem(key,JSON.stringify(val)); };
var saveHistory = function(key,val) { var h=getStorage(STORAGE.HISTORY); h[key]=val; setStorage(STORAGE.HISTORY,h); };
var isFavorited = function(k,n) { return getStorage(STORAGE.FAVORITES).some(function(f){ return f.sourceKey===k&&f.videoName===n; }); };
var addFavorite = function(v) { if(isFavorited(v.sourceKey,v.vod_name)) return; var fav=getStorage(STORAGE.FAVORITES); fav.push({ videoName:v.vod_name, sourceKey:v.sourceKey, sourceName:v.sourceName, vodPic:v.vod_pic, ep_count:v.ep_count, playable_count:v.playable_count, episodes:v.episodes, vod_class:v.vod_class }); setStorage(STORAGE.FAVORITES,fav); };
var removeFavorite = function(k,n) { setStorage(STORAGE.FAVORITES, getStorage(STORAGE.FAVORITES).filter(function(f){ return !(f.sourceKey===k&&f.videoName===n); })); };
var getBookmarks = function() { return getStorage(STORAGE.BOOKMARKS); };
var saveBookmarks = function(list) { setStorage(STORAGE.BOOKMARKS,list); };
var addBookmark = function(video,epIdx,prog,note) { var list=getBookmarks(); var epsCopy=video.episodes?video.episodes.map(function(e){ return {title:e.title,url:e.url,playable:e.playable}; }):[]; list.unshift({ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||epsCopy.length, playable_count:video.playable_count||epsCopy.filter(function(e){ return e.playable; }).length, episodes:epsCopy, epIndex:epIdx, epTitle:(video.episodes||[])[epIdx]?.title||'', epUrl:(video.episodes||[])[epIdx]?.url||'', progress:prog, note:note||'', createdAt:Date.now() }); saveBookmarks(list); };
var updateHistory = function(video,epIdx,prog) { var key=video.sourceKey+'_'+video.vod_name; var epsCopy=video.episodes?video.episodes.map(function(e){ return {title:e.title,url:e.url,playable:e.playable}; }):[]; saveHistory(key,{ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||epsCopy.length, playable_count:video.playable_count||epsCopy.filter(function(e){ return e.playable; }).length, episodes:epsCopy, epIndex:epIdx, epTitle:(video.episodes||[])[epIdx]?.title||'', epUrl:(video.episodes||[])[epIdx]?.url||'', progress:prog, updatedAt:Date.now() }); };

function findVideoInCache(sKey,vName){
  for(var k in loadedSources){
    var d=loadedSources[k];
    if(d?.videos){
      var f=d.videos.find(function(v){ return v.vod_name===vName; });
      if(f) return f;
    }
  }
  return null;
}

function loadData(file,cb,to){
  if (typeof to === 'undefined') to = 3000;
  var key=file==='index.js'?'_TVBOX_INDEX':'_TVBOX_SITE_DATA';
  var s=document.createElement('script');
  var t=setTimeout(function(){ s.onload=s.onerror=null; s.remove(); cb(null); },to);
  s.onerror=function(){ clearTimeout(t); cb(null); };
  s.onload=function(){ clearTimeout(t); var d=window[key]; delete window[key]; cb(d||null); };
  var bp=(typeof window.__SC_BASE_PATH !== 'undefined' ? window.__SC_BASE_PATH : '');
  s.src=bp+'data/'+file;
  document.head.appendChild(s);
}

// ===== йў„еҠ иҪҪ =====
var preloadTotal=0,preloadCompleted=0;
function updatePreload(p){ $('pwPreloadProgressFill').style.width=p+'%'; }
function startPreload(){
  if(!sourceIndex.length) return;
  var files=new Set();
  sourceIndex.forEach(function(s){
    var pc=s.page_count||1, base=(sourceMeta[s.prefix]?.fileBase)||s.prefix;
    for(var i=1;i<=pc;i++) files.add(base+'-'+String(i).padStart(2,'0')+'.js');
  });
  var arr=Array.from(files);
  preloadTotal=arr.length; preloadCompleted=0;
  $('pwPreloadProgressBar').style.display='block';
  updatePreload(0);
  var idx=0,running=0;
  function loadOne(){
    if(idx>=arr.length){
      if(running===0){ updatePreload(100); setTimeout(function(){ $('pwPreloadProgressBar').style.display='none'; },500); }
      return;
    }
    var f=arr[idx++]; running++;
    loadData(f,function(data){
      if(data) loadedSources[f]=data;
      preloadCompleted++;
      updatePreload(Math.floor(preloadCompleted/preloadTotal*100));
      running--;
      loadOne();
    },5000);
  }
  for(var i=0;i<CONCURRENT;i++) loadOne();
}

// ===== жҗңзҙў =====
var searchTimer=null;
function doSearch(){
  var kw=$('pwSearchInput').value.trim();
  if(!kw) return;
  if(isSearching) stopSearch();
  currentSearchKeyword=kw;
  currentSearchResults=[];
  currentSearchCategory='';
  isSearching=true;
  searchVersion++;
  var ver=searchVersion;
  $('pwSearchBtn').style.display='none';
  $('pwStopSearchBtn').style.display='inline';
  renderSearchResult(true);
  if(!sourceIndex.length){
    var wait = setInterval(function(){
      if(!isSearching) { clearInterval(wait); return; }
      if(sourceIndex.length){ clearInterval(wait); doSearchImpl(kw, ver); }
    }, 200);
    return;
  }
  doSearchImpl(kw, ver);
}
function doSearchImpl(kw, ver){
  var tasks = [];

  sourceIndex.forEach(function(src){
    var pc = src.page_count||1;
    for(var p=1; p<=pc; p++){
      var base=(sourceMeta[src.prefix]?.fileBase)||src.prefix;
      var fname=base+'-'+String(p).padStart(2,'0')+'.js';
      tasks.push({ fname: fname });
    }
  });

  var totalPages = tasks.length;
  var doneCount = 0;
  var results = [];
  var needRender = false;

  function searchOne(data, fname){
    var found = false;
    if(data?.videos){
      data.videos.forEach(function(v){
        if(v.vod_name.includes(kw)||(v.vod_class||'').includes(kw)){
          results.push({vod_name:v.vod_name, vod_pic:v.vod_pic, ep_count:v.ep_count, playable_count:v.playable_count, episodes:v.episodes, vod_class:v.vod_class, sourceKey:fname, sourceName:data.name});
          found = true;
        }
      });
    }
    return found;
  }

  // иҝӣеәҰжқЎе§Ӣз»Ҳжӣҙж–°
  function updateProgress(){
    setStatus('рҹ“Ў жҗңзҙўдёӯ '+doneCount+'/'+totalPages+' В· е·ІжүҫеҲ° '+results.length+' жқЎ');
  }

  // еҶ…е®№еҸӘеңЁжңүж–°з»“жһңж—¶жёІжҹ“
  function doRender(){
    if(ver!==searchVersion || !needRender) return;
    needRender = false;
    currentSearchResults = results.slice();
    renderSearchResult(false);
  }

  function finish(){
    if(ver!==searchVersion) return;
    isSearching=false;
    $('pwSearchBtn').style.display='inline';
    $('pwStopSearchBtn').style.display='none';
    currentSearchResults = results.slice();
    setStatus('вң… жҗңзҙўе®ҢжҲҗпјҡе…ій”®иҜҚ '+(currentSearchKeyword||'-')+' - з»“жһңпјҡ'+results.length+' жқЎ');
    $('pwCatBar').innerHTML='';
    renderSearchResult(false);
  }

  var running = 0;
  var idx = 0;

  function loadNext(){
    if(ver!==searchVersion) return;
    while(idx < tasks.length){
      var task = tasks[idx++];
      if(loadedSources[task.fname]){
        var found = searchOne(loadedSources[task.fname], task.fname);
        doneCount++;
        updateProgress();
        if(found) needRender = true;
      } else {
        running++;
        loadData(task.fname, function(data){
          if(data) loadedSources[task.fname]=data;
          var found = searchOne(data, task.fname);
          doneCount++;
          updateProgress();
          if(found) needRender = true;
          running--;
          doRender();
          loadNext();
        }, 5000);
        if(running >= CONCURRENT) break;
      }
    }
    doRender();
    if(idx >= tasks.length && running <= 0) finish();
  }

  for(var i=0; i<CONCURRENT; i++) loadNext();
}
function stopSearch(){
  if(!isSearching) return;
  searchVersion++;
  isSearching=false;
  $('pwSearchBtn').style.display='inline';
  $('pwStopSearchBtn').style.display='none';
  if(currentSearchKeyword) renderSearchResult(false);
}

// ===== жҗңзҙўз»“жһңз®ЎзҗҶ =====
function saveSearchToStorage(){ setStorage(STORAGE.SEARCH,{ keyword:currentSearchKeyword, results:currentSearchResults, category:currentSearchCategory }); }
function loadSearchFromStorage(){ var d=getStorage(STORAGE.SEARCH); if(d?.results?.length){ currentSearchKeyword=d.keyword||''; currentSearchResults=d.results.slice(); currentSearchCategory=d.category||''; return true; } return false; }
function refreshSearchDisplay(){
  var filtered = currentSearchCategory==='' ? currentSearchResults.slice() :
    currentSearchCategory==='жңӘеҲҶзұ»' ? currentSearchResults.filter(function(v){ return !(v.vod_class||'').trim(); }) :
    currentSearchResults.filter(function(v){ return (v.vod_class||'').split(',').some(function(c){ return c.trim()===currentSearchCategory; }); });
  currentFiltered=filtered; currentPage=1; render(); saveSearchToStorage();
}
function buildSearchCatBar(){
  var cats={};
  currentSearchResults.forEach(function(v){
    var cls=v.vod_class;
    if(Array.isArray(cls)) cls=cls.join(',');
    cls=(cls||'').trim();
    if(!cls) cats['жңӘеҲҶзұ»']=(cats['жңӘеҲҶзұ»']||0)+1;
    else cls.split(',').forEach(function(c){ c=c.trim(); if(c) cats[c]=(cats[c]||0)+1; });
  });

function switchSource(){

function loadPageFile(prefix,page){
  var base=(sourceMeta[prefix]?.fileBase)||prefix;
  var fname=base+'-'+String(page).padStart(2,'0')+'.js';
  if(loadedSources[fname]) useSourceData(loadedSources[fname],fname,page);
  else {
    $('pwContent').innerHTML='<div class="pw-empty-state">вӣҸ еҠ иҪҪдёӯ...</div>';
    loadData(fname,function(data){ if(data) loadedSources[fname]=data; useSourceData(data,fname,page); });
  }
}
function useSourceData(data,file,page){
  currentData=data; currentFilePage=page; currentPage=1;
  if(!data?.videos){ setStatus('вқҢ ж•°жҚ®ж јејҸй”ҷиҜҜ'); return; }
  currentCategory='';
  setStatus('рҹ“Ў '+data.name+' вҖ” з¬¬'+page+'йЎө');
  currentFiltered=data.videos.map(function(v){ return {vod_name:v.vod_name, vod_pic:v.vod_pic, ep_count:v.ep_count, playable_count:v.playable_count, episodes:v.episodes, vod_class:v.vod_class, sourceKey:file, sourceName:data.name}; });
  render();
  $('pwClearSearchResultBtn').style.display='none';
  buildCatBarAsync();
}
function ensureFullCategoryStats(prefix){
  if(categoryStatsLoading) return;
  var meta=sourceMeta[prefix];
  if(!meta) return;
  if(meta.categories && Object.keys(meta.categories).length>0) return;
  categoryStatsLoading=true;
  setStatus('рҹ“Ҡ жӯЈеңЁз»ҹи®ЎеҲҶзұ»ж•°йҮҸ (е…ЁйҮҸ) ...');
  var pc=meta.page_count||1;
  var base=(meta.fileBase)||prefix;
  var catMap={};
  var loadedCount=0;
  var totalVideos=0;
  var playableVideos=0;
  function processPage(p){
    if(p>pc){
      meta.categories=catMap;
      meta.total=totalVideos;
      meta.playable_videos=playableVideos;
      categoryStatsLoading=false;
      setStatus('вң… еҲҶзұ»з»ҹи®Ўе®ҢжҲҗ (е…ұ '+Object.keys(catMap).length+' дёӘеҲҶзұ»)');
      buildCatBarAndRefresh();
      return;
    }
    var fname=base+'-'+String(p).padStart(2,'0')+'.js';
    var pageData=loadedSources[fname];
    function afterLoad(data){
      if(data) loadedSources[fname]=data;
      pageData=loadedSources[fname];
      if(pageData?.videos){
        totalVideos+=pageData.videos.length;
        pageData.videos.forEach(function(v){
          if(v.playable_count>0) playableVideos++;
          // е…је®№ vod_class дёәж•°з»„жҲ–еӯ—з¬ҰдёІ
          var cls=v.vod_class;
          if(Array.isArray(cls)) cls=cls.join(',');
          cls=(cls||'').trim();
          if(!cls){ catMap['жңӘеҲҶзұ»']=(catMap['жңӘеҲҶзұ»']||0)+1; }
          else {
            cls.split(',').forEach(function(c){
              c=c.trim().replace(/^\s+|\s+$/g,'');
              if(c) catMap[c]=(catMap[c]||0)+1;
            });
          }
        });
      }
      loadedCount++;
      setStatus('рҹ“Ҡ з»ҹи®ЎеҲҶзұ»дёӯ '+loadedCount+'/'+pc+' ...');
      processPage(p+1);
    }
    if(pageData){ afterLoad(null); }
    else { loadData(fname,function(data){ afterLoad(data); },5000); }
  }
  processPage(1);
}
function buildCatBarAndRefresh(){
  var meta=sourceMeta[currentPrefix];
  if(!meta) return;
  var cats=meta.categories||{};
  var total=meta.total||0;
  var playable=meta.playable_videos||0;
  var h='<select class="pw-cat-filter"><option value="">е…ЁйғЁ ('+(total>99?'99+':total)+'/'+(playable>99?'99+':playable)+')</option>';
  Object.keys(cats).sort(function(a,b){ return cats[b]-cats[a]; }).forEach(function(c){
    h+='<option value="'+c.replace(/&/g,'&amp;')+'">'+c+' ('+cats[c]+')</option>';
  });
  h+='</select>';
  $('pwCatBar').innerHTML=h;
  if(currentCategory && currentCategory!==''){
    filterCategory(document.querySelector('.pw-cat-filter'));
  } else {
    if(currentPrefix && !currentPrefix.startsWith('__') && currentData){
      currentFiltered=currentData.videos.map(function(v){ return {vod_name:v.vod_name, vod_pic:v.vod_pic, ep_count:v.ep_count, playable_count:v.playable_count, episodes:v.episodes, vod_class:v.vod_class, sourceKey:currentData.fileName||currentPrefix, sourceName:currentData.name}; });
      render();
    }
  }
}
function buildCatBarAsync(){
  var meta=sourceMeta[currentPrefix];
  if(!meta) return;
  if(meta.categories && Object.keys(meta.categories).length>0){
    var cats=meta.categories;
    var total=meta.total||0;
    var playable=meta.playable_videos||0;
    var h='<select class="pw-cat-filter"><option value="">е…ЁйғЁ ('+(total>99?'99+':total)+'/'+(playable>99?'99+':playable)+')</option>';
    Object.keys(cats).sort(function(a,b){ return cats[b]-cats[a]; }).forEach(function(c){
      h+='<option value="'+c.replace(/&/g,'&amp;')+'">'+c+' ('+cats[c]+')</option>';
    });
    h+='</select>';
    $('pwCatBar').innerHTML=h;
    return;
  }
  ensureFullCategoryStats(currentPrefix);
  $('pwCatBar').innerHTML='<select class="pw-cat-filter"><option value="">з»ҹи®ЎеҲҶзұ»дёӯ...</option></select>';
}
function filterCategory(sel){
  var selected=sel.value;
  if(currentPrefix==='__search_result__'){ currentSearchCategory=selected; refreshSearchDisplay(); buildSearchCatBar(); return; }
  if(currentPrefix.startsWith('__')) return;
  currentCategory=selected; currentPage=1;
  if(!currentCategory){ loadPageFile(currentPrefix,currentFilePage); return; }
  var meta=sourceMeta[currentPrefix], pc=meta.page_count||1, results=[], loaded=0;
  var done=function(){ loaded++; if(loaded>=pc){ currentFiltered=results; setStatus('[FILTER] '+selected+' вҖ” '+results.length+' results'); render(); } };
  for(var p=1;p<=pc;p++){
    var fn=(meta.fileBase||currentPrefix)+'-'+String(p).padStart(2,'0')+'.js';
    if(loadedSources[fn]){ collectCat(loadedSources[fn],selected,results); done(); }
    else loadData(fn,function(data){ if(data) loadedSources[fn]=data; if(data) collectCat(data,selected,results); done(); });
  }
}
function collectCat(src,cat,out){
  if(!src?.videos) return;
  src.videos.forEach(function(v){
    var matched = false;
    var clsRaw = v.vod_class;
    if(Array.isArray(clsRaw)) clsRaw = clsRaw.join(',');
    if(cat === 'жңӘеҲҶзұ»') {
      if(!clsRaw || (typeof clsRaw === 'string' && clsRaw.trim() === '')) matched = true;
    } else {
      clsRaw = (clsRaw || '').toString();
      var classes = clsRaw.split(',').map(function(c){ return c.trim(); }).filter(function(c){ return c; });
      if(classes.indexOf(cat) !== -1) matched = true;
    }
    if(matched){
      out.push({
        sourceKey: currentPrefix,
        sourceName: src.name,
        vod_name: v.vod_name,
        vod_pic: v.vod_pic,
        episodes: v.episodes,
        ep_count: v.ep_count,
        playable_count: v.playable_count,
        vod_class: v.vod_class
      });
    }
  });
}

function go(p){ var total=currentFiltered.length, max=Math.ceil(total/PAGE_SIZE)||1; if(p<1) p=1; if(p>max) p=max; currentPage=p; render(); }

function toggleEpisodes(el,eid){

  if(!open){
    var vodName=el.dataset.vodname, sKey=el.dataset.sourcekey;
    currentOpenVideo=currentFiltered.find(function(v){ return v.vod_name===vodName&&v.sourceKey===sKey; })||null;
    if(currentOpenVideo && currentOpenVideo.episodes?.length===1 && (currentOpenVideo.isHistory||currentOpenVideo.isBookmark)){
      var full=findVideoInCache(sKey,vodName);
      if(full?.episodes?.length>1){
        currentOpenVideo.episodes=full.episodes;
        currentOpenVideo.playable_count=full.playable_count||full.episodes.filter(function(e){ return e.playable; }).length;
        currentOpenVideo.ep_count=full.ep_count||full.episodes.length;
        var epContainer=panel;
        epContainer.innerHTML='<div class="pw-ep-header"><span>еү§йӣҶ ('+currentOpenVideo.episodes.length+')</span><button class="pw-ep-close" data-eid="'+eid+'">вң–</button></div>';
        currentOpenVideo.episodes.forEach(function(e,ei){
          var isCurr=(currentOpenVideo.isHistory && ei===currentOpenVideo.historyEpIndex)||(currentOpenVideo.isBookmark && ei===currentOpenVideo.bookmarkEpIndex);
          var prog=isCurr&&(currentOpenVideo.historyProgress||currentOpenVideo.bookmarkProgress);
          epContainer.innerHTML+='<div class="pw-ep-item'+(isCurr?' pw-current':'')+'" data-url="'+escAttr(e.url)+'" data-name="'+escAttr(currentOpenVideo.vod_name+' - '+e.title)+'" data-epindex="'+ei+'">'+escHtml(e.title)+(!e.playable?' вҡ ':'')+(isCurr?' в–¶':'')+(prog?' ('+Math.floor(prog/60)+"'"+(prog%60)+')':'')+'</div>';
        });
        var closeBtn=epContainer.querySelector('.pw-ep-close');
        if(closeBtn) closeBtn.addEventListener('click',function(ev){ ev.stopPropagation(); panel.classList.remove('pw-open'); });
      }
    }
  } else currentOpenVideo=null;
}

// ===== ж’ӯж”ҫзӣёе…і =====
function playEp(el){
  var url=el.dataset.url;
  if(!url) return;
  var items=el.parentElement.querySelectorAll('.pw-ep-item');
  var idx=Array.from(items).indexOf(el);
  var epIdx=parseInt(el.dataset.epindex)||idx;
  currentEpNext=idx<items.length-1?items[idx+1]:null;
  $('pwNextEpBtn').style.display=currentEpNext?'inline':'none';
  if(currentPlayingVideo){
    var vv=$('pwPlayer');
    if(vv.currentTime>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(vv.currentTime));
  }
  currentPlayingVideo=currentOpenVideo;
  currentPlayingEpIndex=epIdx;
  $('pwBookmarkBtn').style.display='inline-block';
  doPlay(url,el.dataset.name);
}
function doPlay(url,name){
  if(currentHls) currentHls.destroy();
  var v=$('pwPlayer');
  v.pause(); v.removeAttribute('src'); v.load();
  pw$('.pw-player-box').classList.add('pw-playing');
  if(url.includes('.m3u8') && window.Hls?.isSupported()){
    var hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(v);
    currentHls=hls;
  } else v.src=url;
  v.play().catch(function(){});
  var saved=currentOpenVideo?(currentOpenVideo.historyProgress||currentOpenVideo.bookmarkProgress||0):0;
  if(saved>5) v.addEventListener('canplay',function once(){ v.removeEventListener('canplay',once); v.currentTime=saved; });
  setStatus('в–¶ '+name);
}
function playNext(){ if(currentEpNext) playEp(currentEpNext); }
function addBookmarkHandler(){
  if(!currentPlayingVideo || (currentPlayingEpIndex===undefined)){ setStatus('вҡ  иҜ·е…ҲйҖүжӢ©еү§йӣҶ'); return; }
  var v=$('pwPlayer');
  updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime));
  var note=prompt('еҪұзӯҫеӨҮжіЁпјҡ','');
  if(note===null) return;
  addBookmark(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime),note);
  setStatus('вң“ еҪұзӯҫе·Іж·»еҠ ');
}
function showFloatPlayer(){
  if(playerInFloat) return;
  var main=$('pwPlayer'), floatV=$('pwFloatVideo'), floatDiv=$('pwFloatPlayer');
  if(currentHls){ currentHls.detachMedia(); currentHls.attachMedia(floatV); }
  floatV.src=main.src||main.currentSrc;
  floatV.currentTime=main.currentTime;
  floatV.volume=main.volume;
  if(currentPlayingVideo) $('pwFloatPlayerTitle').textContent=currentPlayingVideo.vod_name||'жӯЈеңЁж’ӯж”ҫ';
  playerInFloat=true;
  pw$('.pw-player-box').classList.remove('pw-playing');
  floatDiv.style.display='block';
  if(!main.paused) floatV.play().catch(function(){});
}
function returnFromFloat(){
  if(!playerInFloat) return;
  $('pwFloatPlayer').style.display='none';
  playerInFloat=false;
  var main=$('pwPlayer'), floatV=$('pwFloatVideo');
  if(currentHls){ currentHls.detachMedia(); currentHls.attachMedia(main); }
  main.src=floatV.src; main.currentTime=floatV.currentTime; main.volume=floatV.volume;
  main.play().catch(function(){});
  pw$('.pw-player-box').classList.add('pw-playing');
  if(floatReturn){ $('pwSourceSelect').value=floatReturn; floatReturn=null; }
}
function closeFloatPlayer(){
  if(!playerInFloat) return;
  var v=$('pwFloatVideo'); v.pause(); v.src='';
  if(currentHls){ currentHls.destroy(); currentHls=null; }
  playerInFloat=false; floatReturn=null;
  $('pwFloatPlayer').style.display='none';
  pw$('.pw-player-box').classList.remove('pw-playing');
  currentPlayingVideo=null;
  $('pwBookmarkBtn').style.display='none';
  setStatus('вҸ№ е·Іе…ій—ӯ');
}

// ===== еҲқе§ӢеҢ–дёҺдё»йўҳ =====
(function(){
  var wrap=$('player-wrap');
  var t=wrap.getAttribute('data-theme');
  if(!t){ try{ var pt=window.parent.document.documentElement.getAttribute('data-theme'); if(pt==='dark'||pt==='light') t=pt; }catch(e){} }
  if(!t) t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
  wrap.setAttribute('data-theme',t);

  function checkContainerWidth(){
    var width = wrap.offsetWidth;
    if(width < 500) wrap.classList.add('pw-narrow');
    else wrap.classList.remove('pw-narrow');
  }
  checkContainerWidth();
  window.addEventListener('resize', checkContainerWidth);
})();

function setEmpty(t,s){ $('pwContent').innerHTML='<div class="pw-empty-state">рҹ“ә '+t+(s?'<div class="sub">'+s+'</div>':'')+'</div>'; }
function loadIndex(){
  loadData('index.js',function(data){
    if(!data){ setEmpty('ж— ж•°жҚ®','иҜ·иҝҗиЎҢзҲ¬иҷ«'); return; }
    sourceIndex=data;
    if(!sourceIndex.length){ setEmpty('ж— ж•°жҚ®жәҗ','иҜ·жЈҖжҹҘ data/зӣ®еҪ•'); return; }
    var sel=$('pwSourceSelect'), ta=0,pa=0;
    sel.innerHTML='';
    sel.appendChild(new Option('рҹ•’ жңҖиҝ‘и§ӮзңӢ','__history__'));
    sel.appendChild(new Option('вқӨпёҸ жҲ‘зҡ„ж”¶и—Ҹ','__favorites__'));
    sel.appendChild(new Option('рҹ“Ң жҲ‘зҡ„еҪұзӯҫ','__bookmarks__'));
    sel.appendChild(new Option('рҹ“Ӣ жҗңзҙўз»“жһң','__search_result__'));
    sel.appendChild(new Option('вҖ” ж•°жҚ®жәҗ вҖ”','',true,true));
    var nameCnt={};
    sourceIndex.forEach(function(s){ nameCnt[s.name]=(nameCnt[s.name]||0)+1; });
    var nameSeen={};
    sourceIndex.forEach(function(s){
      ta+=s.total||0; pa+=s.playable||0;
      var dn=s.name;
      if(nameCnt[s.name]>1){ nameSeen[s.name]=(nameSeen[s.name]||0)+1; dn=s.name+'пјҲз«ҷ'+['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','дёғ','е…«','д№қ'][nameSeen[s.name]-1]+'пјү'; }
      sel.appendChild(new Option('рҹ“Җ '+dn,s.prefix));
      sourceMeta[s.prefix]={ page_count:s.page_count||1, name:dn, total:s.total, playable_videos:s.playable_videos||0, categories:s.categories||{}, fileBase:s.file.replace(/\.js$/,'').replace(/-\d+$/,''), prefix:s.prefix };
    });
    $('pwTvboxFooter').innerHTML='<span>ж•°жҚ®жәҗ '+sourceIndex.length+'</span><span>жҖ»ең°еқҖ '+ta+'</span><span>еҸҜж’ӯж”ҫ '+pa+'</span>';
    startPreload();
    sel.value='__history__';
    renderSpecialView('__history__');
  });
}

// ===== е…ЁеұҖдәӢд»¶пјҲе§”жүҳпјү=====
document.addEventListener('click',function(e){
  var t=e.target;
  var epDel=t.closest('.pw-ep-delete');
  if(epDel){ e.stopPropagation(); var sKey=epDel.dataset.sourcekey, vName=epDel.dataset.vodname, type=epDel.dataset.type; if(type==='history'){ var h=getStorage(STORAGE.HISTORY); delete h[sKey+'_'+vName]; setStorage(STORAGE.HISTORY,h); setStatus('вң“ е·ІеҲ йҷӨ'); renderSpecialView('__history__'); }else if(type==='bookmark'){ saveBookmarks(getBookmarks().filter(function(b){ return !(b.videoName===vName&&b.sourceKey===sKey); })); setStatus('вң“ еҪұзӯҫе·ІеҲ йҷӨ'); renderSpecialView('__bookmarks__'); } return; }
  var srDel=t.closest('.pw-search-result-delete');
  if(srDel){ e.stopPropagation(); removeSearchItem(srDel.dataset.sourcekey, srDel.dataset.vodname); setStatus('вң“ е·Ід»Һжҗңзҙўз»“жһңдёӯеҲ йҷӨ'); return; }
  var fav=t.closest('.pw-fav-btn');
  if(fav){
    e.stopPropagation();
    var sKey=fav.dataset.sourcekey, vName=fav.dataset.vodname, vPic=fav.dataset.vodpic, eCnt=parseInt(fav.dataset.epcount)||0, pCnt=parseInt(fav.dataset.playablecount)||0;
    if(isFavorited(sKey,vName)){
      removeFavorite(sKey,vName); fav.classList.remove('pw-faved'); fav.innerHTML='вҷЎ'; fav.title='ж”¶и—Ҹ';
      if(currentPrefix==='__favorites__') renderSpecialView('__favorites__');
    }else{
      var full=currentFiltered.find(function(v){ return v.vod_name===vName&&v.sourceKey===sKey; });
      if(!full && currentData?.videos) full=currentData.videos.find(function(v){ return v.vod_name===vName; });
      if(!full||!full.episodes?.length) Object.values(loadedSources).some(function(d){
        var f=d?.videos?.find(function(v){ return v.vod_name===vName; });
        if(f?.episodes?.length){ full=f; return true; }
      });
      addFavorite({
        sourceKey:sKey, vod_name:vName, vod_pic:full?.vod_pic||vPic,
        sourceName:full?.sourceName||'', ep_count:full?.ep_count||eCnt,
        playable_count:full?.playable_count||pCnt, episodes:full?.episodes||[],
        vod_class:full?.vod_class||''
      });
      fav.classList.add('pw-faved'); fav.innerHTML='вқӨ'; fav.title='еҸ–ж¶Ҳж”¶и—Ҹ';
    }
    return;
  }
  var epItem=t.closest('.pw-ep-item');
  if(epItem){ playEp(epItem); return; }
  var epClose=t.closest('.pw-ep-close');
  if(epClose){ e.stopPropagation(); var pid=epClose.dataset.eid; var panel=document.getElementById(pid); if(panel) panel.classList.remove('pw-open'); return; }
  var btn=t.closest('button');
  if(btn){
    if(btn.id==='pwSearchBtn') doSearch();
    else if(btn.id==='pwStopSearchBtn') stopSearch();
    else if(btn.id==='pwBookmarkBtn') addBookmarkHandler();
    else if(btn.id==='pwNextEpBtn') playNext();
    else if(btn.classList.contains('pw-pg-go')) go(parseInt(btn.dataset.page));
    else if(btn.classList.contains('pw-pg-page')) goPage(parseInt(btn.dataset.page));
    else if(btn.id==='pwClearSearchResultBtn') clearAllSearchResults();
    return;
  }
  var card=t.closest('.pw-video-card');
  if(card) toggleEpisodes(card,card.dataset.eid);
});
document.addEventListener('change',function(e){
  var tar=e.target;
  if(tar.id==='pwSourceSelect') switchSource();
  else if(tar.classList.contains('pw-cat-filter')) filterCategory(tar);
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter' && document.activeElement===$('pwSearchInput')) doSearch();
  if((e.key==='n'||e.key==='N') && currentEpNext){ e.preventDefault(); playNext(); }
});
$('pwPlayer').addEventListener('ended',function(){
  if(currentPlayingVideo){ var v=$('pwPlayer'); updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); }
  playNext();
  if(!currentEpNext) pw$('.pw-player-box').classList.remove('pw-playing');
});
$('pwPlayer').addEventListener('pause',function(){
  if(currentPlayingVideo){ var v=$('pwPlayer'); if(v.currentTime>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); }
});
$('pwFloatBackBtn').addEventListener('click',returnFromFloat);
$('pwFloatCloseBtn').addEventListener('click',closeFloatPlayer);
loadIndex();

  onDataLoaded([]);
}
