<!DOCTYPE html><html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>超级播霸 · 极速搜索版</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* ===== CSS 自定义属性 ===== */
:root {
  --bg-page: #0f0f0f;
  --bg-card: #1a1a2e;
  --bg-card-hover: #1e1e38;
  --bg-eplist: #111;
  --bg-eplist-alt: #161616;
  --bg-player: #000;
  --bg-toolbar: #16213e;
  --bg-input: #1a1a2e;
  --text-primary: #e8e8e8;
  --text-secondary: #90a4ae;
  --text-muted: #607d8b;
  --border: #333;
  --accent: #ff6b35;
  --accent-hover: #e85d2a;
  --badge-playable-bg: #2e7d32;
  --badge-playable-text: #fff;
  --badge-unplayable-bg: #616161;
  --badge-unplayable-text: #bdbdbd;
  --shadow: rgba(0,0,0,0.4);
  --card-radius: 10px;
}
[data-theme="light"] {
  --bg-page: #f5f5f5;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f0f5;
  --bg-eplist: #fafafa;
  --bg-eplist-alt: #f0f0f0;
  --bg-player: #000;
  --bg-toolbar: #e8e0f0;
  --bg-input: #fff;
  --text-primary: #212121;
  --text-secondary: #546e7a;
  --text-muted: #90a4ae;
  --border: #ddd;
  --accent: #e65100;
  --accent-hover: #d84315;
  --badge-playable-bg: #2e7d32;
  --badge-playable-text: #fff;
  --badge-unplayable-bg: #bdbdbd;
  --badge-unplayable-text: #757575;
  --shadow: rgba(0,0,0,0.1);
  --card-radius: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
#player-wrap * { box-sizing:border-box; }
#player-wrap { font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif; color:var(--text-primary); max-width:1200px; margin:0 auto; line-height:1.5; font-size:14px; transition:color .3s; position:relative; }
/* 顶部缓存进度条 */
#preload-progress-bar {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:2px;
  background:rgba(255,107,53,0.3);
  z-index:10000;
  pointer-events:none;
}
#preload-progress-fill {
  width:0%;
  height:100%;
  background:var(--accent);
  transition:width 0.2s ease;
}
.toolbar{ display:flex; gap:6px; margin:6px 0 6px; flex-wrap:nowrap; align-items:center; }
.toolbar select,.toolbar input,.toolbar button{ padding:7px 10px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text-primary); font-size:13px; transition:border-color .2s; }
.toolbar select{ min-width:0; flex:3; cursor:pointer; }
.toolbar input{ flex:4; min-width:60px; }
.toolbar button{ flex-shrink:0; background:var(--accent); color:#fff; border:none; cursor:pointer; font-weight:500; white-space:nowrap; }
.toolbar button:hover{ background:var(--accent-hover); }
.cat-bar{ margin:0 8px 0 0; display:flex; align-items:center; gap:8px; }
.cat-bar select{ max-width:160px; min-width:80px; padding:7px 10px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text-primary); font-size:13px; cursor:pointer; }
.back-btn{ background:var(--bg-card); border:1px solid var(--border); padding:4px 8px; border-radius:6px; cursor:pointer; font-size:12px; color:var(--text-primary); }
.status-bar{ padding:2px 0px; border-radius:6px; margin:6px 0; font-size:12px; color:var(--text-secondary); display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.status-bar .next-ep-btn{ flex-shrink:0; padding:2px 10px; background:var(--accent); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:11px; display:none; }
.status-bar .next-ep-btn:hover{ background:var(--accent-hover); }
.status-bar .clear-search-btn{ flex-shrink:0; padding:2px 10px; background:#555; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:11px; margin-left:4px; }
.status-bar .clear-search-btn:hover{ background:#777; }
.player-box{ background:var(--bg-player); border-radius:10px; overflow:hidden; margin:0px; position:relative; height:0; transition:height .3s; }
.player-box.playing{ height:auto; }
#player{ width:100%; aspect-ratio:16/9; background:#000; display:block; }
.float-player{ position:fixed; bottom:20px; right:20px; width:320px; background:#1a1a2e; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:9999; overflow:hidden; }
.float-player-header{ display:flex; align-items:center; padding:8px 10px; background:#16213e; gap:8px; }
.float-player-title{ flex:1; font-size:13px; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.float-btn{ width:28px; height:28px; border-radius:50%; border:none; background:rgba(255,255,255,0.15); color:#fff; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; }
.float-close{ color:#ff6b6b; }
#floatVideo{ width:100%; aspect-ratio:16/9; background:#000; display:block; }
.video-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:12px; margin:12px 0; }
.video-card{ background:var(--bg-card); border-radius:var(--card-radius); cursor:pointer; transition:transform .2s,box-shadow .2s; border:1px solid var(--border); position:relative; }
.video-card:hover{ transform:translateY(-3px); box-shadow:0 4px 16px var(--shadow); }
.video-card .poster-wrap{ position:relative; width:100%; aspect-ratio:3/4; overflow:hidden; background:var(--bg-card); }
.video-card .poster{ width:100%; height:100%; object-fit:cover; display:block; }
.video-card .poster-fallback{ display:flex; align-items:center; justify-content:center; width:100%; height:100%; background:linear-gradient(135deg,var(--bg-card),var(--bg-toolbar)); color:var(--text-muted); font-size:32px; }
.card-badge{ position:absolute; top:6px; right:6px; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; backdrop-filter:blur(4px); }
.card-badge.playable{ background:rgba(46,125,50,.85); color:#fff; }
.card-badge.unplayable{ background:rgba(97,97,97,.75); color:#bdbdbd; }
.video-card .card-info{ padding:8px 10px; }
.video-card .card-title{ font-size:13px; color:var(--text-primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
.video-card .card-meta{ font-size:11px; color:var(--text-secondary); margin-top:3px; display:flex; gap:6px; align-items:center; }
.video-card .fav-btn{ position:absolute; top:6px; width:26px; height:26px; border-radius:50%; background:transparent; color:#ff6b6b; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:2; padding:0; }
.video-card .card-fav{ left:6px; }
.video-card .card-delete{ left:calc(6px + 26px + 6px); color:#ff4444; }
.video-card .card-search-delete{ left:calc(6px + 26px + 6px + 26px + 6px); color:#ff6b6b; background:transparent; } /* 搜索结果专用删除按钮位置更靠右 */
.video-card .fav-btn.faved{ color:#ff6b6b; }
.video-card .progress-bar{ position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(0,0,0,0.5); }
.video-card .progress-fill{ height:100%; background:var(--accent); transition:width .3s; }
.video-card .bookmark-note{ position:absolute; bottom:4px; left:4px; right:4px; background:rgba(0,0,0,0.7); color:#fff; font-size:10px; padding:2px 6px; border-radius:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ep-panel{ display:none; }
.ep-panel.open{ display:block; background:var(--bg-eplist); border:1px solid var(--border); border-top:none; border-radius:0 0 var(--card-radius) var(--card-radius); margin-top:-1px; max-height:320px; overflow-y:auto; }
.ep-header{ display:flex; align-items:center; justify-content:space-between; padding:6px 10px; font-size:11px; color:var(--text-muted); background:var(--bg-eplist-alt); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1; }
.ep-item{ cursor:pointer; padding:4px 10px; font-size:12px; border-bottom:1px solid var(--border); transition:background .15s; color:var(--text-secondary); }
.ep-item:hover{ background:var(--bg-card-hover); color:var(--text-primary); }
.ep-item.ep-current{ color:var(--accent); font-weight:500; }
.pagination{ display:flex; gap:3px; justify-content:center; margin:12px 0; flex-wrap:nowrap; }
.pagination button{ padding:3px 8px; border:1px solid var(--border); border-radius:4px; background:var(--bg-card); color:var(--text-secondary); cursor:pointer; font-size:12px; transition:all .15s; min-width:26px; }
.pagination button.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
.empty-state{ text-align:center; padding:50px 20px; color:var(--text-muted); }
.tvbox-footer{ text-align:center; padding:12px 0 6px; margin-top:12px; font-size:11px; color:var(--text-muted); }
@media(max-width:600px){ .video-grid{ grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; } .toolbar select,.toolbar input,.toolbar button{ font-size:12px; padding:6px 8px; } }
</style></head><body>
<div id="preload-progress-bar"><div id="preload-progress-fill"></div></div>
<div id="player-wrap">
<div class="toolbar">
  <select id="sourceSelect"></select>
  <input type="text" id="searchInput" placeholder="全局搜索影片...">
  <button id="searchBtn">搜索</button>
  <button id="stopSearchBtn" style="display:none">停止</button>
</div>
<div class="player-box">
  <video id="player" controls playsinline></video>
</div>
<div class="float-player" id="floatPlayer" style="display:none">
  <div class="float-player-header">
    <span class="float-player-title" id="floatPlayerTitle">正在播放</span>
    <button class="float-btn" id="floatBackBtn" title="返回">←</button>
    <button class="float-btn float-close" id="floatCloseBtn" title="关闭">✖</button>
  </div>
  <video id="floatVideo" playsinline></video>
</div>
<div id="status" class="status-bar">
  <div class="cat-bar" id="catBar"></div>
  <span id="statusText">[STOP] 选择一个数据源</span>
  <div style="display:flex; gap:6px;">
    <button id="clearSearchResultBtn" class="clear-search-btn" style="display:none;">清空</button>
    <button id="bookmarkBtn" class="next-ep-btn" style="background:#4caf50;" title="添加影签">签</button>
    <button id="nextEpBtn" class="next-ep-btn">下集</button>
  </div>
</div>
<div id="content"></div>
<div class="pagination" id="pagination"></div>
<div class="tvbox-footer" id="tvboxFooter"></div>

<script>
// ======================= 常量 & 存储 =======================
var STORAGE_KEYS = { HISTORY: 'tvbox_history', FAVORITES: 'tvbox_favorites', BOOKMARKS: 'tvbox_bookmarks' };
var PAGE_SIZE = 12;
var CONCURRENT_LIMIT = 10;
var currentData = null, currentPage = 1, currentFiltered = [], currentHls = null;
var currentEpNext = null;
var currentCategory = '';
var allSearchResults = [];
var sourceIndex = [];
var loadedSources = {};
var sourceMeta = {};
var currentPrefix = '';
var currentFilePage = 1;
var currentSearchMode = false;
var isSearching = false;
var searchVersion = 0;
var currentPlayingVideo = null;
var currentPlayingEpIndex = 0;
var currentOpenVideo = null;
var playerInFloatMode = false;
var floatReturnPrefix = null;
// 当前搜索结果
var currentSearchKeyword = '';
var currentSearchResults = [];
var currentSearchResultCount = 0;
// 预加载相关
var isPreloading = false;
var preloadTotal = 0;
var preloadCompleted = 0;
var preloadProgressFill = document.getElementById('preload-progress-fill');
var preloadProgressBar = document.getElementById('preload-progress-bar');

// ======================= 预加载所有分页 =======================
function startPreloadAllPages() {
  if (!sourceIndex.length) return;
  isPreloading = true;
  var allFilesSet = new Set();
  sourceIndex.forEach(function(src){
    var pc = src.page_count || 1;
    var baseFile = (sourceMeta[src.prefix] && sourceMeta[src.prefix].fileBase) ? sourceMeta[src.prefix].fileBase : src.prefix;
    for(var i=1;i<=pc;i++){
      var fname = baseFile + '-' + String(i).padStart(2,'0') + '.js';
      if (!loadedSources[fname]) allFilesSet.add(fname);
    }
  });
  var allFiles = Array.from(allFilesSet);
  preloadTotal = allFiles.length;
  preloadCompleted = 0;
  if (preloadTotal === 0) {
    isPreloading = false;
    preloadProgressBar.style.display = 'none';
    return;
  }
  preloadProgressBar.style.display = 'block';
  updatePreloadProgress(0);
  var idx = 0;
  var running = 0;
  var active = true;
  function loadOne() {
    if (!active) return;
    if (idx >= allFiles.length) {
      if (running === 0) {
        isPreloading = false;
        updatePreloadProgress(100);
        setTimeout(function(){ preloadProgressBar.style.display = 'none'; }, 500);
      }
      return;
    }
    var fname = allFiles[idx++];
    running++;
    loadData(fname, function(data) {
      if (data) loadedSources[fname] = data;
      preloadCompleted++;
      var percent = Math.floor((preloadCompleted / preloadTotal) * 100);
      updatePreloadProgress(percent);
      running--;
      loadOne();
    }, 5000);
  }
  for (var i = 0; i < CONCURRENT_LIMIT; i++) {
    loadOne();
  }
}
function updatePreloadProgress(percent) {
  if (preloadProgressFill) preloadProgressFill.style.width = percent + '%';
}

// ======================= 搜索结果视图 =======================
function renderSearchResult(showLoadingMsg) {
  currentSearchMode = false;
  currentCategory = '';
  currentPrefix = '__search_result__';
  var clearBtn = document.getElementById('clearSearchResultBtn');
  if (showLoadingMsg && (!currentSearchResults.length || isSearching)) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="desc">搜索中…</div></div>';
    document.getElementById('pagination').innerHTML = '';
    var statusText = '关键词: ' + currentSearchKeyword + ' - 结果: 0';
    document.getElementById('statusText').textContent = statusText;
    if (clearBtn) clearBtn.style.display = 'none';
    buildSimpleCatBar('');
    return;
  }
  if (!currentSearchResults.length) {
    setEmpty('暂无搜索结果', '请尝试其他关键词');
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('statusText').textContent = '关键词: ' + currentSearchKeyword + ' - 结果: 0';
    if (clearBtn) clearBtn.style.display = 'none';
    buildSimpleCatBar('');
    return;
  }
  currentFiltered = currentSearchResults.slice();
  currentPage = 1;
  render();
  // 简化状态栏显示
  var statusText = '关键词: ' + currentSearchKeyword + ' - 结果: ' + currentSearchResultCount;
  document.getElementById('statusText').textContent = statusText;
  if (clearBtn) clearBtn.style.display = 'inline-block';
  buildSimpleCatBar('');
  var sel = document.getElementById('sourceSelect');
  if (sel.value !== '__search_result__') sel.value = '__search_result__';
}
function resetAndStartSearch(keyword) {
  currentSearchKeyword = keyword;
  currentSearchResults = [];
  currentSearchResultCount = 0;
  var sel = document.getElementById('sourceSelect');
  sel.value = '__search_result__';
  renderSearchResult(true);
}
function addSearchResults(newResults) {
  if (!newResults.length) return;
  var existingKeys = new Set(currentSearchResults.map(v => v.sourceKey + '_' + v.vod_name));
  for (var i = 0; i < newResults.length; i++) {
    var item = newResults[i];
    var key = item.sourceKey + '_' + item.vod_name;
    if (!existingKeys.has(key)) {
      currentSearchResults.push(item);
      existingKeys.add(key);
    }
  }
  currentSearchResultCount = currentSearchResults.length;
  if (document.getElementById('sourceSelect').value === '__search_result__') {
    renderSearchResult(false);
  }
}
// 清空所有搜索结果
function clearAllSearchResults() {
  currentSearchResults = [];
  currentSearchResultCount = 0;
  currentSearchKeyword = '';
  renderSearchResult(false);
  // 清空后，下拉框仍保持在搜索结果视图，显示空状态
  document.getElementById('statusText').textContent = '关键词: - 结果: 0';
  document.getElementById('clearSearchResultBtn').style.display = 'none';
}
// 从当前搜索结果中删除单条记录
function removeSearchResultItem(sourceKey, vodName) {
  var newResults = currentSearchResults.filter(function(v) {
    return !(v.sourceKey === sourceKey && v.vod_name === vodName);
  });
  currentSearchResults = newResults;
  currentSearchResultCount = currentSearchResults.length;
  if (currentSearchResultCount === 0) {
    currentSearchKeyword = '';
  }
  renderSearchResult(false);
  if (currentSearchResultCount === 0) {
    document.getElementById('clearSearchResultBtn').style.display = 'none';
  }
}
// ======================= Helper =======================
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function setStatus(t){ document.getElementById('statusText').textContent = t; }
function getHistory(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY))||{}; }catch(e){ return {}; } }
function saveHistory(key,val){ var h=getHistory(); h[key]=val; localStorage.setItem(STORAGE_KEYS.HISTORY,JSON.stringify(h)); }
function getFavorites(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEYS.FAVORITES))||[]; }catch(e){ return []; } }
function saveFavorites(list){ localStorage.setItem(STORAGE_KEYS.FAVORITES,JSON.stringify(list)); }
function isFavorited(sourceKey,videoName){ return getFavorites().some(f=>f.sourceKey===sourceKey&&f.videoName===videoName); }
function addFavorite(video){ if(isFavorited(video.sourceKey,video.vod_name)) return; var list=getFavorites(); list.push({ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count, playable_count:video.playable_count, episodes:video.episodes, vod_class:video.vod_class }); saveFavorites(list); }
function removeFavorite(sourceKey,videoName){ var list=getFavorites().filter(f=>!(f.sourceKey===sourceKey&&f.videoName===videoName)); saveFavorites(list); }
function getBookmarks(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEYS.BOOKMARKS))||[]; }catch(e){ return []; } }
function saveBookmarks(list){ localStorage.setItem(STORAGE_KEYS.BOOKMARKS,JSON.stringify(list)); }
function addBookmark(video,epIndex,progress,note){ var list=getBookmarks(); var episodesCopy=video.episodes?video.episodes.map(e=>({title:e.title,url:e.url,playable:e.playable})):[]; list.unshift({ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||episodesCopy.length, playable_count:video.playable_count||episodesCopy.filter(e=>e.playable).length, episodes:episodesCopy, epIndex:epIndex, epTitle:(video.episodes||[])[epIndex]?video.episodes[epIndex].title:'', epUrl:(video.episodes||[])[epIndex]?video.episodes[epIndex].url:'', progress:progress, note:note||'', createdAt:Date.now() }); saveBookmarks(list); }
function updateHistory(video,epIndex,progress){ var key=video.sourceKey+'_'+video.vod_name; var episodesCopy=video.episodes?video.episodes.map(e=>({title:e.title,url:e.url,playable:e.playable})):[]; saveHistory(key,{ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||episodesCopy.length, playable_count:video.playable_count||episodesCopy.filter(e=>e.playable).length, episodes:episodesCopy, epIndex:epIndex, epTitle:(video.episodes||[])[epIndex]?video.episodes[epIndex].title:'', epUrl:(video.episodes||[])[epIndex]?video.episodes[epIndex].url:'', progress:progress, updatedAt:Date.now() }); }
function findVideoInCache(sourceKey,videoName){ for(var k in loadedSources){ var data=loadedSources[k]; if(data&&data.videos){ var found=data.videos.find(v=>v.vod_name===videoName); if(found) return found; } } return null; }
function loadData(file,callback,timeout){ var key=(file==='index.js')?'_TVBOX_INDEX':'_TVBOX_SITE_DATA'; var src='/video/data/'+file; var s=document.createElement('script'); var timer=setTimeout(function(){ s.onload=null; s.onerror=null; if(s.parentNode) s.parentNode.removeChild(s); callback(null); },timeout||3000); s.onerror=function(){ clearTimeout(timer); callback(null); }; s.onload=function(){ clearTimeout(timer); var data=window[key]; delete window[key]; callback(data||null); }; s.src=src; document.head.appendChild(s); }

// ======================= 主题 =======================
(function(){ var t=document.documentElement.getAttribute('data-theme'); if(!t){ try{ var p=window.parent.document.documentElement; var pt=p.getAttribute('data-theme'); if(pt==='dark'||pt==='light') t=pt; }catch(e){} } if(!t) t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'; document.documentElement.setAttribute('data-theme',t); })();

// ======================= 索引加载 =======================
function loadIndex() {
  loadData('index.js', function(data){
    if(!data){ showBanner(); return; }
    sourceIndex=data; if(!sourceIndex.length){ setEmpty('无数据，请先运行爬虫','请确保 data/ 目录下有数据文件'); return; }
    var sel=document.getElementById('sourceSelect'); var ta=0,pa=0;
    var optHistory=document.createElement('option'); optHistory.value='__history__'; optHistory.textContent='🕒 最近观看'; sel.appendChild(optHistory);
    var optFav=document.createElement('option'); optFav.value='__favorites__'; optFav.textContent='❤️ 我的收藏'; sel.appendChild(optFav);
    var optMark=document.createElement('option'); optMark.value='__bookmarks__'; optMark.textContent='📌 我的影签'; sel.appendChild(optMark);
    var optSearchResult=document.createElement('option'); optSearchResult.value='__search_result__'; optSearchResult.textContent='📋 搜索结果'; sel.appendChild(optSearchResult);
    var optSep=document.createElement('option'); optSep.value=''; optSep.textContent='— 数据源 —'; optSep.disabled=true; sel.appendChild(optSep);
    var nameCount={}; sourceIndex.forEach(item=>{ nameCount[item.name]=(nameCount[item.name]||0)+1; });
    var nameSeen={};
    sourceIndex.forEach(function(item){
      ta+=item.total||0; pa+=item.playable||0; var displayName=item.name;
      if(nameCount[item.name]>1){ nameSeen[item.name]=(nameSeen[item.name]||0)+1; displayName=item.name+'（站'+['一','二','三','四','五','六','七','八','九'][nameSeen[item.name]-1]+'）'; }

// ======================= 全局搜索（并发优化版） =======================
function doSearch() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) {
    if (document.getElementById('sourceSelect').value === '__search_result__') {
      renderSearchResult(false);
    } else {
      if (currentPrefix && currentPrefix !== '__search_result__') loadPageFile(currentPrefix, currentFilePage);
      else renderHistory();
    }
    return;
  }
  if (isSearching) {
    searchVersion++;
    isSearching = false;
  }
  resetAndStartSearch(q);
  isSearching = true;
  document.getElementById('stopSearchBtn').style.display = '';
  var thisVersion = ++searchVersion;
  var allFiles = [];
  sourceIndex.forEach(function(src){
    var pc = src.page_count || 1;
    var baseFile = (sourceMeta[src.prefix] && sourceMeta[src.prefix].fileBase) ? sourceMeta[src.prefix].fileBase : src.prefix;
    for(var i=1;i<=pc;i++) allFiles.push({ fname: baseFile+'-'+String(i).padStart(2,'0')+'.js', name: src.name });
  });
  var totalFiles = allFiles.length, completedFiles = 0, loadedFiles = 0;
  var running = 0, idx = 0, active = true;
  setStatus('🔍 搜索中: 0/'+totalFiles+' — "'+q+'"');
  function processFile(file, version){
    if(!active) return;
    var fname = file.fname, sourceName = file.name;
    function handleData(data){
      if(!active || searchVersion!==version) return;
      if(data && data.videos){
        var matched = [];
        data.videos.forEach(function(v){
          if(!v.playable_count) return;
          if((v.vod_name||'').toLowerCase().includes(q)){
            var item = { sourceKey: fname, sourceName: sourceName, vod_name: v.vod_name, vod_pic: v.vod_pic, episodes: v.episodes, ep_count: v.ep_count, playable_count: v.playable_count, vod_class: v.vod_class };
            matched.push(item);
          }
        });
        if(matched.length) addSearchResults(matched);
      }
      completedFiles++; loadedFiles++;
      setStatus('🔍 搜索中: '+loadedFiles+'/'+totalFiles+' — "'+q+'" — '+currentSearchResultCount+'个结果');
      running--; schedule();
    }
    if(loadedSources[fname]) { handleData(loadedSources[fname]); return; }
    running++; loadData(fname, function(data){ if(data) loadedSources[fname]=data; handleData(data); }, 5000);
  }
  function schedule(){
    if(!active) return;
    while(running < CONCURRENT_LIMIT && idx < allFiles.length){
      if(searchVersion !== thisVersion){ active=false; return; }
      processFile(allFiles[idx++], thisVersion);
    }
    if(completedFiles >= totalFiles){
      isSearching=false; document.getElementById('stopSearchBtn').style.display='none';
      setStatus('🔍 搜索完成: "'+q+'" — '+currentSearchResultCount+'个结果');
      active=false;
      if (document.getElementById('sourceSelect').value === '__search_result__') renderSearchResult(false);
    }
  }
  schedule();
}
function stopSearch(){
  if(!isSearching) return;
  searchVersion++;
  isSearching=false;
  document.getElementById('stopSearchBtn').style.display='none';
  setStatus('⏹ 搜索已停止 — '+currentSearchResultCount+'个结果');
  if (document.getElementById('sourceSelect').value === '__search_result__') renderSearchResult(false);
}

// ======================= 播放 & 悬浮 =======================
function playEp(el){ var url=el.dataset.url; if(!url) return; var items=el.parentElement.querySelectorAll('.ep-item'); var idx=Array.from(items).indexOf(el); var epIndex=parseInt(el.dataset.epindex)||idx; currentEpNext=idx<items.length-1?items[idx+1]:null; document.getElementById('nextEpBtn').style.display=currentEpNext?'inline':'none'; if(currentPlayingVideo){ var v=document.getElementById('player'); var oldProgress=v.currentTime||0; if(oldProgress>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(oldProgress)); } currentPlayingVideo=currentOpenVideo; currentPlayingEpIndex=epIndex; doPlay(url,el.dataset.name); }
function doPlay(url,name){ if(currentHls){currentHls.destroy();currentHls=null;} var v=document.getElementById('player'); v.pause(); v.removeAttribute('src'); v.load(); document.querySelector('.player-box').classList.add('playing'); if(url.indexOf('.m3u8')>=0){ try{ if(window.Hls && Hls.isSupported()){ var hls=new Hls(); hls.loadSource(url); hls.attachMedia(v); currentHls=hls; } else { v.src=url; } }catch(e){ v.src=url; } } else { v.src=url; } v.play().catch(function(){}); var savedProgress=currentOpenVideo?(currentOpenVideo.historyProgress||currentOpenVideo.bookmarkProgress||0):0; if(savedProgress>5){ v.addEventListener('canplay',function once(){ v.removeEventListener('canplay',once); v.currentTime=savedProgress; }); } setStatus('▶ '+name); }
function playNext(){ if(currentEpNext) playEp(currentEpNext); }
function addBookmarkHandler(){ if(!currentPlayingVideo||(currentPlayingEpIndex!==0&&!currentPlayingEpIndex)){ setStatus('⚠ 请先选择剧集转换'); return; } var v=document.getElementById('player'); updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); var note=prompt('请输入影签备注（可空）：',''); if(note===null) return; addBookmark(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime),note); setStatus('✓ 影签已添加'); }
function showFloatPlayer(){ if(playerInFloatMode) return; var mainPlayer=document.getElementById('player'); var floatVideo=document.getElementById('floatVideo'); var floatPlayer=document.getElementById('floatPlayer'); var floatTitle=document.getElementById('floatPlayerTitle'); if(currentHls){ currentHls.detachMedia(); currentHls.attachMedia(floatVideo); } floatVideo.src=mainPlayer.src||mainPlayer.currentSrc; floatVideo.currentTime=mainPlayer.currentTime; floatVideo.paused=mainPlayer.paused; floatVideo.volume=mainPlayer.volume; if(currentPlayingVideo) floatTitle.textContent=currentPlayingVideo.vod_name||'正在播放'; playerInFloatMode=true; document.querySelector('.player-box').classList.remove('playing'); floatPlayer.style.display='block'; if(!floatVideo.paused) floatVideo.play().catch(function(){}); }
function returnFromFloat(){ if(!playerInFloatMode) return; var floatPlayer=document.getElementById('floatPlayer'); floatPlayer.style.display='none'; playerInFloatMode=false; var mainPlayer=document.getElementById('player'); var floatVideo=document.getElementById('floatVideo'); if(currentHls){ currentHls.detachMedia(); currentHls.attachMedia(mainPlayer); } mainPlayer.src=floatVideo.src; mainPlayer.currentTime=floatVideo.currentTime; mainPlayer.volume=floatVideo.volume; mainPlayer.play().catch(function(){}); document.querySelector('.player-box').classList.add('playing'); if(floatReturnPrefix){ document.getElementById('sourceSelect').value=floatReturnPrefix; floatReturnPrefix=null; } }
function closeFloatPlayer(){ if(!playerInFloatMode) return; var floatPlayer=document.getElementById('floatPlayer'); var floatVideo=document.getElementById('floatVideo'); floatVideo.pause(); floatVideo.src=''; if(currentHls){ currentHls.destroy(); currentHls=null; } playerInFloatMode=false; floatReturnPrefix=null; floatPlayer.style.display='none'; document.querySelector('.player-box').classList.remove('playing'); currentPlayingVideo=null; setStatus('⏹ 已关闭'); }

// ======================= 全局事件 & 初始化 =======================
window._favBtnClick = function(btn){
  var sourceKey=btn.dataset.sourcekey, vodName=btn.dataset.vodname, vodPic=btn.dataset.vodpic, epCount=parseInt(btn.dataset.epcount)||0, playableCount=parseInt(btn.dataset.playablecount)||0;
  if(isFavorited(sourceKey,vodName)){
    removeFavorite(sourceKey,vodName); btn.classList.remove('faved'); btn.innerHTML='♡'; btn.title='收藏';
    if(currentPrefix==='__favorites__') renderFavorites(); return;
  }
  var fullVideo=currentFiltered.find(v=>v.vod_name===vodName&&v.sourceKey===sourceKey);
  if(!fullVideo && currentData && currentData.videos) fullVideo=currentData.videos.find(v=>v.vod_name===vodName);
  if(!fullVideo||!(fullVideo.episodes&&fullVideo.episodes.length)) Object.values(loadedSources).some(data=>{ if(data&&data.videos){ var found=data.videos.find(v=>v.vod_name===vodName); if(found&&found.episodes&&found.episodes.length){ fullVideo=found; return true; } } });
  var videoData={ sourceKey:sourceKey, vod_name:vodName, vod_pic:fullVideo?fullVideo.vod_pic:vodPic, sourceName:fullVideo?(fullVideo.sourceName||''):'', ep_count:fullVideo?(fullVideo.ep_count||0):epCount, playable_count:fullVideo?(fullVideo.playable_count||0):playableCount, episodes:fullVideo?(fullVideo.episodes||[]):[], vod_class:fullVideo?(fullVideo.vod_class||''):'' };
  addFavorite(videoData); btn.classList.add('faved'); btn.innerHTML='❤'; btn.title='取消收藏';
};
document.getElementById('player').addEventListener('ended',function(){ if(currentPlayingVideo){ var v=document.getElementById('player'); updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } playNext(); if(!currentEpNext) document.querySelector('.player-box').classList.remove('playing'); });
document.getElementById('player').addEventListener('pause',function(){ if(currentPlayingVideo){ var v=document.getElementById('player'); if(v.currentTime>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } });
document.getElementById('floatBackBtn').addEventListener('click',returnFromFloat);
document.getElementById('floatCloseBtn').addEventListener('click',closeFloatPlayer);
document.addEventListener('keydown',function(e){ if(e.key==='Enter' && document.activeElement===document.getElementById('searchInput')) doSearch(); if((e.key==='n'||e.key==='N') && currentEpNext){ e.preventDefault(); playNext(); } });
document.addEventListener('change',function(e){ var tar=e.target; if(tar.id==='sourceSelect'){ switchSource(); return; } if(tar.classList.contains('cat-filter')){ filterCat(tar); return; } });
document.addEventListener('click',function(e){ var tar=e.target; var epDelete=tar.closest('.ep-delete'); if(epDelete){ e.stopPropagation(); var vodName=epDelete.dataset.vodname, sourceKey=epDelete.dataset.sourcekey, type=epDelete.dataset.type; if(type==='history'){ var h=getHistory(); delete h[sourceKey+'_'+vodName]; localStorage.setItem(STORAGE_KEYS.HISTORY,JSON.stringify(h)); setStatus('✓ 已删除'); renderHistory(); }else if(type==='bookmark'){ var list=getBookmarks().filter(b=>!(b.videoName===vodName&&b.sourceKey===sourceKey)); saveBookmarks(list); setStatus('✓ 影签已删除'); renderBookmarks(); } return; } var favBtn=tar.closest('.fav-btn'); if(favBtn){ e.stopPropagation(); window._favBtnClick(favBtn); return; } var epItem=tar.closest('.ep-item'); if(epItem){ playEp(epItem); return; } var epClose=tar.closest('.ep-close'); if(epClose){ e.stopPropagation(); closeEp(epClose.dataset.eid); return; } var btn=tar.closest('button'); if(btn){ if(btn.id==='searchBtn'){ doSearch(); return; } if(btn.id==='stopSearchBtn'){ stopSearch(); return; } if(btn.id==='bookmarkBtn'){ addBookmarkHandler(); return; } if(btn.id==='nextEpBtn'){ playNext(); return; } if(btn.classList.contains('pg-go')){ go(parseInt(btn.dataset.page)); return; } if(btn.classList.contains('pg-page')){ goPage(parseInt(btn.dataset.page)); return; } if(btn.id==='clearSearchResultBtn'){ clearAllSearchResults(); return; } } var card=tar.closest('.video-card'); if(card){ toggleEpisodes(card,card.dataset.eid); } });
function setEmpty(t,sub){ var h='<div class="empty-state"><div class="icon">📺</div><div class="desc">'+t+'</div>'; if(sub) h+='<div class="sub">'+sub+'</div>'; h+='</div>'; document.getElementById('content').innerHTML=h; }
loadIndex();
</script></div></body></html>
