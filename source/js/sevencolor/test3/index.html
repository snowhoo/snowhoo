<!DOCTYPE html><html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>超级播霸</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* ===== CSS 自定义属性 ===== */
:root {
  --bg-page: #0f0f0f;
  --bg-card: #1a1a2e;
  --bg-card-hover: #1e1e38;
  --bg-eplist: #111;
  --bg-eplist-alt: #161616;
  --bg-player: #000;
  --bg-toolbar: #16213e;
  --bg-input: #1a1a2e;
  --text-primary: #e8e8e8;
  --text-secondary: #90a4ae;
  --text-muted: #607d8b;
  --border: #333;
  --accent: #ff6b35;
  --accent-hover: #e85d2a;
  --badge-playable-bg: #2e7d32;
  --badge-playable-text: #fff;
  --badge-unplayable-bg: #616161;
  --badge-unplayable-text: #bdbdbd;
  --shadow: rgba(0,0,0,0.4);
  --card-radius: 10px;
}
[data-theme="light"] {
  --bg-page: #f5f5f5;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f0f5;
  --bg-eplist: #fafafa;
  --bg-eplist-alt: #f0f0f0;
  --bg-player: #000;
  --bg-toolbar: #e8e0f0;
  --bg-input: #fff;
  --text-primary: #212121;
  --text-secondary: #546e7a;
  --text-muted: #90a4ae;
  --border: #ddd;
  --accent: #e65100;
  --accent-hover: #d84315;
  --badge-playable-bg: #2e7d32;
  --badge-playable-text: #fff;
  --badge-unplayable-bg: #bdbdbd;
  --badge-unplayable-text: #757575;
  --shadow: rgba(0,0,0,0.1);
  --card-radius: 10px;
}

@media (prefers-color-scheme: light) {
  [data-theme="dark"] {
    --bg-page: #0f0f0f;
    --bg-card: #1a1a2e;
    --bg-card-hover: #1e1e38;
    --bg-eplist: #111;
    --bg-eplist-alt: #161616;
    --bg-player: #000;
    --bg-toolbar: #16213e;
    --bg-input: #1a1a2e;
    --text-primary: #e8e8e8;
    --text-secondary: #90a4ae;
    --text-muted: #607d8b;
    --border: #333;
    --accent: #ff6b35;
    --accent-hover: #e85d2a;
    --badge-playable-bg: #2e7d32;
    --badge-playable-text: #fff;
    --badge-unplayable-bg: #616161;
    --badge-unplayable-text: #bdbdbd;
    --shadow: rgba(0,0,0,0.4);
  }
}

/* ===== 隔离重置：屏蔽 Hexo/Butterfly 主题干扰 ===== */
#player-wrap * {
  box-sizing:border-box;
}
#player-wrap img {
  max-width:none !important;
  height:auto !important;
  border-radius:0 !important;
}
#player-wrap button,
#player-wrap input,
#player-wrap select {
  font-family:inherit;
  font-size:inherit;
  line-height:inherit;
}
#player-wrap button {
  border-radius:4px;
}
#player-wrap h1 {
  margin:0;
  padding:0;
  border:none;
}
#player-wrap a {
  color:inherit;
  text-decoration:none;
}
#player-wrap {
  font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;
  color:var(--text-primary);
  max-width:1200px;
  margin:0 auto;
  line-height:1.5;
  font-size:14px;
  transition:color .3s;
}
#player-wrap p,
#player-wrap ul,
#player-wrap ol,
#player-wrap li {
  margin:0;
  padding:0;
  border:none;
  list-style:none;
}

*{margin:0;padding:0;box-sizing:border-box}

/* ===== Header ===== */
#player-wrap h1.title{
  font-size:18px;
  font-weight:600;
  color:var(--accent);
  margin-bottom:10px;
}

/* ===== Toolbar ===== */
.toolbar{
  display:flex;
  gap:6px;
  margin:6px 0 6px;
  flex-wrap:nowrap;
  align-items:center;
}
.toolbar select,.toolbar input,.toolbar button{
  padding:7px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:transparent;
  color:var(--text-primary);
  font-size:13px;
  transition:border-color .2s;
}
.toolbar select{min-width:0;flex:3;cursor:pointer}
.toolbar select:focus,.toolbar input:focus{
  outline:none;
  border-color:var(--accent);
}
.toolbar input{flex:4;min-width:60px}
.toolbar input::placeholder{color:var(--text-muted)}
.toolbar button{
  flex-shrink:0;
  background:var(--accent);
  color:#fff;
  border:none;
  cursor:pointer;
  font-weight:500;
  white-space:nowrap;
}
.toolbar button:hover{background:var(--accent-hover)}

/* ===== Category Select ===== */
.cat-bar{
  margin:0 8px 0 0;
}
.cat-bar select{
  max-width:160px;
  min-width:80px;
  width:auto;
  padding:7px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:transparent;
  color:var(--text-primary);
  font-size:13px;
  cursor:pointer;
  transition:border-color .2s;
}
.cat-bar select:focus{
  outline:none;
  border-color:var(--accent);
}

/* ===== Status Bar ===== */
.status-bar{
  //background:var(--bg-card);
  padding:2px 0px;
  border-radius:6px;
  margin:6px 0;
  font-size:12px;
  color:var(--text-secondary);
  border:0px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.status-bar .next-ep-btn{
  flex-shrink:0;
  padding:2px 10px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
  transition:background .15s;
  display:none;
}
.status-bar .next-ep-btn:hover{background:var(--accent-hover)}
.status-bar #bookmarkBtn{display:inline!important}

/* ===== Player ===== */
.player-box{
  background:var(--bg-player);
  border-radius:10px;
  overflow:hidden;
  margin:0px;
  position:relative;
  height:0;
  transition:height .3s;
}
.player-box.playing{
  height:auto;
}
#player{width:100%;aspect-ratio:16/9;background:#000;display:block}

/* ===== 悬浮播放器 ===== */
.float-player{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  background:#1a1a2e;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  z-index:9999;
  overflow:hidden;
}
.float-player-header{
  display:flex;
  align-items:center;
  padding:8px 10px;
  background:#16213e;
  gap:8px;
}
.float-player-title{
  flex:1;
  font-size:13px;
  color:#fff;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.float-btn{
  width:28px;
  height:28px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.float-btn:hover{background:rgba(255,255,255,0.3)}
.float-close{color:#ff6b6b}
.float-close:hover{background:rgba(255,107,107,0.3)}
#floatVideo{width:100%;aspect-ratio:16/9;background:#000;display:block}

/* ===== Grid ===== */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
  gap:12px;
  margin:12px 0;
}
.video-card{
  background:var(--bg-card);
  border-radius:var(--card-radius);
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  border:1px solid var(--border);
  position:relative;
}
.video-card:hover{
  transform:translateY(-3px);
  box-shadow:0 4px 16px var(--shadow);
}
.video-card .poster-wrap{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  overflow:hidden;
  background:var(--bg-card);
}
.video-card .poster{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.video-card .poster-fallback{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,var(--bg-card),var(--bg-toolbar));
  color:var(--text-muted);
  font-size:32px;
}
.video-card .card-badge{
  position:absolute;
  top:6px;
  right:6px;
  padding:2px 7px;
  border-radius:4px;
  font-size:10px;
  font-weight:600;
  backdrop-filter:blur(4px);
}
.card-badge.playable{background:rgba(46,125,50,.85);color:#fff}
.card-badge.unplayable{background:rgba(97,97,97,.75);color:#bdbdbd}
.video-card .card-info{
  padding:8px 10px;
}
.video-card .card-title{
  font-size:13px;
  color:var(--text-primary);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-weight:500;
}
.video-card .card-meta{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:3px;
  display:flex;
  gap:6px;
  align-items:center;
}
.video-card .card-meta .sep{color:var(--text-muted)}

/* ===== 收藏按钮 ===== */
.video-card .fav-btn{
  position:absolute;
  top:6px;
  width:26px;
  height:26px;
  border-radius:50%;
  background:transparent;
  color:#ff6b6b;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2;
  transition:color .2s;
  padding:0;
}
.video-card .card-fav{left:6px}
.video-card .card-delete{left:calc(6px + 26px + 6px);color:#ff4444;background:transparent;}
.video-card .fav-btn:hover{color:#ff4444}
.video-card .fav-btn.faved{color:#ff6b6b}
.video-card .card-delete:hover{color:#ff6666;}

/* ===== 观看进度条 ===== */
.video-card .progress-bar{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:3px;
  background:rgba(0,0,0,0.5);
}
.video-card .progress-fill{
  height:100%;
  background:var(--accent);
  transition:width .3s;
}

/* ===== 影签备注 ===== */
.video-card .bookmark-note{
  position:absolute;
  bottom:4px;
  left:4px;
  right:4px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ===== Episode Panel ===== */
.ep-panel{
  display:none;
}
.ep-panel.open{
  display:block;
  background:var(--bg-eplist);
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 var(--card-radius) var(--card-radius);
  margin-top:-1px;
  max-height:320px;
  overflow-y:auto;
}
.ep-panel .ep-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 10px;
  font-size:11px;
  color:var(--text-muted);
  background:var(--bg-eplist-alt);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:1;
}
.ep-panel .ep-header .ep-count{color:var(--text-secondary)}
.ep-panel .ep-header .ep-close{
  background:none;
  border:none;
  color:var(--text-muted);
  cursor:pointer;
  font-size:14px;
  padding:2px 6px;
  border-radius:3px;
}
.ep-panel .ep-header .ep-close:hover{color:var(--accent);background:rgba(255,107,53,0.1)}
.ep-panel .ep-header .ep-delete{
  background:none;
  border:none;
  color:#ff6b6b;
  cursor:pointer;
  font-size:13px;
  padding:2px 6px;
  border-radius:3px;
  margin-right:4px;
}
.ep-panel .ep-header .ep-delete:hover{background:rgba(255,107,107,0.2)}
.ep-item{
  cursor:pointer;
  padding:4px 10px;
  font-size:12px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
  color:var(--text-secondary);
}
.ep-item:last-child{border-bottom:none}
.ep-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.ep-item.ep-current{color:var(--accent);font-weight:500}
.ep-item .epchecked{font-size:10px;margin-left:6px;flex-shrink:0}

/* ===== Footer ===== */
.tvbox-footer{
  text-align:center;
  padding:12px 0 6px;
  margin-top:12px;
  font-size:11px;
  color:var(--text-muted);
  border:none;
  background:none;
}
.tvbox-footer span{margin:0 6px}

/* ===== Pagination ===== */
.pagination{
  display:flex;
  gap:3px;
  justify-content:center;
  margin:12px 0;
  flex-wrap:nowrap;
}
.pagination button{
  padding:3px 8px;
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--bg-card);
  color:var(--text-secondary);
  cursor:pointer;
  font-size:12px;
  transition:all .15s;
  min-width:26px;
}
.pagination button:hover:not(.active):not(:disabled){
  background:var(--bg-card-hover);
  border-color:var(--accent);
  color:var(--accent);
}
.pagination button.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.pagination button:disabled{
  opacity:0.35;
  cursor:default;
}

/* ===== Empty/loading ===== */
.empty-state{
  text-align:center;
  padding:50px 20px;
  color:var(--text-muted);
}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .desc{font-size:13px}
.empty-state .sub{font-size:11px;margin-top:4px;opacity:.7}

/* ===== 全网状态封面 ===== */
.banner-wrap{
  width:100%;
  margin-bottom:12px;
  border-radius:8px;
  overflow:hidden;
  position:relative;
}
.banner-wrap{
  width:100%;
  margin-bottom:12px;
  border-radius:6px;
  overflow:hidden;
  position:relative;
}
.banner-wrap img{
width:100% !important;
 height:auto !important;
  max-height:400px !important;
  object-fit:contain !important;
  display:block !important; 
}
.banner-wrap .overlay{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding:0 20px 8px;
  color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.8),0 0 20px rgba(0,0,0,0.5);
}
.banner-wrap .overlay h2{
  color:#fff;
  font-size:22px;
  font-weight:600;
  margin-bottom:4px;
  text-shadow:0 2px 8px rgba(0,0,0,0.8),0 0 20px rgba(0,0,0,0.5);
}
.banner-wrap .overlay p{
  color:rgba(255,255,255,0.9);
  font-size:13px;
}

/* ===== Scrollbar ===== */
.ep-panel::-webkit-scrollbar{width:4px}
.ep-panel::-webkit-scrollbar-track{background:transparent}
.ep-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== Responsive ===== */
@media(max-width:600px){
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .video-card .card-info{padding:6px 8px}
  .video-card .card-title{font-size:12px}
  #player-wrap h1.title{font-size:16px}
  .toolbar select,.toolbar input,.toolbar button{font-size:12px;padding:6px 8px}
  .ep-panel.open{max-height:282px}
  .pagination{gap:2px}
  .pagination button{padding:2px 5px;font-size:10px;min-width:20px}
}
</style></head><body>
<div id="player-wrap">
<div class="toolbar">
  <select id="sourceSelect"></select>
  <input type="text" id="searchInput" placeholder="全局搜索影片...">
  <button id="searchBtn">搜索</button>
  <button id="stopSearchBtn" style="display:none">停止</button>
</div>
<div class="player-box">
  <video id="player" controls playsinline></video>
</div>
<!-- 悬浮播放器 -->
<div class="float-player" id="floatPlayer" style="display:none">
  <div class="float-player-header">
    <span class="float-player-title" id="floatPlayerTitle">\u6b63\u5728\u64ad\u653e</span>
    <button class="float-btn" id="floatBackBtn" title="\u8fd4\u56de">\u2190</button>
    <button class="float-btn float-close" id="floatCloseBtn" title="\u5173\u95ed">\u2716</button>
  </div>
  <video id="floatVideo" playsinline></video>
</div>
<div id="status" class="status-bar">
  <div class="cat-bar" id="catBar"></div>
  <span id="statusText">[STOP] 选择一个数据源</span>
  <button id="bookmarkBtn" class="next-ep-btn" style="background:#4caf50;margin-right:4px" title="添加影签">签</button>
  <button id="nextEpBtn" class="next-ep-btn">下集</button>
</div>
<div id="content"></div>
<div class="pagination" id="pagination"></div>
<div class="tvbox-footer" id="tvboxFooter"></div>

<script>
/* ===== 本地存储 Key ===== */
var STORAGE_KEYS = {
  HISTORY: 'tvbox_history',
  FAVORITES: 'tvbox_favorites',
  BOOKMARKS: 'tvbox_bookmarks'
};

/* ===== 全局收藏按钮处理器 ===== */
window._favBtnClick = function(btn) {
  var sourceKey = btn.dataset.sourcekey;
  var vodName = btn.dataset.vodname;
  var vodPic = btn.dataset.vodpic;
  var epCount = parseInt(btn.dataset.epcount) || 0;
  var playableCount = parseInt(btn.dataset.playablecount) || 0;
  if (isFavorited(sourceKey, vodName)) {
    removeFavorite(sourceKey, vodName);
    btn.classList.remove('faved');
    btn.innerHTML = '\u2661';
    btn.title = '\u6536\u85cf';
  } else {
    // 从 currentFiltered 中找（优先）
    var fullVideo = currentFiltered.find(function(v){ return v.vod_name === vodName && v.sourceKey === sourceKey; });
    // 如果没找到，尝试从 currentData.videos 找
    if (!fullVideo && currentData && currentData.videos) {
      fullVideo = currentData.videos.find(function(v){ return v.vod_name === vodName; });
    }
    // 再从 loadedSources 缓存中找（可能有完整剧集数据）
    if (!fullVideo || !(fullVideo.episodes && fullVideo.episodes.length)) {
      Object.values(loadedSources).some(function(data) {
        if (data && data.videos) {
          var found = data.videos.find(function(v){ return v.vod_name === vodName && (v.sourceKey === sourceKey || (v.sourceKey && v.sourceKey.includes(sourceKey))); });
          if (found && found.episodes && found.episodes.length) {
            fullVideo = found;
            return true;
          }
        }
      });
    }
    var videoData = {
      sourceKey: sourceKey,
      vod_name: vodName,
      vod_pic: fullVideo ? fullVideo.vod_pic : vodPic,
      sourceName: fullVideo ? (fullVideo.sourceName||'') : '',
      ep_count: fullVideo ? (fullVideo.ep_count||0) : epCount,
      playable_count: fullVideo ? (fullVideo.playable_count||0) : playableCount,
      episodes: fullVideo ? (fullVideo.episodes||[]) : [],
      vod_class: fullVideo ? (fullVideo.vod_class||'') : ''
    };
    addFavorite(videoData);
    btn.classList.add('faved');
    btn.innerHTML = '\u2764';
    btn.title = '\u53d6\u6d88\u6536\u85cf';
  }
};

/* ===== 观看历史 Helper ===== */
// 结构: { [sourceKey+'_'+videoName]: { videoName, sourceKey, sourceName, vodPic, epIndex, epTitle, epUrl, progress, updatedAt } }
function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.HISTORY)) || {}; } catch(e) { return {}; }
}
function saveHistory(key, val) {
  var h = getHistory();
  h[key] = val;
  localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(h));
}
function getHistoryList() {
  return Object.values(getHistory()).sort(function(a,b){return b.updatedAt - a.updatedAt;});
}
function updateHistory(video, epIndex, progress) {
  var key = video.sourceKey + '_' + video.vod_name;
  saveHistory(key, {
    videoName: video.vod_name,
    sourceKey: video.sourceKey,
    sourceName: video.sourceName,
    vodPic: video.vod_pic,
    epIndex: epIndex,
    epTitle: (video.episodes||[])[epIndex] ? video.episodes[epIndex].title : '',
    epUrl: (video.episodes||[])[epIndex] ? video.episodes[epIndex].url : '',
    progress: progress,
    updatedAt: Date.now()
  });
}

/* ===== 收藏 Helper ===== */
// 结构: [{ videoName, sourceKey, sourceName, vodPic, ep_count, playable_count, episodes, vod_class }]
function getFavorites() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.FAVORITES)) || []; } catch(e) { return []; }
}
function saveFavorites(list) {
  localStorage.setItem(STORAGE_KEYS.FAVORITES, JSON.stringify(list));
}
function isFavorited(sourceKey, videoName) {
  return getFavorites().some(function(f){ return f.sourceKey === sourceKey && f.videoName === videoName; });
}
function addFavorite(video) {
  if (isFavorited(video.sourceKey, video.vod_name)) return;
  var list = getFavorites();
  list.push({
    videoName: video.vod_name,

/* ===== 从缓存中查找完整视频数据 ===== */
function findVideoInCache(sourceKey, videoName) {
  // sourceKey 可能是完整文件名如"索尼-01.js"或前缀如"索尼"
  var result = null;
  Object.values(loadedSources).some(function(data) {
    if (data && data.videos) {
      var found = data.videos.find(function(v) {
        return v.vod_name === videoName;
      });
      if (found) {
        result = found;
        return true;
      }
    }
  });
  return result;
}

/* ===== 通用加载函数：script 标签注入，读取 window._TVBOX_INDEX / _TVBOX_SITE_DATA ===== */
function loadData(file, callback, timeout) {
  var key = (file === 'index.js') ? '_TVBOX_INDEX' : '_TVBOX_SITE_DATA';
  var src = '/video/data/' + file;
  var s = document.createElement('script');
  var timer = setTimeout(function() {
    s.onload = null;
    s.onerror = null;
    if (s.parentNode) s.parentNode.removeChild(s);
    callback(null);
  }, timeout || 3000);
  s.onerror = function() { clearTimeout(timer); callback(null); };
  s.onload = function() {
    clearTimeout(timer);
    var data = window[key];
    delete window[key];
    callback(data || null);
  };
  s.src = src;
  document.head.appendChild(s);
}

function loadPageFile(prefix, pageNum) {
  var baseFile = (sourceMeta[prefix] && sourceMeta[prefix].fileBase) ? sourceMeta[prefix].fileBase : prefix;
  var fname = baseFile + '-' + String(pageNum).padStart(2, '0') + '.js';

  if (loadedSources[fname]) {
    useSourceData(loadedSources[fname], fname, pageNum);
    return;
  }

  document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">\u26cf</div><div class="desc">\u52a0\u8f7d\u4e2d...</div></div>';
  document.getElementById('pagination').innerHTML = '';

  loadData(fname, function(data) {
    if (!data) {
      document.getElementById('content').innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      setStatus('\u274c \u6570\u636e\u52a0\u8f7d\u5931\u8d25: ' + fname);
      return;
    }
    loadedSources[fname] = data;
    useSourceData(data, fname, pageNum);
  });
}

function useSourceData(data, file, pageNum) {
  currentData = data;
  currentFilePage = pageNum || 1;
  currentPage = 1;
  if (!currentData || !currentData.videos) {
    document.getElementById('content').innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
    setStatus('\u274c \u6570\u636e\u683c\u5f0f\u9519\u8bef');
    return;
  }
  currentCategory = '';
  buildCatBar();
  var meta = sourceMeta[currentPrefix];
  var vidCount = (currentData.videos||[]).length;
  setStatus('\ud83d\udce1 ' + currentData.name + ' \u2014 \u7b2c' + currentFilePage + '\u9875');

  currentFiltered = tagWithSource(currentData.videos, file, currentData.name);
  render();
}

/* ===== 全局搜索（扁平遍历：直接从 sourceIndex 展开所有文件路径） ===== */
function doSearch() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();

  if (!q) {
    currentSearchMode = false;
    currentCategory = '';
    currentPage = 1;
    loadPageFile(currentPrefix, currentFilePage);
    return;
  }

  if (isSearching) return;
  isSearching = true;
  document.getElementById('stopSearchBtn').style.display = '';
  // 重置源下拉框为全网状态
  document.getElementById('sourceSelect').value = '';
  document.getElementById('sourceSelect').options[0].textContent = '\u5168\u7f51';

  var thisVersion = ++searchVersion;

  currentFiltered = [];
  allSearchResults = [];
  currentPage = 1;
  currentSearchMode = true;

  // 扁平化：所有需要搜索的文件列表
  var allFiles = [];
  sourceIndex.forEach(function(src) {
    var pc = src.page_count || 1;
    for (var i = 1; i <= pc; i++) {
      allFiles.push({
        fname: src.prefix + '-' + String(i).padStart(2, '0') + '.js',
        name: src.name
      });
    }
  });

  var totalFiles = allFiles.length;
  var loadedFiles = 0;

  setStatus('\ud83d\udd0d \u641c\u7d22\u4e2d: 0/' + totalFiles + ' \u2014 \u201c' + q + '\u201d');

  // 顺序遍历
  var idx = 0;

  function loadNext() {
    if (searchVersion !== thisVersion) { isSearching = false; return; }
    if (idx >= allFiles.length) {
      isSearching = false;
      document.getElementById('stopSearchBtn').style.display = 'none';
      setStatus('\ud83d\udd0d \u5168\u5c40\u641c\u7d22\u5b8c\u6210: \u201c' + q + '\u201d \u2014 ' + currentFiltered.length + '\u4e2a\u7ed3\u679c');
      return;
    }
    var f = allFiles[idx++];
    loadData(f.fname, function(data) {
      if (searchVersion !== thisVersion) { isSearching = false; document.getElementById('stopSearchBtn').style.display = 'none'; return; }
      loadedFiles++;
      if (data && data.videos) {
        data.videos.forEach(function(v) {
          // 只搜可播放的视频
          if (!v.playable_count) return;
          var match = (v.vod_name || '').toLowerCase().includes(q);
          if (match) {
            var item = {
              sourceKey: f.fname,
              sourceName: f.name,
              vod_name: v.vod_name,
              vod_pic: v.vod_pic,
              episodes: v.episodes,
              ep_count: v.ep_count,
              playable_count: v.playable_count,
              vod_class: v.vod_class,
            };
            currentFiltered.push(item);
            allSearchResults.push(item);
          }
        });
      }
      setStatus('\ud83d\udd0d \u641c\u7d22\u4e2d: ' + loadedFiles + '/' + totalFiles + ' \u2014 \u201c' + q + '\u201d \u2014 ' + currentFiltered.length + '\u4e2a\u7ed3\u679c');
      render();
      buildCatBarFromFiltered();
      loadNext();
    });
  }

  loadNext();
}



function tagWithSource(videos, key, name) {
  return (videos||[]).map(function(v) {
    v.sourceKey = key;
    v.sourceName = name;
    return v;
  });
}

/* ===== 简化分类栏（用于最近观看/收藏/影签等视图） ===== */
function buildSimpleCatBar(text) {
  document.getElementById('catBar').innerHTML = '<span style="font-size:12px;color:var(--text-muted)">' + (text||'') + '</span>';
}

/* ===== 分类下拉（优先用 index.js 预计算数据，兼容旧数据回退扫描） ===== */
function buildCatBar() {
  var meta = sourceMeta[currentPrefix];
  var cats = {}, totalVideos = 0;

  if (meta && meta.categories && Object.keys(meta.categories).length > 0) {
    // 新数据：用 index.js 预计算的全量统计（已修复为统计全部视频，不限可播放）
    cats = meta.categories;
    totalVideos = Object.values(cats).reduce(function(a,b){return a+b;}, 0);
  } else if (currentData && currentData.videos) {
    // 旧数据兼容：扫描当前页（数据量小，仅限当前页12个）
    totalVideos = currentData.videos.length;
    (currentData.videos||[]).forEach(function(v) {
      var cv = (v.vod_class || '').trim();
      if (!cv) {
        cats['未分类'] = (cats['未分类'] || 0) + 1;
      } else {
        cv.split(',').forEach(function(c) {
          c = c.trim();
          if (c) cats[c] = (cats[c] || 0) + 1;
        });
      }
    });
  } else {
    return;
  }

  var bars = document.getElementById('catBar');
  var playableVid = meta ? meta.playable_videos : 0;
  var totalVid = meta ? meta.total : 0;
  var h = '<select class="cat-filter">';
  h += '<option value="">全部 (' + (totalVid>99?'99+':totalVid) + '/' + (playableVid>99?'99+':playableVid) + ')</option>';
  Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}).forEach(function(c) {
    var cnt = cats[c] > 99 ? '99+' : cats[c];
    h += '<option value="' + c.replace(/&/g,'&amp;').replace(/"/g,'&quot;') + '">' + c + ' (' + cnt + ')</option>';
  });
  h += '</select>';
  bars.innerHTML = h;
}

/* ===== 从 currentFiltered 实时统计分类（用于全局搜索） ===== */
function buildCatBarFromFiltered() {
  var cats = {}, totalVideos = 0;
  currentFiltered.forEach(function(v) {
    totalVideos++;
    var cv = (v.vod_class || '').trim();
    if (!cv) {
      cats['未分类'] = (cats['未分类'] || 0) + 1;
    } else {
      cv.split(',').forEach(function(c) {
        c = c.trim();
        if (c) cats[c] = (cats[c] || 0) + 1;
      });
    }
  });

  var bars = document.getElementById('catBar');
  var h = '<select class="cat-filter">';
  h += '<option value="">全部 (' + allSearchResults.length + ')</option>';
  Object.keys(cats).sort(function(a, b) {
    if (a === '未分类') return 1;
    if (b === '未分类') return -1;
    return cats[b] - cats[a];
  }).forEach(function(c) {
    var cnt = cats[c] > 99 ? '99+' : cats[c];
    h += '<option value="' + c.replace(/&/g, '&amp;').replace(/"/g, '&quot;') + '">' + c + ' (' + cnt + ')</option>';
  });
  h += '</select>';
  bars.innerHTML = h;
}

function filterCat(sel) {
  currentCategory = sel.value;
  currentPage = 1;
  if (!currentCategory) {
    if (currentSearchMode) {
      // 全局搜索模式清空分类：恢复全部搜索结果
      currentCategory = '';
      currentFiltered = allSearchResults.slice();
      render();
      return;
    }
    // 正常模式：回到数据源翻页
    currentSearchMode = false;
    loadPageFile(currentPrefix, currentFilePage);
    return;
  }
  if (currentSearchMode) {
    // 全局搜索模式下选分类：从原始搜索结果过滤
    if (currentCategory === '未分类') {
      currentFiltered = allSearchResults.filter(function(v) {
        return !(v.vod_class || '').trim();
      });
    } else {
      currentFiltered = allSearchResults.filter(function(v) {
        return (v.vod_class || '').split(',').some(function(s) {
          return s.trim() === currentCategory;
        });
      });
    }
    currentPage = 1;
    render();
    return;
  }
  // 正常单数据源模式：遍历全部页文件汇总
  filterByCategory();
}

function filterByCategory() {
  var meta = sourceMeta[currentPrefix];
  var pc = meta ? meta.page_count : 1;
  var results = [], loaded = 0;
  var cat = currentCategory;
  setStatus('[FILTER] ' + cat + ' — loading... (0/' + pc + ')');
  function update() { setStatus('[FILTER] ' + cat + ' — (' + loaded + '/' + pc + ')'); }
  function done() {
    loaded++;
    update();
    if (loaded < pc) return;
    currentFiltered = results;
    setStatus('[FILTER] ' + cat + ' — ' + results.length + ' results');
    currentPage = 1;
    render();
  }
  for (var p = 1; p <= pc; p++) {
    (function(pn){
      var fn = currentPrefix + '-' + String(pn).padStart(2, '0') + '.js';
      if (loadedSources[fn]) { collectCat(loadedSources[fn], cat, results); done(); return; }
      loadData(fn, function(data) {
        if (data) loadedSources[fn] = data;
        if (data) collectCat(data, cat, results);
        done();
      });
    })(p);
  }
}

function collectCat(src, cat, results) {
  if (!src || !src.videos) return;
  src.videos.forEach(function(v) {
    var classes = (v.vod_class || '').split(',');
    var match = classes.some(function(s){ return s.trim() === cat; });
    if (match) {
      results.push({
        sourceKey: currentPrefix,
        sourceName: src.name,
        vod_name: v.vod_name,
        vod_pic: v.vod_pic,
        episodes: v.episodes,
        ep_count: v.ep_count,
        playable_count: v.playable_count,
        vod_class: v.vod_class,
      });
    }
  });
}

/* ===== 渲染卡片 ===== */
function render() {
  var total = currentFiltered.length, pages = Math.ceil(total/PAGE_SIZE)||1;
  if (currentPage>pages) currentPage=pages;
  var start=(currentPage-1)*PAGE_SIZE, items=currentFiltered.slice(start,start+PAGE_SIZE);

  // 顶部统计
  var allEps=0, allPlayable=0;
  items.forEach(function(v){allEps+=v.ep_count||0;allPlayable+=v.playable_count||0});

  var h = '';
  // 网格
  h += '<div class="video-grid">';
  items.forEach(function(v,i) {
    var eid = 'eps_' + currentPage + '_' + i;
    var img = v.vod_pic || '';
    var badgeClass = v.playable_count>0 ? 'playable' : 'unplayable';
    var badgeText = v.playable_count>0 ? '\u53ef\u64ad' : '\u5f85\u9a8c\u8bc1';
    var epInfo = (v.ep_count||0) + '\u96c6';
    if(v.playable_count>0) epInfo += ' \u00b7 ' + v.playable_count + '\u53ef\u64ad';

    h += '<div class="video-card" data-eid="' + eid + '" data-vodname="' + escAttr(v.vod_name||'') + '" data-sourcekey="' + escAttr(v.sourceKey||'') + '">';
    h += '<div class="poster-wrap">';
    if (img) {
      h += '<img class="poster" src="' + img.replace(/&/g,'&amp;').replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
      h += '<div class="poster-fallback" style="display:none">\ud83c\udfac</div>';
    } else {
      h += '<div class="poster-fallback">\ud83c\udfac</div>';
    }
    // 收藏按钮
    var isFav = isFavorited(v.sourceKey, v.vod_name);
    h += '<button class="fav-btn card-fav' + (isFav?' faved':'') + '" data-sourcekey="' + escAttr(v.sourceKey||'') + '" data-vodname="' + escAttr(v.vod_name||'') + '" data-vodpic="' + escAttr(v.vod_pic||'') + '" data-epcount="' + (v.ep_count||0) + '" data-playablecount="' + (v.playable_count||0) + '" title="' + (isFav?'\u53d6\u6d88\u6536\u85cf':'\u6536\u85cf') + '" onclick="event.stopPropagation();window._favBtnClick&&window._favBtnClick(this)">' + (isFav?'\u2764':'\u2661') + '</button>';
    // 历史/影签删除按钮在收藏按钮右边
    if (v.isHistory || v.isBookmark) {
      h += '<button class="fav-btn card-delete ep-delete" data-vodname="' + escAttr(v.vod_name||'') + '" data-sourcekey="' + escAttr(v.sourceKey||'') + '" data-type="' + (v.isHistory?'history':'bookmark') + '" title="\u5220\u9664">\u2716</button>';
    }
    h += '<span class="card-badge ' + badgeClass + '">' + badgeText + '</span>';
    // 最近观看进度提示
    if (v.isHistory && v.historyProgress) {
      var pct = Math.min(100, Math.round((v.historyProgress / 300) * 100));
      h += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    }
    // 影签备注提示
    if (v.isBookmark && v.bookmarkNote) {
      h += '<div class="bookmark-note">' + escHtml(v.bookmarkNote) + '</div>';
    }
    h += '</div>';
    h += '<div class="card-info"><div class="card-title">' + escHtml(v.vod_name||'') + '</div>';
    var metaExtra = '';
    if (v.isHistory && v.historyProgress) metaExtra = ' \u00b7 \u5df2\u89c2' + Math.floor(v.historyProgress/60) + '\u5206';
    if (v.isBookmark && v.bookmarkNote) metaExtra = ' \u00b7 \u201c' + v.bookmarkNote + '\u201d';
    h += '<div class="card-meta">' + (v.sourceName?escHtml(v.sourceName)+' \u00b7 ':'') + epInfo + metaExtra + '</div></div></div>';

    // 剧集面板（与卡片平级，Grid 自动布局）
    h += '<div class="ep-panel" id="' + eid + '">';
    h += '<div class="ep-header"><span class="ep-count">\u5267\u96c6 (' + (v.episodes||[]).length + ')</span><button class="ep-close" data-eid="' + eid + '">\u2716</button></div>';
    (v.episodes||[]).forEach(function(e, ei){
      var eb = e.playable ? '' : ' \u26a0';
      var epExtra = '';
      var isHistoryEp = v.isHistory && ei === v.historyEpIndex;
      var isBookmarkEp = v.isBookmark && ei === v.bookmarkEpIndex;
      if (isHistoryEp) epExtra = ' \u25b6';
      if (isBookmarkEp) epExtra = ' \u1f4cc'; // 📌
      // 显示时间进度
      var timeStr = '';
      if (isHistoryEp && v.historyProgress) {
        var mins = Math.floor(v.historyProgress / 60);
        var secs = Math.floor(v.historyProgress % 60);
        timeStr = ' (' + mins + '\'' + secs + '")';
      }
      if (isBookmarkEp && v.bookmarkProgress) {
        var mins = Math.floor(v.bookmarkProgress / 60);
        var secs = Math.floor(v.bookmarkProgress % 60);
        timeStr = ' (' + mins + '\'' + secs + '")';
      }
      h += '<div class="ep-item' + (isHistoryEp||isBookmarkEp?' ep-current':'') + '" data-url="' + escAttr(e.url||'') + '" data-name="' + escAttr((v.vod_name||'') + ' - ' + (e.title||'')) + '" data-epindex="' + ei + '">' + escHtml(e.title||'') + eb + epExtra + timeStr + '</div>';
    });
    h += '</div>';  // close ep-panel
  });  // close items.forEach
  h += '</div>';  // close video-grid

  if (!items.length) {
    h = '<div class="empty-state"><div class="icon">\ud83d\udd0d</div><div class="desc">\u65e0\u5339\u914d\u7ed3\u679c</div><div class="sub">\u8bd5\u8bd5\u5176\u4ed6\u5173\u952e\u8bcd</div></div>';
  }

  document.getElementById('content').innerHTML = h;
  // 渲染完成后立刻给所有 video-card 绑定直接点击（跳过事件委托）
  document.querySelectorAll('.video-card').forEach(function(card) {
    if (card.dataset.patched) return;
    card.dataset.patched = '1';
    card.addEventListener('click', function(e) {
      // 如果点击的是删除按钮/关闭按钮，不拦截，让它冒泡到 document 处理
      if (e.target.closest('.ep-delete') || e.target.closest('.ep-close')) return;
      e.stopPropagation(); // 阻止冒泡到 document 委托
      toggleEpisodes(this, this.dataset.eid);
    });
  });

  // 分页：页文件导航 or 内存分页（搜索/分类筛选模式）
  var pg = '';
  if (currentSearchMode) {
    // 搜索/分类筛选模式：内存分页
    var total = currentFiltered.length;
    var pages = Math.ceil(total / PAGE_SIZE) || 1;
    pg += '<button class="pg-go" data-page="1"' + (currentPage<=1?' disabled':'') + '>«</button>';
    pg += '<button class="pg-go" data-page="' + (currentPage-1) + '"' + (currentPage<=1?' disabled':'') + '>‹</button>';
    var startP = Math.max(1, currentPage-2), endP = Math.min(pages, currentPage+2);
    for (var pi=startP; pi<=endP; pi++)
      pg += '<button class="pg-go' + (pi===currentPage?' active':'') + '" data-page="' + pi + '">' + pi + '</button>';
    pg += '<button class="pg-go" data-page="' + (currentPage+1) + '"' + (currentPage>=pages?' disabled':'') + '>›</button>';
    pg += '<button class="pg-go" data-page="' + pages + '"' + (currentPage>=pages?' disabled':'') + '>»</button>';
  } else if (currentPrefix && sourceMeta[currentPrefix]) {
    var pc = sourceMeta[currentPrefix].page_count || 1;
    pg += '<button class="pg-page" data-page="1"' + (currentFilePage<=1?' disabled':'') + '>«</button>';
    pg += '<button class="pg-page" data-page="' + (currentFilePage-1) + '"' + (currentFilePage<=1?' disabled':'') + '>‹</button>';
    var startP = Math.max(1, currentFilePage-2), endP = Math.min(pc, currentFilePage+2);
    for (var pi=startP; pi<=endP; pi++)
      pg += '<button class="pg-page' + (pi===currentFilePage?' active':'') + '" data-page="' + pi + '">' + pi + '</button>';
    pg += '<button class="pg-page" data-page="' + (currentFilePage+1) + '"' + (currentFilePage>=pc?' disabled':'') + '>›</button>';
    pg += '<button class="pg-page" data-page="' + pc + '"' + (currentFilePage>=pc?' disabled':'') + '>»</button>';
  }
  document.getElementById('pagination').innerHTML = pg;
}

/* ===== 工具函数 ===== */
function goPage(n) {
  if (!currentPrefix || n < 1) return;
  var meta = sourceMeta[currentPrefix];
  var pc = meta ? meta.page_count : 1;
  if (n > pc) n = pc;
  if (n !== currentFilePage) { loadPageFile(currentPrefix, n); return; }
  currentPage = n;
  render();
}
function go(p){
  if (currentSearchMode) {
    // 搜索/分类筛选模式：内存分页
    var total = currentFiltered.length;
    var maxPages = Math.ceil(total / PAGE_SIZE) || 1;
    if (p < 1) p = 1;
    if (p > maxPages) p = maxPages;
    currentPage = p;
    render();
    return;
  }
  goPage(p);
}

function toggleEpisodes(el, id){
  var panel = document.getElementById(id);
  if(!panel) return;
  var isOpen = panel.classList.contains('open');
  // 关闭所有其他面板
  document.querySelectorAll('.ep-panel.open').forEach(function(p){
    if(p.id!==id) p.classList.remove('open');
  });
  panel.classList.toggle('open');
  // 设置当前展开的视频对象
  if (!isOpen) {
    // 面板打开时，存储对应的视频数据
    var vodName = el.dataset.vodname;
    var sourceKey = el.dataset.sourcekey;
    currentOpenVideo = currentFiltered.find(function(v){ return v.vod_name === vodName && v.sourceKey === sourceKey; }) || null;
    // 如果是历史/影签且只有一集，尝试加载完整数据
    if (currentOpenVideo && (currentOpenVideo.isHistory || currentOpenVideo.isBookmark) && currentOpenVideo.episodes && currentOpenVideo.episodes.length === 1) {
      var fullVideo = findVideoInCache(sourceKey, vodName);
      if (fullVideo && fullVideo.episodes && fullVideo.episodes.length > 1) {
        currentOpenVideo.episodes = fullVideo.episodes;
        currentOpenVideo.playable_count = fullVideo.playable_count || fullVideo.episodes.filter(function(e){ return e.playable; }).length;
        currentOpenVideo.ep_count = fullVideo.ep_count || fullVideo.episodes.length;
        // 更新面板中的剧集信息
        var epHeader = panel.querySelector('.ep-count');
        if (epHeader) epHeader.textContent = '\u5267\u96c6 (' + currentOpenVideo.episodes.length + ')';
        // 重新渲染剧集列表
        renderEpList(panel, currentOpenVideo);
      } else if (sourceMeta[sourceKey]) {
        // 缓存没有，尝试加载数据源
        var baseFile = sourceMeta[sourceKey].fileBase || sourceKey;
        var fname = baseFile + '-01.js';
        if (!loadedSources[fname]) {
          var origOpenVideo = currentOpenVideo;
          loadData(fname, function(data) {
            if (data && data.videos) {
              loadedSources[fname] = data;
              var found = data.videos.find(function(v){ return v.vod_name === origOpenVideo.vod_name; });
              if (found && found.episodes && found.episodes.length > 1) {
                // 更新 currentFiltered 中的数据
                var idx = currentFiltered.findIndex(function(v){ return v.vod_name === origOpenVideo.vod_name && v.sourceKey === origOpenVideo.sourceKey; });
                if (idx >= 0) {
                  currentFiltered[idx].episodes = found.episodes;
                  currentFiltered[idx].playable_count = found.playable_count || found.episodes.filter(function(e){ return e.playable; }).length;
                  currentFiltered[idx].ep_count = found.ep_count || found.episodes.length;
                }
                // 找到后更新 currentOpenVideo 并刷新面板
                if (currentOpenVideo && currentOpenVideo.vod_name === origOpenVideo.vod_name) {
                  currentOpenVideo.episodes = found.episodes;
                  currentOpenVideo.playable_count = found.playable_count || found.episodes.filter(function(e){ return e.playable; }).length;
                  currentOpenVideo.ep_count = found.ep_count || found.episodes.length;
                  var epHeader = panel.querySelector('.ep-count');
                  if (epHeader) epHeader.textContent = '\u5267\u96c6 (' + currentOpenVideo.episodes.length + ')';
                  renderEpList(panel, currentOpenVideo);
                }
              }
            }
          });
        }
      }
    }
  } else {
    currentOpenVideo = null;
  }
}

function renderEpList(panel, video) {
  // 重新渲染剧集列表
  var epList = panel.querySelector('.ep-list');
  if (!epList) return;
  var h = '';
  var episodes = video.episodes || [];
  episodes.forEach(function(e, ei) {
    var eb = e.playable ? '' : ' \u26a0';
    var epExtra = '';
    var isHistoryEp = video.isHistory && ei === video.historyEpIndex;
    var isBookmarkEp = video.isBookmark && ei === video.bookmarkEpIndex;
    if (isHistoryEp) epExtra = ' \u25b6';
    if (isBookmarkEp) epExtra = ' \u1f4cc';
    var timeStr = '';
    if ((isHistoryEp && video.historyProgress) || (isBookmarkEp && video.bookmarkProgress)) {
      var prog = video.historyProgress || video.bookmarkProgress;
      timeStr = ' \u2502 ' + Math.floor(prog/60) + ':' + String(prog%60).padStart(2,'0');
    }
    h += '<div class="ep-item' + (isHistoryEp||isBookmarkEp?' ep-current':'') + '" data-url="' + escAttr(e.url||'') + '" data-name="' + escAttr((video.vod_name||'') + ' - ' + (e.title||'')) + '" data-epindex="' + ei + '">' + escHtml(e.title||'') + eb + epExtra + timeStr + '</div>';
  });
  epList.innerHTML = h;
}
function closeEp(id){
  var el = document.getElementById(id);
  if(el) el.classList.remove('open');
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function setStatus(t){
  document.getElementById('statusText').textContent = t;
}
function setEmpty(t, sub){
  var h = '<div class="empty-state"><div class="icon">\ud83d\udcfa</div><div class="desc">' + t + '</div>';
  if(sub) h += '<div class="sub">' + sub + '</div>';
  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

/* ===== 悬浮播放器 ===== */
function showFloatPlayer() {
  var mainPlayer = document.getElementById('player');
  var floatVideo = document.getElementById('floatVideo');
  var floatPlayer = document.getElementById('floatPlayer');
  var floatTitle = document.getElementById('floatPlayerTitle');

  // 如果已经是悬浮模式则跳过
  if (playerInFloatMode) return;

  // 如果 HLS 正在播放，需要把 HLS 实例转移
  if (currentHls) {
    // HLS.attachMedia 只能绑定到一个 video 元素，先 detach 再 reattach
    currentHls.detachMedia();
    currentHls.attachMedia(floatVideo);
  }

  // 复制播放状态
  floatVideo.src = mainPlayer.src || mainPlayer.currentSrc;
  floatVideo.currentTime = mainPlayer.currentTime;
  floatVideo.paused = mainPlayer.paused;
  floatVideo.volume = mainPlayer.volume;

  // 更新标题
  if (currentPlayingVideo) {
    floatTitle.textContent = currentPlayingVideo.vod_name || '\u6b63\u5728\u64ad\u653e';
  }

  // 隐藏主播放器，显示悬浮播放器
  playerInFloatMode = true;
  document.querySelector('.player-box').classList.remove('playing');
  floatPlayer.style.display = 'block';

  // 如果之前没在播放则开始播放
  if (!floatVideo.paused) {
    floatVideo.play().catch(function(){});
  }
}

function hideFloatPlayer() {
  var mainPlayer = document.getElementById('player');
  var floatVideo = document.getElementById('floatVideo');
  var floatPlayer = document.getElementById('floatPlayer');

  if (!playerInFloatMode) return;

  // 如果 HLS 正在播放，需要把 HLS 实例转移回主播放器
  if (currentHls) {
    currentHls.detachMedia();
    currentHls.attachMedia(mainPlayer);
  }

  // 复制播放状态回主播放器
  mainPlayer.src = floatVideo.src;
  mainPlayer.currentTime = floatVideo.currentTime;
  mainPlayer.volume = floatVideo.volume;

  playerInFloatMode = false;
  floatPlayer.style.display = 'none';
  document.querySelector('.player-box').classList.add('playing');
}

function returnFromFloat() {
  if (!playerInFloatMode) return;
  // 返回时先隐藏悬浮窗口
  var floatPlayer = document.getElementById('floatPlayer');
  floatPlayer.style.display = 'none';
  playerInFloatMode = false;
  // 恢复主播放器
  var mainPlayer = document.getElementById('player');
  var floatVideo = document.getElementById('floatVideo');
  if (currentHls) {
    currentHls.detachMedia();
    currentHls.attachMedia(mainPlayer);
  }
  mainPlayer.src = floatVideo.src;
  mainPlayer.currentTime = floatVideo.currentTime;
  mainPlayer.volume = floatVideo.volume;
  mainPlayer.play().catch(function(){});
  document.querySelector('.player-box').classList.add('playing');
  // 如果有返回地址则跳转
  if (floatReturnPrefix) {
    document.getElementById('sourceSelect').value = floatReturnPrefix;
    floatReturnPrefix = null;
  }
}

function closeFloatPlayer() {
  if (!playerInFloatMode) return;
  var floatPlayer = document.getElementById('floatPlayer');
  var floatVideo = document.getElementById('floatVideo');
  // 停止播放
  floatVideo.pause();
  floatVideo.src = '';
  // 销毁 HLS
  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }
  playerInFloatMode = false;
  floatReturnPrefix = null;
  floatPlayer.style.display = 'none';
  document.querySelector('.player-box').classList.remove('playing');
  currentPlayingVideo = null;
  setStatus('\u23f9 \u5df2\u5173\u95ed');
}

// 悬浮播放器按钮事件绑定
document.getElementById('floatBackBtn').addEventListener('click', function() {
  returnFromFloat();
});
document.getElementById('floatCloseBtn').addEventListener('click', function() {
  closeFloatPlayer();
});

/* ===== 播放 ===== */
function playEp(el) {
  var url = el.dataset.url;
  var name = el.dataset.name;
  if (!url) return;
  var items = el.parentElement.querySelectorAll('.ep-item');
  var idx = Array.from(items).indexOf(el);
  var epIndex = parseInt(el.dataset.epindex) || idx;
  currentEpNext = idx < items.length - 1 ? items[idx + 1] : null;
  document.getElementById('nextEpBtn').style.display = currentEpNext ? 'inline' : 'none';
  // 保存上一个视频的进度（直接获取当前视频元素的时间）
  if (currentPlayingVideo) {
    var v = document.getElementById('player');
    var oldProgress = v.currentTime || 0;
    if (oldProgress > 5) {
      updateHistory(currentPlayingVideo, currentPlayingEpIndex, Math.floor(oldProgress));
    }
  }
  // 使用 currentOpenVideo（toggleEpisodes 时设置的）
  currentPlayingVideo = currentOpenVideo;
  currentPlayingEpIndex = epIndex;
  doPlay(url, name);
}
function doPlay(url, name) {
  if(currentHls){currentHls.destroy();currentHls=null;}
  var v = document.getElementById('player');
  v.pause();
  v.removeAttribute('src');
  v.load();
  document.querySelector('.player-box').classList.add('playing');

  if(url.indexOf('.m3u8')>=0){
    try{
      if(window.Hls && Hls.isSupported()){
        var hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(v);
        currentHls = hls;
      } else {
        v.src = url;
      }
    }catch(e){
      v.src = url;
    }
  } else {
    v.src = url;
  }
  v.play().catch(function(){});
  // 恢复历史/影签进度
  var savedProgress = currentOpenVideo ? (currentOpenVideo.historyProgress || currentOpenVideo.bookmarkProgress || 0) : 0;
  if (savedProgress > 5) {
    v.addEventListener('canplay', function once() {
      v.removeEventListener('canplay', once);
      v.currentTime = savedProgress;
    });
  }
  setStatus('\u25b6 ' + name);
}

/* ===== 下一集 ===== */
function playNext() {
  if (currentEpNext) {
    playEp(currentEpNext);
  }
}
document.getElementById('player').addEventListener('ended', function() {
  // 播放结束时保存当前进度
  if (currentPlayingVideo) {
    var v = document.getElementById('player');
    updateHistory(currentPlayingVideo, currentPlayingEpIndex, Math.floor(v.currentTime));
  }
  playNext();
  // 无下一集时收起播放器
  if (!currentEpNext) {
    document.querySelector('.player-box').classList.remove('playing');
  }
});

/* ===== 暂停时保存进度 ===== */
document.getElementById('player').addEventListener('pause', function() {
  if (currentPlayingVideo) {
    var v = document.getElementById('player');
    if (v.currentTime > 5) {
      updateHistory(currentPlayingVideo, currentPlayingEpIndex, Math.floor(v.currentTime));
    }
  }
});

/* ===== 添加影签 ===== */
function addBookmarkHandler() {
  if (!currentPlayingVideo || (!currentPlayingEpIndex && currentPlayingEpIndex !== 0)) {
    setStatus('\u26a0 \u8bf7\u5148\u9009\u62e9\u5267\u96c6\u8f6c\u6362');
    return;
  }
  // 先保存当前播放进度
  var v = document.getElementById('player');
  updateHistory(currentPlayingVideo, currentPlayingEpIndex, Math.floor(v.currentTime));
  var note = prompt('\u8bf7\u8f93\u5165\u5f71\u7b7e\u5907\u6ce8\uff08\u53ef\u7a7a\uff09\uff1a', '');
  if (note === null) return;
  addBookmark(currentPlayingVideo, currentPlayingEpIndex, Math.floor(v.currentTime), note);
  setStatus('\u2713 \u5f71\u7b7e\u5df2\u6dfb\u52a0');
}

/* ===== 搜索按键 ===== */
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && document.activeElement===document.getElementById('searchInput')){
    doSearch();
  }
  // N 键下一集（全屏时可用）
  if((e.key==='n'||e.key==='N') && currentEpNext){
    e.preventDefault();
    playNext();
  }
});

/* ===== 事件委托处理器（处理 HTML 属性事件改用 addEventListener 后的绑定） */
document.addEventListener('change', function(e) {
  var target = e.target;
  if (target.id === 'sourceSelect') { switchSource(); return; }
  if (target.classList.contains('cat-filter')) { filterCat(target); return; }
});
document.addEventListener('click', function(e) {
  var target = e.target;
  // 优先检查删除按钮（历史/影签的删除有 card-delete class，与收藏按钮互斥）
  var epDelete = target.closest('.ep-delete');
  if (epDelete) {
    e.stopPropagation();
    var vodName = epDelete.dataset.vodname;
    var sourceKey = epDelete.dataset.sourcekey;
    var type = epDelete.dataset.type;
    if (type === 'history') {
      var h = getHistory();
      delete h[sourceKey + '_' + vodName];
      localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(h));
      setStatus('\u2713 \u5df2\u5220\u9664');
      renderHistory();
    } else if (type === 'bookmark') {
      var list = getBookmarks().filter(function(b){ return !(b.videoName === vodName && b.sourceKey === sourceKey); });
      saveBookmarks(list);
      setStatus('\u2713 \u5f71\u7b7e\u5df2\u5220\u9664');
      renderBookmarks();
    }
    return;
  }
  // 优先检查收藏按钮
  var favBtn = target.closest('.fav-btn');
  if (favBtn) {
    e.stopPropagation();
    var sourceKey = favBtn.dataset.sourcekey;
    var vodName = favBtn.dataset.vodname;
    var vodPic = favBtn.dataset.vodpic;
    var epCount = parseInt(favBtn.dataset.epcount) || 0;
    var playableCount = parseInt(favBtn.dataset.playablecount) || 0;
    if (isFavorited(sourceKey, vodName)) {
      removeFavorite(sourceKey, vodName);
      favBtn.classList.remove('faved');
      favBtn.innerHTML = '\u2661';
      favBtn.title = '\u6536\u85cf';
    } else {
      // 从 currentFiltered 中找到完整的视频数据（优先）
      var fullVideo = currentFiltered.find(function(v){ return v.vod_name === vodName && v.sourceKey === sourceKey; });
      // 如果 currentFiltered 里没有，尝试从 currentData.videos 找
      if (!fullVideo && currentData && currentData.videos) {
        fullVideo = currentData.videos.find(function(v){ return v.vod_name === vodName; });
      }
      // 再从 loadedSources 缓存中找（可能有完整剧集数据）
      if (!fullVideo || !(fullVideo.episodes && fullVideo.episodes.length)) {
        Object.values(loadedSources).some(function(data) {
          if (data && data.videos) {
            var found = data.videos.find(function(v){ return v.vod_name === vodName; });
            if (found && found.episodes && found.episodes.length) {
              fullVideo = found;
              return true;
            }
          }
        });
      }
      var videoData = {
        sourceKey: sourceKey,
        vod_name: vodName,
        vod_pic: fullVideo ? fullVideo.vod_pic : vodPic,
        sourceName: fullVideo ? (fullVideo.sourceName||'') : '',
        ep_count: fullVideo ? (fullVideo.ep_count||0) : epCount,
        playable_count: fullVideo ? (fullVideo.playable_count||0) : playableCount,
        episodes: fullVideo ? (fullVideo.episodes||[]) : [],
        vod_class: fullVideo ? (fullVideo.vod_class||'') : ''
      };
      addFavorite(videoData);
      favBtn.classList.add('faved');
      favBtn.innerHTML = '\u2764';
      favBtn.title = '\u53d6\u6d88\u6536\u85cf';
    }
    return;
  }
  // 优先检查 ep-item（ep-close 也有 .ep-close class，会被 button 检查漏掉）
  var epItem = target.closest('.ep-item');
  if (epItem) { playEp(epItem); return; }
  // 检查关闭按钮
  var epClose = target.closest('.ep-close');
  if (epClose) { e.stopPropagation(); closeEp(epClose.dataset.eid); return; }
  // 检查其他 button
  var closest = target.closest('button');
  if (closest && closest.disabled) return;
  if (closest) {
    if (closest.id === 'searchBtn') { doSearch(); return; }
    if (closest.id === 'stopSearchBtn') { stopSearch(); return; }
    if (closest.id === 'bookmarkBtn') { addBookmarkHandler(); return; }
    if (closest.id === 'nextEpBtn') { playNext(); return; }
    if (closest.classList.contains('pg-go')) { go(parseInt(closest.dataset.page)); return; }
    if (closest.classList.contains('pg-page')) { goPage(parseInt(closest.dataset.page)); return; }
  }
  // 检查 video-card（非 button 点击，direct listener 已处理的不会到达这里）
  var card = target.closest('.video-card');
  if (card) { toggleEpisodes(card, card.dataset.eid); return; }
});

loadIndex();

/* ===== 直接点击补丁：已合并到渲染流程（见 renderGrid 末尾） ===== */

</script></div></body></html>
