---
layout: false
---
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

<div class="game-container">
    <div class="board-wrapper">
        <canvas id="gomokuCanvas" width="650" height="650"></canvas>
    </div>
    <div class="side-panel">
        <div class="level-selector-compact">
            <select id="levelSelect">
                <option value="1">1级 初学</option><option value="2">2级 入门</option><option value="3">3级 初级</option>
                <option value="4">4级 业余</option><option value="5" selected>5级 中级</option><option value="6">6级 进阶</option>
                <option value="7">7级 高手</option><option value="8">8级 高段</option><option value="9">9级 强手</option>
                <option value="10">10级 大师</option>
            </select>
            <div class="level-stars" id="levelStars"></div>
        </div>

        <div class="players-dual">
            <div class="player active" id="playerBlack">
                <div class="player-icon black-icon"></div>
                <span class="player-name">黑</span>
                <span class="player-tag human">玩家</span>
            </div>
            <div class="player" id="playerWhite">
                <div class="player-icon white-icon"></div>
                <span class="player-name">白</span>
                <span class="player-tag ai">AI</span>
            </div>
        </div>

        <div class="buttons-group">
            <button class="btn btn-primary" id="restartBtn">✨ 新对局</button>
            <button class="btn btn-secondary" id="undoBtn" disabled>↩️ 悔棋</button>
        </div>

        <div class="theme-selector">
            <select id="themeSelect">
                <option value="classic">🏮 经典木纹</option>
                <option value="jade">🍃 翠玉清雅</option>
                <option value="ink">🖌️ 水墨禅意</option>
            </select>
        </div>

        <div class="status">
            <div class="status-text" id="5_statusText">⚫ 轮到你落子</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-icon" id="modalIcon">🏆</div>
        <h2 class="modal-title" id="modalTitle">胜利!</h2>
        <p class="modal-message" id="modalMessage">精彩对局！</p>
        <button class="modal-btn" id="modalBtn">新的一局</button>
    </div>
</div>

<style>
* {
  /* margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; */
}
body {
  /* background: transparent !important; font-family: inherit; margin: 0 !important;
     padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: auto; */
}
.game-container {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    align-items: stretch;
    max-width: 1300px;
    width: 100%;
    margin: 0 auto;
}
.board-wrapper {
    position: relative;
    background: transparent;
    border-radius: 32px;
    flex-shrink: 0;
}
canvas {
    display: block;
    width: 100%;
    height: auto;
    cursor: pointer;
    border-radius: 10px;
    outline: none;
    border: none;
}
.side-panel {
    background: rgba(128, 128, 128, 0.2);
    border-radius: 10px;
    padding: 12px 8px;
    display: flex;
    gap: 14px;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    border: none;
}
.ctrl-group,
.level-selector-compact,
.players-dual,
.buttons-group,
.theme-selector,
.status {
    background: transparent;
    border: none;
    box-shadow: none;
}
.level-selector-compact {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: transparent;
    border-radius: 48px;
}
.level-selector-compact select {
    flex: 1;
    padding: 8px 12px;
    font-size: 0.8rem;
    border-radius: 48px;
    border: 1px solid rgba(128, 128, 128, 0.3);
    background: rgba(255, 255, 245, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: inherit;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: 0.2s;
}
.level-stars { display: flex; gap: 3px; flex-wrap: nowrap; }
.star { width: 18px; height: 18px; fill: #cdc9c0; transition: fill 0.1s; }
.star.filled { fill: #F5B042; filter: drop-shadow(0 0 2px #ffb347); }
.players-dual { display: flex; gap: 10px; }
.player {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 56px;
    background: rgba(0, 0, 0, 0.05);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: all 0.2s;
    color: inherit;
    border: 1px solid rgba(128, 128, 128, 0.2);
}
.player.active {
    background: rgba(194, 74, 44, 0.2);
    border: 1px solid #C24A2C;
    box-shadow: 0 2px 8px rgba(194, 74, 44, 0.2);
}
.player-icon {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
}
.player-icon.black-icon {
    background: radial-gradient(circle at 30% 30%, #3a3a3a, #111);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.player-icon.white-icon {
    background: radial-gradient(circle at 30% 30%, #f8faff, #e0e6f0);
    border: 1px solid #bbb4a4;
}
.player-name { font-weight: 700; font-size: 0.8rem; color: inherit; }
.player-tag { font-size: 0.6rem; padding: 2px 8px; border-radius: 40px; font-weight: 700; white-space: nowrap; }
.player-tag.human { background: #C24A2C; color: white; }
.player-tag.ai { background: #2c6e49; color: white; }
.buttons-group { display: flex; gap: 10px; }
.btn {
    flex: 1; padding: 8px 12px; font-size: 0.75rem; font-weight: 700;
    border: none; border-radius: 60px; cursor: pointer; transition: 0.2s;
    font-family: inherit; text-align: center; white-space: nowrap;
    background: rgba(30, 30, 40, 0.7);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: white; border: none;
}
.btn-primary {
    background: linear-gradient(125deg, #C24A2C, #a33d22);
    color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.btn-primary:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn-secondary {
    background: rgba(70, 70, 85, 0.7);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: #f2f2f2; border: none;
}
.btn-secondary:hover { background: rgba(90, 90, 110, 0.8); transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.theme-selector select {
    width: 100%; padding: 12px; font-size: 0.75rem; border-radius: 60px;
    border: 1px solid rgba(128, 128, 128, 0.3);
    background: rgba(255, 255, 245, 0.55);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: inherit; font-weight: 500; font-family: inherit; cursor: pointer; text-align: center;
}
.status {
    background: rgba(0, 0, 0, 0.05); border-radius: 60px;
    padding: 8px 14px; text-align: center;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(128, 128, 128, 0.2);
}
.status-text { font-size: 0.8rem; font-weight: 600; color: inherit; }
.status-text.thinking { color: #C24A2C; }
.thinking-dots::after { content: ''; animation: dots 1.5s infinite; }
@keyframes dots {
    0%,20%{content:'.';}40%{content:'..';}60%,100%{content:'...';}
}
.modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    justify-content: center; align-items: center; z-index: 2000;
}
.modal-overlay.show { display: flex; }
.modal {
    background: rgba(28, 26, 30, 0.94); border-radius: 56px;
    padding: 28px 24px; text-align: center;
    max-width: 320px; width: 85%;
    border: 1px solid rgba(230, 180, 120, 0.6);
    color: #f2ede4;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 20px 35px rgba(0,0,0,0.4);
}
.modal-icon { font-size: 3.2rem; margin-bottom: 8px; }
.modal-title { font-family: inherit; font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; }
.modal-title.win { color: #F5AC78; }
.modal-title.lose { color: #92b88d; }
.modal-message { opacity: 0.85; margin-bottom: 20px; font-size: 0.9rem; }
.modal-btn {
    padding: 8px 28px; background: #C24A2C; color: white;
    border: none; border-radius: 48px; font-weight: bold; font-size: 0.9rem;
    cursor: pointer; transition: 0.2s;
}
.modal-btn:hover { background: #a93c21; transform: scale(0.97); }

@media (prefers-color-scheme: dark) {
    .level-selector-compact select,
    .theme-selector select {
        background: rgba(20, 22, 32, 0.85);
        border-color: rgba(160, 160, 180, 0.3);
        color: #eef2fa;
    }
    .player {
        background: rgba(20, 20, 30, 0.55);
        border-color: rgba(180, 180, 210, 0.2);
    }
    .player.active {
        background: rgba(194, 74, 44, 0.3);
        border-color: #E06A4A;
    }
    .status {
        background: rgba(0, 0, 0, 0.4);
        border-color: rgba(200, 200, 220, 0.2);
    }
    .btn-secondary {
        background: rgba(40, 44, 55, 0.8);
        color: #eef2fc;
    }
    canvas { box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6); }
    .board-wrapper, .side-panel, .ctrl-group, .buttons-group {
        border: none; outline: none;
    }
}

@media (min-width: 1025px) {
    .game-container { flex-wrap: nowrap; align-items: stretch; }
    .side-panel {
        flex: 0 0 160px; flex-direction: column;
        justify-content: space-between; gap: 14px; padding: 12px 8px;
    }
    .side-panel > * { width: 100%; }
    .level-selector-compact { flex-direction: column; align-items: stretch; gap: 8px; }
    .level-stars { justify-content: center; }
    .players-dual { flex-direction: column; gap: 10px; }
    .player { width: 100%; justify-content: flex-start; }
    .buttons-group { flex-direction: column; gap: 10px; }
    .btn { width: 100%; }
}
@media (max-width: 1024px) {
    .game-container { flex-direction: column; align-items: center; gap: 20px; }
    .board-wrapper, .side-panel { width: 100%; max-width: 620px; }
    .side-panel { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 12px; }
}
@media (max-width: 550px) {
    .players-dual { flex-wrap: wrap; }
    .btn { padding: 6px 10px; font-size: 0.7rem; }
}
</style>

<script>
(function() {
    var BOARD_SIZE = 15;
    var currentPlayer = 1;
    var board = Array(BOARD_SIZE).fill().map(function() { return Array(BOARD_SIZE).fill(0); });
    var gameOver = false;
    var aiLevel = 5;
    var history = [];
    var isThinking = false;
    var winLineInfo = null;
    var lastMovePos = null;
    var currentTheme = "classic";

    var canvas = document.getElementById('gomokuCanvas');
    var ctx = canvas.getContext('2d');
    var levelSelect = document.getElementById('levelSelect');
    var levelStars = document.getElementById('levelStars');
    var playerBlackDiv = document.getElementById('playerBlack');
    var playerWhiteDiv = document.getElementById('playerWhite');
    var restartBtn = document.getElementById('restartBtn');
    var undoBtn = document.getElementById('undoBtn');
    var statusTextDiv = document.getElementById('5_statusText');
    var modalOverlay = document.getElementById('modalOverlay');
    var modalIcon = document.getElementById('modalIcon');
    var modalTitle = document.getElementById('modalTitle');
    var modalMessage = document.getElementById('modalMessage');
    var modalBtn = document.getElementById('modalBtn');
    var themeSelect = document.getElementById('themeSelect');

    var cellSize = 0, padding = 0, boardWidth = 0, boardHeight = 0;
    var previewRow = -1, previewCol = -1;

    var LEVEL_NAMES = {1:'初学',2:'入门',3:'初级',4:'业余',5:'中级',6:'进阶',7:'高手',8:'高段',9:'强手',10:'大师'};
    var themes = {
        classic: { bgColor: "#FCF3E0", gridColor: "#BD8A5A", starOuter: "#DB9A60", starInner: "#F5C28E" },
        jade: { bgColor: "#E6F0E3", gridColor: "#5F8B6F", starOuter: "#8BBF8F", starInner: "#C5E0B4" },
        ink: { bgColor: "#F2EFE9", gridColor: "#6E5C4B", starOuter: "#B7A17A", starInner: "#E1CFB0" }
    };

    function updateLevelStars() {
        var starsHtml = '';
        for (var i = 1; i <= 10; i++) {
            starsHtml += '<svg class="star ' + (i <= aiLevel ? 'filled' : '') + '" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
        }
        levelStars.innerHTML = starsHtml;
    }

    function resizeCanvasAndDraw() {
        var container = canvas.parentElement;
        var maxSize = Math.min(container.clientWidth - 10, window.innerWidth * 0.85, 660);
        maxSize = Math.max(360, maxSize);
        canvas.width = maxSize;
        canvas.height = maxSize;
        boardWidth = canvas.width;
        boardHeight = canvas.height;
        cellSize = boardWidth / BOARD_SIZE;
        padding = cellSize / 2;
        drawFullBoard();
    }

    function drawGridAndStars() {
        var theme = themes[currentTheme];
        ctx.save();
        ctx.strokeStyle = theme.gridColor;
        ctx.lineWidth = 1.8;
        for (var i = 0; i < BOARD_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(padding, padding + i * cellSize);
            ctx.lineTo(boardWidth - padding, padding + i * cellSize);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(padding + i * cellSize, padding);
            ctx.lineTo(padding + i * cellSize, boardHeight - padding);
            ctx.stroke();
        }
        var stars = [[3,3],[3,11],[7,7],[11,3],[11,11]];
        stars.forEach(function(pair) {
            var x = pair[0], y = pair[1];
            ctx.beginPath();
            ctx.arc(padding + x * cellSize, padding + y * cellSize, cellSize * 0.11, 0, 2*Math.PI);
            ctx.fillStyle = theme.starOuter;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(padding + x * cellSize, padding + y * cellSize, cellSize * 0.07, 0, 2*Math.PI);
            ctx.fillStyle = theme.starInner;
            ctx.fill();
        });
        ctx.restore();
    }

    function drawPiece(row, col, player, alpha) {
        if (typeof alpha === 'undefined') alpha = 1.0;
        var cx = padding + col * cellSize;
        var cy = padding + row * cellSize;
        var radius = cellSize * 0.4;
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, 2*Math.PI);
        if (player === 1) {
            var grad = ctx.createRadialGradient(cx - radius*0.2, cy - radius*0.2, radius*0.2, cx, cy, radius);
            grad.addColorStop(0, '#4a4a4a');
            grad.addColorStop(0.7, '#111');
            grad.addColorStop(1, '#000');
            ctx.fillStyle = grad;
        } else {
            var grad2 = ctx.createRadialGradient(cx - radius*0.2, cy - radius*0.2, radius*0.2, cx, cy, radius);
            grad2.addColorStop(0, '#ffffff');
            grad2.addColorStop(0.5, '#f0f3fc');
            grad2.addColorStop(1, '#d8dfef');
            ctx.fillStyle = grad2;
        }
        ctx.globalAlpha = alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(cx - radius*0.18, cy - radius*0.18, radius*0.18, 0, 2*Math.PI);
        ctx.fillStyle = player === 1 ? '#a5a5a5' : '#ffffffcc';
        ctx.fill();
        if (lastMovePos && lastMovePos.row === row && lastMovePos.col === col && !winLineInfo) {
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.28, 0, 2*Math.PI);
            ctx.fillStyle = '#E05A3A';
            ctx.fill();
        }
        ctx.restore();
    }

    function drawAllPieces() {
        for (var i = 0; i < BOARD_SIZE; i++)
            for (var j = 0; j < BOARD_SIZE; j++)
                if (board[i][j] !== 0) drawPiece(i, j, board[i][j], 1);
    }

    function drawWinLine(start, end) {
        var startX = padding + start.col * cellSize;
        var startY = padding + start.row * cellSize;
        var endX = padding + end.col * cellSize;
        var endY = padding + end.row * cellSize;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = '#E63946';
        ctx.lineWidth = Math.max(3, cellSize * 0.12);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = '#FFD966';
        ctx.lineWidth = Math.max(1.8, cellSize * 0.06);
        ctx.stroke();
        ctx.restore();
    }

    function drawFullBoard() {
        if (!ctx) return;
        ctx.clearRect(0, 0, boardWidth, boardHeight);
        var theme = themes[currentTheme];
        ctx.fillStyle = theme.bgColor;
        ctx.fillRect(0, 0, boardWidth, boardHeight);
        drawGridAndStars();
        drawAllPieces();
        if (winLineInfo) drawWinLine(winLineInfo.start, winLineInfo.end);
        if (previewRow >= 0 && previewCol >= 0 && !gameOver && currentPlayer === 1 && board[previewRow][previewCol] === 0) {
            drawPiece(previewRow, previewCol, currentPlayer, 0.45);
        }
    }

    function checkWinPosition(row, col, playerVal) {
        var dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (var d = 0; d < dirs.length; d++) {
            var dr = dirs[d][0], dc = dirs[d][1];
            var count = 1;
            var start = { row: row, col: col };
            var end = { row: row, col: col };
            for (var step = 1; step <= 5; step++) {
                var nr = row + dr*step, nc = col + dc*step;
                if (nr<0 || nr>=BOARD_SIZE || nc<0 || nc>=BOARD_SIZE || board[nr][nc] !== playerVal) break;
                count++; end = { row: nr, col: nc };
            }
            for (step = 1; step <= 5; step++) {
                nr = row - dr*step; nc = col - dc*step;
                if (nr<0 || nr>=BOARD_SIZE || nc<0 || nc>=BOARD_SIZE || board[nr][nc] !== playerVal) break;
                count++; start = { row: nr, col: nc };
            }
            if (count >= 5) return { start: start, end: end };
        }
        return null;
    }

    function placePiece(row, col, player) {
        if (gameOver || board[row][col] !== 0) return false;
        board[row][col] = player;
        history.push({ row: row, col: col, player: player });
        lastMovePos = { row: row, col: col };
        drawFullBoard();
        var win = checkWinPosition(row, col, player);
        if (win) {
            gameOver = true;
            winLineInfo = win;
            drawFullBoard();
            setTimeout(function() { showResult(player); }, 380);
            return true;
        }
        var full = true;
        for (var i=0; i<BOARD_SIZE && full; i++)
            for (var j=0; j<BOARD_SIZE; j++)
                if (board[i][j]===0) { full=false; break; }
        if (full) {
            gameOver = true;
            setTimeout(function() { showResult(0); }, 280);
            return true;
        }
        currentPlayer = (player === 1 ? 2 : 1);
        updateUI();
        drawFullBoard();
        undoBtn.disabled = history.length === 0;
        return true;
    }

    function showResult(winner) {
        modalOverlay.classList.add('show');
        if (winner === 0) {
            modalIcon.textContent = '🤝'; modalTitle.textContent = '平局'; modalTitle.className = 'modal-title';
            modalMessage.textContent = '势均力敌！';
        } else if (winner === 1) {
            modalIcon.textContent = '🏆'; modalTitle.textContent = '胜利！'; modalTitle.className = 'modal-title win';
            modalMessage.textContent = '击败 ' + LEVEL_NAMES[aiLevel] + ' 级 AI，棋力非凡！';
        } else {
            modalIcon.textContent = '🧠'; modalTitle.textContent = '惜败'; modalTitle.className = 'modal-title lose';
            modalMessage.textContent = 'AI (' + LEVEL_NAMES[aiLevel] + ') 获胜，再接再厉！';
        }
    }

    function findWinningMove(player) {
        for (var i=0; i<BOARD_SIZE; i++)
            for (var j=0; j<BOARD_SIZE; j++)
                if (board[i][j]===0) {
                    board[i][j]=player;
                    var win = checkWinPosition(i,j,player);
                    board[i][j]=0;
                    if(win) return {row:i, col:j};
                }
        return null;
    }

    function hasNeighbor(r, c) {
        for (var dr=-2; dr<=2; dr++)
            for (var dc=-2; dc<=2; dc++) {
                var nr=r+dr, nc=c+dc;
                if (nr>=0 && nr<BOARD_SIZE && nc>=0 && nc<BOARD_SIZE && board[nr][nc]!==0) return true;
            }
        return false;
    }

    function getEmptyNearby() {
        var arr=[];
        for (var i=0; i<BOARD_SIZE; i++)
            for (var j=0; j<BOARD_SIZE; j++)
                if (board[i][j]===0 && hasNeighbor(i,j)) arr.push({row:i, col:j});
        if (arr.length===0)
            for (i=0; i<BOARD_SIZE; i++)
                for (j=0; j<BOARD_SIZE; j++)
                    if (board[i][j]===0) arr.push({row:i, col:j});
        return arr;
    }

    function evaluateDir(row, col, player) {
        var score=0;
        var dirs=[[0,1],[1,0],[1,1],[1,-1]];
        for (var d=0; d<dirs.length; d++) {
            var dr=dirs[d][0], dc=dirs[d][1];
            var cnt=1, free=0;
            for (var step=1; step<=4; step++) {
                var nr=row+dr*step, nc=col+dc*step;
                if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE) break;
                if (board[nr][nc]===player) cnt++;
                else if (board[nr][nc]===0) { free++; break; }
                else break;
            }
            for (step=1; step<=4; step++) {
                nr=row-dr*step; nc=col-dc*step;
                if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE) break;
                if (board[nr][nc]===player) cnt++;
                else if (board[nr][nc]===0) { free++; break; }
                else break;
            }
            if (cnt>=5) score+=120000;
            else if (cnt===4 && free>=1) score+=30000;
            else if (cnt===3 && free===2) score+=4000;
            else if (cnt===3 && free>=1) score+=800;
            else if (cnt===2 && free>=1) score+=60;
        }
        return score;
    }

    function getBestHeuristic() {
        var best=null, bestScore=-1;
        var candidates=getEmptyNearby();
        for (var i=0; i<candidates.length; i++) {
            var mv=candidates[i];
            var aiS=evaluateDir(mv.row, mv.col, 2);
            var defS=evaluateDir(mv.row, mv.col, 1);
            var score= aiS*0.7 + defS*0.3 + Math.random()*0.08;
            if (score>bestScore) { bestScore=score; best=mv; }
        }
        return best;
    }

    function aiMove() {
        if (gameOver || currentPlayer!==2 || isThinking) return;
        isThinking=true;
        updateUI();
        setTimeout(function() {
            var move=null;
            var win=findWinningMove(2);
            if (win) move=win;
            else { var block=findWinningMove(1); if (block) move=block; }
            if (!move) {
                if (aiLevel<=2) {
                    var arr=getEmptyNearby();
                    if (arr.length) move=arr[Math.floor(Math.random()*arr.length)];
                } else if (aiLevel<=4) {
                    move=getBestHeuristic();
                } else {
                    var candidates=getEmptyNearby();
                    var best=null, bestVal=-Infinity;
                    for (var i=0; i<candidates.length; i++) {
                        var mv=candidates[i];
                        var score= evaluateDir(mv.row, mv.col, 2)*0.65 + evaluateDir(mv.row, mv.col, 1)*0.35;
                        score += (Math.random() * (aiLevel/30));
                        if (score>bestVal) { bestVal=score; best=mv; }
                    }
                    move=best;
                }
            }
            if (move && board[move.row][move.col]===0) placePiece(move.row, move.col, 2);
            isThinking=false;
            updateUI();
            drawFullBoard();
        }, 70);
    }

    function undoMove() {
        if (isThinking || gameOver) return;
        if (history.length>=2 && currentPlayer===1) {
            for (var i=0; i<2; i++) {
                var last=history.pop();
                if (last) board[last.row][last.col]=0;
            }
            currentPlayer=1; gameOver=false; winLineInfo=null;
            lastMovePos=history.length ? history[history.length-1] : null;
            drawFullBoard(); updateUI();
        } else if (history.length>=1 && currentPlayer===2) {
            var last=history.pop();
            if (last) board[last.row][last.col]=0;
            currentPlayer=1; gameOver=false; winLineInfo=null;
            lastMovePos=history.length ? history[history.length-1] : null;
            drawFullBoard(); updateUI();
        }
        undoBtn.disabled=history.length===0;
    }

    function resetGame() {
        board = Array(BOARD_SIZE).fill().map(function(){ return Array(BOARD_SIZE).fill(0); });
        currentPlayer = 1; gameOver = false; history = []; isThinking = false;
        winLineInfo = null; lastMovePos = null;
        previewRow = previewCol = -1;
        updateUI(); drawFullBoard(); modalOverlay.classList.remove('show');
        if (currentPlayer===2 && !gameOver) aiMove();
    }

    function updateUI() {
        playerBlackDiv.classList.toggle('active', currentPlayer===1 && !gameOver);
        playerWhiteDiv.classList.toggle('active', currentPlayer===2 && !gameOver);
        if (gameOver) statusTextDiv.innerHTML = '🏁 终局';
        else if (currentPlayer===1) statusTextDiv.innerHTML = '⚫ 轮到你落子';
        else statusTextDiv.innerHTML = '<span class="thinking">🤖 AI 思考中<span class="thinking-dots"></span></span>';
        undoBtn.disabled = history.length===0 || isThinking || gameOver;
    }

    function setTheme(themeKey) { currentTheme = themeKey; drawFullBoard(); }

    function getGridFromXY(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        var cx = (clientX - rect.left) * scaleX, cy = (clientY - rect.top) * scaleY;
        if (cx<0 || cx>boardWidth || cy<0 || cy>boardHeight) return null;
        var col = Math.round((cx - padding) / cellSize), row = Math.round((cy - padding) / cellSize);
        if (row>=0 && row<BOARD_SIZE && col>=0 && col<BOARD_SIZE) return {row:row, col:col};
        return null;
    }

    function onCanvasClick(e) {
        if (gameOver || isThinking || currentPlayer!==1) return;
        var coord = getGridFromXY(e.clientX, e.clientY);
        if (coord && board[coord.row][coord.col]===0) {
            placePiece(coord.row, coord.col, 1);
            if (!gameOver && currentPlayer===2) aiMove();
        }
    }

    function onCanvasMove(e) {
        if (gameOver || isThinking || currentPlayer!==1) {
            if (previewRow!==-1) { previewRow=-1; drawFullBoard(); }
            return;
        }
        var coord = getGridFromXY(e.clientX, e.clientY);
        if (coord && board[coord.row][coord.col]===0 && (previewRow!==coord.row || previewCol!==coord.col)) {
            previewRow=coord.row; previewCol=coord.col; drawFullBoard();
        } else if (!coord && previewRow!==-1) { previewRow=-1; drawFullBoard(); }
    }

    function onCanvasLeave() { if (previewRow!==-1) { previewRow=-1; drawFullBoard(); } }

    window.addEventListener('resize', function() { resizeCanvasAndDraw(); });
    restartBtn.addEventListener('click', function() { resetGame(); if (currentPlayer===2 && !gameOver) aiMove(); });
    undoBtn.addEventListener('click', undoMove);
    levelSelect.addEventListener('change', function(e) { aiLevel = parseInt(e.target.value); updateLevelStars(); });
    themeSelect.addEventListener('change', function(e) { setTheme(e.target.value); });
    modalBtn.addEventListener('click', function() { modalOverlay.classList.remove('show'); resetGame(); if (currentPlayer===2 && !gameOver) aiMove(); });

    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('mousemove', onCanvasMove);
    canvas.addEventListener('mouseleave', onCanvasLeave);
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); var t=e.touches[0]; onCanvasClick(t); });
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); var t=e.touches[0]; onCanvasMove(t); });
    canvas.addEventListener('touchend', function() { previewRow=-1; drawFullBoard(); });

    resizeCanvasAndDraw();
    updateLevelStars();
    resetGame();

    // 通知 sevencolor.js 数据已加载
    if (typeof onDataLoaded !== 'undefined' && onDataLoaded) {
        onDataLoaded([]);
    }
})();
</script>
