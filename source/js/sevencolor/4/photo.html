---
layout: false
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美图盲盒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .picsum-embedded { width: 100%; }
        .art-card { padding: 0 0 0.3rem 0; border-radius: 0.6rem; overflow: hidden; }
        .image-stage { position: relative; width: 100%; min-height: 280px; display: flex; align-items: center; justify-content: center; }
        .dynamic-img { display: block; width: 100%; height: auto; border-radius: 0.6rem; opacity: 0; transition: opacity 0.3s; }
        .dynamic-img.loaded { opacity: 1; }
        .img-placeholder { position: absolute; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .hidden-placeholder { display: none; }
        .btn-lucky { display: block; width: fit-content; margin: 1rem auto; padding: 0.8rem 2rem; font-size: 1rem; border: none; border-radius: 2rem; cursor: pointer; }
        .credit { text-align: center; font-size: 0.7rem; margin-top: 0.5rem; opacity: 0.6; }
    </style>
</head>
<body style="background: transparent; margin: 0; padding: 0;">
<div class="picsum-embedded">
    <div class="art-card">
        <div class="image-stage">
            <img id="picsumImg" class="dynamic-img" alt="Random">
            <div id="placeholder" class="img-placeholder">✨ 图片加载中...</div>
        </div>
        <button id="refreshBtn" class="btn-lucky">🎲 再试一次</button>
        <div class="credit">🌄 图片源于 Lorem Picsum</div>
    </div>
</div>

<script>
(function() {
    // 在脚本所在容器中查找元素
    const root = document.currentScript ? document.currentScript.parentNode : document;
    const img = root.querySelector('.dynamic-img');
    const placeholder = root.querySelector('.img-placeholder');
    const btn = root.querySelector('.btn-lucky');

    function loadRandom() {
        img.classList.remove('loaded');
        placeholder.classList.remove('hidden-placeholder');
        img.src = 'https://picsum.photos/800/600?random=' + Date.now();
        img.onload = function() {
            img.classList.add('loaded');
            placeholder.classList.add('hidden-placeholder');
        };
        img.onerror = function() {
            placeholder.textContent = '✨ 图片加载失败';
        };
    }

    btn.addEventListener('click', loadRandom);
    loadRandom();
})();
</script>
</body>
</html>
