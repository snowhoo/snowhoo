<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 仅保留下拉框基础样式 */
        .idea-select {
flex:2;min-width:100px;
cursor:pointer;
padding:7px 10px;
border:1px solid var(--border);
border-radius:6px;
background:transparent;
color:var(--text-primary);
font-size:13px
        }
        /* 宿主容器无样式，由内部页面决定 */
        .idea-host {
            width: 100%;
           /* min-height: 80vh; */
        }
    </style>
</head>
<body>

<select class="idea-select"></select>
<div class="idea-host"></div>

<script>
    // ========== 配置：下拉选项及对应的 HTML 文件路径 ==========
    const pages = {
        "美图盲盒": "/js/sevencolor/4/photo.html",
        "五子连珠": "/js/sevencolor/4/five.html"
        // 请根据实际文件路径修改
    };
    // =====================================================

    const selectEl = document.querySelector('.idea-select');
    const host = document.querySelector('.idea-host');

    // 动态生成下拉选项
    function buildSelect() {
        const keys = Object.keys(pages);
        if (keys.length === 0) {
            selectEl.innerHTML = '<option disabled>—— 请配置文件映射 ——</option>';
            return;
        }
        let options = '';
        keys.forEach(key => {
            options += `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`;
        });
        selectEl.innerHTML = options;
        // 默认加载第一个
        selectEl.value = keys[0];
        loadPageIntoIframe(pages[keys[0]]);
    }

    // 将 HTML 文件通过 iframe 嵌入（样式完全隔离）
    function loadPageIntoIframe(filePath) {
        // 清除旧内容
        while (host.firstChild) {
            host.removeChild(host.firstChild);
        }
        // 创建 iframe
        const iframe = document.createElement('iframe');
        iframe.style.border = 'none';
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.background = 'transparent';
        host.appendChild(iframe);

        // 设置 iframe 的 sandbox（如果需要更严格的隔离可以添加更多属性）
        iframe.sandbox = 'allow-scripts allow-same-origin';

        // 等 iframe 加载完成后设置 basePath
        iframe.onload = function() {
            try {
                // 设置 __SC_BASE_PATH 和 __SC_ID
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframe.contentWindow.__SC_BASE_PATH = filePath.substring(0, filePath.lastIndexOf('/') + 1);
                iframe.contentWindow.__SC_ID = 'idea';
            } catch(e) {
                console.warn('无法设置iframe上下文:', e);
            }
        };

        // 直接设置 src
        iframe.src = filePath;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    selectEl.addEventListener('change', (e) => {
        const filePath = pages[e.target.value];
        if (filePath) loadPageIntoIframe(filePath);
    });

    buildSelect();
</script>
</body>
</html>
