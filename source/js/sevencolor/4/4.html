---
layout: false
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        .idea-select {
            flex: 2;
            min-width: 100px;
            cursor: pointer;
            padding: 7px 10px;
            border: 1px solid var(--border, #333);
            border-radius: 6px;
            background: transparent;
            color: var(--text-primary, #e8e8e8);
            font-size: 13px;
        }
        .idea-host {
            width: 100%;
        }
    </style>
</head>
<body>

<select class="idea-select"></select>
<div class="idea-host"></div>

<script>
    const pages = {
        "美图盲盒": "/js/sevencolor/4/photo.html",
        "五子连珠": "/js/sevencolor/4/five.html"
    };

    const selectEl = document.querySelector('.idea-select');
    const host = document.querySelector('.idea-host');

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    async function loadPage(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            let html = await response.text();

            // 提取head中的style
            const headStyles = [];
            html = html.replace(/<head[^>]*>([\s\S]*?)<\/head>\s*/gi, function(match, headContent) {
                const s = headContent.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
                if (s) headStyles.push(...s);
                return '';
            });

            // 去掉Hexo front matter和外层框架
            html = html.replace(/^---[\s\S]*?---\s*/i, '');
            html = html.replace(/<!DOCTYPE[^>]*>\s*/gi, '');
            html = html.replace(/<html[^>]*>/gi, '');
            html = html.replace(/<\/html>\s*/gi, '');
            html = html.replace(/<body/gi, '<div');
            html = html.replace(/<\/body>/gi, '</div>');

            // 提取脚本
            const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/i);
            const scriptContent = scriptMatch ? scriptMatch[1] : '';
            html = html.replace(/<script[\s\S]*?<\/script>/gi, '');

            // 解析并获取body内容
            const bodyContent = html.replace(/^<div[^>]*>/, '').replace(/<\/div>\s*$/, '');

            // 注入CSS
            if (headStyles.length > 0) {
                headStyles.forEach(styleTag => {
                    const contentMatch = styleTag.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
                    if (contentMatch) {
                        const style = document.createElement('style');
                        style.textContent = contentMatch[1];
                        document.head.appendChild(style);
                    }
                });
            }

            // 设置DOM
            host.innerHTML = bodyContent;

            // 执行脚本（在主文档上下文）
            if (scriptContent) {
                try {
                    const fn = new Function(scriptContent);
                    fn();
                } catch(e) {
                    console.warn('脚本执行失败:', e);
                }
            }

        } catch(e) {
            console.warn('加载失败:', e);
        }
    }

    function buildSelect() {
        const keys = Object.keys(pages);
        if (keys.length === 0) {
            selectEl.innerHTML = '<option disabled>—— 请配置文件 ——</option>';
            return;
        }
        let options = '';
        keys.forEach(key => {
            options += `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`;
        });
        selectEl.innerHTML = options;
        selectEl.value = keys[0];
        loadPage(pages[keys[0]]);
    }

    selectEl.addEventListener('change', (e) => {
        const url = pages[e.target.value];
        if (url) loadPage(url);
    });

    buildSelect();
</script>
</body>
</html>
