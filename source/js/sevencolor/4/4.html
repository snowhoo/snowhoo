<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 干净的下拉框样式 */
        .idea-select {
            flex: 2;
            min-width: 100px;
            cursor: pointer;
            padding: 7px 10px;
            border: 1px solid var(--border, #333);
            border-radius: 6px;
            background: transparent;
            color: var(--text-primary, #e8e8e8);
            font-size: 13px;
        }
        /* 宿主容器 */
        .idea-host {
            width: 100%;
        }
    </style>
</head>
<body>

<select class="idea-select"></select>
<div class="idea-host"></div>

<script>
    // ========== 配置：下拉选项及对应的 HTML 文件路径 ==========
    const pages = {
        "美图盲盒": "/js/sevencolor/4/photo.html",
        "五子连珠": "/js/sevencolor/4/five.html"
    };
    // =====================================================

    const selectEl = document.querySelector('.idea-select');
    const host = document.querySelector('.idea-host');

    // 转义HTML
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    // 加载子页面到Shadow DOM
    async function loadPageIntoShadow(filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            let html = await response.text();

            // 清除旧内容
            while (host.firstChild) {
                host.removeChild(host.firstChild);
            }

            // 创建Shadow DOM
            const shadowRoot = host.attachShadow({ mode: 'open' });

            // 解析HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // 迁移样式
            const styles = doc.head.querySelectorAll('style, link[rel="stylesheet"]');
            styles.forEach(style => {
                shadowRoot.appendChild(style.cloneNode(true));
            });

            // 迁移body内容
            const bodyContent = doc.body.innerHTML;
            shadowRoot.innerHTML = bodyContent;

            // 执行脚本
            const scripts = doc.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                    newScript.async = oldScript.async;
                    newScript.defer = oldScript.defer;
                } else {
                    newScript.textContent = oldScript.textContent;
                }
                shadowRoot.appendChild(newScript);
            });

        } catch(e) {
            console.warn('加载失败:', e);
        }
    }

    // 动态生成下拉选项
    function buildSelect() {
        const keys = Object.keys(pages);
        if (keys.length === 0) {
            selectEl.innerHTML = '<option disabled>—— 请配置文件 ——</option>';
            return;
        }
        let options = '';
        keys.forEach(key => {
            options += `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`;
        });
        selectEl.innerHTML = options;
        selectEl.value = keys[0];
        loadPageIntoShadow(pages[keys[0]]);
    }

    selectEl.addEventListener('change', (e) => {
        const url = pages[e.target.value];
        if (url) loadPageIntoShadow(url);
    });

    buildSelect();
</script>
</body>
</html>
