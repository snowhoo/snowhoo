<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* 仅保留下拉框基础样式 */
        .idea-select {
flex:2;min-width:100px;
cursor:pointer;
padding:7px 10px;
border:1px solid var(--border);
border-radius:6px;
background:transparent;
color:var(--text-primary);
font-size:13px
        }
        /* 宿主容器无样式，由内部页面决定 */
        .idea-host {
            width: 100%;
           /* min-height: 80vh; */
        }
    </style>
</head>
<body>

<select class="idea-select"></select>
<div class="idea-host"></div>

<script>
    // ========== 配置：下拉选项及对应的 HTML 文件路径 ==========
    const pages = {
        "美图盲盒": "/js/sevencolor/4/photo.html",
        "五子连珠": "/js/sevencolor/4/five.html"
        // 请根据实际文件路径修改
    };
    // =====================================================

    const selectEl = document.querySelector('.idea-select');
    const host = document.querySelector('.idea-host');

    // 动态生成下拉选项
    function buildSelect() {
        const keys = Object.keys(pages);
        if (keys.length === 0) {
            selectEl.innerHTML = '<option disabled>—— 请配置文件映射 ——</option>';
            return;
        }
        let options = '';
        keys.forEach(key => {
            options += `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`;
        });
        selectEl.innerHTML = options;
        // 默认加载第一个
        selectEl.value = keys[0];
        loadPageIntoIframe(pages[keys[0]]);
    }

    // 将 HTML 文件内容加载到 Shadow DOM 中（样式隔离）
    async function loadPageIntoShadow(filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            let html = await response.text();

            // 清除旧的 Shadow DOM
            if (host.shadowRoot) {
                // Shadow DOM 已存在，不能重新 attach，只能清空内容
                while (host.shadowRoot.firstChild) {
                    host.shadowRoot.removeChild(host.shadowRoot.firstChild);
                }
            } else {
                // 首次创建 Shadow DOM
                // 清除所有子节点
                while (host.firstChild) {
                    host.removeChild(host.firstChild);
                }
                // 创建 Shadow Root（mode: 'open' 便于调试，但不影响隔离）
                host.attachShadow({ mode: 'open' });
            }
            const shadowRoot = host.shadowRoot;

            // 处理 HTML：提取 style 并修改 CSS 选择器，防止泄露
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // 处理 style 标签，给 CSS 添加 :host 限定
            const styles = doc.querySelectorAll('style');
            styles.forEach(style => {
              let css = style.textContent;
              // 给 CSS 添加 :host 限定，确保只影响 Shadow DOM 内部
              css = css.replace(/([^{}]+)(\{[^}]*\})/g, function(match, selector, body) {
                if (selector.trim().startsWith('@')) {
                  return match; // 跳过@rules
                }
                // body/html 选择器特殊处理
                if (/^(body|html)/i.test(selector.trim())) {
                  return ':host' + body;
                }
                return ':host ' + selector.trim() + body;
              });
              style.textContent = css;
            });

            // 将处理后的内容注入 Shadow DOM
            shadowRoot.innerHTML = doc.documentElement.innerHTML;

            // 处理脚本：在 Shadow DOM 上下文中执行
            const scripts = shadowRoot.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    // 外部脚本：创建新脚本并加载
                    newScript.src = oldScript.src;
                    newScript.async = oldScript.async;
                    newScript.defer = oldScript.defer;
                } else {
                    // 内联脚本：在 Shadow DOM 上下文中执行
                    let scriptContent = oldScript.textContent;
                    const basePath = filePath.substring(0, filePath.lastIndexOf('/') + 1);
                    // 创建闭包，传入shadowRoot作为document上下文
                    const wrappedScript = `
                        (function(doc, basePath) {
                            // 替换document为shadowRoot
                            var document = doc;
                            window.__SC_BASE_PATH = basePath;
                            window.__SC_ID = 'idea';
                            ${scriptContent}
                        })(arguments[0], arguments[1]);
                    `;
                    newScript.textContent = wrappedScript;
                    // 使用Function构造函数传入shadowRoot
                    const fn = new Function('shadowRoot', 'basePath', wrappedScript);
                    fn(shadowRoot, basePath);
                    // 不再追加到shadowRoot（因为已经执行过了）
                    return;
                }
                shadowRoot.appendChild(newScript);
                oldScript.remove();
            });

        } catch (err) {
            console.error('加载失败:', err);
            shadowRoot.innerHTML = `<div style="color:red; padding:1rem;">加载失败: ${err.message}</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    selectEl.addEventListener('change', (e) => {
        const filePath = pages[e.target.value];
        if (filePath) loadPageIntoShadow(filePath);
    });

    buildSelect();
</script>
</body>
</html>
