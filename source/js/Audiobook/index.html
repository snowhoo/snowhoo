<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懒人听书 - 免费有声小说在线收听</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-headphones-alt"></i>
                <span>懒人听书</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索书名、作者...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-actions">
                <button class="btn-link" id="toHomeBtn"><i class="fas fa-home"></i> 首页</button>
                <button class="btn-link" id="historyBtn"><i class="fas fa-history"></i> 播放历史</button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 左侧分类栏 -->
        <aside class="sidebar" id="sidebar">
            <h3><i class="fas fa-list"></i> 分类</h3>
            <ul class="category-list" id="categoryList">
                <li class="active" data-type="0">全部</li>
                <li data-type="1">玄幻奇幻</li>
                <li data-type="2">武侠仙侠</li>
                <li data-type="3">都市言情</li>
                <li data-type="4">穿越架空</li>
                <li data-type="5">悬疑推理</li>
                <li data-type="6">恐怖灵异</li>
                <li data-type="7">军事历史</li>
                <li data-type="8">科幻未来</li>
                <li data-type="9">儿童读物</li>
                <li data-type="10">相声评书</li>
                <li data-type="11">其他分类</li>
            </ul>
        </aside>

        <!-- 中央内容区 -->
        <section class="content-area">
            <!-- 首页视图 -->
            <div class="view" id="homeView">
                <div class="view-header">
                    <h2><i class="fas fa-fire"></i> 热门推荐</h2>
                </div>
                <div class="book-grid" id="hotBooks">
                    <!-- 热门书籍将通过JS动态加载 -->
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
                </div>

                <div class="view-header" style="margin-top: 30px;">
                    <h2><i class="fas fa-clock"></i> 最新上架</h2>
                </div>
                <div class="book-grid" id="newBooks">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
                </div>
            </div>

            <!-- 搜索结果视图 -->
            <div class="view" id="searchView" style="display: none;">
                <div class="view-header">
                    <h2><i class="fas fa-search"></i> 搜索结果</h2>
                    <span class="result-count" id="searchCount"></span>
                </div>
                <div class="book-grid" id="searchResults">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> 搜索中...</div>
                </div>
            </div>

            <!-- 书籍详情视图 -->
            <div class="view" id="bookDetailView" style="display: none;">
                <div class="book-detail" id="bookDetail">
                    <!-- 书籍详情将通过JS动态加载 -->
                </div>
            </div>

            <!-- 播放历史视图 -->
            <div class="view" id="historyView" style="display: none;">
                <div class="view-header">
                    <h2><i class="fas fa-history"></i> 播放历史</h2>
                </div>
                <div class="book-grid" id="historyBooks">
                    <div class="empty-tip" id="emptyHistory"><i class="fas fa-inbox"></i> 暂无播放记录</div>
                </div>
            </div>
        </section>

        <!-- 右侧边栏 -->
        <aside class="right-sidebar">
            <h3><i class="fas fa-play-circle"></i> 最近播放</h3>
            <ul class="recent-list" id="recentList">
                <li class="empty-tip"><i class="fas fa-inbox"></i> 暂无播放记录</li>
            </ul>

            <div class="source-switch">
                <h3><i class="fas fa-exchange-alt"></i> 切换源</h3>
                <select id="sourceSelect">
                    <option value="lanren">懒人听书</option>
                    <option value="ximalaya" disabled>喜马拉雅 (敬请期待)</option>
                    <option value="other" disabled>其他源 (敬请期待)</option>
                </select>
            </div>
        </aside>
    </main>

    <!-- 底部播放器 -->
    <div class="player" id="player">
        <div class="player-content">
            <!-- 封面和信息 -->
            <div class="player-info">
                <div class="player-cover" id="playerCover">
                    <img src="https://via.placeholder.com/60/667eea/ffffff?text=听" alt="封面">
                </div>
                <div class="player-text">
                    <div class="player-title" id="playerTitle">未播放</div>
                    <div class="player-author" id="playerAuthor">--</div>
                </div>
            </div>

            <!-- 播放控制 -->
            <div class="player-controls">
                <div class="control-buttons">
                    <button class="btn-control" id="prevBtn" title="上一章"><i class="fas fa-step-backward"></i></button>
                    <button class="btn-control btn-play" id="playBtn" title="播放/暂停"><i class="fas fa-play"></i></button>
                    <button class="btn-control" id="nextBtn" title="下一章"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="progress-area">
                    <span class="time-current" id="currentTime">00:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-loaded" id="progressLoaded"></div>
                        <div class="progress-current" id="progressCurrent"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                    <span class="time-total" id="totalTime">00:00</span>
                </div>
            </div>

            <!-- 扩展控制 -->
            <div class="player-extend">
                <div class="volume-control">
                    <button class="btn-control" id="volumeBtn"><i class="fas fa-volume-up"></i></button>
                    <div class="volume-bar" id="volumeBar">
                        <div class="volume-current" id="volumeCurrent"></div>
                    </div>
                </div>
                <div class="speed-control">
                    <button class="btn-control" id="speedBtn" title="播放倍速">1.0x</button>
                    <div class="speed-menu" id="speedMenu">
                        <span data-speed="0.5">0.5x</span>
                        <span data-speed="0.75">0.75x</span>
                        <span data-speed="1.0" class="active">1.0x</span>
                        <span data-speed="1.25">1.25x</span>
                        <span data-speed="1.5">1.5x</span>
                        <span data-speed="2.0">2.0x</span>
                    </div>
                </div>
                <button class="btn-control" id="listBtn" title="章节列表"><i class="fas fa-list"></i></button>
                <button class="btn-control" id="favoriteBtn" title="收藏"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <!-- 章节列表弹窗 -->
        <div class="chapter-popup" id="chapterPopup">
            <div class="chapter-header">
                <h3>章节列表</h3>
                <button class="btn-close" id="closeChapterBtn"><i class="fas fa-times"></i></button>
            </div>
            <ul class="chapter-list" id="chapterList">
                <!-- 章节将通过JS动态加载 -->
            </ul>
        </div>
    </div>

    <!-- 音频播放器 -->
    <audio id="audioPlayer" preload="metadata"></audio>

    <!-- 提示消息 -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="js/api.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
