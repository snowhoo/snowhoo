<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title></title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#player-wrap *{box-sizing:border-box}
#player-wrap{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;color:var(--text-primary);max-width:1200px;margin:0 auto;line-height:1.5;font-size:14px;transition:color .3s;position:relative}
:root{--bg-page:#0f0f0f;--bg-card:#1a1a2e;--bg-card-hover:#1e1e38;--bg-eplist:#111;--bg-eplist-alt:#161616;--bg-player:#000;--bg-toolbar:#16213e;--bg-input:#1a1a2e;--text-primary:#e8e8e8;--text-secondary:#90a4ae;--text-muted:#607d8b;--border:#333;--accent:#ff6b35;--accent-hover:#e85d2a;--badge-playable-bg:#2e7d32;--badge-playable-text:#fff;--badge-unplayable-bg:#616161;--badge-unplayable-text:#bdbdbd;--shadow:rgba(0,0,0,0.4);--card-radius:10px}
[data-theme="light"]{--bg-page:#f5f5f5;--bg-card:#fff;--bg-card-hover:#f0f0f5;--bg-eplist:#fafafa;--bg-eplist-alt:#f0f0f0;--bg-player:#000;--bg-toolbar:#e8e0f0;--bg-input:#fff;--text-primary:#212121;--text-secondary:#546e7a;--text-muted:#90a4ae;--border:#ddd;--accent:#e65100;--accent-hover:#d84315;--badge-playable-bg:#2e7d32;--badge-playable-text:#fff;--badge-unplayable-bg:#bdbdbd;--badge-unplayable-text:#757575;--shadow:rgba(0,0,0,0.1);--card-radius:10px}
#preload-progress-bar{width:100%;height:1px;background:transparent;margin:0;position:relative}
#preload-progress-fill{width:0%;height:100%;background:#aaa;transition:width .2s}
.toolbar{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input,.toolbar button{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-primary);font-size:13px}
.toolbar select{flex:2;min-width:100px;cursor:pointer}
.toolbar input{flex:2;min-width:120px}
.toolbar button{flex-shrink:0;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:500}
.toolbar button:hover{background:var(--accent-hover)}
.cat-bar{margin:0 8px 0 0;display:flex;align-items:center;gap:8px}
.cat-bar select{max-width:160px;min-width:80px;padding:7px 10px;background:transparent;color:var(--text-primary);border:1px solid var(--border);border-radius:6px;cursor:pointer}
.status-bar{padding:2px 0;margin:6px 0;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.status-bar .next-ep-btn{flex-shrink:0;padding:2px 10px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;display:none}
.status-bar .clear-search-btn{padding:2px 10px;background:#555;color:#fff;border:none;border-radius:4px;cursor:pointer}
.player-box{background:var(--bg-player);border-radius:10px;overflow:hidden;position:relative;height:0;transition:height .3s}
.player-box.playing{height:auto}
#player{width:100%;aspect-ratio:16/9;background:#000;display:block}
.float-player{position:fixed;bottom:20px;right:20px;width:320px;background:#1a1a2e;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:9999;overflow:hidden}
.float-player-header{display:flex;align-items:center;padding:8px 10px;background:#16213e;gap:8px}
.float-player-title{flex:1;font-size:13px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.float-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.float-close{color:#ff6b6b}
#floatVideo{width:100%;aspect-ratio:16/9;background:#000}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin:12px 0}
.video-card{background:var(--bg-card);border-radius:var(--card-radius);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--border);position:relative}
.video-card:hover{transform:translateY(-3px);box-shadow:0 4px 16px var(--shadow)}
.video-card .poster-wrap{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--bg-card)}
.video-card .poster{width:100%;height:100%;object-fit:cover}
.video-card .poster-fallback{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,var(--bg-card),var(--bg-toolbar));color:var(--text-muted);font-size:32px}
.card-badge{position:absolute;top:6px;right:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;backdrop-filter:blur(4px)}
.card-badge.playable{background:rgba(46,125,50,.85);color:#fff}
.card-badge.unplayable{background:rgba(97,97,97,.75);color:#bdbdbd}
.video-card .card-info{padding:8px 10px}
.video-card .card-title{font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.video-card .card-meta{font-size:11px;color:var(--text-secondary);margin-top:3px;display:flex;gap:6px}
.video-card .fav-btn{position:absolute;top:4px;width:28px;height:28px;border-radius:50%;background:transparent;color:#ff6b6b;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.video-card .card-fav{left:6px}
.video-card .card-delete{left:calc(6px + 28px + 6px);color:#f44}
.video-card .fav-btn.faved{color:#ff6b6b}
.video-card .progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,0.5)}
.video-card .progress-fill{height:100%;background:var(--accent)}
.video-card .bookmark-note{position:absolute;bottom:4px;left:4px;right:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-panel{display:none}
.ep-panel.open{display:block;background:var(--bg-eplist);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--card-radius) var(--card-radius);margin-top:-1px;max-height:320px;overflow-y:auto}
.ep-header{display:flex;justify-content:space-between;padding:6px 10px;font-size:11px;color:var(--text-muted);background:var(--bg-eplist-alt);border-bottom:1px solid var(--border);position:sticky;top:0}
.ep-item{cursor:pointer;padding:4px 10px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
.ep-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.ep-item.ep-current{color:var(--accent);font-weight:500}
.pagination{display:flex;gap:3px;justify-content:center;margin:12px 0}
.pagination button{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:12px;min-width:26px}
.pagination button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pagination button:disabled{opacity:0.5;cursor:default}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.tvbox-footer{text-align:center;padding:12px 0 6px;margin-top:12px;font-size:11px;color:var(--text-muted)}
@media(max-width:600px){.video-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}}
</style>
</head>
<body>
<div id="player-wrap">
<div class="toolbar">
  <select id="sourceSelect"></select>
  <input type="text" id="searchInput" placeholder="全局搜索影片...">
  <button id="searchBtn">搜索</button>
  <button id="stopSearchBtn" style="display:none">停止</button>
</div>
<div id="preload-progress-bar"><div id="preload-progress-fill"></div></div>
<div class="player-box"><video id="player" controls playsinline></video></div>
<div class="float-player" id="floatPlayer" style="display:none">
  <div class="float-player-header"><span class="float-player-title" id="floatPlayerTitle">正在播放</span><button class="float-btn" id="floatBackBtn">←</button><button class="float-btn float-close" id="floatCloseBtn">✖</button></div>
  <video id="floatVideo" playsinline></video>
</div>
<div id="status" class="status-bar">
  <div class="cat-bar" id="catBar"></div>
  <span id="statusText">[STOP] 选择一个数据源</span>
  <div style="display:flex; gap:6px"><button id="clearSearchResultBtn" class="clear-search-btn" style="display:none">清空</button><button id="bookmarkBtn" class="next-ep-btn" style="background:#4caf50">签</button><button id="nextEpBtn" class="next-ep-btn">下集</button></div>
</div>
<div id="content"></div>
<div class="pagination" id="pagination"></div>
<div class="tvbox-footer" id="tvboxFooter"></div>
</div>
<script>
// ----- 常量与存储辅助 -----
const STORAGE = { HISTORY:'tvbox_history', FAVORITES:'tvbox_favorites', BOOKMARKS:'tvbox_bookmarks', SEARCH:'tvbox_search_results' };
const PAGE_SIZE = 12, CONCURRENT = 10;
let sourceIndex=[], loadedSources={}, sourceMeta={}, currentPrefix='', currentFilePage=1, currentPage=1, currentFiltered=[], currentCategory='';
let currentSearchKeyword='', currentSearchResults=[], currentSearchCategory='', isSearching=false, searchVersion=0;
let currentPlayingVideo=null, currentPlayingEpIndex=0, currentOpenVideo=null, currentEpNext=null, currentHls=null, playerInFloat=false, floatReturn=null;
let categoryStatsLoading=false; // 防止重复统计
const $ = id => document.getElementById(id);
const escHtml = s => String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
const escAttr = s => String(s).replace(/[&"']/g, m => ({'&':'&amp;','"':'&quot;',"'":'&#39;'})[m]);
const setStatus = t => $('statusText').textContent = t;
const getStorage = key => { try{ return JSON.parse(localStorage.getItem(key))||(key===STORAGE.HISTORY?{}:[]); }catch(e){ return key===STORAGE.HISTORY?{}:[]; } };
const setStorage = (key,val) => localStorage.setItem(key,JSON.stringify(val));
const saveHistory = (key,val) => { let h=getStorage(STORAGE.HISTORY); h[key]=val; setStorage(STORAGE.HISTORY,h); };
const isFavorited = (k,n) => getStorage(STORAGE.FAVORITES).some(f=>f.sourceKey===k&&f.videoName===n);
const addFavorite = v => { if(isFavorited(v.sourceKey,v.vod_name)) return; let fav=getStorage(STORAGE.FAVORITES); fav.push({ videoName:v.vod_name, sourceKey:v.sourceKey, sourceName:v.sourceName, vodPic:v.vod_pic, ep_count:v.ep_count, playable_count:v.playable_count, episodes:v.episodes, vod_class:v.vod_class }); setStorage(STORAGE.FAVORITES,fav); };
const removeFavorite = (k,n) => setStorage(STORAGE.FAVORITES, getStorage(STORAGE.FAVORITES).filter(f=>!(f.sourceKey===k&&f.videoName===n)));
const getBookmarks = () => getStorage(STORAGE.BOOKMARKS);
const saveBookmarks = list => setStorage(STORAGE.BOOKMARKS,list);
const addBookmark = (video,epIdx,prog,note) => { let list=getBookmarks(); let epsCopy=video.episodes?video.episodes.map(e=>({title:e.title,url:e.url,playable:e.playable})):[]; list.unshift({ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||epsCopy.length, playable_count:video.playable_count||epsCopy.filter(e=>e.playable).length, episodes:epsCopy, epIndex:epIdx, epTitle:(video.episodes||[])[epIdx]?.title||'', epUrl:(video.episodes||[])[epIdx]?.url||'', progress:prog, note:note||'', createdAt:Date.now() }); saveBookmarks(list); };
const updateHistory = (video,epIdx,prog) => { let key=video.sourceKey+'_'+video.vod_name; let epsCopy=video.episodes?video.episodes.map(e=>({title:e.title,url:e.url,playable:e.playable})):[]; saveHistory(key,{ videoName:video.vod_name, sourceKey:video.sourceKey, sourceName:video.sourceName, vodPic:video.vod_pic, ep_count:video.ep_count||epsCopy.length, playable_count:video.playable_count||epsCopy.filter(e=>e.playable).length, episodes:epsCopy, epIndex:epIdx, epTitle:(video.episodes||[])[epIdx]?.title||'', epUrl:(video.episodes||[])[epIdx]?.url||'', progress:prog, updatedAt:Date.now() }); };
function findVideoInCache(sKey,vName){ for(let k in loadedSources){ let d=loadedSources[k]; if(d?.videos){ let f=d.videos.find(v=>v.vod_name===vName); if(f) return f; } } return null; }
function loadData(file,cb,to=3000){ let key=file==='index.js'?'_TVBOX_INDEX':'_TVBOX_SITE_DATA'; let s=document.createElement('script'); let t=setTimeout(()=>{ s.onload=s.onerror=null; s.remove(); cb(null); },to); s.onerror=()=>{ clearTimeout(t); cb(null); }; s.onload=()=>{ clearTimeout(t); let d=window[key]; delete window[key]; cb(d||null); }; let bp=(typeof window.__SC_BASE_PATH !== 'undefined' ? window.__SC_BASE_PATH : ''); s.src=bp+'data/'+file; document.head.appendChild(s); }

// ----- 预加载 -----
let preloadTotal=0,preloadCompleted=0;
function updatePreload(p){ $('preload-progress-fill').style.width=p+'%'; }
function startPreload(){ if(!sourceIndex.length) return; let files=new Set(); sourceIndex.forEach(s=>{ let pc=s.page_count||1, base=(sourceMeta[s.prefix]?.fileBase)||s.prefix; for(let i=1;i<=pc;i++) files.add(base+'-'+String(i).padStart(2,'0')+'.js'); }); let arr=[...files]; preloadTotal=arr.length; preloadCompleted=0; $('preload-progress-bar').style.display='block'; updatePreload(0); let idx=0,running=0; function loadOne(){ if(idx>=arr.length){ if(running===0){ updatePreload(100); setTimeout(()=>$('preload-progress-bar').style.display='none',500); } return; } let f=arr[idx++]; running++; loadData(f,data=>{ if(data) loadedSources[f]=data; preloadCompleted++; updatePreload(Math.floor(preloadCompleted/preloadTotal*100)); running--; loadOne(); },5000); } for(let i=0;i<CONCURRENT;i++) loadOne(); }

// ----- 搜索结果管理 -----
function saveSearchToStorage(){ setStorage(STORAGE.SEARCH,{ keyword:currentSearchKeyword, results:currentSearchResults, category:currentSearchCategory }); }
function loadSearchFromStorage(){ let d=getStorage(STORAGE.SEARCH); if(d?.results?.length){ currentSearchKeyword=d.keyword||''; currentSearchResults=d.results.slice(); currentSearchCategory=d.category||''; return true; } return false; }
function refreshSearchDisplay(){ let filtered = currentSearchCategory==='' ? currentSearchResults.slice() : currentSearchCategory==='未分类' ? currentSearchResults.filter(v=>!(v.vod_class||'').trim()) : currentSearchResults.filter(v=>(v.vod_class||'').split(',').some(c=>c.trim()===currentSearchCategory)); currentFiltered=filtered; currentPage=1; render(); saveSearchToStorage(); }
function buildSearchCatBar(){ let cats={}; currentSearchResults.forEach(v=>{ let cls=(v.vod_class||'').trim(); if(!cls) cats['未分类']=(cats['未分类']||0)+1; else cls.split(',').forEach(c=>{ c=c.trim(); if(c) cats[c]=(cats[c]||0)+1; }); }); let h='<select class="cat-filter"><option value="">全部分类 ('+currentSearchResults.length+')</option>'; Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).forEach(c=>h+=`<option value="${c.replace(/&/g,'&amp;')}"${c===currentSearchCategory?' selected':''}>${c} (${cats[c]})</option>`); h+='</select>'; $('catBar').innerHTML=h; }
function renderSearchResult(loading){ currentPrefix='__search_result__'; if(loading && (!currentSearchResults.length||isSearching)){ $('content').innerHTML='<div class="empty-state">🔍 搜索中…</div>'; $('pagination').innerHTML=''; $('statusText').textContent=`关键词: ${currentSearchKeyword} - 结果: 0`; $('clearSearchResultBtn').style.display='none'; $('catBar').innerHTML=''; return; } if(!currentSearchResults.length){ setEmpty('暂无搜索结果','请尝试其他关键词'); $('pagination').innerHTML=''; $('statusText').textContent=`关键词: ${currentSearchKeyword} - 结果: 0`; $('clearSearchResultBtn').style.display='none'; $('catBar').innerHTML=''; return; } buildSearchCatBar(); refreshSearchDisplay(); $('sourceSelect').value='__search_result__'; }
function resetSearch(keyword){ currentSearchKeyword=keyword; currentSearchResults=[]; currentSearchCategory=''; $('sourceSelect').value='__search_result__'; renderSearchResult(true); setStorage(STORAGE.SEARCH,null); }
function addSearchResults(newArr){ if(!newArr.length) return; let exist=new Set(currentSearchResults.map(v=>v.sourceKey+'_'+v.vod_name)); for(let item of newArr){ let key=item.sourceKey+'_'+item.vod_name; if(!exist.has(key)){ currentSearchResults.push(item); exist.add(key); } } if($('sourceSelect').value==='__search_result__'){ buildSearchCatBar(); refreshSearchDisplay(); } saveSearchToStorage(); }
function clearAllSearchResults(){ if(currentPrefix!=='__search_result__') return; currentSearchResults=[]; currentSearchKeyword=''; currentSearchCategory=''; renderSearchResult(false); $('statusText').textContent='关键词: - 结果: 0'; $('clearSearchResultBtn').style.display='none'; $('catBar').innerHTML=''; setStorage(STORAGE.SEARCH,null); }
function removeSearchItem(sKey,vName){ currentSearchResults=currentSearchResults.filter(v=>!(v.sourceKey===sKey&&v.vod_name===vName)); if(!currentSearchResults.length) currentSearchKeyword='',currentSearchCategory=''; buildSearchCatBar(); refreshSearchDisplay(); if(!currentSearchResults.length) $('clearSearchResultBtn').style.display='none'; saveSearchToStorage(); }

// ----- 渲染历史/收藏/影签（统一入口）-----
function renderSpecialView(type){
  if(isSearching) stopSearch(); currentPrefix=type; currentCategory=''; $('searchInput').value=''; $('clearSearchResultBtn').style.display='none';
  let list=[];
  if(type==='__history__') list=Object.values(getStorage(STORAGE.HISTORY)).sort((a,b)=>b.updatedAt-a.updatedAt);
  else if(type==='__favorites__') list=getStorage(STORAGE.FAVORITES);
  else if(type==='__bookmarks__') list=getBookmarks();
  if(!list.length){ setEmpty(type==='__history__'?'暂无观看记录':type==='__favorites__'?'暂无收藏':'暂无影签',''); $('pagination').innerHTML=''; $('catBar').innerHTML=`<span style="font-size:12px">${type==='__history__'?'最近观看':type==='__favorites__'?'我的收藏':'我的影签'} — 0 条记录</span>`; setStatus(`${type==='__history__'?'最近观看':type==='__favorites__'?'我的收藏':'我的影签'} — 0 条记录`); return; }
  currentFiltered = list.map(item=>{
    let base={ sourceKey:item.sourceKey, sourceName:item.sourceName, vod_name:item.videoName||item.videoName, vod_pic:item.vodPic, ep_count:item.ep_count, playable_count:item.playable_count, episodes:item.episodes };
    if(type==='__history__') Object.assign(base,{ isHistory:true, historyEpIndex:item.epIndex, historyProgress:item.progress });
    else if(type==='__bookmarks__') Object.assign(base,{ isBookmark:true, bookmarkNote:item.note, bookmarkProgress:item.progress, bookmarkEpIndex:item.epIndex });
    return base;
  });
  currentPage=1; render();
  let title=type==='__history__'?'最近观看':type==='__favorites__'?'我的收藏':'我的影签';
  $('catBar').innerHTML=`<span style="font-size:12px">${title} — ${list.length} 条记录</span>`;
  setStatus(`${title} — ${list.length} 条记录 · 第 1 页`);
}

// ----- 数据源相关 -----
function switchSource(){ if(isSearching) stopSearch(); let val=$('sourceSelect').value; if(!val){ $('content').innerHTML=''; setStatus('⏹ 选择数据源'); return; }
  if(val==='__history__'){ renderSpecialView('__history__'); return; }
  if(val==='__favorites__'){ renderSpecialView('__favorites__'); return; }
  if(val==='__bookmarks__'){ renderSpecialView('__bookmarks__'); return; }
  if(val==='__search_result__'){ renderSearchResult(false); return; }
  currentPrefix=val; currentFilePage=1; currentPage=1; $('searchInput').value=''; if(currentPlayingVideo) floatReturn=currentPrefix, showFloatPlayer(); loadPageFile(val,1); }
function loadPageFile(prefix,page){ let base=(sourceMeta[prefix]?.fileBase)||prefix; let fname=base+'-'+String(page).padStart(2,'0')+'.js'; if(loadedSources[fname]) useSourceData(loadedSources[fname],fname,page); else { $('content').innerHTML='<div class="empty-state">⛏ 加载中...</div>'; loadData(fname,data=>{ if(data) loadedSources[fname]=data; useSourceData(data,fname,page); }); } }
function useSourceData(data,file,page){ currentData=data; currentFilePage=page; currentPage=1; if(!data?.videos){ setStatus('❌ 数据格式错误'); return; } currentCategory=''; setStatus(`📡 ${data.name} — 第${page}页`); currentFiltered=data.videos.map(v=>({...v, sourceKey:file, sourceName:data.name})); render(); $('clearSearchResultBtn').style.display='none';
  // 构建分类栏，如果索引中没有完整分类统计，则异步全量统计
  buildCatBarAsync();
}
// 异步确保分类统计完整（遍历所有页面）
async function ensureFullCategoryStats(prefix){
  if(categoryStatsLoading) return;
  let meta=sourceMeta[prefix];
  if(!meta) return;
  // 如果已有categories且不为空对象，且总数匹配（可选检查），则直接使用
  if(meta.categories && Object.keys(meta.categories).length>0) return;
  categoryStatsLoading=true;
  setStatus(`📊 正在统计分类数量 (全量) ...`);
  let pc=meta.page_count||1;
  let base=(meta.fileBase)||prefix;
  let catMap={};
  let loadedCount=0;
  let totalVideos=0;
  let playableVideos=0;
  for(let p=1;p<=pc;p++){
    let fname=base+'-'+String(p).padStart(2,'0')+'.js';
    let pageData=loadedSources[fname];
    if(!pageData){
      await new Promise(resolve=>{
        loadData(fname,data=>{
          if(data) loadedSources[fname]=data;
          resolve();
        },5000);
      });
      pageData=loadedSources[fname];
    }
    if(pageData?.videos){
      totalVideos+=pageData.videos.length;
      pageData.videos.forEach(v=>{
        if(v.playable_count>0) playableVideos++;
        let cls=(v.vod_class||'').trim();
        if(!cls) catMap['未分类']=(catMap['未分类']||0)+1;
        else cls.split(',').forEach(c=>{ c=c.trim(); if(c) catMap[c]=(catMap[c]||0)+1; });
      });
    }
    loadedCount++;
    setStatus(`📊 统计分类中 ${loadedCount}/${pc} ...`);
  }
  meta.categories=catMap;
  meta.total=totalVideos;
  meta.playable_videos=playableVideos;
  categoryStatsLoading=false;
  setStatus(`✅ 分类统计完成 (共 ${Object.keys(catMap).length} 个分类)`);
  // 刷新分类栏和当前视图
  buildCatBarAndRefresh();
}
function buildCatBarAndRefresh(){
  let meta=sourceMeta[currentPrefix];
  if(!meta) return;
  let cats=meta.categories||{};
  let total=meta.total||0;
  let playable=meta.playable_videos||0;
  let h=`<select class="cat-filter"><option value="">全部 (${total>99?'99+':total}/${playable>99?'99+':playable})</option>`;
  Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).forEach(c=>h+=`<option value="${c.replace(/&/g,'&amp;')}">${c} (${cats[c]})</option>`);
  h+='</select>';
  $('catBar').innerHTML=h;
  // 如果当前有分类筛选，重新应用筛选保持一致性
  if(currentCategory && currentCategory!==''){
    filterCategory(document.querySelector('.cat-filter'));
  } else {
    // 刷新当前显示（保持页面）
    if(currentPrefix && !currentPrefix.startsWith('__') && currentData){
      currentFiltered=currentData.videos.map(v=>({...v, sourceKey:currentData.fileName||currentPrefix, sourceName:currentData.name}));
      render();
    }
  }
}
function buildCatBarAsync(){
  let meta=sourceMeta[currentPrefix];
  if(!meta) return;
  // 如果categories已有数据且非空，直接渲染
  if(meta.categories && Object.keys(meta.categories).length>0){
    let cats=meta.categories;
    let total=meta.total||0;
    let playable=meta.playable_videos||0;
    let h=`<select class="cat-filter"><option value="">全部 (${total>99?'99+':total}/${playable>99?'99+':playable})</option>`;
    Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).forEach(c=>h+=`<option value="${c.replace(/&/g,'&amp;')}">${c} (${cats[c]})</option>`);
    h+='</select>';
    $('catBar').innerHTML=h;
    return;
  }
  // 否则异步统计
  ensureFullCategoryStats(currentPrefix).then(()=>{
    if(currentPrefix===sourceMeta[currentPrefix]?.prefix) buildCatBarAndRefresh();
  }).catch(()=>{});
  // 临时显示加载中
  $('catBar').innerHTML=`<select class="cat-filter"><option value="">统计分类中...</option></select>`;
}
function filterCategory(sel){ let selected=sel.value;
  if(currentPrefix==='__search_result__'){ currentSearchCategory=selected; refreshSearchDisplay(); buildSearchCatBar(); return; }
  if(currentPrefix.startsWith('__')) return;
  currentCategory=selected; currentPage=1;
  if(!currentCategory){ loadPageFile(currentPrefix,currentFilePage); return; }
  let meta=sourceMeta[currentPrefix], pc=meta.page_count||1, results=[], loaded=0;
  let done=()=>{ if(++loaded>=pc){ currentFiltered=results; setStatus(`[FILTER] ${selected} — ${results.length} results`); render(); } };
  for(let p=1;p<=pc;p++){ let fn=(meta.fileBase||currentPrefix)+'-'+String(p).padStart(2,'0')+'.js'; if(loadedSources[fn]){ collectCat(loadedSources[fn],selected,results); done(); }else loadData(fn,data=>{ if(data) loadedSources[fn]=data; if(data) collectCat(data,selected,results); done(); }); } }
function collectCat(src,cat,out){
  if(!src?.videos) return;
  src.videos.forEach(v=>{
    let matched = false;
    if(cat === '未分类') {
      const clsRaw = v.vod_class;
      if(!clsRaw || (typeof clsRaw === 'string' && clsRaw.trim() === '')) matched = true;
    } else {
      const clsRaw = v.vod_class || '';
      const classes = clsRaw.split(',').map(c=>c.trim()).filter(c=>c);
      if(classes.includes(cat)) matched = true;
    }
    if(matched){
      out.push({
        sourceKey: currentPrefix,
        sourceName: src.name,
        vod_name: v.vod_name,
        vod_pic: v.vod_pic,
        episodes: v.episodes,
        ep_count: v.ep_count,
        playable_count: v.playable_count,
        vod_class: v.vod_class
      });
    }
  });
}

// ----- 主渲染 -----
function render(){
  let total=currentFiltered.length, pages=Math.ceil(total/PAGE_SIZE)||1; if(currentPage>pages) currentPage=pages;
  let start=(currentPage-1)*PAGE_SIZE, items=currentFiltered.slice(start,start+PAGE_SIZE);
  let h='<div class="video-grid">', isSearch=(currentPrefix==='__search_result__'), isSpecial=['__history__','__favorites__','__bookmarks__'].includes(currentPrefix);
  items.forEach((v,i)=>{
    let eid=`eps_${currentPage}_${i}`, img=v.vod_pic||'', badge=v.playable_count>0?'可播':'待验证', epInfo=(v.ep_count||0)+'集'+(v.playable_count?` · ${v.playable_count}可播`:'');
    let isFav=isFavorited(v.sourceKey, v.vod_name);
    h+=`<div class="video-card" data-eid="${eid}" data-vodname="${escAttr(v.vod_name)}" data-sourcekey="${escAttr(v.sourceKey)}">`;
    h+=`<div class="poster-wrap">${img?`<img class="poster" src="${img.replace(/&/g,'&amp;')}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="poster-fallback" style="display:none">🎬</div>`:'<div class="poster-fallback">🎬</div>'}`;
    h+=`<button class="fav-btn card-fav${isFav?' faved':''}" data-sourcekey="${escAttr(v.sourceKey)}" data-vodname="${escAttr(v.vod_name)}" data-vodpic="${escAttr(v.vod_pic||'')}" data-epcount="${v.ep_count||0}" data-playablecount="${v.playable_count||0}" title="${isFav?'取消收藏':'收藏'}">${isFav?'❤':'♡'}</button>`;
    if(isSearch && !v.isHistory && !v.isBookmark) h+=`<button class="fav-btn card-delete search-result-delete" data-vodname="${escAttr(v.vod_name)}" data-sourcekey="${escAttr(v.sourceKey)}" title="删除">✖</button>`;
    else if(v.isHistory || v.isBookmark) h+=`<button class="fav-btn card-delete ep-delete" data-vodname="${escAttr(v.vod_name)}" data-sourcekey="${escAttr(v.sourceKey)}" data-type="${v.isHistory?'history':'bookmark'}" title="删除">✖</button>`;
    h+=`<span class="card-badge ${v.playable_count>0?'playable':'unplayable'}">${badge}</span>`;
    if(v.isHistory && v.historyProgress) h+=`<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,Math.round(v.historyProgress/300*100))}%"></div></div>`;
    if(v.isBookmark && v.bookmarkNote) h+=`<div class="bookmark-note">${escHtml(v.bookmarkNote)}</div>`;
    h+=`</div><div class="card-info"><div class="card-title">${escHtml(v.vod_name)}</div><div class="card-meta">${v.sourceName?escHtml(v.sourceName)+' · ':''}${epInfo}${v.isHistory && v.historyProgress?` · 已观${Math.floor(v.historyProgress/60)}分`:''}${v.isBookmark && v.bookmarkNote?` · "${v.bookmarkNote}"`:''}</div></div></div>`;
    h+=`<div class="ep-panel" id="${eid}"><div class="ep-header"><span>剧集 (${(v.episodes||[]).length})</span><button class="ep-close" data-eid="${eid}">✖</button></div>`;
    (v.episodes||[]).forEach((e,ei)=>{
      let isCurr=(v.isHistory && ei===v.historyEpIndex)||(v.isBookmark && ei===v.bookmarkEpIndex);
      let prog=isCurr&&(v.historyProgress||v.bookmarkProgress);
      h+=`<div class="ep-item${isCurr?' ep-current':''}" data-url="${escAttr(e.url)}" data-name="${escAttr(v.vod_name+' - '+e.title)}" data-epindex="${ei}">${escHtml(e.title)}${!e.playable?' ⚠':''}${isCurr?' ▶':''}${prog?` (${Math.floor(prog/60)}'${prog%60})`:''}</div>`;
    });
    h+=`</div>`;
  });
  h+='</div>';
  if(!items.length) h='<div class="empty-state">🔍 无匹配结果</div>';
  $('content').innerHTML=h;
  // 分页生成
  let pg='';
  if(isSearch || isSpecial || (currentPrefix && !currentPrefix.startsWith('__') && currentCategory!=='')){
    let pgs=Math.ceil(total/PAGE_SIZE)||1;
    if(pgs===1) pg='<button disabled>1</button>';
    else{ pg+=`<button class="pg-go" data-page="1"${currentPage<=1?' disabled':''}>«</button><button class="pg-go" data-page="${currentPage-1}"${currentPage<=1?' disabled':''}>‹</button>`;
      let sp=Math.max(1,currentPage-2), ep=Math.min(pgs,currentPage+2);
      for(let pi=sp;pi<=ep;pi++) pg+=`<button class="pg-go${pi===currentPage?' active':''}" data-page="${pi}">${pi}</button>`;
      pg+=`<button class="pg-go" data-page="${currentPage+1}"${currentPage>=pgs?' disabled':''}>›</button><button class="pg-go" data-page="${pgs}"${currentPage>=pgs?' disabled':''}>»</button>`;
    }
    if(isSearch){ let txt=`关键词: ${currentSearchKeyword||'-'} - 结果: ${currentSearchResults.length}${currentSearchCategory?` · 分类: ${currentSearchCategory}`:''} · 第 ${currentPage} 页`; $('statusText').textContent=txt; $('clearSearchResultBtn').style.display=currentSearchResults.length?'inline-block':'none'; }
    else if(isSpecial) $('statusText').textContent=`${currentPrefix==='__history__'?'最近观看':currentPrefix==='__favorites__'?'我的收藏':'我的影签'} — ${total} 条记录 · 第 ${currentPage} 页`;
    else $('statusText').textContent=`${currentData?.name||''} · ${currentCategory==='未分类'?'未分类':currentCategory}分类 — ${total} 部影片 · 第 ${currentPage} 页`;
  } else if(currentPrefix && sourceMeta[currentPrefix] && !currentPrefix.startsWith('__')){
    let pc=sourceMeta[currentPrefix].page_count||1;
    if(pc===1) pg='<button disabled>1</button>';
    else{ pg+=`<button class="pg-page" data-page="1"${currentFilePage<=1?' disabled':''}>«</button><button class="pg-page" data-page="${currentFilePage-1}"${currentFilePage<=1?' disabled':''}>‹</button>`;
      let sp=Math.max(1,currentFilePage-2), ep=Math.min(pc,currentFilePage+2);
      for(let pi=sp;pi<=ep;pi++) pg+=`<button class="pg-page${pi===currentFilePage?' active':''}" data-page="${pi}">${pi}</button>`;
      pg+=`<button class="pg-page" data-page="${currentFilePage+1}"${currentFilePage>=pc?' disabled':''}>›</button><button class="pg-page" data-page="${pc}"${currentFilePage>=pc?' disabled':''}>»</button>`;
    }
    $('statusText').textContent=`📡 ${currentData?.name||''} — 第${currentFilePage}页`;
  }
  $('pagination').innerHTML=pg;
}
function go(p){ let total=currentFiltered.length, max=Math.ceil(total/PAGE_SIZE)||1; if(p<1) p=1; if(p>max) p=max; currentPage=p; render(); }
function goPage(p){ if(currentCategory!==''){ go(p); return; } let meta=sourceMeta[currentPrefix]; let pc=meta?.page_count||1; if(p<1) p=1; if(p>pc) p=pc; if(p!==currentFilePage) loadPageFile(currentPrefix,p); else{ currentPage=p; render(); } }
function toggleEpisodes(el,eid){
  let panel = document.getElementById(eid);
  if(!panel) return;
  let open = panel.classList.contains('open');
  document.querySelectorAll('.ep-panel.open').forEach(ep=>{ if(ep.id!==eid) ep.classList.remove('open'); });
  panel.classList.toggle('open');
  if(!open){
    let vodName=el.dataset.vodname, sKey=el.dataset.sourcekey;
    currentOpenVideo=currentFiltered.find(v=>v.vod_name===vodName&&v.sourceKey===sKey)||null;
    if(currentOpenVideo && currentOpenVideo.episodes?.length===1 && (currentOpenVideo.isHistory||currentOpenVideo.isBookmark)){
      let full=findVideoInCache(sKey,vodName);
      if(full?.episodes?.length>1){
        currentOpenVideo.episodes=full.episodes;
        currentOpenVideo.playable_count=full.playable_count||full.episodes.filter(e=>e.playable).length;
        currentOpenVideo.ep_count=full.ep_count||full.episodes.length;
        let epContainer=panel;
        epContainer.innerHTML=`<div class="ep-header"><span>剧集 (${currentOpenVideo.episodes.length})</span><button class="ep-close" data-eid="${eid}">✖</button></div>`;
        currentOpenVideo.episodes.forEach((e,ei)=>{
          let isCurr=(currentOpenVideo.isHistory && ei===currentOpenVideo.historyEpIndex)||(currentOpenVideo.isBookmark && ei===currentOpenVideo.bookmarkEpIndex);
          let prog=isCurr&&(currentOpenVideo.historyProgress||currentOpenVideo.bookmarkProgress);
          epContainer.innerHTML+=`<div class="ep-item${isCurr?' ep-current':''}" data-url="${escAttr(e.url)}" data-name="${escAttr(currentOpenVideo.vod_name+' - '+e.title)}" data-epindex="${ei}">${escHtml(e.title)}${!e.playable?' ⚠':''}${isCurr?' ▶':''}${prog?` (${Math.floor(prog/60)}'${prog%60})`:''}</div>`;
        });
        let closeBtn=epContainer.querySelector('.ep-close');
        if(closeBtn) closeBtn.addEventListener('click',(eve)=>{ eve.stopPropagation(); panel.classList.remove('open'); });
      }
    }
  } else currentOpenVideo=null;
}

// ----- 播放相关 (省略，与原文一致)-----
function playEp(el){ let url=el.dataset.url; if(!url) return; let items=el.parentElement.querySelectorAll('.ep-item'), idx=Array.from(items).indexOf(el), epIdx=parseInt(el.dataset.epindex)||idx; currentEpNext=idx<items.length-1?items[idx+1]:null; $('nextEpBtn').style.display=currentEpNext?'inline':'none'; if(currentPlayingVideo){ let v=$('player'); if(v.currentTime>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } currentPlayingVideo=currentOpenVideo; currentPlayingEpIndex=epIdx; doPlay(url,el.dataset.name); }
function doPlay(url,name){ if(currentHls) currentHls.destroy(); let v=$('player'); v.pause(); v.removeAttribute('src'); v.load(); document.querySelector('.player-box').classList.add('playing'); if(url.includes('.m3u8') && window.Hls?.isSupported()){ let hls=new Hls(); hls.loadSource(url); hls.attachMedia(v); currentHls=hls; } else v.src=url; v.play().catch(()=>{}); let saved=currentOpenVideo?(currentOpenVideo.historyProgress||currentOpenVideo.bookmarkProgress||0):0; if(saved>5) v.addEventListener('canplay',function once(){ v.removeEventListener('canplay',once); v.currentTime=saved; }); setStatus(`▶ ${name}`); }
function playNext(){ if(currentEpNext) playEp(currentEpNext); }
function addBookmarkHandler(){ if(!currentPlayingVideo || (currentPlayingEpIndex===undefined)){ setStatus('⚠ 请先选择剧集'); return; } let v=$('player'); updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); let note=prompt('影签备注：',''); if(note===null) return; addBookmark(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime),note); setStatus('✓ 影签已添加'); }
function showFloatPlayer(){ if(playerInFloat) return; let main=$('player'), floatV=$('floatVideo'), floatDiv=$('floatPlayer'); if(currentHls){ currentHls.detachMedia(); currentHls.attachMedia(floatV); } floatV.src=main.src||main.currentSrc; floatV.currentTime=main.currentTime; floatV.volume=main.volume; if(currentPlayingVideo) $('floatPlayerTitle').textContent=currentPlayingVideo.vod_name||'正在播放'; playerInFloat=true; document.querySelector('.player-box').classList.remove('playing');
 floatDiv.style.display='block'; if(!main.paused) floatV.play().catch(()=>{}); }
function returnFromFloat(){ if(!playerInFloat) return; $('floatPlayer').style.display='none'; playerInFloat=false; let main=$('player'), floatV=$('floatVideo'); if(currentHls){ currentHls.detachMedia(); currentHls.attachMedia(main); } main.src=floatV.src; main.currentTime=floatV.currentTime; main.volume=floatV.volume; main.play().catch(()=>{}); document.querySelector('.player-box').classList.add('playing'); if(floatReturn){ $('sourceSelect').value=floatReturn; floatReturn=null; } }
function closeFloatPlayer(){ if(!playerInFloat) return; let v=$('floatVideo'); v.pause(); v.src=''; if(currentHls){ currentHls.destroy(); currentHls=null; } playerInFloat=false; floatReturn=null; $('floatPlayer').style.display='none'; document.querySelector('.player-box').classList.remove('playing');
 currentPlayingVideo=null; setStatus('⏹ 已关闭'); }

// ----- 初始化与主题 -----
(function(){ let t=document.documentElement.getAttribute('data-theme'); if(!t){ try{ let pt=window.parent.document.documentElement.getAttribute('data-theme'); if(pt==='dark'||pt==='light') t=pt; }catch(e){} } if(!t) t=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'; document.documentElement.setAttribute('data-theme',t); })();
function setEmpty(t,s){ $('content').innerHTML=`<div class="empty-state">📺 ${t}${s?`<div class="sub">${s}</div>`:''}</div>`; }
function loadIndex(){ loadData('index.js',data=>{ if(!data){ setEmpty('无数据','请运行爬虫'); return; } sourceIndex=data; if(!sourceIndex.length){ setEmpty('无数据源','请检查data/目录'); return; } let sel=$('sourceSelect'), ta=0,pa=0; sel.innerHTML=''; sel.appendChild(new Option('🕒 最近观看','__history__')); sel.appendChild(new Option('❤️ 我的收藏','__favorites__')); sel.appendChild(new Option('📌 我的影签','__bookmarks__')); sel.appendChild(new Option('📋 搜索结果','__search_result__')); sel.appendChild(new Option('— 数据源 —','',true,true)); let nameCnt={}; sourceIndex.forEach(s=>nameCnt[s.name]=(nameCnt[s.name]||0)+1); let nameSeen={}; sourceIndex.forEach(s=>{ ta+=s.total||0; pa+=s.playable||0; let dn=s.name; if(nameCnt[s.name]>1){ nameSeen[s.name]=(nameSeen[s.name]||0)+1; dn=s.name+'（站'+['一','二','三','四','五','六','七','八','九'][nameSeen[s.name]-1]+'）'; } sel.appendChild(new Option('📀 '+dn,s.prefix)); sourceMeta[s.prefix]={ page_count:s.page_count||1, name:dn, total:s.total, playable_videos:s.playable_videos||0, categories:s.categories||{}, fileBase:s.file.replace(/\.js$/,'').replace(/-\d+$/,''), prefix:s.prefix }; }); $('tvboxFooter').innerHTML=`<span>数据源 ${sourceIndex.length}</span><span>总地址 ${ta}</span><span>可播放 ${pa}</span>`; startPreload(); sel.value='__history__'; renderSpecialView('__history__'); }); }

// ----- 全局事件（委托）-----
document.addEventListener('click',e=>{
  let t=e.target; let epDel=t.closest('.ep-delete'); if(epDel && !t.closest('.search-result-delete')){ e.stopPropagation(); let sKey=epDel.dataset.sourcekey, vName=epDel.dataset.vodname, type=epDel.dataset.type; if(type==='history'){ let h=getStorage(STORAGE.HISTORY); delete h[sKey+'_'+vName]; setStorage(STORAGE.HISTORY,h); setStatus('✓ 已删除'); renderSpecialView('__history__'); }else if(type==='bookmark'){ saveBookmarks(getBookmarks().filter(b=>!(b.videoName===vName&&b.sourceKey===sKey))); setStatus('✓ 影签已删除'); renderSpecialView('__bookmarks__'); } return; }
  let fav=t.closest('.fav-btn'); if(fav){ e.stopPropagation(); let sKey=fav.dataset.sourcekey, vName=fav.dataset.vodname, vPic=fav.dataset.vodpic, eCnt=parseInt(fav.dataset.epcount)||0, pCnt=parseInt(fav.dataset.playablecount)||0; if(isFavorited(sKey,vName)){ removeFavorite(sKey,vName); fav.classList.remove('faved'); fav.innerHTML='♡'; fav.title='收藏'; if(currentPrefix==='__favorites__') renderSpecialView('__favorites__'); }else{ let full=currentFiltered.find(v=>v.vod_name===vName&&v.sourceKey===sKey); if(!full && currentData?.videos) full=currentData.videos.find(v=>v.vod_name===vName); if(!full||!full.episodes?.length) Object.values(loadedSources).some(d=>{ let f=d?.videos?.find(v=>v.vod_name===vName); if(f?.episodes?.length){ full=f; return true; } }); addFavorite({ sourceKey:sKey, vod_name:vName, vod_pic:full?.vod_pic||vPic, sourceName:full?.sourceName||'', ep_count:full?.ep_count||eCnt, playable_count:full?.playable_count||pCnt, episodes:full?.episodes||[], vod_class:full?.vod_class||'' }); fav.classList.add('faved'); fav.innerHTML='❤'; fav.title='取消收藏'; } return; }
  let epItem=t.closest('.ep-item'); if(epItem){ playEp(epItem); return; }
  let epClose=t.closest('.ep-close'); if(epClose){ e.stopPropagation(); let pid=epClose.dataset.eid; let panel=document.getElementById(pid); if(panel) panel.classList.remove('open'); return; }
  let btn=t.closest('button'); if(btn){ if(btn.id==='searchBtn') doSearch(); else if(btn.id==='stopSearchBtn') stopSearch(); else if(btn.id==='bookmarkBtn') addBookmarkHandler(); else if(btn.id==='nextEpBtn') playNext(); else if(btn.classList.contains('pg-go')) go(parseInt(btn.dataset.page)); else if(btn.classList.contains('pg-page')) goPage(parseInt(btn.dataset.page)); else if(btn.id==='clearSearchResultBtn') clearAllSearchResults(); return; }
  let card=t.closest('.video-card'); if(card) toggleEpisodes(card,card.dataset.eid);
});
document.addEventListener('change',e=>{ let tar=e.target; if(tar.id==='sourceSelect') switchSource(); else if(tar.classList.contains('cat-filter')) filterCategory(tar); });
document.addEventListener('keydown',e=>{ if(e.key==='Enter' && document.activeElement===$('searchInput')) doSearch(); if((e.key==='n'||e.key==='N') && currentEpNext){ e.preventDefault(); playNext(); } });
$('player').addEventListener('ended',()=>{ if(currentPlayingVideo){ let v=$('player'); updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } playNext(); if(!currentEpNext) document.querySelector('.player-box').classList.remove('playing');
 });
$('player').addEventListener('pause',()=>{ if(currentPlayingVideo){ let v=$('player'); if(v.currentTime>5) updateHistory(currentPlayingVideo,currentPlayingEpIndex,Math.floor(v.currentTime)); } });
$('floatBackBtn').addEventListener('click',returnFromFloat);
$('floatCloseBtn').addEventListener('click',closeFloatPlayer);
loadIndex();
// 通知 sevencolor.js 数据已加载（嵌入模式缓存）
if (typeof onDataLoaded !== 'undefined' && onDataLoaded) {
  onDataLoaded([]);
}
