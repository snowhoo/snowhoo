<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>电影广场 · 聚合播放器</title>
    <!-- 引入 HLS.js 用于 m3u8 播放 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* 所有样式都限定在 .tvbox-app 内，避免污染 Hexo 主题 */
        .tvbox-app {
            max-width: 1400px;
            margin: 0 auto;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #efefef;
        }
        .tvbox-app .header {
            margin-bottom: 1.5rem;
        }
        .tvbox-app .header h1 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, #e6b422, #f78c6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .tvbox-app .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        .tvbox-app .controls input,
        .tvbox-app .controls select {
            background: #1e1e2a;
            border: 1px solid #2c2c3a;
            padding: 0.5rem 1rem;
            border-radius: 32px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }
        .tvbox-app .controls input {
            flex: 1;
            min-width: 180px;
        }
        .tvbox-app .controls button {
            background: #e6b422;
            border: none;
            border-radius: 32px;
            padding: 0.5rem 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .tvbox-app .controls button:hover {
            background: #ffcd5c;
        }
        .tvbox-app .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .tvbox-app .movie-card {
            background: #15151f;
            border-radius: 1rem;
            overflow: hidden;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #2a2a38;
        }
        .tvbox-app .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            border-color: #e6b42288;
        }
        .tvbox-app .card-poster {
            position: relative;
            aspect-ratio: 2 / 3;
            background: #0b0b12;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .tvbox-app .card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tvbox-app .play-icon {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            backdrop-filter: blur(4px);
        }
        .tvbox-app .card-info {
            padding: 0.7rem 0.8rem 0.9rem;
        }
        .tvbox-app .card-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
            color: inherit;
        }
        .tvbox-app .source-tag {
            font-size: 0.65rem;
            background: #2a2a3a;
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            margin-top: 6px;
            color: #e6b422;
        }
        .tvbox-app .empty-message {
            text-align: center;
            padding: 3rem;
            color: #aaa;
            grid-column: 1 / -1;
        }
        .tvbox-app .loading {
            text-align: center;
            padding: 2rem;
            color: #e6b422;
        }

        /* 模态框（弹窗）全局置于顶层，为避免影响主题也加上类限定，但位置不受限 */
        .tvbox-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            backdrop-filter: blur(16px);
        }
        .tvbox-modal.active {
            display: flex;
        }
        .tvbox-modal .video-wrapper {
            width: 90%;
            max-width: 1100px;
            background: black;
            border-radius: 20px;
            overflow: hidden;
        }
        .tvbox-modal #tvbox-video-player {
            width: 100%;
            max-height: 75vh;
            background: black;
        }
        .tvbox-modal .modal-footer {
            width: 90%;
            max-width: 1100px;
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
        }
        .tvbox-modal .close-modal-btn {
            background: #e6b422;
            border: none;
            border-radius: 32px;
            padding: 0.4rem 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .tvbox-app .movies-grid {
                gap: 1rem;
                grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
            }
        }
    </style>
</head>
<body>
<!-- 注意：为了不与主题 body 背景冲突，我们不再设置 body 背景，而是直接在 .tvbox-app 内部定义深色背景 -->
<div class="tvbox-app">
    <div class="header">
        <h1>🎬 电影广场 · 聚合播放器</h1>
    </div>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="搜索影片名称...">
        <select id="sourceFilter"></select>
        <button id="reloadBtn">🔄 刷新数据</button>
    </div>
    <div id="moviesGrid" class="movies-grid">
        <div class="loading">加载数据中...</div>
    </div>
</div>

<!-- 模态框放置于外部，但样式已限定 -->
<div id="tvboxModal" class="tvbox-modal">
    <div class="video-wrapper">
        <video id="tvbox-video-player" controls preload="auto"></video>
    </div>
    <div class="modal-footer">
        <div id="modalMovieTitle" style="color:white;"></div>
        <button class="close-modal-btn" id="closeModalBtn">关闭</button>
    </div>
</div>

<script>
    // ===================== 配置 =====================
    const DATA_URL = '/data/all_movies.json';   // 你的 JSON 数据地址
    let allMovies = [];
    let currentFilter = 'all';
    let hlsInstance = null;

    // DOM 元素
    const moviesGrid = document.getElementById('moviesGrid');
    const searchInput = document.getElementById('searchInput');
    const sourceFilter = document.getElementById('sourceFilter');
    const reloadBtn = document.getElementById('reloadBtn');
    const modal = document.getElementById('tvboxModal');
    const videoPlayer = document.getElementById('tvbox-video-player');
    const modalTitleSpan = document.getElementById('modalMovieTitle');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // 关闭模态框
    function closeModal() {
        modal.classList.remove('active');
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        videoPlayer.pause();
        videoPlayer.src = '';
    }

    // 播放视频
    function playVideo(url, title) {
        if (!url) { alert("无播放地址"); return; }
        if (hlsInstance) hlsInstance.destroy();
        modalTitleSpan.innerText = title || "正在播放";
        modal.classList.add('active');
        const isM3U8 = url.toLowerCase().includes('.m3u8');
        if (isM3U8 && Hls && Hls.isSupported()) {
            hlsInstance = new Hls({ enableWorker: true });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoPlayer);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play().catch(e=>console.warn));
            hlsInstance.on(Hls.Events.ERROR, (_, data) => {
                if(data.fatal) { alert("流加载失败"); closeModal(); }
            });
        } else {
            videoPlayer.src = url;
            videoPlayer.play().catch(e => alert("播放失败: "+e.message));
        }
    }

    // 渲染影片网格
    function renderMovies() {
        let filtered = allMovies;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(m => m.source === currentFilter);
        }
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword) {
            filtered = filtered.filter(m => m.title.toLowerCase().includes(keyword));
        }
        if (!filtered.length) {
            moviesGrid.innerHTML = '<div class="empty-message">🎬 没有找到影片，试试其他关键词或稍后再试</div>';
            return;
        }
        let html = '';
        for (let m of filtered) {
            const cover = m.cover || 'https://placehold.co/300x450/2a2a36/e6b422?text=🎬';
            html += `
                <div class="movie-card" data-url="${escapeHtml(m.videoUrl)}" data-title="${escapeHtml(m.title)}">
                    <div class="card-poster">
                        <img src="${escapeHtml(cover)}" loading="lazy" onerror="this.src='https://placehold.co/300x450/2a2a36/e6b422?text=📷'">
                        <div class="play-icon">▶️</div>
                    </div>
                    <div class="card-info">
                        <h3>${escapeHtml(m.title.length > 28 ? m.title.slice(0,28)+'…' : m.title)}</h3>
                        <div class="source-tag">${escapeHtml(m.source)}</div>
                    </div>
                </div>
            `;
        }
        moviesGrid.innerHTML = html;
        // 绑定点击事件
        document.querySelectorAll('.tvbox-app .movie-card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.dataset.url;
                const title = card.dataset.title;
                if (url) playVideo(url, title);
                else alert("无播放地址");
            });
        });
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    // 加载数据
    async function loadData() {
        moviesGrid.innerHTML = '<div class="loading">⏳ 加载影片数据...</div>';
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            // 兼容多种数据结构
            allMovies = data.movies || data.list || data.vod_list || [];
            if (!allMovies.length) {
                moviesGrid.innerHTML = '<div class="empty-message">❌ 暂无影片数据，请检查 /data/all_movies.json 是否有效</div>';
                return;
            }
            // 更新来源下拉框
            const sources = [...new Set(allMovies.map(m => m.source).filter(Boolean))];
            sourceFilter.innerHTML = '<option value="all">📌 所有来源</option>' + sources.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
            currentFilter = 'all';
            sourceFilter.value = 'all';
            renderMovies();
        } catch (err) {
            console.error(err);
            moviesGrid.innerHTML = `<div class="empty-message">❌ 数据加载失败: ${err.message}<br>请确保 /data/all_movies.json 可访问且格式正确</div>`;
        }
    }

    // 事件绑定
    sourceFilter.addEventListener('change', () => {
        currentFilter = sourceFilter.value;
        renderMovies();
    });
    searchInput.addEventListener('input', renderMovies);
    reloadBtn.addEventListener('click', loadData);
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });

    // 启动
    loadData();
</script>
</body>
</html>
