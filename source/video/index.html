<!DOCTYPE html><html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>超级播霸</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
/* ===== CSS 自定义属性 ===== */
:root {
  --bg-page: #0f0f0f;
  --bg-card: #1a1a2e;
  --bg-card-hover: #1e1e38;
  --bg-eplist: #111;
  --bg-eplist-alt: #161616;
  --bg-player: #000;
  --bg-toolbar: #16213e;
  --bg-input: #1a1a2e;
  --text-primary: #e8e8e8;
  --text-secondary: #90a4ae;
  --text-muted: #607d8b;
  --border: #333;
  --accent: #ff6b35;
  --accent-hover: #e85d2a;
  --badge-playable-bg: #2e7d32;
  --badge-playable-text: #fff;
  --badge-unplayable-bg: #616161;
  --badge-unplayable-text: #bdbdbd;
  --shadow: rgba(0,0,0,0.4);
  --card-radius: 10px;
}
[data-theme="light"] {
  --bg-page: #f5f5f5;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f0f5;
  --bg-eplist: #fafafa;
  --bg-eplist-alt: #f0f0f0;
  --bg-player: #000;
  --bg-toolbar: #e8e0f0;
  --bg-input: #fff;
  --text-primary: #212121;
  --text-secondary: #546e7a;
  --text-muted: #90a4ae;
  --border: #ddd;
  --accent: #e65100;
  --accent-hover: #d84315;
  --badge-playable-bg: #2e7d32;
  --badge-playable-text: #fff;
  --badge-unplayable-bg: #bdbdbd;
  --badge-unplayable-text: #757575;
  --shadow: rgba(0,0,0,0.1);
  --card-radius: 10px;
}

@media (prefers-color-scheme: light) {
  [data-theme="dark"] {
    --bg-page: #0f0f0f;
    --bg-card: #1a1a2e;
    --bg-card-hover: #1e1e38;
    --bg-eplist: #111;
    --bg-eplist-alt: #161616;
    --bg-player: #000;
    --bg-toolbar: #16213e;
    --bg-input: #1a1a2e;
    --text-primary: #e8e8e8;
    --text-secondary: #90a4ae;
    --text-muted: #607d8b;
    --border: #333;
    --accent: #ff6b35;
    --accent-hover: #e85d2a;
    --badge-playable-bg: #2e7d32;
    --badge-playable-text: #fff;
    --badge-unplayable-bg: #616161;
    --badge-unplayable-text: #bdbdbd;
    --shadow: rgba(0,0,0,0.4);
  }
}

/* ===== 隔离重置：屏蔽 Hexo/Butterfly 主题干扰 ===== */
#player-wrap * {
  box-sizing:border-box;
}
#player-wrap img {
  max-width:none !important;
  height:auto !important;
  border-radius:0 !important;
}
#player-wrap button,
#player-wrap input,
#player-wrap select {
  font-family:inherit;
  font-size:inherit;
  line-height:inherit;
}
#player-wrap button {
  border-radius:4px;
}
#player-wrap h1 {
  margin:0;
  padding:0;
  border:none;
}
#player-wrap a {
  color:inherit;
  text-decoration:none;
}
#player-wrap {
  font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;
  color:var(--text-primary);
  max-width:1200px;
  margin:0 auto;
  line-height:1.5;
  font-size:14px;
  transition:color .3s;
}
#player-wrap p,
#player-wrap ul,
#player-wrap ol,
#player-wrap li {
  margin:0;
  padding:0;
  border:none;
  list-style:none;
}

*{margin:0;padding:0;box-sizing:border-box}

/* ===== Header ===== */
#player-wrap h1.title{
  font-size:18px;
  font-weight:600;
  color:var(--accent);
  margin-bottom:10px;
}

/* ===== Toolbar ===== */
.toolbar{
  display:flex;
  gap:6px;
  margin:6px 0 6px;
  flex-wrap:nowrap;
  align-items:center;
}
.toolbar select,.toolbar input,.toolbar button{
  padding:7px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--bg-input);
  color:var(--text-primary);
  font-size:13px;
  transition:border-color .2s;
}
.toolbar select{min-width:0;flex:3;cursor:pointer}
.toolbar select:focus,.toolbar input:focus{
  outline:none;
  border-color:var(--accent);
}
.toolbar input{flex:4;min-width:60px}
.toolbar input::placeholder{color:var(--text-muted)}
.toolbar button{
  flex-shrink:0;
  background:var(--accent);
  color:#fff;
  border:none;
  cursor:pointer;
  font-weight:500;
  white-space:nowrap;
}
.toolbar button:hover{background:var(--accent-hover)}

/* ===== Category Select ===== */
.cat-bar{
  margin:0 8px 0 0;
}
.cat-bar select{
  max-width:160px;
  min-width:80px;
  width:auto;
  padding:7px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--bg-input);
  color:var(--text-primary);
  font-size:13px;
  cursor:pointer;
  transition:border-color .2s;
}
.cat-bar select:focus{
  outline:none;
  border-color:var(--accent);
}

/* ===== Status Bar ===== */
.status-bar{
  background:var(--bg-card);
  padding:2px 6px;
  border-radius:6px;
  margin:6px 0;
  font-size:12px;
  color:var(--text-secondary);
  border:0px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.status-bar .next-ep-btn{
  flex-shrink:0;
  padding:2px 10px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
  transition:background .15s;
  display:none;
}
.status-bar .next-ep-btn:hover{background:var(--accent-hover)}

/* ===== Player ===== */
.player-box{
  background:var(--bg-player);
  border-radius:10px;
  overflow:hidden;
  margin:0px;
  position:relative;
  height:0;
  transition:height .3s;
}
.player-box.playing{
  height:auto;
}
#player{width:100%;aspect-ratio:16/9;background:#000;display:block}

/* ===== Grid ===== */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
  gap:12px;
  margin:12px 0;
}
.video-card{
  background:var(--bg-card);
  border-radius:var(--card-radius);
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  border:1px solid var(--border);
  position:relative;
}
.video-card:hover{
  transform:translateY(-3px);
  box-shadow:0 4px 16px var(--shadow);
}
.video-card .poster-wrap{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  overflow:hidden;
  background:var(--bg-card);
}
.video-card .poster{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.video-card .poster-fallback{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,var(--bg-card),var(--bg-toolbar));
  color:var(--text-muted);
  font-size:32px;
}
.video-card .card-badge{
  position:absolute;
  top:6px;
  right:6px;
  padding:2px 7px;
  border-radius:4px;
  font-size:10px;
  font-weight:600;
  backdrop-filter:blur(4px);
}
.card-badge.playable{background:rgba(46,125,50,.85);color:#fff}
.card-badge.unplayable{background:rgba(97,97,97,.75);color:#bdbdbd}
.video-card .card-info{
  padding:8px 10px;
}
.video-card .card-title{
  font-size:13px;
  color:var(--text-primary);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-weight:500;
}
.video-card .card-meta{
  font-size:11px;
  color:var(--text-secondary);
  margin-top:3px;
  display:flex;
  gap:6px;
  align-items:center;
}
.video-card .card-meta .sep{color:var(--text-muted)}

/* ===== Episode Panel ===== */
.ep-panel{
  display:none;
}
.ep-panel.open{
  display:block;
  background:var(--bg-eplist);
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 var(--card-radius) var(--card-radius);
  margin-top:-1px;
  max-height:320px;
  overflow-y:auto;
}
.ep-panel .ep-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 10px;
  font-size:11px;
  color:var(--text-muted);
  background:var(--bg-eplist-alt);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:1;
}
.ep-panel .ep-header .ep-count{color:var(--text-secondary)}
.ep-panel .ep-header .ep-close{
  background:none;
  border:none;
  color:var(--text-muted);
  cursor:pointer;
  font-size:14px;
  padding:2px 6px;
  border-radius:3px;
}
.ep-panel .ep-header .ep-close:hover{color:var(--accent);background:rgba(255,107,53,0.1)}
.ep-item{
  cursor:pointer;
  padding:4px 10px;
  font-size:12px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
  color:var(--text-secondary);
}
.ep-item:last-child{border-bottom:none}
.ep-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.ep-item .epchecked{font-size:10px;margin-left:6px;flex-shrink:0}

/* ===== Footer ===== */
.tvbox-footer{
  text-align:center;
  padding:12px 0 6px;
  margin-top:12px;
  font-size:11px;
  color:var(--text-muted);
  border:none;
  background:none;
}
.tvbox-footer span{margin:0 6px}

/* ===== Pagination ===== */
.pagination{
  display:flex;
  gap:3px;
  justify-content:center;
  margin:12px 0;
  flex-wrap:nowrap;
}
.pagination button{
  padding:3px 8px;
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--bg-card);
  color:var(--text-secondary);
  cursor:pointer;
  font-size:12px;
  transition:all .15s;
  min-width:26px;
}
.pagination button:hover:not(.active):not(:disabled){
  background:var(--bg-card-hover);
  border-color:var(--accent);
  color:var(--accent);
}
.pagination button.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.pagination button:disabled{
  opacity:0.35;
  cursor:default;
}

/* ===== Empty/loading ===== */
.empty-state{
  text-align:center;
  padding:50px 20px;
  color:var(--text-muted);
}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .desc{font-size:13px}
.empty-state .sub{font-size:11px;margin-top:4px;opacity:.7}

/* ===== Scrollbar ===== */
.ep-panel::-webkit-scrollbar{width:4px}
.ep-panel::-webkit-scrollbar-track{background:transparent}
.ep-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== Responsive ===== */
@media(max-width:600px){
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .video-card .card-info{padding:6px 8px}
  .video-card .card-title{font-size:12px}
  #player-wrap h1.title{font-size:16px}
  .toolbar select,.toolbar input,.toolbar button{font-size:12px;padding:6px 8px}
  .ep-panel.open{max-height:282px}
  .pagination{gap:2px}
  .pagination button{padding:2px 5px;font-size:10px;min-width:20px}
}
</style></head><body>
<div id="player-wrap">
<h1 class="title">超级播霸</h1>
<div class="toolbar">
  <select id="sourceSelect" onchange="switchSource()">
    <option value="">— 选择数据源 —</option>
  </select>
  <input type="text" id="searchInput" placeholder="全局搜索影片...">
  <button onclick="doSearch()">搜索</button>
  <button id="stopSearchBtn" onclick="stopSearch()" style="display:none">停止</button>
</div>
<div class="player-box">
  <video id="player" controls playsinline></video>
</div>
<div id="status" class="status-bar">
  <div class="cat-bar" id="catBar"></div>
  <span id="statusText">[STOP] 选择一个数据源</span>
  <button id="nextEpBtn" class="next-ep-btn" onclick="playNext()">下集</button>
</div>
<div id="content"></div>
<div class="pagination" id="pagination"></div>
<div class="tvbox-footer" id="tvboxFooter"></div>

<script>
var PAGE_SIZE = 12;
var currentData = null, currentPage = 1, currentFiltered = [], currentHls = null;
var currentEpNext = null;
var currentCategory = '';
var allSearchResults = [];   // 全局搜索原始结果，分类过滤以此为基准
var sourceIndex = [];     // 索引数据 [{name, prefix, page_count, file, total, playable}]
var loadedSources = {};   // 已加载的分片缓存 {key: data}
var sourceMeta = {};      // {prefix: {page_count, name, total, playable, total_episodes}}
var currentPrefix = '';
var currentFilePage = 1;
var currentSearchMode = false;
var isSearching = false; // 搜索进行中锁
var searchVersion = 0;   // 搜索版本号，用于取消过期搜索

/* ===== 主题自动适配 ===== */
(function(){
  var t = document.documentElement.getAttribute('data-theme');
  if(!t){
    // 检测 Hexo Butterfly 父页面主题
    try{
      var p = window.parent.document.documentElement;
      var pt = p.getAttribute('data-theme');
      if(pt === 'dark' || pt === 'light') t = pt;
    }catch(e){}
  }
  // prefers-color-scheme 兜底
  if(!t){
    t = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', t);
})();

/* ===== 通用加载函数：script 标签注入，读取 window._TVBOX_INDEX / _TVBOX_SITE_DATA ===== */
function loadData(file, callback, timeout) {
  var key = (file === 'index.js') ? '_TVBOX_INDEX' : '_TVBOX_SITE_DATA';
  var src = './data/' + file;
  var s = document.createElement('script');
  var timer = setTimeout(function() {
    s.onload = null;
    s.onerror = null;
    if (s.parentNode) s.parentNode.removeChild(s);
    callback(null);
  }, timeout || 3000);
  s.onerror = function() { clearTimeout(timer); callback(null); };
  s.onload = function() {
    clearTimeout(timer);
    var data = window[key];
    delete window[key];
    callback(data || null);
  };
  s.src = src;
  document.head.appendChild(s);
}

/* ===== 加载索引 ===== */
function loadIndex() {
  var timeout = setTimeout(function() {
    setEmpty('\u23f3 \u7d27\u5f20\u52a0\u8f7d\u4e2d...', '\u7b49\u5f85 data/ \u7d27\u5f20\u52a0\u8f7d\uff0c\u6216\u68c0\u67e5\u7f51\u7edc\u8fde\u63a5');
  }, 10000);
  loadData('index.js', function(data) {
    clearTimeout(timeout);
    if (!data) {
      setEmpty('\u23f3 \u7d27\u5f20\u52a0\u8f7d\u4e2d...', '\u7b49\u5f85 data/ \u7d27\u5f20\u52a0\u8f7d\uff0c\u6216\u68c0\u67e5\u7f51\u7edc\u8fde\u63a5');
      return;
    }
    sourceIndex = data;
    if (!sourceIndex.length) {
      setEmpty('\u274c \u65e0\u6570\u636e\uff0c\u8bf7\u5148\u8fd0\u884c\u722c\u866b', '\u8bf7\u786e\u4fdd data/ \u76ee\u5f55\u4e0b\u6709\u6570\u636e\u6587\u4ef6');
      return;
    }
    var sel = document.getElementById('sourceSelect'), ta = 0, pa = 0;
    // 统计同名数量，用于去重显示
    var nameCount = {};
    sourceIndex.forEach(function(item) {
      nameCount[item.name] = (nameCount[item.name] || 0) + 1;
    });
    var nameSeen = {};
    sourceIndex.forEach(function(item) {
      ta += item.total||0;
      pa += item.playable||0;
      var displayName = item.name;
      if (nameCount[item.name] > 1) {
        nameSeen[item.name] = (nameSeen[item.name] || 0) + 1;
        displayName = item.name + '（站' + ['一','二','三','四','五','六','七','八','九'][nameSeen[item.name] - 1] + '）';
      }
      var o = document.createElement('option');
      o.value = item.prefix;
      o.textContent = displayName;
      sel.appendChild(o);
      // 缓存元数据供翻页 & 搜索
      sourceMeta[item.prefix] = {
        page_count: item.page_count || 1,
        name: displayName,
        total: item.total,
        playable_videos: item.playable_videos || 0,
        playable: item.playable,
        total_episodes: item.total_episodes,
        categories: item.categories || {}
      };
    });
    document.getElementById('tvboxFooter').innerHTML =
      '<span>\u6570\u636e\u6e90 ' + sourceIndex.length + '</span><span>\u603b\u5730\u5740 ' + ta + '</span><span>\u53ef\u64ad\u653e ' + pa + '</span>';
    sel.value = sourceIndex[0].prefix;
    switchSource();
  });
}

/* ===== 切源 / 翻页核心 ===== */
function switchSource() {
  var prefix = document.getElementById('sourceSelect').value;
  if (!prefix) {
    document.getElementById('content').innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
    setStatus('\u23f9 \u9009\u62e9\u6570\u636e\u6e90');
    return;
  }
  currentPrefix = prefix;
  currentFilePage = 1;
  currentPage = 1;
  currentSearchMode = false;
  document.getElementById('searchInput').value = '';
  loadPageFile(prefix, 1);
}

function loadPageFile(prefix, pageNum) {
  var fname = prefix + '-' + String(pageNum).padStart(2, '0') + '.js';

  if (loadedSources[fname]) {
    useSourceData(loadedSources[fname], fname, pageNum);
    return;
  }

  document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">\u26cf</div><div class="desc">\u52a0\u8f7d\u4e2d...</div></div>';
  document.getElementById('pagination').innerHTML = '';

  loadData(fname, function(data) {
    if (!data) {
      document.getElementById('content').innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      setStatus('\u274c \u6570\u636e\u52a0\u8f7d\u5931\u8d25: ' + fname);
      return;
    }
    loadedSources[fname] = data;
    useSourceData(data, fname, pageNum);
  });
}

function useSourceData(data, file, pageNum) {
  currentData = data;
  currentFilePage = pageNum || 1;
  currentPage = 1;
  if (!currentData || !currentData.videos) {
    document.getElementById('content').innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
    setStatus('\u274c \u6570\u636e\u683c\u5f0f\u9519\u8bef');
    return;
  }
  currentCategory = '';
  buildCatBar();
  var meta = sourceMeta[currentPrefix];
  var vidCount = (currentData.videos||[]).length;
  setStatus('\ud83d\udce1 ' + currentData.name + ' \u2014 \u7b2c' + currentFilePage + '\u9875');

  currentFiltered = tagWithSource(currentData.videos, file, currentData.name);
  render();
}

/* ===== 停止搜索 ===== */
function stopSearch() {
  isSearching = false;
  searchVersion++;  // 使当前搜索的异步回调全部失效
  document.getElementById('stopSearchBtn').style.display = 'none';
  setStatus('\u23f9 \u641c\u7d22\u5df2\u505c\u6b62 \u2014 ' + currentFiltered.length + '\u4e2a\u7ed3\u679c');
}

/* ===== 全局搜索（扁平遍历：直接从 sourceIndex 展开所有文件路径） ===== */
function doSearch() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();

  if (!q) {
    currentSearchMode = false;
    currentCategory = '';
    currentPage = 1;
    loadPageFile(currentPrefix, currentFilePage);
    return;
  }

  if (isSearching) return;
  isSearching = true;
  document.getElementById('stopSearchBtn').style.display = '';

  var thisVersion = ++searchVersion;

  currentFiltered = [];
  allSearchResults = [];
  currentPage = 1;
  currentSearchMode = true;

  // 扁平化：所有需要搜索的文件列表
  var allFiles = [];
  sourceIndex.forEach(function(src) {
    var pc = src.page_count || 1;
    for (var i = 1; i <= pc; i++) {
      allFiles.push({
        fname: src.prefix + '-' + String(i).padStart(2, '0') + '.js',
        name: src.name
      });
    }
  });

  var totalFiles = allFiles.length;
  var loadedFiles = 0;

  setStatus('\ud83d\udd0d \u641c\u7d22\u4e2d: 0/' + totalFiles + ' \u2014 \u201c' + q + '\u201d');

  // 顺序遍历
  var idx = 0;

  function loadNext() {
    if (searchVersion !== thisVersion) { isSearching = false; return; }
    if (idx >= allFiles.length) {
      isSearching = false;
      document.getElementById('stopSearchBtn').style.display = 'none';
      setStatus('\ud83d\udd0d \u5168\u5c40\u641c\u7d22\u5b8c\u6210: \u201c' + q + '\u201d \u2014 ' + currentFiltered.length + '\u4e2a\u7ed3\u679c');
      return;
    }
    var f = allFiles[idx++];
    loadData(f.fname, function(data) {
      if (searchVersion !== thisVersion) { isSearching = false; document.getElementById('stopSearchBtn').style.display = 'none'; return; }
      loadedFiles++;
      if (data && data.videos) {
        data.videos.forEach(function(v) {
          // 只搜可播放的视频
          if (!v.playable_count) return;
          var match = (v.vod_name || '').toLowerCase().includes(q);
          if (match) {
            var item = {
              sourceKey: f.fname,
              sourceName: f.name,
              vod_name: v.vod_name,
              vod_pic: v.vod_pic,
              episodes: v.episodes,
              ep_count: v.ep_count,
              playable_count: v.playable_count,
              vod_class: v.vod_class,
            };
            currentFiltered.push(item);
            allSearchResults.push(item);
          }
        });
      }
      setStatus('\ud83d\udd0d \u641c\u7d22\u4e2d: ' + loadedFiles + '/' + totalFiles + ' \u2014 \u201c' + q + '\u201d \u2014 ' + currentFiltered.length + '\u4e2a\u7ed3\u679c');
      render();
      buildCatBarFromFiltered();
      loadNext();
    });
  }

  loadNext();
}



function tagWithSource(videos, key, name) {
  return (videos||[]).map(function(v) {
    v.sourceKey = key;
    v.sourceName = name;
    return v;
  });
}

/* ===== 分类下拉（优先用 index.js 预计算数据，兼容旧数据回退扫描） ===== */
function buildCatBar() {
  var meta = sourceMeta[currentPrefix];
  var cats = {}, totalVideos = 0;

  if (meta && meta.categories && Object.keys(meta.categories).length > 0) {
    // 新数据：用 index.js 预计算的全量统计（已修复为统计全部视频，不限可播放）
    cats = meta.categories;
    totalVideos = Object.values(cats).reduce(function(a,b){return a+b;}, 0);
  } else if (currentData && currentData.videos) {
    // 旧数据兼容：扫描当前页（数据量小，仅限当前页12个）
    totalVideos = currentData.videos.length;
    (currentData.videos||[]).forEach(function(v) {
      var cv = (v.vod_class || '').trim();
      if (!cv) {
        cats['未分类'] = (cats['未分类'] || 0) + 1;
      } else {
        cv.split(',').forEach(function(c) {
          c = c.trim();
          if (c) cats[c] = (cats[c] || 0) + 1;
        });
      }
    });
  } else {
    return;
  }

  var bars = document.getElementById('catBar');
  var playableVid = meta ? meta.playable_videos : 0;
  var totalVid = meta ? meta.total : 0;
  var h = '<select onchange="filterCat(this)">';
  h += '<option value="">全部 (' + (totalVid>99?'99+':totalVid) + '/' + (playableVid>99?'99+':playableVid) + ')</option>';
  Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}).forEach(function(c) {
    var cnt = cats[c] > 99 ? '99+' : cats[c];
    h += '<option value="' + c.replace(/&/g,'&amp;').replace(/"/g,'&quot;') + '">' + c + ' (' + cnt + ')</option>';
  });
  h += '</select>';
  bars.innerHTML = h;
}

/* ===== 从 currentFiltered 实时统计分类（用于全局搜索） ===== */
function buildCatBarFromFiltered() {
  var cats = {}, totalVideos = 0;
  currentFiltered.forEach(function(v) {
    totalVideos++;
    var cv = (v.vod_class || '').trim();
    if (!cv) {
      cats['未分类'] = (cats['未分类'] || 0) + 1;
    } else {
      cv.split(',').forEach(function(c) {
        c = c.trim();
        if (c) cats[c] = (cats[c] || 0) + 1;
      });
    }
  });

  var bars = document.getElementById('catBar');
  var h = '<select onchange="filterCat(this)">';
  h += '<option value="">全部 (' + allSearchResults.length + ')</option>';
  Object.keys(cats).sort(function(a, b) {
    if (a === '未分类') return 1;
    if (b === '未分类') return -1;
    return cats[b] - cats[a];
  }).forEach(function(c) {
    var cnt = cats[c] > 99 ? '99+' : cats[c];
    h += '<option value="' + c.replace(/&/g, '&amp;').replace(/"/g, '&quot;') + '">' + c + ' (' + cnt + ')</option>';
  });
  h += '</select>';
  bars.innerHTML = h;
}

function filterCat(sel) {
  currentCategory = sel.value;
  currentPage = 1;
  if (!currentCategory) {
    if (currentSearchMode) {
      // 全局搜索模式清空分类：恢复全部搜索结果
      currentCategory = '';
      currentFiltered = allSearchResults.slice();
      render();
      return;
    }
    // 正常模式：回到数据源翻页
    currentSearchMode = false;
    loadPageFile(currentPrefix, currentFilePage);
    return;
  }
  if (currentSearchMode) {
    // 全局搜索模式下选分类：从原始搜索结果过滤
    if (currentCategory === '未分类') {
      currentFiltered = allSearchResults.filter(function(v) {
        return !(v.vod_class || '').trim();
      });
    } else {
      currentFiltered = allSearchResults.filter(function(v) {
        return (v.vod_class || '').split(',').some(function(s) {
          return s.trim() === currentCategory;
        });
      });
    }
    currentPage = 1;
    render();
    return;
  }
  // 正常单数据源模式：遍历全部页文件汇总
  filterByCategory();
}

function filterByCategory() {
  var meta = sourceMeta[currentPrefix];
  var pc = meta ? meta.page_count : 1;
  var results = [], loaded = 0;
  var cat = currentCategory;
  setStatus('[FILTER] ' + cat + ' — loading... (0/' + pc + ')');
  function update() { setStatus('[FILTER] ' + cat + ' — (' + loaded + '/' + pc + ')'); }
  function done() {
    loaded++;
    update();
    if (loaded < pc) return;
    currentFiltered = results;
    setStatus('[FILTER] ' + cat + ' — ' + results.length + ' results');
    currentPage = 1;
    render();
  }
  for (var p = 1; p <= pc; p++) {
    (function(pn){
      var fn = currentPrefix + '-' + String(pn).padStart(2, '0') + '.js';
      if (loadedSources[fn]) { collectCat(loadedSources[fn], cat, results); done(); return; }
      loadData(fn, function(data) {
        if (data) loadedSources[fn] = data;
        if (data) collectCat(data, cat, results);
        done();
      });
    })(p);
  }
}

function collectCat(src, cat, results) {
  if (!src || !src.videos) return;
  src.videos.forEach(function(v) {
    var classes = (v.vod_class || '').split(',');
    var match = classes.some(function(s){ return s.trim() === cat; });
    if (match) {
      results.push({
        sourceKey: currentPrefix,
        sourceName: src.name,
        vod_name: v.vod_name,
        vod_pic: v.vod_pic,
        episodes: v.episodes,
        ep_count: v.ep_count,
        playable_count: v.playable_count,
        vod_class: v.vod_class,
      });
    }
  });
}

/* ===== 渲染卡片 ===== */
function render() {
  var total = currentFiltered.length, pages = Math.ceil(total/PAGE_SIZE)||1;
  if (currentPage>pages) currentPage=pages;
  var start=(currentPage-1)*PAGE_SIZE, items=currentFiltered.slice(start,start+PAGE_SIZE);

  // 顶部统计
  var allEps=0, allPlayable=0;
  items.forEach(function(v){allEps+=v.ep_count||0;allPlayable+=v.playable_count||0});

  var h = '';
  // 网格
  h += '<div class="video-grid">';
  items.forEach(function(v,i) {
    var eid = 'eps_' + currentPage + '_' + i;
    var img = v.vod_pic || '';
    var badgeClass = v.playable_count>0 ? 'playable' : 'unplayable';
    var badgeText = v.playable_count>0 ? '\u53ef\u64ad' : '\u5f85\u9a8c\u8bc1';
    var epInfo = (v.ep_count||0) + '\u96c6';
    if(v.playable_count>0) epInfo += ' \u00b7 ' + v.playable_count + '\u53ef\u64ad';

    h += '<div class="video-card" onclick="toggleEpisodes(this,\'' + eid + '\')">';
    h += '<div class="poster-wrap">';
    if (img) {
      h += '<img class="poster" src="' + img.replace(/&/g,'&amp;').replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=poster-fallback>\ud83c\udfac</div>\'">';
    } else {
      h += '<div class="poster-fallback">\ud83c\udfac</div>';
    }
    h += '<span class="card-badge ' + badgeClass + '">' + badgeText + '</span>';
    h += '</div>';
    h += '<div class="card-info"><div class="card-title">' + escHtml(v.vod_name||'') + '</div>';
    h += '<div class="card-meta">' + (v.sourceName?escHtml(v.sourceName)+' \u00b7 ':'') + epInfo + '</div></div></div>';

    // 剧集面板（与卡片平级，Grid 自动布局）
    h += '<div class="ep-panel" id="' + eid + '">';
    h += '<div class="ep-header"><span class="ep-count">\u5267\u96c6 (' + (v.episodes||[]).length + ')</span><button class="ep-close" onclick="event.stopPropagation();closeEp(\'' + eid + '\')">\u2716</button></div>';
    (v.episodes||[]).forEach(function(e){
      var eb = e.playable ? '' : ' \u26a0';
      h += '<div class="ep-item" onclick="event.stopPropagation();playEp(this)" data-url="' + escAttr(e.url||'') + '" data-name="' + escAttr((v.vod_name||'') + ' - ' + (e.title||'')) + '">' + escHtml(e.title||'') + eb + '</div>';
    });
    h += '</div>';  // close ep-panel
  });  // close items.forEach
  h += '</div>';  // close video-grid

  if (!items.length) {
    h = '<div class="empty-state"><div class="icon">\ud83d\udd0d</div><div class="desc">\u65e0\u5339\u914d\u7ed3\u679c</div><div class="sub">\u8bd5\u8bd5\u5176\u4ed6\u5173\u952e\u8bcd</div></div>';
  }

  document.getElementById('content').innerHTML = h;

  // 分页：页文件导航 or 内存分页（搜索/分类筛选模式）
  var pg = '';
  if (currentSearchMode) {
    // 搜索/分类筛选模式：内存分页
    var total = currentFiltered.length;
    var pages = Math.ceil(total / PAGE_SIZE) || 1;
    pg += '<button onclick="go(1)"' + (currentPage<=1?' disabled':'') + '>«</button>';
    pg += '<button onclick="go(' + (currentPage-1) + ')"' + (currentPage<=1?' disabled':'') + '>‹</button>';
    var startP = Math.max(1, currentPage-2), endP = Math.min(pages, currentPage+2);
    for (var pi=startP; pi<=endP; pi++)
      pg += '<button class="' + (pi===currentPage?'active':'') + '" onclick="go(' + pi + ')">' + pi + '</button>';
    pg += '<button onclick="go(' + (currentPage+1) + ')"' + (currentPage>=pages?' disabled':'') + '>›</button>';
    pg += '<button onclick="go(' + pages + ')"' + (currentPage>=pages?' disabled':'') + '>»</button>';
  } else if (currentPrefix && sourceMeta[currentPrefix]) {
    var pc = sourceMeta[currentPrefix].page_count || 1;
    pg += '<button onclick="goPage(1)"' + (currentFilePage<=1?' disabled':'') + '>«</button>';
    pg += '<button onclick="goPage(' + (currentFilePage-1) + ')"' + (currentFilePage<=1?' disabled':'') + '>‹</button>';
    var startP = Math.max(1, currentFilePage-2), endP = Math.min(pc, currentFilePage+2);
    for (var pi=startP; pi<=endP; pi++)
      pg += '<button class="' + (pi===currentFilePage?'active':'') + '" onclick="goPage(' + pi + ')">' + pi + '</button>';
    pg += '<button onclick="goPage(' + (currentFilePage+1) + ')"' + (currentFilePage>=pc?' disabled':'') + '>›</button>';
    pg += '<button onclick="goPage(' + pc + ')"' + (currentFilePage>=pc?' disabled':'') + '>»</button>';
  }
  document.getElementById('pagination').innerHTML = pg;
}

/* ===== 工具函数 ===== */
function goPage(n) {
  if (!currentPrefix || n < 1) return;
  var meta = sourceMeta[currentPrefix];
  var pc = meta ? meta.page_count : 1;
  if (n > pc) n = pc;
  if (n !== currentFilePage) { loadPageFile(currentPrefix, n); return; }
  currentPage = n;
  render();
}
function go(p){
  if (currentSearchMode) {
    // 搜索/分类筛选模式：内存分页
    var total = currentFiltered.length;
    var maxPages = Math.ceil(total / PAGE_SIZE) || 1;
    if (p < 1) p = 1;
    if (p > maxPages) p = maxPages;
    currentPage = p;
    render();
    return;
  }
  goPage(p);
}

function toggleEpisodes(el, id){
  var panel = document.getElementById(id);
  if(!panel) return;
  var isOpen = panel.classList.contains('open');
  // 关闭所有其他面板
  document.querySelectorAll('.ep-panel.open').forEach(function(p){
    if(p.id!==id) p.classList.remove('open');
  });
  panel.classList.toggle('open');
}
function closeEp(id){
  var el = document.getElementById(id);
  if(el) el.classList.remove('open');
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function setStatus(t){
  document.getElementById('statusText').textContent = t;
}
function setEmpty(t, sub){
  var h = '<div class="empty-state"><div class="icon">\ud83d\udcfa</div><div class="desc">' + t + '</div>';
  if(sub) h += '<div class="sub">' + sub + '</div>';
  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

/* ===== 播放 ===== */
function playEp(el) {
  var url = el.dataset.url;
  var name = el.dataset.name;
  if (!url) return;
  // 查找下一集
  var items = el.parentElement.querySelectorAll('.ep-item');
  var idx = Array.from(items).indexOf(el);
  currentEpNext = idx < items.length - 1 ? items[idx + 1] : null;
  document.getElementById('nextEpBtn').style.display = currentEpNext ? 'inline' : 'none';
  doPlay(url, name);
}
function doPlay(url, name) {
  if(currentHls){currentHls.destroy();currentHls=null;}
  var v = document.getElementById('player');
  v.pause();
  v.removeAttribute('src');
  v.load();
  document.querySelector('.player-box').classList.add('playing');

  if(url.indexOf('.m3u8')>=0){
    if(Hls.isSupported()){
      try{
        var hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(v);
        currentHls = hls;
      }catch(e){
        v.src = url;
      }
    } else if(v.canPlayType('application/vnd.apple.mpegurl')){
      v.src = url;
    } else {
      setStatus('\u274c \u6d4f\u89c8\u5668\u4e0d\u652f\u6301 m3u8\u64ad\u653e');
      return;
    }
  } else {
    v.src = url;
  }
  v.play().catch(function(){});
  setStatus('\u25b6 ' + name);
}

/* ===== 下一集 ===== */
function playNext() {
  if (currentEpNext) {
    playEp(currentEpNext);
  }
}
document.getElementById('player').addEventListener('ended', function() {
  playNext();
  // 无下一集时收起播放器
  if (!currentEpNext) {
    document.querySelector('.player-box').classList.remove('playing');
  }
});

/* ===== 搜索按键 ===== */
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && document.activeElement===document.getElementById('searchInput')){
    doSearch();
  }
  // N 键下一集（全屏时可用）
  if((e.key==='n'||e.key==='N') && currentEpNext){
    e.preventDefault();
    playNext();
  }
});

loadIndex();
