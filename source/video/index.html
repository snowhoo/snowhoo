<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影广场 · 聚合播放器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a12; font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif; color: #efefef; padding: 1rem; }
        .header { margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.7rem; background: linear-gradient(135deg, #e6b422, #f78c6e); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; align-items: center; }
        .controls input, .controls select { background: #1e1e2a; border: 1px solid #2c2c3a; padding: 0.5rem 1rem; border-radius: 32px; color: white; outline: none; }
        .controls input { flex: 1; min-width: 180px; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .movie-card { background: #15151f; border-radius: 1rem; overflow: hidden; transition: 0.2s; cursor: pointer; border: 1px solid #2a2a38; }
        .movie-card:hover { transform: translateY(-6px); box-shadow: 0 15px 25px rgba(0,0,0,0.5); border-color: #e6b42288; }
        .card-poster { aspect-ratio: 2/3; background: #0b0b12; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-poster img { width: 100%; height: 100%; object-fit: cover; }
        .play-icon { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #e6b422; }
        .card-info { padding: 0.7rem 0.8rem 0.9rem; }
        .card-info h3 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-tag { font-size: 0.65rem; background: #2a2a3a; display: inline-block; padding: 0.2rem 0.5rem; border-radius: 20px; margin-top: 6px; color: #e6b422; }
        .empty-message { text-align: center; padding: 3rem; color: #aaa; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 3000; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(16px); }
        .modal.active { display: flex; }
        .video-wrapper { width: 90%; max-width: 1100px; background: black; border-radius: 20px; overflow: hidden; }
        #video-player { width: 100%; max-height: 75vh; background: black; }
        .modal-footer { width: 90%; max-width: 1100px; margin-top: 1rem; display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); border-radius: 60px; padding: 0.5rem 1.2rem; }
        .close-modal-btn { background: #e6b422; border: none; border-radius: 32px; padding: 0.4rem 1.2rem; font-weight: bold; cursor: pointer; }
        .loading { text-align: center; padding: 2rem; color: #e6b422; }
    </style>
</head>
<body>
<div class="header">
    <h1>🎬 电影广场 · 聚合播放器</h1>
</div>
<div class="controls">
    <input type="text" id="searchInput" placeholder="搜索影片名称...">
    <select id="sourceFilter"></select>
    <button id="reloadBtn" style="background:#e6b422; border:none; border-radius:32px; padding:0.4rem 1rem; cursor:pointer;">🔄 刷新</button>
</div>
<div id="moviesGrid" class="movies-grid">
    <div class="loading">加载数据中...</div>
</div>

<div id="videoModal" class="modal">
    <div class="video-wrapper">
        <video id="video-player" controls preload="auto"></video>
    </div>
    <div class="modal-footer">
        <div id="modalMovieTitle" style="color:white;"></div>
        <button class="close-modal-btn" id="closeModalBtn">关闭</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    let allMovies = [];
    let currentFilter = 'all';
    let hlsInstance = null;

    const moviesGrid = document.getElementById('moviesGrid');
    const searchInput = document.getElementById('searchInput');
    const sourceFilter = document.getElementById('sourceFilter');
    const reloadBtn = document.getElementById('reloadBtn');
    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('video-player');
    const modalTitleSpan = document.getElementById('modalMovieTitle');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function closeModal() {
        videoModal.classList.remove('active');
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        videoPlayer.pause();
        videoPlayer.src = '';
    }

    function playVideo(url, title) {
        if (!url) { alert("无播放地址"); return; }
        if (hlsInstance) hlsInstance.destroy();
        modalTitleSpan.innerText = title || "正在播放";
        videoModal.classList.add('active');
        const isM3U8 = url.toLowerCase().includes('.m3u8');
        if (isM3U8 && Hls && Hls.isSupported()) {
            hlsInstance = new Hls({ enableWorker: true });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoPlayer);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play().catch(e=>console.warn));
            hlsInstance.on(Hls.Events.ERROR, (_, data) => { if(data.fatal) { alert("流加载失败"); closeModal(); } });
        } else {
            videoPlayer.src = url;
            videoPlayer.play().catch(e => alert("播放失败: "+e.message));
        }
    }

    function renderMovies() {
        let filtered = allMovies;
        if (currentFilter !== 'all') filtered = filtered.filter(m => m.source === currentFilter);
        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword) filtered = filtered.filter(m => m.title.toLowerCase().includes(keyword));
        if (!filtered.length) {
            moviesGrid.innerHTML = '<div class="empty-message">🎬 没有找到影片，试试其他关键词或稍后再试</div>';
            return;
        }
        let html = '';
        for (let m of filtered) {
            const cover = m.cover || 'https://placehold.co/300x450/2a2a36/e6b422?text=🎬';
            html += `
                <div class="movie-card" data-url="${escapeHtml(m.videoUrl)}" data-title="${escapeHtml(m.title)}">
                    <div class="card-poster">
                        <img src="${escapeHtml(cover)}" loading="lazy" onerror="this.src='https://placehold.co/300x450/2a2a36/e6b422?text=📷'">
                        <div class="play-icon">▶️</div>
                    </div>
                    <div class="card-info">
                        <h3>${escapeHtml(m.title.length > 28 ? m.title.slice(0,28)+'…' : m.title)}</h3>
                        <div class="source-tag">${escapeHtml(m.source)}</div>
                    </div>
                </div>
            `;
        }
        moviesGrid.innerHTML = html;
        document.querySelectorAll('.movie-card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.dataset.url;
                const title = card.dataset.title;
                if (url) playVideo(url, title);
                else alert("无播放地址");
            });
        });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    async function loadData() {
        moviesGrid.innerHTML = '<div class="loading">⏳ 加载数据中...</div>';
        try {
            const response = await fetch('/data/all_movies.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            allMovies = data.movies || [];
            const sources = [...new Set(allMovies.map(m => m.source))];
            sourceFilter.innerHTML = '<option value="all">📌 所有来源</option>' + sources.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
            currentFilter = 'all';
            sourceFilter.value = 'all';
            renderMovies();
        } catch (err) {
            moviesGrid.innerHTML = `<div class="empty-message">❌ 数据加载失败: ${err.message}<br>请确保 GitHub Action 已成功运行并生成了 /data/all_movies.json</div>`;
        }
    }

    sourceFilter.addEventListener('change', () => { currentFilter = sourceFilter.value; renderMovies(); });
    searchInput.addEventListener('input', renderMovies);
    reloadBtn.addEventListener('click', loadData);
    closeModalBtn.addEventListener('click', closeModal);
    videoModal.addEventListener('click', (e) => { if (e.target === videoModal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && videoModal.classList.contains('active')) closeModal(); });

    loadData();
</script>
</body>
</html>
