<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hexo手机博客发布器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 100%;
            padding: 15px;
        }
        
        .header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 10px 10px;
            border-radius: 10px 10px 10px 10px;
            box-shadow: 0 4px 12px rgba(106, 17, 203, 0.2);
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
 color: white;
        }
        
        .header h1 i {
            font-size: 1.8rem;
        }
        
        .header p {
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .form-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f2f6;
        }
        
        .form-title i {
            color: #6a11cb;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #f8fafc;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6a11cb;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.5;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
        }
        
        .char-count {
            text-align: right;
            font-size: 0.85rem;
            color: #718096;
            margin-top: 5px;
        }
        
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .tag {
            background: #e9d8fd;
            color: #6a11cb;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tag i {
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .add-tag {
            display: flex;
            gap: 10px;
        }
        
        .add-tag input {
            flex-grow: 1;
        }
        
        .btn {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(106, 17, 203, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(106, 17, 203, 0.3);
        }
        
        .btn-secondary {
            background: #718096;
            box-shadow: 0 4px 10px rgba(113, 128, 150, 0.2);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 6px 15px rgba(113, 128, 150, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #38a169 0%, #2f855a 100%);
            box-shadow: 0 4px 10px rgba(56, 161, 105, 0.2);
        }
        
        .btn-success:hover {
            box-shadow: 0 6px 15px rgba(56, 161, 105, 0.3);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #d69e2e 0%, #b7791f 100%);
            box-shadow: 0 4px 10px rgba(214, 158, 46, 0.2);
        }
        
        .btn-warning:hover {
            box-shadow: 0 6px 15px rgba(214, 158, 46, 0.3);
        }
        
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-container .btn {
            flex: 1;
            min-width: 120px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #718096;
            font-size: 0.9rem;
            padding: 20px;
        }
        
        .preview-section {
            background: #f8fafc;
            border: 1.5px dashed #cbd5e0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        
        .preview-section h3 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .preview-content {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .preview-content h2 {
            color: #2d3436;
            margin-bottom: 10px;
        }
        
        .preview-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
        }
        
        .download-section {
            margin-top: 20px;
            padding: 20px;
            background: #f0fff4;
            border-radius: 10px;
            border: 1px solid #c6f6d5;
        }
        
        .download-section h3 {
            color: #2d3436;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .download-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        
        .download-info p {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .download-info i {
            color: #6a11cb;
            width: 20px;
        }
        
        .download-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .image-upload-section {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            border: 2px dashed #cbd5e0;
        }
        
        .image-upload-section h3 {
            color: #2d3436;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-area {
            border: 2px dashed #a0aec0;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            margin-bottom: 15px;
        }
        
        .upload-area:hover {
            border-color: #6a11cb;
            background: #f9f5ff;
        }
        
        .upload-area.dragover {
            border-color: #6a11cb;
            background: #f0e6ff;
        }
        
        .upload-area i {
            font-size: 3rem;
            color: #a0aec0;
            margin-bottom: 15px;
        }
        
        .upload-area:hover i {
            color: #6a11cb;
        }
        
        .upload-area p {
            color: #718096;
            margin-bottom: 10px;
        }
        
        .upload-area .btn-small {
            background: #6a11cb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .image-preview-container {
            display: none;
            margin-top: 15px;
        }
        
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .image-item {
            width: calc(33.333% - 10px);
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        
        .image-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }
        
        .image-item .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        
        .image-url-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .image-url-input input {
            flex-grow: 1;
        }
        
        .markdown-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        
        .markdown-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }
        
        .markdown-btn:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }
        
        .markdown-btn i {
            font-size: 0.9rem;
        }
        
        code {
            background: #f7fafc;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #e53e3e;
        }
        
        pre {
            background: #f7fafc;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            margin: 10px 0;
        }
        
        pre code {
            background: none;
            padding: 0;
            color: #2d3748;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 15px;
            }
            
            .form-section {
                padding: 15px;
            }
            
            .btn-container {
                flex-direction: column;
            }
            
            .btn-container .btn {
                width: 100%;
            }
            
            .download-buttons {
                flex-direction: column;
            }
            
            .image-item {
                width: calc(50% - 10px);
            }
            
            .markdown-toolbar {
                flex-direction: column;
            }
            
            .markdown-btn {
                width: 100%;
                justify-content: center;
            }
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #6a11cb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .success-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #38a169;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(56, 161, 105, 0.3);
            z-index: 1001;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .warning {
            background: #d69e2e;
        }
        
        .error {
            background: #e53e3e;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }
        
        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-mobile-alt"></i> Hexo手机博客发布器</h1>
        <!-- <p>随时随地发布您的Hexo博客文章</p> -->
    </div>
    
    <div class="container">
        <div class="form-section">
            <div class="form-title">
                <i class="fas fa-edit"></i> 文章内容
            </div>
            
            <div class="form-group">
                <label for="title"><i class="fas fa-heading"></i> 文章标题</label>
                <!--<input type="text" id="title" placeholder="请输入文章标题" maxlength="100" value="Hexo手机发布教程">//-->
                <input type="text" id="title" placeholder="请输入文章标题" maxlength="100" value="">
                <div class="char-count" id="title-count">15/100</div>
            </div>
            
            <div class="form-group">
                <label for="content"><i class="fas fa-align-left"></i> 文章内容 (Markdown格式)</label>
                
                <div class="markdown-toolbar" id="markdown-toolbar">
                    <button type="button" class="markdown-btn" data-insert="# "><i class="fas fa-heading"></i> 标题</button>
                    <button type="button" class="markdown-btn" data-insert="**粗体**"><i class="fas fa-bold"></i> 粗体</button>
                    <button type="button" class="markdown-btn" data-insert="*斜体*"><i class="fas fa-italic"></i> 斜体</button>
                    <button type="button" class="markdown-btn" data-insert="[链接](http://)"><i class="fas fa-link"></i> 链接</button>
                    <button type="button" class="markdown-btn" data-insert="![图片描述](图片URL)" id="insert-image-btn"><i class="fas fa-image"></i> 图片</button>
                    <button type="button" class="markdown-btn" data-insert="`代码`"><i class="fas fa-code"></i> 代码</button>
                    <button type="button" class="markdown-btn" data-insert="- 列表项"><i class="fas fa-list"></i> 列表</button>
                    <button type="button" class="markdown-btn" data-insert="> 引用"><i class="fas fa-quote-right"></i> 引用</button>
                </div>
                
                <textarea id="content" placeholder="请使用Markdown格式编写文章内容..." rows="12">
</textarea>
                <div class="char-count" id="content-count">0/5000</div>
            </div>
        </div>
        
        <!-- 图片上传部分 -->
        <div class="image-upload-section" id="image-upload-section">
            <h3><i class="fas fa-images"></i> 图片管理</h3>
            
            <div class="upload-area" id="upload-area">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>点击或拖放图片到此区域上传</p>
                <p style="font-size: 0.9rem; color: #a0aec0;">支持 JPG, PNG, GIF 格式，建议小于 2MB</p>
                <button type="button" class="btn-small" id="select-image-btn">
                    <i class="fas fa-folder-open"></i> 选择图片
                </button>
                <input type="file" id="image-input" accept="image/jpeg,image/png,image/gif" multiple style="display: none;">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
            
            <div class="image-url-input">
                <input type="text" id="image-url-input" placeholder="或输入图片URL地址 (如: https://example.com/image.jpg)">
                <button type="button" class="btn btn-secondary" id="insert-url-btn">插入URL</button>
            </div>
            
            <div class="image-preview-container" id="image-preview-container">
                <h4 style="margin-bottom: 10px; color: #4a5568;">已上传的图片</h4>
                <div class="image-preview" id="image-preview">
                    <!-- 图片预览会动态添加到这里 -->
                </div>
            </div>
        </div>
        
        <div class="form-section">
            <div class="form-title">
                <i class="fas fa-tags"></i> 文章分类与标签
            </div>
            
            <div class="form-group">
                <label for="category"><i class="fas fa-folder"></i> 文章分类</label>
                <select id="category">
                    <option value="">请选择分类</option>
                    <option value="随笔" selected>随笔</option>
                    <option value="无界之界">无界之界</option>
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> 文章标签</label>
                <div class="tag-container" id="tag-container">
                    <!-- 标签会动态添加到这里 -->
                </div>
                <div class="add-tag">
                    <input type="text" id="tag-input" placeholder="输入标签后按添加">
                    <button class="btn" id="add-tag-btn">添加</button>
                </div>
            </div>
        </div>
        
        <div class="form-section">
            <div class="form-title">
                <i class="fas fa-cog"></i> 发布设置
            </div>
            
            <div class="form-group">
                <label for="layout"><i class="fas fa-layer-group"></i> 文章布局</label>
                <select id="layout">
                    <option value="post" selected>post (默认)</option>
                    <option value="page">page (页面)</option>
                    <option value="draft">draft (草稿)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="far fa-calendar-alt"></i> 发布日期</label>
                <input type="datetime-local" id="date" value="">
            </div>
            
            <button class="btn" id="preview-btn">
                <i class="fas fa-eye"></i> 预览文章
            </button>
            
            <div class="preview-section" id="preview-section">
                <h3>文章预览</h3>
                <div class="preview-content" id="preview-content">
                    <!-- 预览内容会动态生成 -->
                </div>
            </div>
        </div>
        
        <div class="download-section" id="download-section">
            <h3><i class="fas fa-file-download"></i> 文件下载</h3>
            <div class="download-info" id="file-info">
                <p><i class="fas fa-file-alt"></i> <strong>文件名：</strong><span id="filename">未生成</span></p>
                <p><i class="fas fa-folder"></i> <strong>保存位置：</strong>浏览器默认下载目录</p>
                <p><i class="fas fa-info-circle"></i> <strong>使用说明：</strong>下载后放入Hexo博客的<code>source/_posts</code>目录</p>
            </div>
            <div class="download-buttons">
                <button class="btn btn-success" id="generate-file-btn">
                    <i class="fas fa-magic"></i> 生成并下载文章文件
                </button>
                <button class="btn btn-warning" id="download-images-btn">
                    <i class="fas fa-images"></i> 下载图片包
                </button>
                <button class="btn btn-secondary" id="copy-content-btn">
                    <i class="fas fa-copy"></i> 复制文章内容
                </button>
            </div>
        </div>
        
        <div class="btn-container">
            <button class="btn btn-secondary" id="save-draft-btn">
                <i class="fas fa-save"></i> 保存草稿
            </button>
            <button class="btn" id="publish-btn">
                <i class="fas fa-paper-plane"></i> 发布文章（模拟）
            </button>
        </div>
        
        <div class="footer">
            <p>Hexo手机发布器 &copy; 2023 | 支持Markdown格式 | 图片上传 | 适配移动端 | 直接下载Hexo文件</p>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loading-text">正在处理，请稍候...</p>
    </div>
    
    <div class="success-message" id="success-message">
        <i class="fas fa-check-circle"></i>
        <span id="success-text">操作成功！</span>
    </div>

    <script>
        // 初始化标签数组//let tags = ['Hexo', '教程', '移动端'];
        let tags = [];
        
        // 存储上传的图片
        let uploadedImages = [];
        
        // 初始化日期为当前时间
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            const localDateTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            document.getElementById('date').value = localDateTime;
            
            // 初始渲染标签
            renderTags();
            
            // 初始化字符计数
            updateCharCount();
            
            // 初始化图片上传功能
            initImageUpload();
        });
        
        // 字符计数
        const titleInput = document.getElementById('title');
        const contentInput = document.getElementById('content');
        const titleCount = document.getElementById('title-count');
        const contentCount = document.getElementById('content-count');
        
        // 更新字符计数
        function updateCharCount() {
            titleCount.textContent = titleInput.value.length + '/100';
            contentCount.textContent = contentInput.value.length + '/5000';
        }
        
        // 监听输入变化
        titleInput.addEventListener('input', updateCharCount);
        contentInput.addEventListener('input', updateCharCount);
        
        // 渲染标签
        function renderTags() {
            const tagContainer = document.getElementById('tag-container');
            tagContainer.innerHTML = '';
            
            tags.forEach(function(tag) {
                const tagElement = document.createElement('div');
                tagElement.className = 'tag';
                tagElement.innerHTML = tag + 
                    '<i class="fas fa-times" data-tag="' + tag + '"></i>';
                tagContainer.appendChild(tagElement);
            });
            
            // 添加标签删除事件
            document.querySelectorAll('.tag i').forEach(function(icon) {
                icon.addEventListener('click', function() {
                    const tagToRemove = this.getAttribute('data-tag');
                    tags = tags.filter(function(tag) {
                        return tag !== tagToRemove;
                    });
                    renderTags();

        // 处理图片文件 - 修复版
        function handleImageFiles(files) {
            if (!files || files.length === 0) {
                showMessage('没有选择图片文件', 'warning');
                return;
            }
            
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loading-text');
            const progressBar = document.getElementById('progress-bar');
            const progress = document.getElementById('progress');
            
            let totalFiles = 0;
            let processedFiles = 0;
            let failedFiles = 0;
            
            // 计算需要处理的文件数量
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type.match('image.*')) {
                    totalFiles++;
                }
            }
            
            if (totalFiles === 0) {
                showMessage('没有有效的图片文件', 'error');
                return;
            }
            
            loadingText.textContent = '正在处理图片 (0/' + totalFiles + ')...';
            loading.style.display = 'flex';
            progressBar.style.display = 'block';
            progress.style.width = '0%';
            
            // 逐个处理图片文件
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // 检查文件类型
                if (!file.type.match('image.*')) {
                    failedFiles++;
                    continue;
                }
                
                // 检查文件大小 (限制2MB，避免内存问题)
                if (file.size > 2 * 1024 * 1024) {
                    showMessage('文件 "' + file.name + '" 超过2MB限制，已跳过', 'warning');
                    failedFiles++;
                    continue;
                }
                
                // 使用更安全的方式处理图片
                processImageFile(file, function(imageData) {
                    if (imageData) {
                        uploadedImages.push(imageData);
                        updateImagePreview();
                        
                        // 生成Markdown图片语法并插入
                        const markdownImage = '![' + file.name + '](图片' + imageData.id + ')';
                        insertAtCursor(contentInput, markdownImage);
                    }
                    
                    processedFiles++;
                    
                    // 更新进度
                    const progressPercent = Math.round((processedFiles / totalFiles) * 100);
                    progress.style.width = progressPercent + '%';
                    loadingText.textContent = '正在处理图片 (' + processedFiles + '/' + totalFiles + ')...';
                    
                    // 所有文件处理完成
                    if (processedFiles + failedFiles === totalFiles) {
                        setTimeout(function() {
                            loading.style.display = 'none';
                            progressBar.style.display = 'none';
                            
                            if (processedFiles > 0) {
                                showMessage('成功上传 ' + processedFiles + ' 张图片！', 'success');
                            }
                            
                            if (failedFiles > 0) {
                                showMessage(failedFiles + ' 张图片上传失败', 'warning');
                            }
                        }, 500);
                    }
                });
            }
        }
        
        // 安全处理图片文件
        function processImageFile(file, callback) {
            try {
                // 创建图片对象进行压缩处理
                const img = new Image();
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    img.onload = function() {
                        // 创建canvas进行压缩
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // 计算压缩尺寸，限制最大宽度为800px
                        let width = img.width;
                        let height = img.height;
                        const maxWidth = 800;
                        
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        
                        // 绘制压缩后的图片
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 获取压缩后的dataUrl
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        
                        // 创建图片数据对象
                        const imageData = {
                            id: Date.now() + Math.random(),
                            name: file.name,
                            type: 'image/jpeg', // 统一转换为jpeg格式
                            size: file.size,
                            compressedSize: compressedDataUrl.length,
                            dataUrl: compressedDataUrl,
                            uploadedAt: new Date().toISOString()
                        };
                        
                        callback(imageData);
                    };
                    
                    img.onerror = function() {
                        console.error('图片加载失败:', file.name);
                        callback(null);
                    };
                    
                    img.src = e.target.result;
                };
                
                reader.onerror = function() {
                    console.error('文件读取失败:', file.name);
                    callback(null);
                };
                
                reader.readAsDataURL(file);
            } catch (error) {
                console.error('处理图片时出错:', error);
                callback(null);
            }
        }

        // 生成安全的文件名
        function generateFilename(title) {
            const cleanTitle = title
                .replace(/[^\w\u4e00-\u9fa5\s-]/g, '')
                .replace(/\s+/g, '-')
                .toLowerCase();
            
            const date = new Date();
            const dateStr = date.getFullYear() + '-' + 
                (date.getMonth() + 1).toString().padStart(2, '0') + '-' + 
                date.getDate().toString().padStart(2, '0');
            
            return dateStr + '-' + (cleanTitle || 'hexo-post') + '.md';
        }
        
        // 生成Hexo格式的文章内容
        function generateHexoContent(articleData) {
            let frontMatter = '---\n' +
                'title: ' + articleData.title + '\n' +
                'date: ' + articleData.date + '\n' +
                'categories: [' + articleData.category + ']\n';
            
            if (articleData.tags && articleData.tags.length > 0) {
                frontMatter += 'tags: [' + articleData.tags.map(function(tag) {
                    return '"' + tag + '"';
                }).join(', ') + ']\n';
            }
            
            frontMatter += 'layout: ' + articleData.layout + '\n' +
                '---\n\n';
            
            // 处理图片引用
            let content = articleData.content;
            if (articleData.images && articleData.images.length > 0) {
                // 在实际应用中，这里可以将图片上传到服务器并替换URL
                // 这里我们只是做个标记，提示用户需要手动处理图片
                content = content + '\n\n<!-- \n图片说明：\n' +
                    '文章中引用的图片需要手动上传到图床或服务器，并替换对应的图片URL。\n' +
                    '上传的图片总共有 ' + articleData.images.length + ' 张。\n' +
                    '-->';
            }
            
            return frontMatter + content;
        }

            loadingText.textContent = '正在打包图片...';

            // 创建图片下载函数
            function downloadImage(index) {
                if (index >= uploadedImages.length) {
                    loading.style.display = 'none';
                    showMessage('所有图片已下载完成！', 'success');
                    return;
                }
                
                const image = uploadedImages[index];
                loadingText.textContent = '正在下载图片 (' + (index + 1) + '/' + uploadedImages.length + ')...';
                
                // 将dataUrl转换为Blob
                const byteString = atob(image.dataUrl.split(',')[1]);
                const mimeString = image.dataUrl.split(',')[0].split(':')[1].split(';')[0];
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                
                for (let i = 0; i < byteString.length; i++) {
                    ia[i] = byteString.charCodeAt(i);
                }
                
                const blob = new Blob([ab], { type: mimeString });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'hexo-images/' + image.name;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                setTimeout(function() {
                    URL.revokeObjectURL(url);
                    // 下载下一张图片
                    setTimeout(function() {
                        downloadImage(index + 1);
                    }, 500);
                }, 100);
            }
            
            // 开始下载第一张图片

        // 简单的Markdown解析器
        function markedParse(markdown) {
            // 替换图片引用
            let html = markdown
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`{3}([\s\S]*?)`{3}/g, function(match, code) {
                    return '<pre><code>' + escapeHtml(code) + '</code></pre>';
                })
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                .replace(/^\> (.*$)/gm, '<blockquote>$1</blockquote>');
            
            // 处理图片
            html = html.replace(/!\[(.*?)\]\((.*?)\)/g, function(match, alt, src) {
                // 如果是本地上传的图片
                if (src.startsWith('图片')) {
                    const imageId = parseInt(src.replace('图片', ''));
                    const image = uploadedImages.find(function(img) {
                        return img.id === imageId;
                    });
                    
                    if (image) {
                        return '<img src="' + image.dataUrl + '" alt="' + alt + '" style="max-width:100%;border-radius:8px;margin:10px 0;">';
                    }
                }
                
                // 外部图片
                return '<img src="' + src + '" alt="' + alt + '" style="max-width:100%;border-radius:8px;margin:10px 0;">';
            });
            
            // 处理链接
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // 处理换行
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            
            return '<p>' + html + '</p>';
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
