<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="35%" stop-color="#a5d6a7"/>
      <stop offset="70%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#f1f8e9"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1b5e20" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空背景 -->
  <rect width="800" height="400" fill="url(#sky)" rx="16"/>

  <!-- 远景大圆装饰 -->
  <circle cx="780" cy="20" r="100" fill="#fff" opacity="0.08"/>
  <circle cx="20" cy="390" r="70" fill="#fff" opacity="0.06"/>

  <!-- 节气专属场景 -->
  
    <!-- 远山茶园 -->
    <path d="M0 300 Q200 265 400 285 Q600 250 800 270 L800 400 L0 400Z" fill="#a5d6a7" opacity="0.5"/>
    <path d="M100 285 Q250 255 400 272 Q550 245 700 262" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- 茶园层 -->
    <path d="M0 360 Q200 340 400 352 Q600 335 800 348 L800 400 L0 400Z" fill="#2e7d32" opacity="0.7"/>
    <!-- 采茶 -->
    <path d="M80 400 Q82 370 80 378" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M200 400 Q202 362 200 370" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M320 400 Q322 370 320 378" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M440 400 Q442 362 440 370" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M560 400 Q562 370 560 378" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M680 400 Q682 362 680 370" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- 谷雨茶芽 -->
    
      <path d="M90 360 Q94 350 90 358" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7"/>
      <ellipse cx="92" cy="352" rx="4" ry="6" fill="#81c784" opacity="0.8"/>
    
      <path d="M180 352 Q184 342 180 350" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7999999999999999"/>
      <ellipse cx="182" cy="344" rx="4" ry="6" fill="#81c784" opacity="0.8700000000000001"/>
    
      <path d="M270 344 Q274 334 270 342" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.8999999999999999"/>
      <ellipse cx="272" cy="336" rx="4" ry="6" fill="#81c784" opacity="0.9400000000000001"/>
    
      <path d="M360 360 Q364 350 360 358" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7"/>
      <ellipse cx="362" cy="352" rx="4" ry="6" fill="#81c784" opacity="0.8"/>
    
      <path d="M450 352 Q454 342 450 350" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7999999999999999"/>
      <ellipse cx="452" cy="344" rx="4" ry="6" fill="#81c784" opacity="0.8700000000000001"/>
    
      <path d="M540 344 Q544 334 540 342" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.8999999999999999"/>
      <ellipse cx="542" cy="336" rx="4" ry="6" fill="#81c784" opacity="0.9400000000000001"/>
    
      <path d="M630 360 Q634 350 630 358" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7"/>
      <ellipse cx="632" cy="352" rx="4" ry="6" fill="#81c784" opacity="0.8"/>
    
      <path d="M720 352 Q724 342 720 350" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7999999999999999"/>
      <ellipse cx="722" cy="344" rx="4" ry="6" fill="#81c784" opacity="0.8700000000000001"/>
    
    <!-- 雨水 -->
    <line x1="0" y1="0" x2="-4" y2="18" stroke="#4fc3f7" stroke-width="1.2" opacity="0.15"/><line x1="28" y1="12" x2="24" y2="30" stroke="#4fc3f7" stroke-width="1.2" opacity="0.22499999999999998"/><line x1="56" y1="24" x2="52" y2="42" stroke="#4fc3f7" stroke-width="1.2" opacity="0.3"/><line x1="84" y1="0" x2="80" y2="18" stroke="#4fc3f7" stroke-width="1.2" opacity="0.375"/><line x1="112" y1="12" x2="108" y2="30" stroke="#4fc3f7" stroke-width="1.2" opacity="0.15"/><line x1="140" y1="24" x2="136" y2="42" stroke="#4fc3f7" stroke-width="1.2" opacity="0.22499999999999998"/><line x1="168" y1="0" x2="164" y2="18" stroke="#4fc3f7" stroke-width="1.2" opacity="0.3"/><line x1="196" y1="12" x2="192" y2="30" stroke="#4fc3f7" stroke-width="1.2" opacity="0.375"/><line x1="224" y1="24" x2="220" y2="42" stroke="#4fc3f7" stroke-width="1.2" opacity="0.15"/><line x1="252" y1="0" x2="248" y2="18" stroke="#4fc3f7" stroke-width="1.2" opacity="0.22499999999999998"/><line x1="280" y1="12" x2="276" y2="30" stroke="#4fc3f7" stroke-width="1.2" opacity="0.3"/><line x1="308" y1="24" x2="304" y2="42" stroke="#4fc3f7" stroke-width="1.2" opacity="0.375"/><line x1="336" y1="0" x2="332" y2="18" stroke="#4fc3f7" stroke-width="1.2" opacity="0.15"/><line x1="364" y1="12" x2="360" y2="30" stroke="#4fc3f7" stroke-width="1.2" opacity="0.22499999999999998"/><line x1="392" y1="24" x2="388" y2="42" stroke="#4fc3f7" stroke-width="1.2" opacity="0.3"/>
    <!-- 布谷鸟 -->
    <ellipse cx="650" cy="200" rx="18" ry="12" fill="#66bb6a" opacity="0.8"/>
    <circle cx="665" cy="195" r="8" fill="#66bb6a"/>
    <path d="M673 195 L685 193 L673 197Z" fill="#ff8f00"/>
    <!-- 池塘浮萍 -->
    <ellipse cx="480" cy="378" rx="22" ry="10" fill="#2e7d32" opacity="0.6"/>
    <ellipse cx="520" cy="383" rx="18" ry="8" fill="#2e7d32" opacity="0.5"/>
    <circle cx="478" cy="376" r="3" fill="#f06292" opacity="0.8"/>
    <circle cx="522" cy="381" r="2.5" fill="#f06292" opacity="0.7"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0" y="320" width="800" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="250" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="400" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#1b5e20" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">谷雨</text>

  <!-- 拼音 -->
  <text x="400" y="246" text-anchor="middle" font-size="20"
    fill="#1b5e20" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Gǔyǔ</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#1b5e20" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="400" y="287" text-anchor="middle" font-size="15"
    fill="#1b5e20" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">04月19日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="400" y="378" text-anchor="middle" font-size="13"
    fill="#1b5e20" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">播种  ·  谷物  ·  雨润  ·  春末</text>
</svg>