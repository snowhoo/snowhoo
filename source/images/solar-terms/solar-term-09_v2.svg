<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="35%" stop-color="#ffecb3"/>
      <stop offset="70%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#fffde7"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#bf360c" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空背景 -->
  <rect width="800" height="400" fill="url(#sky)" rx="16"/>

  <!-- 远景大圆装饰 -->
  <circle cx="780" cy="20" r="100" fill="#fff" opacity="0.08"/>
  <circle cx="20" cy="390" r="70" fill="#fff" opacity="0.06"/>

  <!-- 节气专属场景 -->
  
    <!-- 梯田 -->
    <path d="M0 320 Q100 300 200 312 Q300 292 400 305 Q500 285 600 298 Q700 278 800 290 L800 400 L0 400Z" fill="#42a5f5" opacity="0.6"/>
    <path d="M0 345 Q100 325 200 337 Q300 317 400 330 Q500 310 600 323 Q700 303 800 315 L800 400 L0 400Z" fill="#1e88e5" opacity="0.7"/>
    <path d="M0 368 Q200 345 400 358 Q600 338 800 350 L800 400 L0 400Z" fill="#90caf9" opacity="0.8"/>
    <!-- 稻农插秧 -->
    <path d="M300 400 L300 368" stroke="#8d6e63" stroke-width="2.5"/>
    <circle cx="300" cy="360" r="8" fill="#8d6e63"/>
    <path d="M300 372 L280 385" stroke="#8d6e63" stroke-width="2"/><path d="M300 372 L315 383" stroke="#8d6e63" stroke-width="2"/>
    <!-- 秧苗 -->
    
      <path d="M280 400 Q282 390 280 395" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.6"/>
    
      <path d="M288 400 Q290 385 288 390" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.72"/>
    
      <path d="M296 400 Q298 390 296 395" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.84"/>
    
      <path d="M304 400 Q306 385 304 390" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.6"/>
    
      <path d="M312 400 Q314 390 312 395" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.72"/>
    
      <path d="M320 400 Q322 385 320 390" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.84"/>
    
      <path d="M328 400 Q330 390 328 395" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.6"/>
    
      <path d="M336 400 Q338 385 336 390" stroke="#66bb6a" stroke-width="1.5" fill="none" opacity="0.72"/>
    
    <!-- 芒种麦穗 -->
    
      <ellipse cx="80" cy="310" rx="4" ry="10" fill="#f9a825" opacity="0.7" transform="rotate(-8,80,310)"/>
    
      <ellipse cx="200" cy="322" rx="4" ry="10" fill="#f9a825" opacity="0.85" transform="rotate(-8,200,322)"/>
    
      <ellipse cx="320" cy="310" rx="4" ry="10" fill="#f9a825" opacity="0.7" transform="rotate(-8,320,310)"/>
    
      <ellipse cx="440" cy="322" rx="4" ry="10" fill="#f9a825" opacity="0.85" transform="rotate(-8,440,322)"/>
    
      <ellipse cx="560" cy="310" rx="4" ry="10" fill="#f9a825" opacity="0.7" transform="rotate(-8,560,310)"/>
    
      <ellipse cx="680" cy="322" rx="4" ry="10" fill="#f9a825" opacity="0.85" transform="rotate(-8,680,322)"/>
    
    <!-- 布谷催耕 -->
    <ellipse cx="680" cy="180" rx="16" ry="11" fill="#42a5f5" opacity="0.8"/>
    <circle cx="694" cy="175" r="7" fill="#42a5f5"/>
    <path d="M701 175 L713 173 L701 177Z" fill="#ff8f00"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0" y="320" width="800" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="250" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="400" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#bf360c" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">芒种</text>

  <!-- 拼音 -->
  <text x="400" y="246" text-anchor="middle" font-size="20"
    fill="#bf360c" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Mángzhòng</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#bf360c" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="400" y="287" text-anchor="middle" font-size="15"
    fill="#bf360c" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">06月05日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="400" y="378" text-anchor="middle" font-size="13"
    fill="#bf360c" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">收获  ·  播种  ·  农忙  ·  仲夏</text>
</svg>