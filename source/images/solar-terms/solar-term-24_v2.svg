    <ellipse cx="150" cy="272" rx="20" ry="12" fill="#90a4ae" opacity="0.8"/>
    <ellipse cx="150" cy="275" rx="25" ry="8" fill="#fff" opacity="0.9"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0" y="320" width="800" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="250" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="400" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#37474f" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">大寒</text>

  <!-- 拼音 -->
  <text x="400" y="246" text-anchor="middle" font-size="20"
    fill="#37474f" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Dàhán</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#37474f" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="400" y="287" text-anchor="middle" font-size="15"
    fill="#37474f" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">01月20日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="400" y="378" text-anchor="middle" font-size="13"
    fill="#37474f" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">极寒  ·  冰天  ·  岁末  ·  守岁</text>
</svg>