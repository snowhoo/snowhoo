<?xml version="1.0" encoding="UTF-8"?>
<svg width="1300" height="400" viewBox="0 0 1300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="35%" stop-color="#ffecb3"/>
      <stop offset="70%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#fffde7"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#bf360c" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空背景 -->
  <rect width="1300" height="400" fill="url(#sky)" rx="16"/>

  <!-- 远景大圆装饰 -->
  <circle cx="1267.5" cy="20" r="100" fill="#fff" opacity="0.08"/>
  <circle cx="32.5" cy="390" r="70" fill="#fff" opacity="0.06"/>

  <!-- 节气专属场景 -->
  
    <!-- 炎热山景 -->
    <path d="M0 290 Q200 265 400 280 Q600 250 800 265 L800 400 L0 400Z" fill="#90caf9" opacity="0.3"/>
    <!-- 炙烤地面 -->
    <path d="M0 340 Q200 320 400 332 Q600 312 800 325 L800 400 L0 400Z" fill="#d84315" opacity="0.5"/>
    <path d="M0 360 Q200 340 400 352 Q600 332 800 345 L800 400 L0 400Z" fill="#bf360c" opacity="0.6"/>
    <!-- 烈日灼烧 -->
    <circle cx="650.0" cy="150" r="80" fill="#ff8f00" opacity="0.9"/>
    <circle cx="650.0" cy="150" r="62" fill="#ff5722" opacity="0.8"/>
    <circle cx="650.0" cy="150" r="44" fill="#ffca28" opacity="0.7"/>
    <!-- 热浪扭曲 -->
    <path d="M0 310 Q100 300 200 308 Q300 298 400 306 Q500 296 600 304 Q700 294 800 302" stroke="#ff8a65" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M0 320 Q100 310 200 318 Q300 308 400 316 Q500 306 600 314 Q700 304 800 312" stroke="#ff8a65" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M0 330 Q100 320 200 328 Q300 318 400 326 Q500 316 600 324 Q700 314 800 322" stroke="#ff8a65" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- 枯草 -->
    
      <path d="M60 400 Q62 375 60 385" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    
      <path d="M150 400 Q152 365 150 375" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6000000000000001"/>
    
      <path d="M240 400 Q242 375 240 385" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    
      <path d="M330 400 Q332 365 330 375" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6000000000000001"/>
    
      <path d="M420 400 Q422 375 420 385" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    
      <path d="M510 400 Q512 365 510 375" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6000000000000001"/>
    
      <path d="M600 400 Q602 375 600 385" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    
      <path d="M690 400 Q692 365 690 375" stroke="#8d6e63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6000000000000001"/>
    
    <!-- 蝉 -->
    <ellipse cx="1105.0" cy="250" rx="16" ry="20" fill="#42a5f5" opacity="0.9"/>
    <ellipse cx="1105.0" cy="238" rx="13" ry="8" fill="#90caf9" opacity="0.9"/>
    <path d="M670 242 Q680 237 690 242" stroke="#42a5f5" stroke-width="2.5" fill="none"/>
    <!-- 西瓜 -->
    <ellipse cx="292.5" cy="380" rx="35" ry="22" fill="#388e3c" opacity="0.9"/>
    <ellipse cx="292.5" cy="378" rx="30" ry="18" fill="#f44336" opacity="0.9"/>
    <ellipse cx="292.5" cy="376" rx="20" ry="12" fill="#f8bbd0" opacity="0.6"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0.0" y="320" width="1300" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="406.25" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="1056.25" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#bf360c" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">大暑</text>

  <!-- 拼音 -->
  <text x="1056.25" y="246" text-anchor="middle" font-size="20"
    fill="#bf360c" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Dàshǔ</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#bf360c" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="1056.25" y="287" text-anchor="middle" font-size="15"
    fill="#bf360c" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">07月22日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="1056.25" y="378" text-anchor="middle" font-size="13"
    fill="#bf360c" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">酷热  ·  中伏  ·  消暑  ·  夏末</text>
</svg>