<?xml version="1.0" encoding="UTF-8"?>
<svg width="1300" height="400" viewBox="0 0 1300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="35%" stop-color="#a5d6a7"/>
      <stop offset="70%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#f1f8e9"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1b5e20" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空背景 -->
  <rect width="1300" height="400" fill="url(#sky)" rx="16"/>

  <!-- 远景大圆装饰 -->
  <circle cx="1267.5" cy="20" r="100" fill="#fff" opacity="0.08"/>
  <circle cx="32.5" cy="390" r="70" fill="#fff" opacity="0.06"/>

  <!-- 节气专属场景 -->
  
    <!-- 远山 -->
    <path d="M0 280 Q150 250 300 270 Q450 235 600 260 Q720 240 800 255 L800 400 L0 400Z" fill="#a5d6a7" opacity="0.4"/>
    <!-- 渐变草地 -->
    <path d="M0 350 Q200 325 400 340 Q600 318 800 335 L800 400 L0 400Z" fill="#66bb6a" opacity="0.6"/>
    <!-- 春雷云 -->
    <ellipse cx="325.0" cy="130" rx="120" ry="50" fill="#a5d6a7" opacity="0.7"/>
    <ellipse cx="276.25" cy="145" rx="80" ry="35" fill="#66bb6a" opacity="0.6"/>
    <ellipse cx="406.25" cy="150" rx="60" ry="30" fill="#a5d6a7" opacity="0.5"/>
    <!-- 闪电 -->
    <path d="M200 200 L185 240 L200 235 L180 280 L210 230 L195 235 L215 200Z" stroke="#ffd600" stroke-width="2" fill="#ffd600" opacity="0.9"/>
    <path d="M250 210 L238 245 L252 240 L235 275 L260 232 L245 237 L262 210Z" stroke="#ffd600" stroke-width="1.5" fill="#ffd600" opacity="0.7"/>
    <!-- 草地新芽 -->
    <path d="M50 400 Q53 360 50 370" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/><path d="M125 400 Q128 345 125 355" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65"/><path d="M200 400 Q203 360 200 370" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M275 400 Q278 345 275 355" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/><path d="M350 400 Q353 360 350 370" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65"/><path d="M425 400 Q428 345 425 355" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M500 400 Q503 360 500 370" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/><path d="M575 400 Q578 345 575 355" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65"/><path d="M650 400 Q653 360 650 370" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/><path d="M725 400 Q728 345 725 355" stroke="#2e7d32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- 醒来的青蛙 -->
    <ellipse cx="568.75" cy="378" rx="18" ry="12" fill="#4caf50" opacity="0.85"/>
    <circle cx="555.75" cy="370" r="5" fill="#4caf50"/>
    <circle cx="581.75" cy="370" r="5" fill="#4caf50"/>
    <circle cx="555.75" cy="369" r="2.5" fill="#1b5e20"/>
    <circle cx="581.75" cy="369" r="2.5" fill="#1b5e20"/>
    <!-- 蝴蝶 -->
    <ellipse cx="1056.25" cy="280" rx="12" ry="8" fill="#e91e63" opacity="0.8" transform="rotate(-30,650,280)"/>
    <ellipse cx="1080.62" cy="275" rx="10" ry="6" fill="#e91e63" opacity="0.6" transform="rotate(20,665,275)"/>
    <line x1="658" y1="280" x2="658" y2="290" stroke="#5d4037" stroke-width="1"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0.0" y="320" width="1300" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="406.25" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="1056.25" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#1b5e20" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">惊蛰</text>

  <!-- 拼音 -->
  <text x="1056.25" y="246" text-anchor="middle" font-size="20"
    fill="#1b5e20" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Jīngzhé</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#1b5e20" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="1056.25" y="287" text-anchor="middle" font-size="15"
    fill="#1b5e20" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">03月05日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="1056.25" y="378" text-anchor="middle" font-size="13"
    fill="#1b5e20" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">惊醒  ·  萌动  ·  奋发  ·  春雷</text>
</svg>