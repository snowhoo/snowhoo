<?xml version="1.0" encoding="UTF-8"?>
<svg width="1300" height="400" viewBox="0 0 1300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe0b2"/>
      <stop offset="35%" stop-color="#ffcc80"/>
      <stop offset="70%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#fff8e1"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#bf360c" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空背景 -->
  <rect width="1300" height="400" fill="url(#sky)" rx="16"/>

  <!-- 远景大圆装饰 -->
  <circle cx="1267.5" cy="20" r="100" fill="#fff" opacity="0.08"/>
  <circle cx="32.5" cy="390" r="70" fill="#fff" opacity="0.06"/>

  <!-- 节气专属场景 -->
  
    <!-- 晚霞远山 -->
    <path d="M0 280 Q200 255 400 270 Q600 245 800 260 L800 400 L0 400Z" fill="#ff8a65" opacity="0.5"/>
    <!-- 晚霞 -->
    <path d="M0 240 Q200 210 400 225 Q600 200 800 215 L800 280 L0 280Z" fill="#ff8a65" opacity="0.3"/>
    <path d="M0 260 Q200 235 400 248 Q600 225 800 238 L800 280 L0 280Z" fill="#ffa726" opacity="0.25"/>
    <!-- 荷塘残荷 -->
    <path d="M0 360 Q200 342 400 352 Q600 338 800 350 L800 400 L0 400Z" fill="#b0bec5" opacity="0.6"/>
    <!-- 残荷 -->
    <ellipse cx="406.25" cy="378" rx="20" ry="9" fill="#bf360c" opacity="0.7"/>
    <path d="M250 369 L250 355" stroke="#f4511e" stroke-width="2" opacity="0.6"/>
    <ellipse cx="893.75" cy="382" rx="18" ry="8" fill="#bf360c" opacity="0.65"/>
    <path d="M550 374 L548 362" stroke="#f4511e" stroke-width="2" opacity="0.5"/>
    <!-- 露珠 -->
    
      <circle cx="130.0" cy="340" r="2" fill="#e3f2fd" opacity="0.4"/>
    
      <circle cx="284.38" cy="355" r="3.5" fill="#e3f2fd" opacity="0.55"/>
    
      <circle cx="438.75" cy="370" r="2" fill="#e3f2fd" opacity="0.7"/>
    
      <circle cx="593.12" cy="340" r="3.5" fill="#e3f2fd" opacity="0.4"/>
    
      <circle cx="747.5" cy="355" r="2" fill="#e3f2fd" opacity="0.55"/>
    
      <circle cx="901.88" cy="370" r="3.5" fill="#e3f2fd" opacity="0.7"/>
    
      <circle cx="1056.25" cy="340" r="2" fill="#e3f2fd" opacity="0.4"/>
    
      <circle cx="1210.62" cy="355" r="3.5" fill="#e3f2fd" opacity="0.55"/>
    
    <!-- 秋蝉 -->
    <ellipse cx="1105.0" cy="240" rx="14" ry="17" fill="#f4511e" opacity="0.85"/>
    <ellipse cx="1105.0" cy="228" rx="11" ry="7" fill="#ff8a65" opacity="0.85"/>
    <path d="M670 232 Q680 227 690 232" stroke="#f4511e" stroke-width="2" fill="none"/>
    <!-- 初秋叶落 -->
    <path d="M100 50 Q106 40 112 50" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(0,106,45)"/><path d="M150 68 Q156 58 162 68" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.39" transform="rotate(53,156,63)"/><path d="M176 86 Q182 76 188 86" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.48" transform="rotate(106,182,81)"/><path d="M226 50 Q232 40 238 50" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(159,232,45)"/><path d="M252 68 Q258 58 264 68" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.39" transform="rotate(212,258,63)"/><path d="M302 86 Q308 76 314 86" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.48" transform="rotate(265,308,81)"/><path d="M328 50 Q334 40 340 50" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(318,334,45)"/><path d="M378 68 Q384 58 390 68" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.39" transform="rotate(371,384,63)"/><path d="M404 86 Q410 76 416 86" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.48" transform="rotate(424,410,81)"/><path d="M454 50 Q460 40 466 50" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(477,460,45)"/><path d="M480 68 Q486 58 492 68" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.39" transform="rotate(530,486,63)"/><path d="M530 86 Q536 76 542 86" stroke="#e65100" stroke-width="1.5" fill="none" opacity="0.48" transform="rotate(583,536,81)"/>
  

  <!-- 底部渐变遮罩 -->
  <rect x="0.0" y="320" width="1300" height="80" fill="url(#sky)" opacity="0.3" rx="0"/>

  <!-- 标题区背景 -->
  <rect x="406.25" y="130" width="300" height="160" fill="#fff" opacity="0.18" rx="12"/>

  <!-- 主标题 -->
  <text x="1056.25" y="208" text-anchor="middle" font-size="80" font-weight="bold"
    fill="#bf360c" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">处暑</text>

  <!-- 拼音 -->
  <text x="1056.25" y="246" text-anchor="middle" font-size="20"
    fill="#bf360c" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Chǔshǔ</text>

  <!-- 分隔线 -->
  <line x1="350" y1="265" x2="450" y2="265" stroke="#bf360c" stroke-width="1.5" opacity="0.4"/>

  <!-- 日期 -->
  <text x="1056.25" y="287" text-anchor="middle" font-size="15"
    fill="#bf360c" opacity="0.65"
    font-family="'Noto Sans SC', Arial, sans-serif">08月23日 · 二十四节气</text>

  <!-- 底部关键词 -->
  <text x="1056.25" y="378" text-anchor="middle" font-size="13"
    fill="#bf360c" opacity="0.5"
    font-family="'Noto Sans SC', Arial, sans-serif">出暑  ·  秋凉  ·  收获  ·  金风</text>
</svg>