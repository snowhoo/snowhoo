    fill="#37474f" font-family="'Noto Serif SC', 'SimHei', 'STKaiti', serif"
    filter="url(#softShadow)" letter-spacing="8">小寒</text>

  <!-- 拼音 -->
  <text x="1056.25" y="246" text-anchor="middle" font-size="20"
    fill="#37474f" opacity="0.7"
    font-family="Arial, sans-serif" letter-spacing="6">Xiǎohán</text>

