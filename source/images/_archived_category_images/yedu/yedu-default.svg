<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6ca"/>
      <stop offset="100%" style="stop-color:#e8c97a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- 月亮 -->
  <circle cx="620" cy="100" r="45" fill="url(#moon)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="635" cy="90" r="40" fill="#1a1a2e" opacity="0.8"/>
  <!-- 星星 -->
  <circle cx="150" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="350" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="500" cy="120" r="2" fill="white" opacity="0.6"/>
  <circle cx="100" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="280" cy="130" r="1.5" fill="white" opacity="0.5"/>
  <!-- 山 -->
  <polygon points="0,400 150,200 300,400" fill="#0a1628" opacity="0.6"/>
  <polygon points="200,400 400,150 600,400" fill="#0d1f3c" opacity="0.5"/>
  <polygon points="500,400 650,250 800,400" fill="#091428" opacity="0.6"/>
  <!-- 文字 -->
  <text x="400" y="320" text-anchor="middle" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="36" fill="#e8c97a" font-weight="bold" filter="url(#glow)">人民日报 · 夜读</text>
  <text x="400" y="365" text-anchor="middle" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="18" fill="#a0a0c0">每晚十点，陪你读书入眠</text>
</svg>
